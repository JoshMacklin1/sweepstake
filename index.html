          {onFamilyClick && playerFamily && (
            <div onClick={() => onFamilyClick(playerFamily)} className="player-card"
              style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 12px", border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, background: C.card, marginBottom: 16, cursor: "pointer", WebkitTapHighlightColor: "transparent" }}>
              <span style={{ width: 30, height: 30, borderRadius: "50%", background: familyColor(playerFamily), color: "#0d1f12", fontWeight: 900, fontSize: 16, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>👨‍👩‍👧</span>
              <div style={{ flex: 1, minWidth: 0, lineHeight: 1.25 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: C.text }}>{playerFamily}</div>
                <div style={{ fontSize: 11, color: C.muted }}>Family</div>
              </div>
              <span aria-hidden="true" style={{ color: C.muted, fontSize: 18, lineHeight: 1, flexShrink: 0 }}>›</span>
            </div>
          )}
          <div style={{ display:"flex", gap:10, marginBottom:18 }}>
            <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", textAlign:"center" }}>
              <div style={{ fontSize:24, fontWeight:900, color: player.total < 0 ? C.red : C.text }}>{player.total}</div>
              <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em" }}>Points</div>
            </div>
            <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", textAlign:"center" }}>
              <div style={{ fontSize:24, fontWeight:900, color: isReaper ? C.dangerText : C.accent }}>{isReaper ? "—" : `${winPct ?? 0}%`}</div>
              <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em" }}>Sweeps win chance</div>
            </div>
          </div>

          <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Points over time</div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", marginBottom:18, display:"flex", justifyContent:"center" }}>
            <Sparkline data={player.hist} width={300} height={72} color={isReaper ? C.red : player.total < 0 ? C.red : player.total === 0 ? C.neutral : C.accent} />
          </div>

          {isReaper ? (
            <>
              <div style={{ fontSize:11, color:C.dangerText, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8 }}>Bounty Board</div>
              {[["Pot 1 upset", 1, 50], ["Pot 2 upset", 2, 15]].map(([label, pot, bounty]) => {
                const count = Object.entries(player._eliminated || {}).filter(([code, stage]) => stage === "GROUP_ELIM" && potOf(code) === pot).length;
                return (
                  <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid #3f1212` }}>
                    <div>
                      <div style={{ fontSize:12, color: count > 0 ? C.text : C.dangerText, opacity: count > 0 ? 1 : 0.5 }}>{label}</div>
                      <div style={{ fontSize:10, color:C.dangerText, opacity:0.6 }}>{bounty}pts per team</div>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color: count > 0 ? C.red : C.dangerText }}>{count > 0 ? `+${count * bounty}pts` : "—"}</div>
                  </div>
                );
              })}
              {(() => {
                const groupMatches = (player._matches || []).filter(m => (m.stage||"").toUpperCase().includes("GROUP") && m.status === "FINISHED");
                const droughtGames = groupMatches.filter(m => goalDroughtPts(m) > 0);
                const droughtTotal = droughtGames.reduce((sum, m) => sum + goalDroughtPts(m), 0);
                return (
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0" }}>
                    <div>
                      <div style={{ fontSize:12, color: droughtTotal > 0 ? C.text : C.dangerText, opacity: droughtTotal > 0 ? 1 : 0.5 }}>Goal drought curse</div>
                      <div style={{ fontSize:10, color:C.dangerText, opacity:0.6 }}>3pts per 0-0</div>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color: droughtTotal > 0 ? C.red : C.dangerText }}>{droughtTotal > 0 ? `+${droughtTotal}pts` : "—"}</div>
                  </div>
                );
              })()}
            </>
          ) : (
            <>
              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Teams</div>
              {player.teams.map(t => {
                const out = t.eliminated && !t.won;
                const wc = t.won ? 100 : (winTeams && winTeams[t.code] != null ? winTeams[t.code] : 0);
                return (
                  <div key={t.code} onClick={onTeamClick ? () => onTeamClick(t.code) : undefined}
                    role={onTeamClick ? "button" : undefined} tabIndex={onTeamClick ? 0 : undefined}
                    onKeyDown={onTeamClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onTeamClick(t.code); } } : undefined}
                    style={{ display:"flex", alignItems:"center", padding:"9px 0", borderBottom:`1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default", WebkitTapHighlightColor:"transparent" }}>
                    <div style={{ marginRight:10, flexShrink:0 }}><Flag code={t.code} size={20} /></div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{t.name} <span style={{ fontSize:10, color:C.muted, fontWeight:400 }}>(P{t.pot})</span></div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:2 }}>
                        <span style={{ fontSize:11, color:C.muted }}>{(t.w + t.d + t.l) > 0 ? `${t.w}W ${t.d}D ${t.l}L` : "0W 0D 0L"}</span>
                        <StatusPill won={t.won} eliminated={t.eliminated} small />
                        <StagePill stage={t.stage} won={t.won} small />
                      </div>
                    </div>
                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      <div style={{ fontSize:13, fontWeight:700, color: t.pts < 0 ? C.red : t.pts > 0 ? C.text : C.muted }}>{t.pts > 0 ? "+" : ""}{t.pts}pts</div>
                      <div style={{ fontSize:10, color: out ? C.muted : C.accent }}>{out ? "out" : `${wc}% to win WC`}</div>
                    </div>
                    {onTeamClick && <span aria-hidden="true" style={{ marginLeft:8, color:C.muted, fontSize:18, lineHeight:1, flexShrink:0 }}>›</span>}
                  </div>
                );
              })}
              <div style={{ fontSize:9, color:C.muted, marginTop:12, lineHeight:1.4 }}>
                Win chances are rough Monte Carlo estimates (pot-weighted) — for fun, not real odds.
              </div>
            </>
          )}
          {badges && badges.length > 0 && (
            <>
              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", margin:"22px 0 8px" }}>Accolades</div>
              {badges.map((b, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                  <span style={{ fontSize:20, flexShrink:0, width:24, textAlign:"center" }}>{b.icon}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color: b.tone === "bad" ? C.dangerText : C.accent }}>{b.label}</div>
                    <div style={{ fontSize:11, color:C.muted }}>{b.desc}</div>
                  </div>
                </div>
              ))}
            </>
          )}
          {!isReaper && (() => {
            const playerCodes = (player.teams || []).map(t => t.code);
            const upcomingPlayerMatches = matches
              .filter(m => {
                const h = m.homeTeam?.tla?.toUpperCase();
                const a = m.awayTeam?.tla?.toUpperCase();
                return (playerCodes.includes(h) || playerCodes.includes(a)) && !isSettled(m.status);
              })
              .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
            if (upcomingPlayerMatches.length === 0) return null;
            return (
              <>
                <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", margin:"22px 0 8px" }}>Upcoming</div>
                {upcomingPlayerMatches.map((m, i) => (
                  <UpcomingMatchRow key={m.id} m={m} onMatchClick={onMatchClick} isLast={i === upcomingPlayerMatches.length - 1} />
                ))}
              </>
            );
          })()}
          {!isReaper && (() => {
            // Unified events: match rows + Q/ELIM milestones across all teams, newest-first.
            const events = [];
            (player.teams || []).forEach(t => {
              matches.forEach(m => {
                const h = m.homeTeam?.tla?.toUpperCase();
                const a = m.awayTeam?.tla?.toUpperCase();
                if (h !== t.code && a !== t.code) return;
                if (isSettled(m.status)) {
                  events.push({ type: "match", sortTime: new Date(m.utcDate).getTime(), m, t, isHome: h === t.code });
                }
              });
              const bonus = stageBonusFor(t.code, t.pts, matches, matchPtsById);
              const grpMatchesForTeam = matches.filter(m => {
                const h = m.homeTeam?.tla?.toUpperCase();
                const a = m.awayTeam?.tla?.toUpperCase();
                return (h === t.code || a === t.code) && (m.stage || "").toUpperCase().includes("GROUP") && isSettled(m.status);
              });
              const lastGrpForTeam = grpMatchesForTeam.length > 0
                ? grpMatchesForTeam.reduce((best, m) => new Date(m.utcDate) > new Date(best.utcDate) ? m : best)
                : null;
              if (lastGrpForTeam) {
                const lastGrpTime = new Date(lastGrpForTeam.utcDate).getTime();
                const dateStr = fmt(lastGrpForTeam.utcDate);
                const isGroupElim = (bonus < 0) || (t.eliminated && (!t.stage || t.stage === "GROUP_ELIM"));
                if (isGroupElim) {
                  events.push({ type: "elim", sortTime: lastGrpTime + 500, t, pts: bonus < 0 ? bonus : null, dateStr });
                } else if (t.stage && t.stage !== "GROUP_ELIM") {
                  events.push({ type: "qual", sortTime: lastGrpTime + 500, t, pts: bonus > 0 ? bonus : null, dateStr });
                }
              }
              // Add E milestone for teams eliminated in knockouts (separate from group Q milestone)
              if (t.eliminated && t.stage && t.stage !== "GROUP_ELIM") {
                const koMatchesForTeam = matches.filter(m => {
                  const h = m.homeTeam?.tla?.toUpperCase();
                  const a = m.awayTeam?.tla?.toUpperCase();
                  return (h === t.code || a === t.code) && !(m.stage||"").toUpperCase().includes("GROUP") && isSettled(m.status);
                });
                const koLoss = koMatchesForTeam.find(m => {
                  const isHome = m.homeTeam?.tla?.toUpperCase() === t.code;
                  const hs = m.score?.fullTime?.home ?? 0;
                  const as_ = m.score?.fullTime?.away ?? 0;
                  const myGoals = isHome ? hs : as_;
                  const oppGoals = isHome ? as_ : hs;
                  if (myGoals < oppGoals) return true;
                  const pen = m.score?.penalties;
                  if (myGoals === oppGoals && pen) {
                    const myPen = isHome ? pen.home : pen.away;
                    const oppPen = isHome ? pen.away : pen.home;
                    return myPen < oppPen;
                  }
                  return false;
                });
                if (koLoss) {
                  events.push({ type: "koElim", sortTime: new Date(koLoss.utcDate).getTime() + 500, t, dateStr: fmt(koLoss.utcDate), stageLabel: (koLoss.stage||"").replace(/_/g," ") });
                }
              }
            });
            events.sort((a, b) => b.sortTime - a.sortTime);
            if (events.length === 0) return null;
            return (
              <>
                <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", margin:"22px 0 8px" }}>Results</div>
                {events.map((ev) => {
                  if (ev.type === "match") {
                    const { m, t, isHome } = ev;
                    const isLive = m.status === "IN_PLAY" || m.status === "PAUSED";
                    const oppName = isHome ? (m.awayTeam?.name || "TBD") : (m.homeTeam?.name || "TBD");
                    const hs = m.score?.fullTime?.home ?? 0;
                    const as_ = m.score?.fullTime?.away ?? 0;
                    const myGoals = isHome ? hs : as_;
                    const oppGoals = isHome ? as_ : hs;
                    const pen = m.score?.penalties;
                    let result = "D";
                    if (myGoals > oppGoals) result = "W";
                    else if (myGoals < oppGoals) result = "L";
                    else if (pen) {
                      const myPen = isHome ? pen.home : pen.away;
                      const oppPen = isHome ? pen.away : pen.home;
                      result = myPen > oppPen ? "W" : "L";
                    }
                    const mPts = matchPtsById[m.id];
                    const earnedPts = mPts ? (isHome ? mPts.home : mPts.away) : null;
                    const resultColor = isLive ? "#f97316" : result === "W" ? C.accent : result === "L" ? C.red : C.muted;
                    const badgeBg = isLive ? "rgba(249,115,22,0.15)" : result === "W" ? C.posBg : result === "L" ? C.negBg : "rgba(148,163,184,0.12)";
                    return (
                      <div key={"r" + t.code + m.id} className={onTeamClick ? "player-card" : undefined} onClick={onTeamClick ? () => onTeamClick(t.code) : undefined} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 0", borderBottom:`1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default" }}>
                        <div style={{ width:22, height:22, borderRadius:4, flexShrink:0, background: badgeBg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:resultColor }}>{result}</div>
                        <Flag code={t.code} size={18} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}{t.pot ? <span style={{ fontSize:9, color:C.muted, fontWeight:400 }}> (P{t.pot})</span> : ""}</div>
                          <div style={{ fontSize:10, color:C.muted }}>{isLive && <span style={{ color:"#f97316", fontWeight:700 }}>LIVE · </span>}vs {oppName} · {fmt(m.utcDate)}</div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          {earnedPts != null && <div style={{ fontSize:12, fontWeight:800, color: isLive ? "#f97316" : C.text }}>{earnedPts > 0 ? `+${earnedPts}` : earnedPts} pts</div>}
                          <div style={{ fontSize:11, color:resultColor }}>{myGoals}–{oppGoals}</div>
                        </div>
                      </div>
                    );
                  }
                  if (ev.type === "qual") {
                    const { t, pts, dateStr } = ev;
                    return (
                      <div key={"q" + t.code} className={onTeamClick ? "player-card" : undefined} onClick={onTeamClick ? () => onTeamClick(t.code) : undefined} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 0", borderBottom:`1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default" }}>
                        <div style={{ width:22, height:22, borderRadius:4, flexShrink:0, background:C.posBg, border:`1px solid ${C.accent}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:C.accent }}>Q</div>
                        <Flag code={t.code} size={18} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}{t.pot ? <span style={{ fontSize:9, color:C.muted, fontWeight:400 }}> (P{t.pot})</span> : ""}</div>
                          <div style={{ fontSize:10, color:C.muted }}>Qualified for Knockouts · {dateStr}</div>
                        </div>
                        {pts != null && <div style={{ fontSize:12, fontWeight:800, color:C.text, flexShrink:0 }}>+{pts} pts</div>}
                      </div>
                    );
                  }
                  if (ev.type === "elim") {
                    const { t, pts, dateStr } = ev;
                    return (
                      <div key={"e" + t.code} className={onTeamClick ? "player-card" : undefined} onClick={onTeamClick ? () => onTeamClick(t.code) : undefined} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 0", borderBottom:`1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default" }}>
                        <div style={{ width:22, height:22, borderRadius:4, flexShrink:0, background:C.negBg, border:`1px solid ${C.red}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:C.red }}>E</div>
                        <Flag code={t.code} size={18} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}{t.pot ? <span style={{ fontSize:9, color:C.muted, fontWeight:400 }}> (P{t.pot})</span> : ""}</div>
                          <div style={{ fontSize:10, color:C.muted }}>Eliminated from groups · {dateStr}</div>
                        </div>
                        {pts != null && <div style={{ fontSize:12, fontWeight:800, color:C.text, flexShrink:0 }}>{pts} pts</div>}
                      </div>
                    );
                  }
                  if (ev.type === "koElim") {
                    const { t, dateStr, stageLabel } = ev;
                    return (
                      <div key={"ke" + t.code} className={onTeamClick ? "player-card" : undefined} onClick={onTeamClick ? () => onTeamClick(t.code) : undefined} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 0", borderBottom:`1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default" }}>
                        <div style={{ width:22, height:22, borderRadius:4, flexShrink:0, background:C.negBg, border:`1px solid ${C.red}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:C.red }}>E</div>
                        <Flag code={t.code} size={18} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}{t.pot ? <span style={{ fontSize:9, color:C.muted, fontWeight:400 }}> (P{t.pot})</span> : ""}</div>
                          <div style={{ fontSize:10, color:C.muted }}>{stageLabel} · {dateStr}</div>
                        </div>
                      </div>
                    );
                  }
                  return null;
                })}
              </>
            );
          })()}
        </div>
      </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TEAM MODAL — bottom sheet with a single team's full match history
// ─────────────────────────────────────────────────────────────────────────────
function TeamCardContent({ bodyRef, tla, matches, ranked, matchPtsById, onTeamClick, onOwnerClick, onMatchClick, onClose }) {
  const owner = ownerOf(tla, ranked);
  const pot = potOf(tla);

  let teamEntry = null;
  for (const p of ranked) {
    const t = (p.teams || []).find(t => t.code === tla);
    if (t) { teamEntry = t; break; }
  }

  const teamMatches = matches
    .filter(m => {
      const h = m.homeTeam?.tla?.toUpperCase();
      const a = m.awayTeam?.tla?.toUpperCase();
      return (h === tla || a === tla) && isSettled(m.status);
    })
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const upcomingMatches = matches
    .filter(m => {
      const h = m.homeTeam?.tla?.toUpperCase();
      const a = m.awayTeam?.tla?.toUpperCase();
      return (h === tla || a === tla) && !isSettled(m.status);
    })
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const teamName = teamEntry?.name || tla;
  const stage = teamEntry?.stage;
  const eliminated = teamEntry?.eliminated;
  const won = teamEntry?.won;
  const totalPts = teamEntry?.pts ?? 0;
  // Orphaned Last-32 qualification bonus (points not tied to any single match).
  const stageBonus = stageBonusFor(tla, totalPts, matches, matchPtsById);

  return (<>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Flag code={tla} size={28} />
            <div>
              <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>{teamName}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
                <span style={{ fontSize: 11, color: C.muted }}>{owner ? `Pot ${pot}` : `Unassigned · Pot ${pot}`}</span>
                <StatusPill won={won} eliminated={eliminated} small />
              </div>
            </div>
          </div>
          <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
        </div>
        <div ref={bodyRef} style={{ flex: 1, overflowY: "auto", padding: "16px 14px 28px" }}>
          {owner && (() => {
            const oe = ranked.find(p => p.name === owner);
            const r = oe ? (oe._displayRank || (ranked.indexOf(oe) + 1)) : null;
            const ord = (n) => { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); };
            return (
              <div onClick={onOwnerClick ? () => onOwnerClick(owner) : undefined}
                className={onOwnerClick ? "player-card" : undefined}
                role={onOwnerClick ? "button" : undefined} tabIndex={onOwnerClick ? 0 : undefined}
                onKeyDown={onOwnerClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOwnerClick(owner); } } : undefined}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 12px", border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, background: C.card, marginBottom: 16, cursor: onOwnerClick ? "pointer" : "default", WebkitTapHighlightColor: "transparent" }}>
                <span style={{ width: 30, height: 30, borderRadius: "50%", background: playerColor(owner), color: "#0d1f12", fontWeight: 900, fontSize: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{owner[0]}</span>
                <div style={{ flex: 1, minWidth: 0, lineHeight: 1.25 }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{owner}</div>
                  <div style={{ fontSize: 11, color: C.muted }}>Owner{r ? ` · ${ord(r)} in the league` : ""}</div>
                </div>
                {onOwnerClick && <span aria-hidden="true" style={{ color: C.muted, fontSize: 18, lineHeight: 1, flexShrink: 0 }}>›</span>}
              </div>
            );
          })()}
          <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 900, color: totalPts < 0 ? C.red : C.text, lineHeight: 1 }}>{totalPts > 0 ? `+${totalPts}` : totalPts}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 4 }}>Points</div>
            </div>
            {(() => {
              const sk = won ? "WINNER" : (eliminated && !won ? (stage || "GROUP_ELIM") : (stage || "GROUP"));
              const scfg = STAGE_PILL_CFG[sk] || STAGE_PILL_CFG.GROUP;
              return (
                <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, padding: "12px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 24, fontWeight: 900, color: scfg.color, lineHeight: 1 }}>{scfg.label}</div>
                  <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 4 }}>Stage</div>
                </div>
              );
            })()}
          </div>

          {upcomingMatches.length > 0 && (<>
            <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Upcoming</div>
            {upcomingMatches.map((m, i) => (
              <UpcomingMatchRow key={m.id} m={m} onMatchClick={onMatchClick} isLast={i === upcomingMatches.length - 1} />
            ))}
            <div style={{ marginBottom: 20 }} />
          </>)}

          <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Results</div>
          {(() => {
            const renderMatchRow = (m) => {
              const isHome = m.homeTeam?.tla?.toUpperCase() === tla;
              const isLive = m.status === "IN_PLAY" || m.status === "PAUSED";
              const oppCode = isHome ? m.awayTeam?.tla?.toUpperCase() : m.homeTeam?.tla?.toUpperCase();
              const oppName = isHome ? (m.awayTeam?.name || "TBD") : (m.homeTeam?.name || "TBD");
              const hs = m.score?.fullTime?.home ?? 0;
              const as_ = m.score?.fullTime?.away ?? 0;
              const myGoals = isHome ? hs : as_;
              const oppGoals = isHome ? as_ : hs;
              const pen = m.score?.penalties;
              let result = "D";
              if (myGoals > oppGoals) result = "W";
              else if (myGoals < oppGoals) result = "L";
              else if (pen) {
                const myPen = isHome ? pen.home : pen.away;
                const oppPen = isHome ? pen.away : pen.home;
                result = myPen > oppPen ? "W" : "L";
              }
              const mPts = matchPtsById[m.id];
              const earnedPts = mPts ? (isHome ? mPts.home : mPts.away) : null;
              const resultColor = isLive ? "#f97316" : result === "W" ? C.accent : result === "L" ? C.red : C.muted;
              const badgeBg = isLive ? "rgba(249,115,22,0.15)" : result === "W" ? C.posBg : result === "L" ? C.negBg : "rgba(148,163,184,0.12)";
              return (
                <div key={m.id} className={onTeamClick && oppCode ? "player-card" : undefined} onClick={onTeamClick && oppCode ? () => onTeamClick(oppCode) : undefined} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}`, cursor: onTeamClick && oppCode ? "pointer" : "default" }}>
                  <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: badgeBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: resultColor }}>{result}</div>
                  <Flag code={oppCode} size={18} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{oppName}{POT[oppCode] ? <span style={{ fontSize: 9, color: C.muted, fontWeight: 400 }}> (P{POT[oppCode]})</span> : ""}</div>
                    <div style={{ fontSize: 10, color: C.muted }}>{isLive && <span style={{ color: "#f97316", fontWeight: 700 }}>LIVE · </span>}{(m.stage || "").replace(/_/g, " ")} · {fmt(m.utcDate)}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    {earnedPts != null && <div style={{ fontSize: 12, fontWeight: 800, color: isLive ? "#f97316" : C.text }}>{earnedPts > 0 ? `+${earnedPts}` : earnedPts} pts</div>}
                    <div style={{ fontSize: 11, color: resultColor }}>{myGoals}–{oppGoals}</div>
                  </div>
                </div>
              );
            };

            // Build unified events: match rows + Q/ELIM milestones, sorted newest-first
            const grpMatches = teamMatches.filter(m => (m.stage || "").toUpperCase().includes("GROUP"));
            const lastGrpMatch = grpMatches.length > 0 ? grpMatches[grpMatches.length - 1] : null;
            const events = teamMatches.map(m => ({ type: "match", sortTime: new Date(m.utcDate).getTime(), m }));

            if (lastGrpMatch) {
              const lastGrpTime = new Date(lastGrpMatch.utcDate).getTime();
              const dateStr = fmt(lastGrpMatch.utcDate);
              // Only show "eliminated from groups" if eliminated AT the group stage.
              // Teams eliminated later (e.g. Last 32) have stage="LAST_32" — show qual instead.
              const isGroupElim = (stageBonus < 0) || (eliminated && (!stage || stage === "GROUP_ELIM"));
              if (isGroupElim) {
                events.push({ type: "elim", sortTime: lastGrpTime + 500, dateStr, pts: stageBonus < 0 ? stageBonus : null });
              } else if (stage && stage !== "GROUP_ELIM") {
                events.push({ type: "qual", sortTime: lastGrpTime + 500, dateStr, pts: stageBonus > 0 ? stageBonus : null });
              }
            }
            // Add E milestone for teams eliminated in knockouts (separate from group Q)
            if (eliminated && stage && stage !== "GROUP_ELIM") {
              const koLoss = teamMatches.find(m => {
                if ((m.stage||"").toUpperCase().includes("GROUP")) return false;
                const isHome = m.homeTeam?.tla?.toUpperCase() === tla;
                const hs = m.score?.fullTime?.home ?? 0;
                const as_ = m.score?.fullTime?.away ?? 0;
                const myGoals = isHome ? hs : as_;
                const oppGoals = isHome ? as_ : hs;
                if (myGoals < oppGoals) return true;
                const pen = m.score?.penalties;
                if (myGoals === oppGoals && pen) {
                  const myPen = isHome ? pen.home : pen.away;
                  const oppPen = isHome ? pen.away : pen.home;
                  return myPen < oppPen;
                }
                return false;
              });
              if (koLoss) {
                events.push({ type: "koElim", sortTime: new Date(koLoss.utcDate).getTime() + 500, dateStr: fmt(koLoss.utcDate), stageLabel: (koLoss.stage||"").replace(/_/g," ") });
              }
            }

            events.sort((a, b) => b.sortTime - a.sortTime);

            if (events.length === 0) {
              return <div style={{ fontSize: 12, color: C.muted, padding: "8px 0" }}>No results yet</div>;
            }
            return (
              <>
                {events.map((ev) => {
                  if (ev.type === "match") return renderMatchRow(ev.m);
                  if (ev.type === "qual") return (
                    <div key="qual" style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: C.posBg, border: `1px solid ${C.accent}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 900, color: C.accent }}>Q</div>
                      <Flag code={tla} size={18} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Qualified for Knockouts</div>
                        <div style={{ fontSize: 10, color: C.muted }}>top-2 group finish · {ev.dateStr}</div>
                      </div>
                      {ev.pts != null && (
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 12, fontWeight: 800, color: C.text }}>+{ev.pts} pts</div>
                        </div>
                      )}
                    </div>
                  );
                  if (ev.type === "elim") return (
                    <div key="elim" style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: C.negBg, border: `1px solid ${C.red}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 900, color: C.red }}>E</div>
                      <Flag code={tla} size={18} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Eliminated from groups</div>
                        <div style={{ fontSize: 10, color: C.muted }}>bottom of group · {ev.dateStr}</div>
                      </div>
                      {ev.pts != null && (
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 12, fontWeight: 800, color: C.text }}>{ev.pts} pts</div>
                        </div>
                      )}
                    </div>
                  );
                  if (ev.type === "koElim") return (
                    <div key="koelim" style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: C.negBg, border: `1px solid ${C.red}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 900, color: C.red }}>E</div>
                      <Flag code={tla} size={18} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Eliminated</div>
                        <div style={{ fontSize: 10, color: C.muted }}>{ev.stageLabel} · {ev.dateStr}</div>
                      </div>
                    </div>
                  );
                  return null;
                })}
              </>
            );
          })()}
        </div>
      </>
  );
}

  "#f59e0b", // Alex - amber
  "#60a5fa", // Ben - blue
  "#f472b6", // Charlotte - pink
  "#34d399", // Craig - emerald
  "#fb923c", // Ahmet - orange
  "#818cf8", // Dharma - indigo
  "#f87171", // Gary - red
  "#a78bfa", // Henry - violet
  "#2dd4bf", // Katrina - teal
  "#facc15", // Luke - yellow
  "#c084fc", // Marco - purple
  "#4ade80", // Michelle - light green
  "#38bdf8", // Natalie - sky
  "#fb7185", // Nick - rose
  "#fbbf24", // Ollie - gold
  "#6ee7b7", // Paul - mint
  "#93c5fd", // Peter - light blue
  "#fca5a5", // Ramon - light red
  "#86efac", // Sam - pale green
  "#e879f9", // Stephen - fuchsia
  "#67e8f9", // Stuart - cyan
  "#fde68a", // Wes - pale yellow
  "#a5b4fc", // Will A - periwinkle
  "#fdba74", // Will B - peach

  "#22c55e", // Josh - green
];

// Derived from the active group's PLAYERS (not hardcoded) so a different
// group's roster gets correct, collision-free color assignment too. `var`
// (not `const`) so the group gate can recompute it after switching groups.
var PLAYER_NAME_ORDER = PLAYERS.map(p => p.name);

const playerColor = (name) => {
  const idx = PLAYER_NAME_ORDER.indexOf(name);
  return idx >= 0 ? PLAYER_COLORS[idx] : PLAYER_COLORS[PLAYER_NAME_ORDER.length % PLAYER_COLORS.length];
};

const FAMILY_COLORS = ["#f59e0b", "#60a5fa", "#f472b6", "#34d399", "#a78bfa", "#fb923c", "#38bdf8"];
const familyColor = (name) => {
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return FAMILY_COLORS[h % FAMILY_COLORS.length];
};

const formatBucket = (b) => {
  if (!b) return "";
  if (b === "Start") return "Start";
  if (b.startsWith("MD")) return `MD ${b.slice(2)}`;
  if (b.includes("LAST_32")) return "Last 32";
  if (b.includes("LAST_16") || b.includes("16")) return "Last 16";
  if (b.includes("QUARTER")) return "QF";
  if (b.includes("SEMI")) return "SF";
  if (b === "FINAL") return "Final";
  return b;
};

function HScrollButtons({ targetRef, step = 200 }) {
  const scroll = (dir) => {
    const el = targetRef.current;
    if (el) el.scrollBy({ left: dir * step, behavior: "smooth" });
  };
  const btn = {
    width:34, height:34, borderRadius:"50%", border:`1px solid ${C.border}`,
    background:C.card, color:C.dim, cursor:"pointer", display:"flex",
    alignItems:"center", justifyContent:"center", fontSize:18, lineHeight:1,
    padding:0, fontWeight:700,
  };
  return (
    <div className="hscroll-nav" style={{ gap:8, justifyContent:"flex-end", marginBottom:10, paddingRight:4 }}>
      <button style={btn} onClick={() => scroll(-1)} aria-label="Scroll left">‹</button>
      <button style={btn} onClick={() => scroll(1)} aria-label="Scroll right">›</button>
    </div>
  );
}

function BumpChart({ history, allRanked, bucketLabels = [], raceHistory, colorFn }) {
  const [selected, setSelected] = React.useState(null);
  const [atLeft, setAtLeft] = React.useState(false);
  const scrollRef = React.useRef(null);
  const maxLen = Math.max(...history.map(p => p.hist.length));

  // Start scrolled to the right (current standings); buttons/trackpad reveal history.
  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) requestAnimationFrame(() => { el.scrollLeft = el.scrollWidth; });
  }, [maxLen]);

  const handleBumpScroll = React.useCallback(() => {
    const el = scrollRef.current;
    if (el) setAtLeft(el.scrollLeft <= 1);
  }, []);

  if (maxLen < 2) {
    return (
      <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13 }}>
        Not enough scoring events yet to show rankings over time.
      </div>
    );
  }

  const n = history.length;
  const padL = 16, padR = 72, padT = 16, padB = 24;
  const isDesktop = window.innerWidth >= 768;
  // Width available for the plotted columns. On desktop base it on the CONTENT
  // column (capped at #root's 760px max, minus 28px padding each side) — NOT the
  // full monitor width, which blows the columns out absurdly wide.
  const contentW = isDesktop ? Math.min(window.innerWidth - 260, 760) - 56 : window.innerWidth;
  // Subtract the body's own side padding (28px mobile = 14×2) so the chart fills
  // the content column; the desktop contentW already nets that off, hence -8.
  const availW = contentW - padL - padR - (isDesktop ? 8 : 28);
  // Fill the available width, but never narrower than MIN_COL — past that point
  // (lots of games) the chart grows beyond the view and scrolls instead.
  const MIN_COL = 80;
  const COL_W = maxLen <= 2 ? availW : Math.max(MIN_COL, Math.floor(availW / (maxLen - 1)));
  // Chart only scrolls (and thus needs the left fade) once it outgrows the view.
  const scrollable = (maxLen - 1) * COL_W > availW + 1;
  const rowH = 34;
  const chartW = (maxLen - 1) * COL_W;
  const chartH = (n - 1) * rowH;
  const W = padL + chartW + padR;
  const H = padT + chartH + padB;

  const xScale = t => padL + t * COL_W;
  const yScale = r => padT + (r - 1) * rowH;

  const colorOf = name => (colorFn || playerColor)(name);

  const timePoints = Array.from({length: maxLen}, (_, t) => {
    const scores = history.map(p => ({
      name: p.name,
      pts: p.hist[Math.min(t, p.hist.length - 1)],
    })).sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
    const ranks = {};
    scores.forEach((s, i) => { ranks[s.name] = i + 1; });
    return ranks;
  });

  const buildPath = name => {
    const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i-1][0] + pts[i][0]) / 2;
      d += ` C ${cpx},${pts[i-1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
    }
    return d;
  };

  const startRanks = timePoints[0];
  const endRanks = timePoints[maxLen - 1];

  const xLabels = Array.from({length: maxLen}, (_, t) => ({
    t,
    label: bucketLabels[t] ? formatBucket(bucketLabels[t]) : (t === 0 ? "Start" : t === maxLen-1 ? "Now" : "")
  })).filter(x => x.label);

  return (
    <div style={{ padding:"8px 0 0" }}>
      <HScrollButtons targetRef={scrollRef} step={COL_W * 2} />
      <div style={{ position:"relative" }}>
        <div ref={scrollRef} onScroll={handleBumpScroll} style={{ overflowX:"scroll", overflowY:"hidden", WebkitOverflowScrolling:"touch" }}>
          <div style={{ display:"inline-block" }}>
        <svg width={W} height={H} style={{ display:"block" }}>
          {/* Horizontal grid lines */}
          {Array.from({length: n}, (_, i) => (
            <line key={i} x1={padL} y1={yScale(i+1)} x2={padL+chartW} y2={yScale(i+1)} stroke={C.border} strokeWidth={1} />
          ))}
          {/* Lines */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <path key={p.name} d={buildPath(p.name)} fill="none"
              stroke={dim ? C.border : colorOf(p.name)}
              strokeWidth={selected === p.name ? 3.5 : 2.5}
              strokeLinecap="round" strokeLinejoin="round"
              opacity={dim ? 0.3 : 0.9} />
            );
          })}
          {/* Dots */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return timePoints.map((tp, t) => (
              <circle key={`${p.name}-${t}`}
                cx={xScale(t)} cy={yScale(tp[p.name])}
                r={t === maxLen-1 ? 5 : 3}
                fill={dim ? C.border : colorOf(p.name)}
                stroke="#080c18" strokeWidth={1.5}
                opacity={dim ? 0.3 : 1} />
            ));
          })}
          {/* Rank numbers on left */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`s-${p.name}`} x={padL-5} y={yScale(startRanks[p.name])+4}
              textAnchor="end" fontSize={10} fontWeight={700}
              fill={dim ? C.border : colorOf(p.name)}
              opacity={dim ? 0.3 : 1}>
              {startRanks[p.name]}
            </text>
            );
          })}
          {/* Name labels on right — tappable */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`e-${p.name}`} x={padL+chartW+8} y={yScale(endRanks[p.name])+4}
              textAnchor="start" fontSize={11} fontWeight={700}
              fill={dim ? C.neutral : colorOf(p.name)}
              opacity={dim ? 0.4 : 1}
              style={{ cursor:"pointer" }}
              onClick={() => setSelected(selected === p.name ? null : p.name)}>
              {p.name}
            </text>
            );
          })}
          {/* X labels */}
          {xLabels.map(({t, label}) => (
            <text key={`xl-${t}`} x={xScale(t)} y={H-4}
              textAnchor="middle" fontSize={9} fill={C.muted}>{label}</text>
          ))}
        </svg>
          </div>
        </div>
        {/* Left fade — only when scrollable and not already at the leftmost position */}
        {scrollable && !atLeft && (
        <div style={{
          position:"absolute", top:0, left:0, bottom:0, width:48,
          background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)`,
          pointerEvents:"none",
        }}/>
        )}
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16, padding:"0 4px" }}>
        {allRanked.map((p, i) => {
          const dim = selected && selected !== p.name;
          return (
          <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
            style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", opacity: dim ? 0.35 : 1 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:colorOf(p.name), flexShrink:0 }}/>
            <span style={{ fontSize:11, color:C.muted }}>{p.name} <span style={{ color:C.text, fontWeight:700 }}>{p.total}pts</span></span>
          </div>
          );
        })}
      </div>
    </div>
  );
}

function BarRaceModal({ history, allRanked, bucketLabels = [], elimByFrame = [], stageByFrame = [], onClose, colorFn, isFamily = false }) {
  const maxLen = Math.max(...history.map(p => p.hist.length));
  const [frame, setFrame] = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const intervalRef = React.useRef(null);
  const TICK = 800;
  const n = history.length;

  // Each player's teams (code + elimination status) for the flags shown by the bar.
  const teamsByName = {};
  allRanked.forEach(p => { teamsByName[p.name] = p.teams || []; });
  // Teams eliminated as of the current frame (progressive through the race).
  const elimNow = React.useMemo(
    () => new Set(elimByFrame[Math.min(frame, Math.max(0, elimByFrame.length - 1))] || []),
    [frame, elimByFrame]
  );

  const colorOf = name => (colorFn || playerColor)(name);

  const prevRanks = React.useRef({});

  // Compute standings at this frame — each entry gets a rank (0 = top)
  const standings = React.useMemo(() => {
    const sorted = history.map(p => ({
      name: p.name,
      value: p.hist[Math.min(frame, p.hist.length - 1)],
      color: colorOf(p.name),
    })).sort((a, b) => b.value - a.value || a.name.localeCompare(b.name));
    return sorted.map((s, i) => {
      const prev = prevRanks.current[s.name] ?? i;
      const movingUp = i < prev; // lower index = higher rank = moving up
      return { ...s, rank: i, movingUp };
    });
  }, [frame]);

  // After each render, update prevRanks
  React.useEffect(() => {
    standings.forEach(s => { prevRanks.current[s.name] = s.rank; });
  }, [standings]);

  const minValue = Math.min(...standings.map(s => s.value), 0);
  const maxValue = Math.max(...standings.map(s => s.value), 1);
  // Offset so negative values still render a visible bar (shifted so min = 0).
  const barOffset = minValue < 0 ? -minValue : 0;
  const barRange = maxValue + barOffset || 1;

  // Work out tournament stage label for current frame
  const frameLabel = frame === 0 ? "Start" : `Game ${frame} of ${maxLen - 1}`;
  const stageNow = stageByFrame.length ? (stageByFrame[Math.min(frame, stageByFrame.length - 1)] || "") : "";
  // End-of-race celebration: who's top at the final frame, and whether the
  // tournament is actually decided (the final has been played → "Champion",
  // otherwise they're just "Leading the Race").
  const tournamentDone = stageByFrame.length > 0 && stageByFrame[stageByFrame.length - 1] === "Finals";
  const champ = (allRanked && allRanked.length) ? allRanked[0] : null;
  const raceFinished = frame >= maxLen - 1 && maxLen > 1 && champ && champ.total > 0;

  React.useEffect(() => {
    if (playing && frame < maxLen - 1) {
      intervalRef.current = setTimeout(() => setFrame(f => f + 1), TICK);
    } else if (frame >= maxLen - 1) {
      setPlaying(false);
    }
    return () => clearTimeout(intervalRef.current);
  }, [playing, frame]);

  const wasPlayingRef = React.useRef(false);

  const onScrubStart = () => { wasPlayingRef.current = playing; setPlaying(false); };
  const onScrubEnd = () => { if (wasPlayingRef.current && frame < maxLen - 1) setPlaying(true); };

  const toggle = () => {
    if (frame >= maxLen - 1) { setFrame(0); setPlaying(true); }
    else setPlaying(p => !p);
  };
  const restart = () => { setFrame(0); setPlaying(true); };
  const progress = (frame / Math.max(maxLen - 1, 1)) * 100;

  // Fixed row height for animation
  const ROW_H = `${100 / n}%`;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:60, background:C.bg, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text }}>🏁 {isFamily ? "Family Race" : "The Race"}</div>
        <button onClick={onClose} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
      </div>

      {/* Chart */}
      <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0 }}>
          {/* Render in STABLE order (by name) so DOM nodes never remount */}
          {[...history].sort((a,b) => a.name.localeCompare(b.name)).map(p => {
            const s = standings.find(x => x.name === p.name);
            if (!s) return null;
            const topPct = (s.rank / n) * 100;
            const barW = ((s.value + barOffset) / barRange) * 100;
            return (
              <div key={s.name} style={{
                position:"absolute",
                left:0, right:0,
                height:ROW_H,
                top:`${topPct}%`,
                transition:`top ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                display:"flex", alignItems:"center",
                padding:"0 16px",
                gap:8,
                zIndex: s.movingUp ? n + 1 : 1,
              }}>
                <div style={{ width:18, textAlign:"right", fontSize:11, color:C.muted, flexShrink:0, fontWeight:700 }}>
                  {s.rank + 1}
                </div>
                <div style={{ width: isFamily ? 100 : 66, textAlign:"right", fontSize:12, fontWeight:700, color:C.text, flexShrink:0, overflow:"hidden", whiteSpace:"nowrap" }}>
                  {s.name}
                </div>
                {!isFamily && (
                <div style={{ display:"flex", flexDirection:"column", justifyContent:"center", gap:2, flexShrink:0, width:75 }}>
                  {(teamsByName[s.name] || []).length === 0 ? (
                    <span style={{ fontSize:16, lineHeight:1, marginLeft:2 }}>💀</span>
                  ) : chunkFlags(teamsByName[s.name] || [], 3).map((row, ri) => (
                    <div key={ri} style={{ display:"flex", gap:3 }}>
                      {row.map(t => {
                        const out = elimNow.has(t.code);
                        const url = flag(t.code);
                        return (
                          <div key={t.code} style={{ position:"relative", width:22, height:15, flexShrink:0 }}>
                            <div style={{
                              position:"absolute", inset:0, borderRadius:2,
                              backgroundImage: url ? `url(${url})` : "none", backgroundColor:C.border,
                              backgroundSize:"cover", backgroundPosition:"center",
                              filter: out ? "grayscale(1)" : "none", opacity: out ? 0.4 : 1,
                            }}/>
                            {out && (
                              <span style={{ position:"absolute", top:-2, right:-1, fontSize:9, fontWeight:900, color:C.red, textShadow:"0 0 2px rgba(0,0,0,0.9)", lineHeight:1, zIndex:1 }}>✕</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
                )}
                <div style={{ flex:1, position:"relative", height:"55%", minHeight:18 }}>
                  <div style={{ position:"absolute", inset:0, background:C.border, borderRadius:"0 3px 3px 0" }}/>
                  <div style={{
                    position:"absolute", left:0, top:0, bottom:0,
                    width:`${barW}%`,
                    background:s.color,
                    borderRadius:"0 3px 3px 0",
                    transition:`width ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                    ...(raceFinished && s.rank === 0 ? {
                      "--glow-color": s.color,
                      "--glow-color-dim": s.color + "55",
                      animation: "barGlow 1.8s ease-in-out infinite",
                    } : {}),
                  }}/>
                  {s.value !== 0 && (
                    <div style={{
                      position:"absolute", left:0, top:0, bottom:0, right:0,
                      display:"flex", alignItems:"center",
                      justifyContent: barW > 70 ? "flex-end" : "flex-start",
                      paddingLeft: barW > 70 ? 0 : `calc(${Math.max(barW, 0)}% + 6px)`,
                      paddingRight: barW > 70 ? 8 : 0,
                      pointerEvents:"none",
                    }}>
                      <span style={{ fontSize:11, fontWeight:700, color: s.value < 0 ? C.red : C.text, whiteSpace:"nowrap" }}>
                        {s.value}pts
                      </span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Stage label — overlays the bars bottom-right, naming the tournament
            stage the race is currently at (Group Stage Game 1–3, then rounds). */}
        {stageNow && (() => {
          // Stack words vertically so long titles stay narrow; the group-stage
          // game number drops to a smaller bracketed line underneath. Short
          // labels (Last 32/16, Finals) stay on one line.
          let lines = [stageNow], sub = "";
          const gm = stageNow.match(/^Group Stage Game (\d+)$/);
          if (gm) { lines = ["Group", "Stage"]; sub = `(Game ${gm[1]})`; }
          else if (!/^Last /.test(stageNow) && stageNow.indexOf(" ") !== -1) { lines = stageNow.split(" "); }
          return (
            <div key={stageNow} style={{ position:"absolute", bottom:10, right:16, textAlign:"right", pointerEvents:"none", zIndex: n + 5, transformOrigin:"100% 100%", animation:"stagePop 0.9s ease-out" }}>
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", color:"rgba(240,250,243,0.35)", textTransform:"uppercase", marginBottom:2 }}>Stage</div>
              {lines.map((w, i) => (
                <div key={i} style={{ fontSize:20, fontWeight:800, color:"rgba(240,250,243,0.34)", lineHeight:1.05, textShadow:"0 1px 6px rgba(0,0,0,0.55)", whiteSpace:"nowrap" }}>{w}</div>
              ))}
              {sub && <div style={{ fontSize:13, fontWeight:700, color:"rgba(240,250,243,0.34)", lineHeight:1.1, textShadow:"0 1px 6px rgba(0,0,0,0.55)", whiteSpace:"nowrap", marginTop:1 }}>{sub}</div>}
            </div>
          );
        })()}
      </div>

      {/* Controls */}
      <div style={{ padding:"10px 16px 20px", flexShrink:0 }}>
        {/* Scrubber */}
        <input
          type="range" min={0} max={maxLen - 1} value={frame}
          onMouseDown={onScrubStart} onTouchStart={onScrubStart}
          onMouseUp={onScrubEnd} onTouchEnd={onScrubEnd}
          onChange={e => setFrame(Number(e.target.value))}
          style={{ width:"100%", marginBottom:10, accentColor:C.accent, cursor:"pointer" }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontSize:11, color:C.muted, fontWeight:600 }}>{frameLabel}</span>
          <span style={{ fontSize:11, color:C.muted }}>Event {frame + 1} of {maxLen}</span>
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:8 }}>
          <button onClick={restart} style={{ background:C.border, border:"none", color:C.text, padding:"8px 16px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>Restart</button>
          <button onClick={toggle} style={{ background:C.accent, border:"none", color:"white", padding:"8px 24px", borderRadius:6, cursor:"pointer", fontSize:14, fontWeight:700 }}>
            {playing ? "⏸" : frame >= maxLen - 1 ? "↺" : "▶"}
          </button>
        </div>
      </div>
    </div>
  );
}
