  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1f12;
      color: #f0faf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .league-card {
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Sweeps/Groups/Knockouts toggle — persistent sticky top nav.
       Class-based (not inline) so it doesn't inherit the header's
       desktop [style*="sticky"] rules. z-index sits above the live
       banner so it stays pinned at the very top on scroll. */
    .sweeps-nav {
      padding: 10px 14px 12px;
    }
    .sweeps-seg {
      display: flex;
      border: 1px solid #1e3d28;
      border-radius: 10px;
      overflow: hidden;
    }
    .sweeps-seg button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    /* Horizontal-scroll arrow buttons — desktop/mouse only (hidden on touch) */
    .hscroll-nav { display: none; }
    /* Scores day strip — no visible scrollbar (swipe/drag only on mobile,
       arrow buttons below take over on desktop) */
    .day-strip { scrollbar-width: none; -ms-overflow-style: none; }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-nav-arrow { display: none; align-items: center; justify-content: center; }
    /* Share button removed from the header (it only ever showed on mobile) */
    .share-btn { display: none !important; }
    /* Rules & Info pop-over — windowed card with space around it (mobile) */
    .info-backdrop { padding: 24px 18px 88px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .info-card { width: 100%; max-width: 460px; max-height: 68vh; border-radius: 16px; overflow: hidden; animation: modalIn 0.18s ease-out; }
    /* Player detail bottom sheet (mobile) — slides up from the bottom edge,
       deliberately covering the bottom nav (higher z-index than it) rather
       than floating above it like the Rules card does. Drag-to-resize/flick
       to dismiss is a deliberate follow-up, not part of this pass — for now
       it opens/closes the same way the old centred modal did (backdrop tap,
       X, Escape), just restyled and repositioned. */
    .detail-backdrop {
      position: fixed; inset: 0; z-index: 35;
      display: flex; align-items: flex-end; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .detail-sheet {
      width: 100%; max-width: 480px; max-height: 92vh;
      border-radius: 20px 20px 0 0; overflow: hidden;
      animation: sheetIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sheet-handle { display: flex; justify-content: center; padding: 8px 0 0; flex-shrink: 0; }
    .sheet-handle span { width: 36px; height: 4px; border-radius: 2px; background: rgba(143,186,154,0.35); }
    @keyframes topSheetIn {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
    .notif-panel {
      position: fixed; top: 0; left: 0; right: 0; z-index: 36;
      max-height: 72vh; border-radius: 0 0 20px 20px; overflow: hidden;
      animation: topSheetIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.65);
    }
    /* Player row hover affordance (desktop) */
    .player-card { transition: background 0.15s ease; }
    .player-card:hover { background: rgba(34,197,94,0.06); }
    /* Share/copy button — hidden on mobile, shown on desktop */
    .share-btn { display: none !important; }

    /* ── Desktop ── */
    @media (min-width: 768px) {
      body { background: #000000; }
      .hscroll-nav {
        display: flex;
        position: sticky;
        top: calc(var(--hdr-h, 130px) + 8px);
        z-index: 8;
        pointer-events: none; /* don't block the content/cards underneath */
        background: transparent;
      }
      .hscroll-nav button { pointer-events: auto; } /* but the buttons stay clickable */
      .day-nav-arrow { display: flex; }
      /* Desktop: the Rules & Info dialog goes full-screen (the windowed look was
         only wanted on mobile — it didn't suit desktop) */
      .info-backdrop { padding: 0; }
      .info-card { max-width: none; max-height: none; width: 100%; height: 100%; border-radius: 0; border: none !important; box-shadow: none !important; animation: none; }
      /* Desktop: stay a centred windowed card — a sheet sliding up off a
         huge viewport doesn't read as a native pattern there, unlike mobile. */
      .detail-backdrop { align-items: center; left: 260px !important; right: auto !important; width: min(760px, calc(100vw - 260px)) !important; }
      .detail-sheet { max-width: 520px; max-height: 82vh; border-radius: 16px; animation: modalIn 0.18s ease-out; }
      .sheet-handle { display: none; }
      /* Centre the pop-over over the CONTENT column (right of the 260px sidebar,
         max 760px wide), not the whole viewport, so it aligns with the list behind it */
      .info-backdrop { left: 260px !important; right: auto !important; width: min(760px, calc(100vw - 260px)) !important; }
      .share-btn { display: flex !important; }
      /* Sidebar background strip */
      body::before {
        content: "";
        display: block;
        width: 260px;
        min-height: 100vh;
        background: #0a1a0f;
        border-right: 1px solid #1e3d28;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 1;
      }

      #root {
        max-width: 760px;
        margin: 0 0 0 260px;
        min-height: 100vh;
        background: #0d1f12;
        box-shadow: 4px 0 40px rgba(0,0,0,0.3);
      }
      /* Single column on desktop for all cards */
      .league-grid {
        display: block;
        max-width: 680px;
      }
      /* Bottom nav → sidebar nav */
      div[style*="bottom:0"][style*="fixed"],
      div[style*="bottom: 0"][style*="fixed"] {
        bottom: auto !important;
        top: 120px !important;
        left: 0 !important;
        right: auto !important;
        width: 260px !important;
        max-width: 260px !important;
        flex-direction: column !important;
        align-items: stretch !important;
        border-top: none !important;
        border-right: 1px solid #1e3d28 !important;
        background: transparent !important;
        padding: 8px 12px !important;
        gap: 2px !important;
        transform: translateY(0) !important;
        z-index: 5 !important;
      }
      /* Nav buttons row → column with label */
      div[style*="bottom:0"][style*="fixed"] button,
      div[style*="bottom: 0"][style*="fixed"] button {
        flex: none !important;
        flex-direction: row !important;
        justify-content: flex-start !important;
        align-items: center !important;
        padding: 11px 14px !important;
        border-radius: 10px !important;
        gap: 12px !important;
        width: 100% !important;
      }
      div[style*="bottom:0"][style*="fixed"] button > div,
      div[style*="bottom: 0"][style*="fixed"] button > div {
        padding: 0 !important;
        background: transparent !important;
        border-radius: 0 !important;
      }
      div[style*="bottom:0"][style*="fixed"] button span,
      div[style*="bottom: 0"][style*="fixed"] button span {
        font-size: 14px !important;
        font-weight: 500 !important;
        text-rendering: optimizeLegibility !important;
        -webkit-font-smoothing: antialiased !important;
      }
      /* Active sidebar item (desktop) — green highlight echoing the mobile pill */
      div[style*="bottom:0"][style*="fixed"] button[data-active="true"],
      div[style*="bottom: 0"][style*="fixed"] button[data-active="true"] {
        background: rgba(34,197,94,0.16) !important;
      }
      div[style*="bottom:0"][style*="fixed"] button[data-active="true"] span,
      div[style*="bottom: 0"][style*="fixed"] button[data-active="true"] span {
        color: #f0faf3 !important;
        font-weight: 700 !important;
      }
      /* Sticky header: hide the title row (duplicated by sidebar header),
         keep the live/next-match banner visible, sticky, and aligned with
         the rest of the content column (matching Fixtures/Results cards).
         The show/hide-on-scroll transform is a mobile-only pattern — on
         desktop the banner is always static, never slides away. */
      div[data-title-row] {
        display: none !important;
      }
      div[style*="sticky"] {
        top: 0 !important;
        transform: none !important;
      }
      div[style*="sticky"] > div:not([data-title-row]) {
        padding-left: 28px !important;
        padding-right: 28px !important;
      }
      /* Hide the mobile-only "scrolled past sticky header" duplicate —
         on desktop the sticky banner above is always visible, so this
         peek-a-boo duplicate (built for mobile scroll behaviour) is redundant. */
      div[style*="z-index: 11"] {
        display: none !important;
      }
      /* Content padding */
      div[style*="14px 14px 0"] {
        padding: 20px 28px 0 !important;
      }
    }

    @keyframes goalFlash {
      0%   { background-color: #0d1f12; }
      20%  { background-color: #14532d; }
      40%  { background-color: #0d1f12; }
      60%  { background-color: #14532d; }
      80%  { background-color: #0d1f12; }
      100% { background-color: #0d1f12; }
    }
    @keyframes goalPop {
      0%   { transform: scale(0.6); opacity: 0; }
      30%  { transform: scale(1.08); opacity: 1; }
      45%  { transform: scale(0.98); }
      60%  { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes modalIn {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes pulse-red {
      50% { opacity: 0.5; }
    }
    @keyframes stagePop {
      0%   { transform: scale(0.92); filter: brightness(1); }
      20%  { transform: scale(1.25); filter: brightness(3.4) drop-shadow(0 0 12px rgba(34,197,94,0.85)); }
      55%  { transform: scale(1.0);  filter: brightness(2); }
      100% { transform: scale(1);    filter: brightness(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes barGlow {
      0%, 100% { box-shadow: 0 0 8px 2px var(--glow-color), 0 0 20px 4px var(--glow-color-dim); }
      50%       { box-shadow: 0 0 18px 6px var(--glow-color), 0 0 36px 10px var(--glow-color-dim); }
    }
    @keyframes bumpScroll {
      0%   { transform: translateX(0); }
      30%  { transform: translateX(-40px); }
      60%  { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }
    @keyframes dropdownIn {
      from { opacity: 0; transform: scale(0.95) translateY(-6px); transform-origin: top right; }
      to   { opacity: 1; transform: scale(1)    translateY(0);    transform-origin: top right; }
    }
      from { max-height: 0; opacity: 0; }
      to   { max-height: 120px; opacity: 1; }
    }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
  </style>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({ data, width = 90, height = 28, color = C.accent }) {
  if (!data || data.length < 2) {
    return (
      <svg width={width} height={height} style={{ display:"block" }}>
        <line x1={0} y1={height*0.6} x2={width} y2={height*0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
      </svg>
    );
  }

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 3;

  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${points[points.length-1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
  const uid = `sp${data.length}x${data[data.length-1]}`;

  return (
    <svg width={width} height={height} style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${uid})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={3.5} fill={color} />
    </svg>
  );
}

const { useState, useEffect, useCallback } = React;

// Self-healing flag <img> handlers — flagcdn.com occasionally serves a 200 OK
// with empty/corrupt image data for one asset (an edge-cache blip), which
// doesn't fire onError and just renders blank. Added after an unconfirmed
// report of DR Congo's flag occasionally not appearing, later also reported
// for Uruguay (Ollie P) on a near-1-minute on/off cadence — root cause never
// conclusively isolated (the flagcdn URL itself checks out, and nothing in
// this app's own code, the code string/lookup table/React keys, is
// non-deterministic), so this is presumed to be CDN-side. Catches the "loads
// but renders blank" case via onLoad's naturalWidth check, not just onError,
// retries once with a cache-busting query string, then falls back to a small
// text badge showing the team code if the retry also fails. Shared by the
// Flag component and PlayerRow's own inline flag <img>s (PlayerRow predates
// Flag and was never migrated onto it).
function flagHandlers(code, size) {
  const onFail = (e) => {
    if (e.target.dataset.retried) {
      const span = document.createElement("span");
      span.textContent = code;
      span.style.cssText = `display:inline-block;font-size:${size*0.5}px;font-weight:700;color:${C.muted};background:${C.border};border-radius:2px;padding:1px 3px;line-height:${size}px;`;
      e.target.replaceWith(span);
      return;
    }
    e.target.dataset.retried = "1";
    const base = e.target.src.split("?")[0];
    e.target.src = `${base}?retry=${Date.now()}`;
  };
  const onLoad = (e) => { if (e.target.naturalWidth === 0) onFail(e); };
  return { onError: onFail, onLoad };
}

function Flag({ code, size = 18, snail = false }) {
  const url = flag(code);
  if (!url) return null;
  const w = Math.round(size * 1.5); // uniform 3:2 flag aspect across the app
  const handlers = flagHandlers(code, size);
  if (!snail) return <img src={url} alt={code} {...handlers} style={{ width:w, height:size, objectFit:"cover", borderRadius:2, display:"block", flexShrink:0 }} />;
  return (
    <div style={{ position:"relative", display:"inline-flex", flexShrink:0 }}>
      <img src={url} alt={code} {...handlers} style={{ width:w, height:size, objectFit:"cover", borderRadius:2, display:"block", opacity:0.75 }} />
      <span style={{ position:"absolute", bottom:-3, right:-4, fontSize:size*0.55, lineHeight:1 }}>🐌</span>
    </div>
  );
}

// Splits a list of teams into rows of at most `size` flags — used everywhere
// multiple team flags are shown together, so a player with more than 3 teams
// (smaller groups bundle more teams per player, e.g. 6) wraps onto a second
// row instead of overflowing/squashing into one.
function chunkFlags(items, size = 3) {
  const rows = [];
  for (let i = 0; i < items.length; i += size) rows.push(items.slice(i, i + size));
  return rows;
}

// Single-row flag strip — 1–3 flags at full size, 4–6 scale down
// so they always fit one row. Sorts won > alive > eliminated first.
function FlagRow({ teams, baseHeight = 18 }) {
  if (!teams || teams.length === 0) return null;
  const won   = teams.filter(t => t.won);
  const alive = teams.filter(t => !t.eliminated && !t.won && t.stage !== "GROUP_ELIM");
  const dead  = teams.filter(t => (t.eliminated || t.stage === "GROUP_ELIM") && !t.won);
  const ordered = [...won, ...alive, ...dead];
  const n = ordered.length;
  const scale = n <= 3 ? 1 : n === 4 ? 0.94 : n === 5 ? 0.83 : 0.72;
  const h = Math.round(baseHeight * scale);
  const w = Math.round(h * 1.5);
  const gap = n <= 3 ? 4 : n === 4 ? 3 : n === 5 ? 2 : 1;
  return (
    <div style={{ display: "flex", gap, alignItems: "center", flexWrap: "nowrap", overflow: "hidden" }}>
      {ordered.map(t => {
        const url = flag(t.code);
        if (!url) return null;
        const dimmed = (t.eliminated || t.stage === "GROUP_ELIM") && !t.won;
        if (t.lateB) {
          return (
            <div key={t.code} style={{ position: "relative", display: "inline-block", height: h, flexShrink: 0 }}>
              <img src={url} alt={t.name || t.code} {...flagHandlers(t.code, h)}
                style={{ width: w, height: h, objectFit: "cover", borderRadius: 2, display: "block",
                  opacity: dimmed ? 0.25 : 1,
                  outline: t.won ? "2px solid #f59e0b" : "none" }} />
              {dimmed && (
                <span style={{ position: "absolute", top: 0, right: 0, fontSize: Math.max(7, Math.round(9 * scale)), fontWeight: 900, color: C.red, textShadow: "0 0 2px rgba(0,0,0,0.9)", lineHeight: 1, zIndex: 1, pointerEvents: "none" }}>✕</span>
              )}
              <span style={{
                position: "absolute", bottom: -2, right: -3,
                fontSize: Math.max(5, Math.round(7 * scale)), fontWeight: 900, lineHeight: 1,
                color: "white", background: "rgba(20,10,0,0.75)",
                borderRadius: 2, padding: "0px 2px", letterSpacing: 0,
              }}>B</span>
            </div>
          );
        }
        return (
          <div key={t.code} style={{ position: "relative", display: "inline-block", height: h, flexShrink: 0 }}>
            <img src={url} alt={t.name || t.code} {...flagHandlers(t.code, h)}
              title={`${t.name} (Pot ${t.pot})${t.stage ? " — " + STAGE_LABEL[t.stage] : ""}`}
              style={{ width: w, height: h, objectFit: "cover", borderRadius: 2, display: "block",
                opacity: dimmed ? 0.25 : 1,
                outline: t.won ? "2px solid #f59e0b" : "none" }} />
            {dimmed && (
              <span style={{ position: "absolute", top: 0, right: 0, fontSize: Math.max(7, Math.round(9 * scale)), fontWeight: 900, color: C.red, textShadow: "0 0 2px rgba(0,0,0,0.9)", lineHeight: 1, zIndex: 1, pointerEvents: "none" }}>✕</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// Stage pill — coloured badge communicating which round a team has reached.
// Colors progress from cool/muted (early stages) to vivid/warm (deep runs).
const STAGE_PILL_CFG = {
  WINNER:         { color: "#f59e0b", bg: "rgba(245,158,11,0.18)",   label: "Winner 🏆" },
  FINALIST:       { color: "#c084fc", bg: "rgba(192,132,252,0.15)",   label: "Final" },
  SEMI_FINALS:    { color: "#60a5fa", bg: "rgba(96,165,250,0.15)",    label: "Semi-Final" },
  QUARTER_FINALS: { color: "#34d399", bg: "rgba(52,211,153,0.15)",    label: "Quarter-Final" },
  LAST_16:        { color: "#fb923c", bg: "rgba(251,146,60,0.15)",    label: "Last 16" },
  LAST_32:        { color: "#94a3b8", bg: "rgba(148,163,184,0.13)",   label: "Last 32" },
  GROUP_ELIM:     { color: "#64748b", bg: "rgba(100,116,139,0.13)",   label: "Groups" },
  GROUP:          { color: "#475569", bg: "rgba(71,85,105,0.10)",     label: "Groups" },

function StatusPill({ won, eliminated, small = false }) {

function StagePill({ stage, won, small = false }) {

const dayKey  = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const sameDay = (a, b) => dayKey(a) === dayKey(b);

// BBC-style day strip — swipe/scroll horizontally through every day of the
// tournament (not just days with fixtures, so "no matches" days still show
// an empty state rather than vanishing). On mobile, swipe is the only input —
// edge fades hint there's more to scroll. Desktop has no swipe gesture, so it
// additionally gets small arrow buttons overlaid on the fades (same
// mobile-hidden/desktop-shown convention as the existing HScrollButtons used
// for the bracket and bump chart).
function DayPicker({ days, selected, onSelect }) {
  const scrollRef = React.useRef(null);
  const selectedKey = dayKey(selected);
  const today = new Date();
  const [atStart, setAtStart] = React.useState(true);
  const [atEnd, setAtEnd] = React.useState(true);

  const checkEdges = () => {
    const el = scrollRef.current;
    if (!el) return;
    setAtStart(el.scrollLeft <= 1);
    setAtEnd(el.scrollLeft + el.clientWidth >= el.scrollWidth - 1);
  };

  React.useEffect(() => {
    const el = scrollRef.current?.querySelector(`[data-daykey="${selectedKey}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    // scrollIntoView is a smooth/async scroll — re-check once it's settled
    // so the fades/arrows reflect where the strip actually lands.
    const t = setTimeout(checkEdges, 350);
    return () => clearTimeout(t);
  }, [selectedKey]);

  const scrollBy = (dir) => scrollRef.current?.scrollBy({ left: dir * 160, behavior: "smooth" });

  // display/alignItems/justifyContent deliberately live in the .day-nav-arrow
  // CSS class, not here — an inline style would override the class's
  // mobile-hides-this `display:none`, since inline always beats a stylesheet
  // rule regardless of the desktop media query.
  const arrowStyle = {
    position: "absolute", top: "50%", transform: "translateY(-50%)",
    width: 26, height: 26, borderRadius: "50%", border: `1px solid ${C.border}`,
    background: C.card, color: C.dim, cursor: "pointer",
    fontSize: 15, fontWeight: 700, lineHeight: 1, padding: 0,
  };

  return (
    <div style={{ position: "relative" }}>
      <div ref={scrollRef} onScroll={checkEdges} className="day-strip" style={{
        display: "flex", overflowX: "auto", WebkitOverflowScrolling: "touch",
        scrollSnapType: "x proximity",
      }}>
        {days.map(d => {
          const key = dayKey(d);
          const isSelected = key === selectedKey;
          const isToday = sameDay(d, today);
          return (
            <button key={key} data-daykey={key} onClick={() => onSelect(d)} style={{
              flex: "0 0 auto", minWidth: 56, scrollSnapAlign: "center",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              padding: "6px 4px 8px", border: "none", cursor: "pointer",
              borderRadius: 8,
              background: isToday ? "rgba(34,197,94,0.18)" : "transparent",
              borderBottom: `3px solid ${isSelected ? C.accent : "transparent"}`,
            }}>
              <span style={{ fontSize: 12, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>
                {isToday ? "Today" : d.toLocaleDateString(undefined, { weekday: "short" })}
              </span>
              <span style={{ fontSize: 17, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>
                {d.getDate()}
              </span>
            </button>
          );
        })}
      </div>
      {!atStart && <div style={{ position:"absolute", top:0, left:0, bottom:0, width:36, pointerEvents:"none",
        background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)` }} />}
      {!atEnd && <div style={{ position:"absolute", top:0, right:0, bottom:0, width:36, pointerEvents:"none",
        background:`linear-gradient(to left, ${C.bg} 0%, transparent 100%)` }} />}
      {!atStart && <button className="day-nav-arrow" onClick={() => scrollBy(-1)} aria-label="Earlier days" style={{ ...arrowStyle, left:2 }}>‹</button>}
      {!atEnd && <button className="day-nav-arrow" onClick={() => scrollBy(1)} aria-label="Later days" style={{ ...arrowStyle, right:2 }}>›</button>}
    </div>
  );
}

function MatchCard({ m, ranked, upcoming = [], pts, onPlayerClick, onTeamClick, onMatchClick }) {
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const fin = m.status === "FINISHED";
  const live = m.status === "IN_PLAY" || m.status === "PAUSED";
  const scheduled = m.status === "SCHEDULED" || m.status === "TIMED";
  const broadcast = getBroadcast(h, a);
  const hOwner = ownerOf(h, ranked);
  const aOwner = ownerOf(a, ranked);

  const hRank = ranked.findIndex(p => p.name === hOwner);
  const aRank = ranked.findIndex(p => p.name === aOwner);

  const [showStakes, setShowStakes] = React.useState(false);

  // Points at stake for each possible result — only computed for upcoming matches
  const stakesResult = (scheduled && h && a) ? (() => {
    const isGroup = (m.stage || "").toUpperCase().includes("GROUP");
    if (isGroup) {
      return {
        rows: [
          { label: m.homeTeam?.name || h, hPts: groupGamePts(h, "W"), aPts: 0 },
          { label: "Draw",                hPts: groupGamePts(h, "D"),  aPts: groupGamePts(a, "D"), reaperDraw: true },
          { label: m.awayTeam?.name || a, hPts: 0, aPts: groupGamePts(a, "W") },
        ],
        note: null,
      };
    }
    const stage = (m.stage || "").toUpperCase();
    let thisStage = null, nextStage = null;
    if (stage === "FINAL")                                         { thisStage = "FINALIST";       nextStage = "WINNER"; }
    else if (stage.includes("SEMI"))                               { thisStage = "SEMI_FINALS";    nextStage = "FINALIST"; }
    else if (stage.includes("QUARTER"))                            { thisStage = "QUARTER_FINALS"; nextStage = "SEMI_FINALS"; }
    else if (stage.includes("LAST_16") || stage.includes("16"))   { thisStage = "LAST_16";        nextStage = "QUARTER_FINALS"; }
    else if (stage.includes("LAST_32") || stage.includes("32"))   { thisStage = "LAST_32";        nextStage = "LAST_16"; }
    if (!thisStage) return null;
    return {
      rows: [
        { label: m.homeTeam?.name || h, hPts: ptsTotal(h, nextStage) - ptsTotal(h, thisStage), aPts: 0 },
        { label: m.awayTeam?.name || a, hPts: 0, aPts: ptsTotal(a, nextStage) - ptsTotal(a, thisStage) },
      ],
      note: `win = advance to ${STAGE_LABEL[nextStage] || nextStage}`,
    };
  })() : null;

  // Rivalry clash — only flag the FIRST fixture between any two owners
  const firstClashBetween = (ownerA, ownerB) => {
    if (!ownerA || !ownerB || ownerA === ownerB) return null;
    return upcoming.find(fx => {
      const fh = fx.homeTeam?.tla?.toUpperCase();
      const fa = fx.awayTeam?.tla?.toUpperCase();
      const fhOwner = ownerOf(fh, ranked);
      const faOwner = ownerOf(fa, ranked);
      return (fhOwner === ownerA && faOwner === ownerB) || (fhOwner === ownerB && faOwner === ownerA);
    });
  };

  const isFirstClash = scheduled && hOwner && aOwner && hOwner !== aOwner &&
    firstClashBetween(hOwner, aOwner)?.id === m.id;

  const clashLabel = (() => {
    if (!isFirstClash) return null;
    // Title: 1st vs 2nd
    const positions = new Set([hRank, aRank]);
    if (positions.has(0) && positions.has(1)) return { icon:"👑", label:"TITLE SHOWDOWN" };
    return null;
  })();

  // Result-based banners — winner/loser of THIS match, for finished games only.
  const hs = m.score?.fullTime?.home ?? 0;
  const as_ = m.score?.fullTime?.away ?? 0;
  const pen = m.score?.penalties;
  let winnerCode = null, loserCode = null;
  if (hs > as_)      { winnerCode = h; loserCode = a; }
  else if (as_ > hs) { winnerCode = a; loserCode = h; }
  else if (pen)      { winnerCode = pen.home > pen.away ? h : a; loserCode = winnerCode === h ? a : h; }
  const isKnockout = !(m.stage || "").toUpperCase().includes("GROUP");

  // Knockout exit banners — three tiers based on pot gap, any team can trigger.
  // Knockout losses are unambiguous eliminations so we grade the shock here.
  // Takes priority over the group-stage upset ladder below.
  const knockoutExitLabel = (() => {
    if (!fin || !isKnockout || !loserCode || !winnerCode) return null;
    const gap = potOf(winnerCode) - potOf(loserCode);
    if (gap === 3) return { icon:"🌋", label:"SEISMIC SHOCK" };
    if (gap === 2) return { icon:"😱", label:"SHOCK EXIT" };
    if (gap === 1) return { icon:"⚠️", label:"UPSET ALERT" };
    return null;
  })();

  // Upset ladder — group stage only (knockouts handled above).
  const upsetLabel = (() => {
    if (!fin || knockoutExitLabel) return null;
    if (winnerCode && loserCode) {
      const gap = potOf(winnerCode) - potOf(loserCode); // >0 if the weaker pot won
      if (gap === 3) return { icon:"🦄", label:"FAIRYTALE" };
      if (gap === 2) return { icon:"🔪", label:"GIANT KILLER" };
      if (gap === 1) return { icon:"⚠️", label:"UPSET ALERT" };
      return null;
    }
    // Draws (group stage only — knockouts always resolve via penalties, so
    // winnerCode/loserCode would already be set above).
    if (hs === as_) {
      const gap = Math.abs(potOf(h) - potOf(a));
      if (gap === 3) return { icon:"🛡️", label:"HEROIC STAND" };
      if (gap === 2) return { icon:"🤝", label:"PUNCHED ABOVE" };
    }
    return null;
  })();

  const resultLabel = knockoutExitLabel || upsetLabel;

  const rivalryBorder = (clashLabel || resultLabel)
    ? `2px solid ${C.gold}`
    : `1px solid ${C.border}`;

  const rivalryGlow = (clashLabel || resultLabel)
    ? "0 0 10px #f59e0b44"
    : "none";

  return (
    <div className={onMatchClick ? "player-card" : undefined} onClick={onMatchClick ? () => onMatchClick(m.id) : undefined} style={{ ...s.card, border: rivalryBorder, boxShadow: rivalryGlow, cursor: onMatchClick ? "pointer" : "default" }}>
      <div style={{ padding: "12px 14px" }}>
        {/* Header row: stage left | rivalry centre | date right */}
        <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
          <span style={{ fontSize:10, color: live ? C.red : C.dim, fontWeight:700, letterSpacing:"0.08em", flex:1,
            animation: live ? "pulse-red 1.5s infinite" : "none" }}>
            {live ? "⚡ LIVE" : (m.stage||"").replace(/_/g," ")}
          </span>
          <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"center", flex:1 }}>
            {clashLabel && scheduled && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{clashLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.accent, letterSpacing:"0.08em" }}>{clashLabel.label}</span>
            </>}
            {resultLabel && fin && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{resultLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.gold, letterSpacing:"0.08em" }}>{resultLabel.label}</span>
            </>}
          </div>
          <span style={{ fontSize:10, color: C.muted, flex:1, textAlign:"right" }}>{fmt(m.utcDate)}</span>
        </div>
        {/* Teams row */}
        <div style={{ display:"flex", alignItems:"center" }}>
          <div
            className={!onMatchClick && ((onTeamClick && h) || (onPlayerClick && hOwner)) ? "player-card" : undefined}
            onClick={!onMatchClick && onTeamClick && h ? () => onTeamClick(h) : !onMatchClick && onPlayerClick && hOwner ? () => onPlayerClick(hOwner) : undefined}
            style={{ flex:1, display:"flex", alignItems:"center", gap:8, cursor: !onMatchClick && ((onTeamClick && h) || (onPlayerClick && hOwner)) ? "pointer" : "default" }}>
            <Flag code={h} size={22} />
            <div>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(h, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.homeTeam?.name || "TBD"}{POT[h] ? <span style={{ color:C.muted, fontSize:9 }}> (P{potOf(h)})</span> : ""}</div>
              {pts && <div style={{ fontSize:10, fontWeight:800, color: pts.home > 0 ? C.accent : C.muted, marginTop:2 }}>+{pts.home} pts</div>}
            </div>
          </div>
          <div style={{ minWidth:64, textAlign:"center" }}>
            {fin || live
              ? <>
                  <span style={{ fontSize:18, fontWeight:800, letterSpacing:2 }}>
                    {m.score?.fullTime?.home ?? 0}–{m.score?.fullTime?.away ?? 0}
                  </span>
                  {fin && m.score?.penalties?.home != null && (
                    <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>
                      pens {m.score.penalties.home}–{m.score.penalties.away}
                    </div>
                  )}
                </>
              : <div>
                  <div style={{ fontSize:12, color: C.muted, marginBottom:5 }}>vs</div>
                  <span style={{
                    fontSize:9, fontWeight:800, color:"white",
                    background: broadcast.b === "ITV" ? "#003087" : "#FF6B35",
                    padding:"2px 6px", borderRadius:3,
                  }}>{broadcast.b}</span>
                </div>
            }
          </div>
          <div
            className={!onMatchClick && ((onTeamClick && a) || (onPlayerClick && aOwner)) ? "player-card" : undefined}
            onClick={!onMatchClick && onTeamClick && a ? () => onTeamClick(a) : !onMatchClick && onPlayerClick && aOwner ? () => onPlayerClick(aOwner) : undefined}
            style={{ flex:1, display:"flex", alignItems:"center", gap:8, justifyContent:"flex-end", cursor: !onMatchClick && ((onTeamClick && a) || (onPlayerClick && aOwner)) ? "pointer" : "default" }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(a, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.awayTeam?.name || "TBD"}{POT[a] ? <span style={{ color:C.muted, fontSize:9 }}> (P{potOf(a)})</span> : ""}</div>
              {pts && <div style={{ fontSize:10, fontWeight:800, color: pts.away > 0 ? C.accent : C.muted, marginTop:2 }}>+{pts.away} pts</div>}
            </div>
            <Flag code={a} size={22} />
          </div>
        </div>
        {stakesResult && (
          <>
            <div
              onClick={e => { e.stopPropagation(); setShowStakes(s => !s); }}
              style={{ marginTop:8, textAlign:"center", cursor:"pointer", padding:"2px 0" }}
            >
              <span style={{ fontSize:10, color:C.muted, fontWeight:700, letterSpacing:"0.06em" }}>
                📊 STAKES {showStakes ? "▲" : "▾"}
              </span>
            </div>
            {showStakes && (
              <div style={{ marginTop:6, padding:"8px 4px 2px", borderTop:`1px solid ${C.border}` }}>
                {stakesResult.rows.map((row, i) => {
                  const sameOwner = hOwner && aOwner && hOwner === aOwner;
                  return (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:4, marginBottom: i < stakesResult.rows.length - 1 ? 5 : 0 }}>
                      <span style={{ flex:1.4, color:C.dim, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontSize:10 }}>{row.label}</span>
                      {sameOwner ? (
                        <span style={{ flex:2, textAlign:"center", color:C.accent, fontWeight:700, fontSize:11 }}>{hOwner} +{row.hPts + row.aPts}</span>
                      ) : (
                        <>
                          <span style={{ flex:1, textAlign:"center", fontWeight:700, fontSize:11, color: row.hPts > 0 ? C.accent : C.muted }}>
                            {hOwner || h} {row.hPts > 0 ? `+${row.hPts}` : "0"}
                          </span>
                          <span style={{ flex:1, textAlign:"right", fontWeight:700, fontSize:11, color: row.aPts > 0 ? C.accent : C.muted }}>
                            {aOwner || a} {row.aPts > 0 ? `+${row.aPts}` : "0"}
                          </span>
                        </>
                      )}
                      {row.reaperDraw && <span style={{ fontSize:9, color:C.dangerText, flexShrink:0 }}>💀+3 if 0-0</span>}
                    </div>
                  );
                })}
                {stakesResult.note && <div style={{ fontSize:9, color:C.muted, marginTop:5, textAlign:"center" }}>{stakesResult.note}</div>}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function PlayerRow({ player, rank, displayRank, onOpen, badges = [], rank24hChange = 0 }) {
  const rankColors = ["#84cc16","#94a3b8","#b45309"];
  const isTop = displayRank <= 3;

  return (
    <div style={{
      ...s.card,
      border: `1px solid ${player.grimReaper ? C.reaperAccent : C.border}`,
      background: player.grimReaper ? C.reaperBg : C.card,
    }}>
      <div className="player-card" onClick={onOpen} style={{ display:"flex", alignItems:"center", padding:"10px 14px", cursor:"pointer", gap:10 }}>

        {/* Rank badge */}
        <div style={{
          width:30, height:30, borderRadius:"50%", flexShrink:0,
          background: player.grimReaper ? C.reaperAccent : isTop ? rankColors[displayRank-1] : C.border,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:13, fontWeight:800, color: player.grimReaper ? C.dangerTextBright : isTop ? "#080c18" : C.dim,
        }}>{displayRank}</div>

        {/* Left: name + flags */}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5, minWidth:0, marginBottom:5 }}>
            <div style={{ fontWeight:700, fontSize:15, color: C.text, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {player.name}
            </div>
            <div style={{ display:"flex", gap:3, flexShrink:0 }}>
              {(badges || []).slice(0, 2).map((b, i) => (
                <span key={i} title={`${b.label} — ${b.desc}`} style={{ fontSize:13, lineHeight:1 }}>{b.icon}</span>
              ))}
            </div>
          </div>
          {player.grimReaper ? (
            <div style={{ fontSize:10, color:C.dangerText, lineHeight:1.5, opacity:0.7 }}>
              Grim Reaper — earns on boring football &amp; eliminations
            </div>
          ) : (
            <FlagRow teams={player.teams} baseHeight={18} />
          )}
        </div>

        {/* Middle: sparkline — narrower for 6-team players so all flags fit */}
        <div style={{ flexShrink:0 }}>
          <Sparkline data={player.hist} width={player.teams && player.teams.length >= 6 ? 72 : 100} height={56} color={player.grimReaper ? C.red : player.total < 0 ? C.red : player.total === 0 ? C.neutral : C.accent} />
        </div>

        {/* Right: points + change */}
        <div style={{ textAlign:"right", flexShrink:0, minWidth:56 }}>
          <div style={{ fontSize:22, fontWeight:800, color: player.total < 0 ? C.red : C.text, lineHeight:1 }}>
            {player.total}
          </div>
          <div style={{ fontSize:10, color: player.grimReaper ? C.dangerText : C.muted, marginBottom:4 }}>pts</div>
          {rank24hChange !== 0 ? (
            <div style={{
              display:"inline-block",
              fontSize:10, fontWeight:700, padding:"1px 5px",
              borderRadius:3,
              background: player.grimReaper ? C.negBg : rank24hChange > 0 ? C.posBg : C.negBg,
              color: player.grimReaper ? C.red : rank24hChange > 0 ? C.accent : C.red,
            }}>
              {rank24hChange > 0 ? "▲" : "▼"}{" "}
              {Math.abs(rank24hChange)} pos
            </div>
          ) : (
            <div style={{
              display:"inline-block",
              fontSize:10, fontWeight:700, padding:"1px 5px",
              borderRadius:3,
              background:"rgba(148,163,184,0.12)", color:"#94a3b8",
            }}>0 pos</div>
          )}
        </div>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink:0, transform:"rotate(-90deg)" }}>
          <path d="M6 9l6 6 6-6" stroke={player.grimReaper ? C.dangerText : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SNAP SHEET — reusable bottom-sheet wrapper with two snap points.
// Mobile: opens at 50vh, flick up → 92vh full, flick down → previous snap,
// flick down from half → close.  Desktop: windowed centred card, no snapping.
// Renders .detail-backdrop + .detail-sheet; passes bodyRef to children via
// render prop so callers can place their scrollable body.
// ─────────────────────────────────────────────────────────────────────────────
function SnapSheet({ onClose, scrollBodyToBottom = false, initialSnap = "half", children }) {
  React.useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, []);

  const [snapState, setSnapState] = React.useState(initialSnap);
  const snapStateRef = React.useRef(initialSnap);
  React.useEffect(() => { snapStateRef.current = snapState; }, [snapState]);

  const sheetRef = React.useRef(null);
  const bodyRef  = React.useRef(null);
  const dragInfo = React.useRef({ startY: 0, startTime: 0, active: false, dragY: 0 });
  const [dragY,    setDragY]    = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [closing,  setClosing]  = React.useState(false);
  const closingRef = React.useRef(false);
  const triggerCloseRef = React.useRef(null);
  triggerCloseRef.current = () => {
    if (closingRef.current) return;
    closingRef.current = true;
    setClosing(true);
    setTimeout(onClose, 250);
  };

  React.useEffect(() => {
    if (scrollBodyToBottom && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, []);

  React.useEffect(() => {
    const el = sheetRef.current;
    if (!el) return;
    const onStart = (e) => {
      dragInfo.current = { startY: e.touches[0].clientY, startTime: Date.now(), active: true, dragY: 0 };
    };
    const onMove = (e) => {
      if (!dragInfo.current.active) return;
      const delta = e.touches[0].clientY - dragInfo.current.startY;
      const atTop = !bodyRef.current || bodyRef.current.scrollTop <= 0;
      if (delta > 0 && atTop) {
        // Dragging down — dismiss (half) or snap to half (full)
        e.preventDefault();
        dragInfo.current.dragY = delta;
        setDragging(true);
        setDragY(delta);
      } else if (delta < 0 && atTop && snapStateRef.current === "half") {
        // Dragging up from half — expand to full
        e.preventDefault();
        dragInfo.current.dragY = delta;
        setDragging(true);
        setDragY(delta);
      } else if (dragInfo.current.dragY !== 0 && delta !== 0 && Math.sign(delta) !== Math.sign(dragInfo.current.dragY)) {
        // Reversed direction — clamp (delta===0 guard prevents false-clamp when finger
        // returns exactly to the touch-start Y as it lifts off)
        dragInfo.current.dragY = 0;
        setDragY(0);
      }
    };
    const onEnd = () => {
      if (!dragInfo.current.active) return;
      dragInfo.current.active = false;
      setDragging(false);
      const { dragY: finalDragY, startTime } = dragInfo.current;
      if (finalDragY === 0) return;
      const elapsed = Date.now() - startTime;
      const velocity = finalDragY / Math.max(elapsed, 1); // px/ms, positive = downward
      const snap = snapStateRef.current;
      if (snap === "half") {
        if (finalDragY < 0) {
          // Upward flick — expand to full
          if (finalDragY < -40 || velocity < -0.25) {
            setSnapState("full"); snapStateRef.current = "full";
          }
          setDragY(0);
        } else {
          // Downward drag — close
          if (finalDragY > el.offsetHeight * 0.25 || velocity > 0.5) {
            triggerCloseRef.current();
          } else {
            setDragY(0);
          }
        }
      } else { // "full"
        // Downward drag — snap to half
        if (finalDragY > 60 || velocity > 0.3) {
          setSnapState("half"); snapStateRef.current = "half";
        }
        setDragY(0);
      }
    };
    // Body touch listeners: both touchstart AND touchmove must be passive:false
    // on the scroll body itself. Browsers commit a gesture as native scroll at
    // touchstart time — if every touchstart listener in the path is passive:true,
    // the browser locks in scroll and ignores later preventDefault() calls, even
    // in a non-passive touchmove. The empty noop passive:false touchstart opts
    // the body out of that fast-path so touchmove can still cancel scroll.
    const noop = () => {};
    const onBodyMove = (e) => {
      if (!dragInfo.current.active) return;
      const bodyEl = bodyRef.current;
      if (!bodyEl) return;
      const delta = e.touches[0].clientY - dragInfo.current.startY;
      const atTop = bodyEl.scrollTop <= 0;
      if (dragInfo.current.dragY !== 0 ||
          (delta > 0 && atTop) ||
          (delta < 0 && atTop && snapStateRef.current === "half")) {
        e.preventDefault();
      }
    };
    const bodyEl = bodyRef.current;
    el.addEventListener("touchstart", onStart, { passive: true });
    el.addEventListener("touchmove", onMove, { passive: false });
    el.addEventListener("touchend", onEnd, { passive: true });
    if (bodyEl) {
      bodyEl.addEventListener("touchstart", noop,       { passive: false });
      bodyEl.addEventListener("touchmove",  onBodyMove, { passive: false });
    }
    return () => {
      el.removeEventListener("touchstart", onStart);
      el.removeEventListener("touchmove", onMove);
      el.removeEventListener("touchend", onEnd);
      if (bodyEl) {
        bodyEl.removeEventListener("touchstart", noop);
        bodyEl.removeEventListener("touchmove",  onBodyMove);
      }
    };
    // [] deliberately — onClose is recreated every App render; capturing once
    // is correct since this sheet instance only ever closes itself.
  }, []);

  const isMobile = window.innerWidth < 768;

  return (
    <div className="detail-backdrop" onClick={() => triggerCloseRef.current()}
      style={{ background: closing ? "rgba(0,0,0,0)" : "rgba(0,0,0,0.55)", transition: "background 0.25s ease" }}>
      <div
        className="detail-sheet"
        ref={sheetRef}
        onClick={(e) => e.stopPropagation()}
        style={{
          background: C.bg, display: "flex", flexDirection: "column",
          border: `1px solid ${C.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.55)",
          height: isMobile
            ? snapState === "full"
              ? "92vh"
              : dragging && dragY < 0
                ? `calc(50vh - ${dragY}px)` // dragY is negative, so -dragY grows the sheet upward
                : "50vh"
            : undefined,
          transform: closing
            ? isMobile ? "translateY(120%)" : "scale(0.96)"
            : dragging && dragY < 0 && snapState === "half" ? "none" : `translateY(${dragY}px)`,
          opacity: closing && !isMobile ? 0 : undefined,
          transition: closing
            ? isMobile ? "transform 0.25s ease" : "transform 0.18s ease, opacity 0.18s ease"
            : dragging ? "none" : "transform 0.25s ease, height 0.3s cubic-bezier(0.22, 1, 0.36, 1)",
        }}
      >
        {children(bodyRef, () => triggerCloseRef.current())}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PLAYER MODAL — pop-over with points, results, win chances
// ─────────────────────────────────────────────────────────────────────────────
// The Last-32 qualification bonus is earned by finishing top-2 in the group, so
// — unlike every other points source — it isn't tied to a single match and has
// no natural row in a Results list. We surface it as a "milestone" line. It's
// computed as the gap between a team's banked total and the sum of its per-match
// points, which means it only appears while orphaned and disappears on its own
// once the real Last 32 fixture is played (deriveMatchPts then attaches those
// points to that game, closing the gap). Returns 0 (or negative, e.g. a group
// penalty) when there's nothing to surface.
function stageBonusFor(tla, teamTotalPts, matches, matchPtsById) {
  let attached = 0;
  (matches || []).forEach(m => {
    const h = m.homeTeam && m.homeTeam.tla ? m.homeTeam.tla.toUpperCase() : null;
    const a = m.awayTeam && m.awayTeam.tla ? m.awayTeam.tla.toUpperCase() : null;
    if (h !== tla && a !== tla) return;
    const mp = matchPtsById && matchPtsById[m.id];
    if (!mp) return;
    attached += (h === tla ? mp.home : mp.away) || 0;
  });
  return Math.round((teamTotalPts || 0) - attached);
}

function PlayerCardContent({ bodyRef, player, displayRank, winPct, winTeams, badges = [], matches = [], matchPtsById = {}, onTeamClick, onMatchClick, onFamilyClick, playerFamily, onClose }) {

  const playerStillIn = (player.teams || []).some(t => !t.eliminated);

          </div>
          <button onClick={onClose} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
