// ═════════════════════════════════════════════════════════════════════════
// PROJECTED ROUND OF 32 BRACKET ("as it stands")
// ═════════════════════════════════════════════════════════════════════════
// Projects what the Last 32 bracket WOULD look like if the group stage ended
// today, using current standings. Mirrors BBC Sport's "As it stands" feature.
//
// Real FIFA rule: top 2 from each of 12 groups (24 teams) + best 8 of the 12
// third-placed teams (ranked by Pts > GD > GF > fair play > FIFA ranking —
// we only have the first three, fair play/ranking not tracked in this app).
//
// The 8 qualifying third-place groups are looked up in FIFA's official
// Annex C scenario table (495 combinations) to find the exact opponent
// assignment for each of the 8 "3rd place" slots in the Last 32 draw.

// Fixed Last 32 structure — always the same regardless of which teams qualify.
// "3RD-N" placeholders are resolved via THIRD_PLACE_SCENARIOS based on which
// 8 groups' third-place teams actually qualify.
var R32_FIXED_MATCHES = [
  { match: 73, home: "RU-A", away: "RU-B" },
  { match: 74, home: "W-E",  away: "3RD-1" }, // 3rd of A/B/C/D/F
  { match: 75, home: "W-F",  away: "RU-C" },
  { match: 76, home: "W-C",  away: "RU-F" },
  { match: 77, home: "W-I",  away: "3RD-2" }, // 3rd of C/D/F/G/H
  { match: 78, home: "RU-E", away: "RU-I" },
  { match: 79, home: "W-A",  away: "3RD-3" }, // 3rd of C/E/F/H/I
  { match: 80, home: "W-L",  away: "3RD-4" }, // 3rd of E/H/I/J/K
  { match: 81, home: "W-D",  away: "3RD-5" }, // 3rd of B/E/F/I/J
  { match: 82, home: "W-G",  away: "3RD-6" }, // 3rd of A/E/H/I/J
  { match: 83, home: "RU-K", away: "RU-L" },
  { match: 84, home: "W-H",  away: "RU-J" },
  { match: 85, home: "W-B",  away: "3RD-7" }, // 3rd of E/F/G/I/J
  { match: 86, home: "W-J",  away: "RU-H" },
  { match: 87, home: "W-K",  away: "3RD-8" }, // 3rd of D/E/I/J/L
  { match: 88, home: "RU-D", away: "RU-G" },
];

// projectR32(groupStandings) — given current standings for all 12 groups,
// returns the projected Last 32 fixture list ("as it stands").
//
// groupStandings: { A: [{tla, pts, gd, gf}, ...4 teams sorted 1st-4th...], B: [...], ... }
function projectR32(groupStandings) {
  const GROUPS = "ABCDEFGHIJKL".split("");

  // Winners and runners-up are simply position 1 and 2 in each group's current table
  const winner = g => groupStandings[g]?.[0] || null;
  const runnerUp = g => groupStandings[g]?.[1] || null;
  const third = g => groupStandings[g]?.[2] || null;

  // Rank all 12 third-place teams: Pts > GD > GF (fair play / FIFA ranking
  // not available in this app's data, so ties beyond this are arbitrary
  // but rare in practice).
  const allThirds = GROUPS
    .map(g => ({ group: g, team: third(g) }))
    .filter(t => t.team); // only groups with enough matches played

  allThirds.sort((a, b) => {
    if (b.team.pts !== a.team.pts) return b.team.pts - a.team.pts;
    if (b.team.gd  !== a.team.gd)  return b.team.gd  - a.team.gd;
    return b.team.gf - a.team.gf;
  });

  const qualifyingThirds = allThirds.slice(0, 8);
  const qualifyingGroups = qualifyingThirds.map(t => t.group).sort();
  const key = qualifyingGroups.join("");

  const scenario = THIRD_PLACE_SCENARIOS[key];
  // If not enough groups have played enough games yet, scenario lookup will
  // fail (key won't have 8 entries) — caller should check for this.
  if (!scenario || qualifyingThirds.length < 8) {
    return { ready: false, fixtures: [] };
  }

  // Map "3RD-N" slot index (1-8) -> which group's 3rd place team fills it
  const thirdByGroup = {};
  qualifyingThirds.forEach(t => { thirdByGroup[t.group] = t.team; });

  const slotTeam = (slotIdx) => {
    const groupLetter = scenario[slotIdx - 1]; // 1-indexed slots
    return thirdByGroup[groupLetter] || null;
  };

  const resolveSlot = (code) => {
    if (code.startsWith("W-")) return winner(code.slice(2));
    if (code.startsWith("RU-")) return runnerUp(code.slice(3));
    if (code.startsWith("3RD-")) return slotTeam(parseInt(code.slice(4), 10));
    return null;
  };

  const fixtures = R32_FIXED_MATCHES.map(m => ({
    match: m.match,
    home: resolveSlot(m.home),
    away: resolveSlot(m.away),
  }));

  return { ready: true, fixtures, qualifyingGroups };
}



// Compact match row for use inside a Section card on the Home tab.
// No outer card border — the Section provides that. Shows flags, owner names,
// score (finished/live) or vs + time (upcoming), and pts earned.
// Result banner for a finished match — mirrors the Scores-page MatchCard logic
// (shock exit, then the upset ladder) so Home and Scores never disagree.
function resultBanner(m) {
  if (m.status !== "FINISHED") return null;
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const hs = m.score?.fullTime?.home ?? 0;
  const as_ = m.score?.fullTime?.away ?? 0;
  const pen = m.score?.penalties;
  let winnerCode = null, loserCode = null;
  if (hs > as_)      { winnerCode = h; loserCode = a; }
  else if (as_ > hs) { winnerCode = a; loserCode = h; }
  else if (pen)      { winnerCode = pen.home > pen.away ? h : a; loserCode = winnerCode === h ? a : h; }
  const isKnockout = !(m.stage || "").toUpperCase().includes("GROUP");
  if (isKnockout && winnerCode && loserCode) {
    const gap = potOf(winnerCode) - potOf(loserCode);
    if (gap === 3) return { icon: "🌋", label: "SEISMIC SHOCK" };
    if (gap === 2) return { icon: "😱", label: "SHOCK EXIT" };
    if (gap === 1) return { icon: "⚠️", label: "UPSET ALERT" };
    return null;
  }
  if (winnerCode && loserCode) {
    const gap = potOf(winnerCode) - potOf(loserCode);
    if (gap === 3) return { icon: "🦄", label: "FAIRYTALE" };
    if (gap === 2) return { icon: "🔪", label: "GIANT KILLER" };
    if (gap === 1) return { icon: "⚠️", label: "UPSET ALERT" };
    return null;
  }
  if (hs === as_) {
    const gap = Math.abs(potOf(h) - potOf(a));
    if (gap === 3) return { icon: "🛡️", label: "HEROIC STAND" };
    if (gap === 2) return { icon: "🤝", label: "PUNCHED ABOVE" };
  }
  return null;
}

function StatRow({ label, hVal, aVal, hColor, aColor }) {
  return (
    <div style={{ display: "flex", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
      <div style={{ flex: 1, textAlign: "right", fontSize: 13, fontWeight: 700, color: hColor || C.text }}>{hVal}</div>
      <div style={{ width: 96, textAlign: "center", fontSize: 9, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}</div>
      <div style={{ flex: 1, textAlign: "left", fontSize: 13, fontWeight: 700, color: aColor || C.text }}>{aVal}</div>
    </div>
  );
}

function HeadToHeadCard({ bodyRef, m, ranked, matchPtsById, onTeamClick, onPlayerClick, onFamilyClick, groupKey, defaultView, onClose }) {
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const fin = m.status === "FINISHED";
  const live = m.status === "IN_PLAY" || m.status === "PAUSED";
  const hs = m.score?.fullTime?.home ?? null;
  const as_ = m.score?.fullTime?.away ?? null;
  const pts = matchPtsById[m.id];
  const banner = resultBanner(m);

  const hOwner = ownerOf(h, ranked);
  const aOwner = ownerOf(a, ranked);
  const allTeams = ranked.flatMap(p => p.teams || []);
  const hEntry = allTeams.find(t => t.code === h);
  const aEntry = allTeams.find(t => t.code === a);

  const hPlayer = hOwner ? ranked.find(p => p.name === hOwner) : null;
  const aPlayer = aOwner ? ranked.find(p => p.name === aOwner) : null;
  const hRank = hPlayer ? ranked.findIndex(p => p.name === hOwner) + 1 : null;
  const aRank = aPlayer ? ranked.findIndex(p => p.name === aOwner) + 1 : null;
  const toOrdinal = n => { const s = ["th","st","nd","rd"]; const v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };

  const STAGE_ORD = ["GROUP_STAGE", "GROUP_ELIM", "LAST_32", "LAST_16", "QUARTER_FINALS", "SEMI_FINALS", "FINALIST", "WINNER"];
  const playerBestStage = (player) => {
    const teams = player?.teams || [];
    const active = teams.filter(t => !t.eliminated);
    const src = active.length ? active : teams;
    return src.reduce((best, t) => {
      const s = t.stage || "GROUP_STAGE";
      return STAGE_ORD.indexOf(s) > STAGE_ORD.indexOf(best || "GROUP_STAGE") ? s : (best || "GROUP_STAGE");
    }, null);
  };
  const hStillIn = (hPlayer?.teams || []).some(t => !t.eliminated);
  const aStillIn = (aPlayer?.teams || []).some(t => !t.eliminated);
  const hWon    = (hPlayer?.teams || []).some(t => t.won);
  const aWon    = (aPlayer?.teams || []).some(t => t.won);
  const hBestStage = playerBestStage(hPlayer);
  const aBestStage = playerBestStage(aPlayer);

  const families = GROUPS[groupKey]?.families;
  const familyData = families ? (() => {
    const playerMap = Object.fromEntries(ranked.map(p => [p.name, p]));
    const rows = families.map(f => {
      const tots = f.members.map(n => playerMap[n]?.total ?? 0);
      const total = tots.reduce((s, v) => s + v, 0);
      const avg = Math.round(total / f.members.length);
      return { name: f.name, total, avg };
    }).sort((a, b) => b.avg - a.avg);
    return Object.fromEntries(rows.map((f, i) => [f.name, { ...f, rank: i + 1 }]));
  })() : null;
  const findFamily = (playerName) => playerName ? (families?.find(f => f.members.includes(playerName)) || null) : null;
  const hFamilyDef = findFamily(hOwner);
  const aFamilyDef = findFamily(aOwner);
  const hFamilyData = hFamilyDef && familyData ? familyData[hFamilyDef.name] : null;
  const aFamilyData = aFamilyDef && familyData ? familyData[aFamilyDef.name] : null;
  const showFamilyTab = !!(families && (hFamilyDef || aFamilyDef));
  const familyTeamsOf = (fDef) => {
    if (!fDef) return [];
    const pMap = Object.fromEntries(ranked.map(p => [p.name, p]));
    return fDef.members.flatMap(n => pMap[n]?.teams || []);
  };
  const hFamilyTeams = familyTeamsOf(hFamilyDef);
  const aFamilyTeams = familyTeamsOf(aFamilyDef);
  const hFamilyWon = hFamilyTeams.some(t => t.won);
  const aFamilyWon = aFamilyTeams.some(t => t.won);
  const hFamilyStillIn = hFamilyTeams.some(t => !t.eliminated);
  const aFamilyStillIn = aFamilyTeams.some(t => !t.eliminated);
  const hFamilyBestStage = hFamilyTeams.reduce((best, t) => {
    const s = t.stage || "GROUP_STAGE";
    return STAGE_ORD.indexOf(s) > STAGE_ORD.indexOf(best || "GROUP_STAGE") ? s : (best || "GROUP_STAGE");
  }, null);
  const aFamilyBestStage = aFamilyTeams.reduce((best, t) => {
    const s = t.stage || "GROUP_STAGE";
    return STAGE_ORD.indexOf(s) > STAGE_ORD.indexOf(best || "GROUP_STAGE") ? s : (best || "GROUP_STAGE");
  }, null);
  const hFamilyAlive = hFamilyTeams.filter(t => !t.eliminated).length;
  const aFamilyAlive = aFamilyTeams.filter(t => !t.eliminated).length;

  const [view, setView] = React.useState(defaultView || "teams");

  const contentRef = React.useRef(null);
  React.useEffect(() => {
    const el = contentRef.current;
    if (!el) return;
    // Mirror what SnapSheet does on the PlayerCard/TeamCard bodyRef:
    // a passive:false touchstart prevents Chrome committing to scroll at touchstart
    // time, and a passive:false touchmove that calls preventDefault() cancels any
    // scroll Chrome might have started — keeping touchmove events cancelable so the
    // sheet's onMove handler can intercept the full drag gesture.
    // H2H has no scrollable body so it's safe to always prevent default on touchmove.
    const noop = () => {};
    const stopScroll = (e) => e.preventDefault();
    el.addEventListener("touchstart", noop,        { passive: false });
    el.addEventListener("touchmove",  stopScroll,  { passive: false });
    return () => {
      el.removeEventListener("touchstart", noop);
      el.removeEventListener("touchmove",  stopScroll);
    };
  }, []);

  const navBtnStyle = { flex: 1, padding: "11px 8px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, color: C.accent, fontWeight: 700, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 };

  return (
    <>
      {/* bodyRef is hidden — scrollTop always 0 so SnapSheet sees atTop=true everywhere.
          Visible content lives in plain divs with no overflow so the browser never
          commits a touch to native scroll, letting the sheet's drag handlers work. */}
      <div ref={bodyRef} style={{ display: "none" }} />

      <div className="sheet-handle"><span></span></div>

      {/* Fixed header: title row + match preview + view toggle */}
      <div style={{ flexShrink: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px 12px", flexShrink: 0 }}>
          <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>Head to Head</div>
          <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
        </div>

        {/* Match block: teams view = single card with score; players/family view = two tappable cards */}
        {view === "teams" ? (
          <div style={{ padding: "0 14px 12px" }}>
            <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px 12px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5, textAlign: "center", minWidth: 0 }}>
                  <Flag code={h} size={32} />
                  <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%" }}>{m.homeTeam?.name || h}{POT[h] ? <span style={{ fontSize: 10, fontWeight: 600, color: C.muted }}> (P{POT[h]})</span> : ""}</div>
                  {hOwner && <div style={{ fontSize: 11, fontWeight: 600, color: C.accent }}>{hOwner}</div>}
                </div>
                <div style={{ flexShrink: 0, textAlign: "center", minWidth: 52 }}>
                  {(fin || live) && hs !== null && as_ !== null
                    ? <div style={{ fontSize: 22, fontWeight: 900, color: C.text, lineHeight: 1 }}>{hs} – {as_}</div>
                    : <div style={{ fontSize: 13, fontWeight: 700, color: C.muted }}>vs</div>}
                  {live && <div style={{ fontSize: 9, fontWeight: 800, color: C.red, marginTop: 3, letterSpacing: "0.08em" }}>LIVE</div>}
                  {fin && <div style={{ fontSize: 9, fontWeight: 700, color: C.muted, marginTop: 4, letterSpacing: "0.06em", textTransform: "uppercase" }}>FT</div>}
                </div>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5, textAlign: "center", minWidth: 0 }}>
                  <Flag code={a} size={32} />
                  <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%" }}>{m.awayTeam?.name || a}{POT[a] ? <span style={{ fontSize: 10, fontWeight: 600, color: C.muted }}> (P{POT[a]})</span> : ""}</div>
                  {aOwner && <div style={{ fontSize: 11, fontWeight: 600, color: C.accent }}>{aOwner}</div>}
                </div>
              </div>
            </div>
          </div>
        ) : view === "players" ? (
          <div style={{ display: "flex", gap: 10, padding: "0 14px 12px" }}>
            {[{ owner: hOwner, rank: hRank }, { owner: aOwner, rank: aRank }].map(({ owner, rank }, i) => (
              <button key={i} onClick={owner && onPlayerClick ? () => onPlayerClick(owner) : undefined}
                style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 8px", cursor: owner && onPlayerClick ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, position: "relative" }}>
                {owner
                  ? <span style={{ width: 36, height: 36, borderRadius: "50%", background: playerColor(owner), display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 900, color: "#0d1f12" }}>{owner[0]}</span>
                  : <span style={{ width: 36, height: 36, borderRadius: "50%", background: C.border, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: C.muted }}>?</span>}
                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%" }}>{owner || "No owner"}</div>
                {rank != null && <div style={{ fontSize: 11, color: C.muted }}>{toOrdinal(rank)}</div>}
                {owner && onPlayerClick && <span style={{ position: "absolute", top: 10, right: 10, fontSize: 14, color: C.muted, lineHeight: 1 }}>›</span>}
              </button>
            ))}
          </div>
        ) : (
          <div style={{ display: "flex", gap: 10, padding: "0 14px 12px" }}>
            {[{ fd: hFamilyDef, data: hFamilyData }, { fd: aFamilyDef, data: aFamilyData }].map(({ fd, data }, i) => (
              <button key={i} onClick={fd && onFamilyClick ? () => onFamilyClick(fd.name) : undefined}
                style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 8px", cursor: fd && onFamilyClick ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, position: "relative" }}>
                <span style={{ width: 36, height: 36, borderRadius: "50%", background: fd ? familyColor(fd.name) : C.border, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{fd ? "👨‍👩‍👧" : "?"}</span>
                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%" }}>{fd ? fd.name : "No family"}</div>
                {data && <div style={{ fontSize: 11, color: C.muted }}>{toOrdinal(data.rank)}</div>}
                {fd && onFamilyClick && <span style={{ position: "absolute", top: 10, right: 10, fontSize: 14, color: C.muted, lineHeight: 1 }}>›</span>}
              </button>
            ))}
          </div>
        )}

        {/* Teams / Players / Family toggle */}
        <div style={{ display: "flex", gap: 8, padding: "0 14px 12px" }}>
          {["teams", "players", ...(showFamilyTab ? ["family"] : [])].map(v => (
            <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "7px 0", background: view === v ? C.accent : C.card, color: view === v ? "#0d1117" : C.muted, border: `1px solid ${view === v ? C.accent : C.border}`, borderRadius: 10, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
              {v === "teams" ? "Teams" : v === "players" ? "Players" : "Family"}
            </button>
          ))}
        </div>

        <div style={{ borderBottom: `1px solid ${C.border}` }} />
      </div>

      <div ref={contentRef} style={{ flex: 1, padding: "16px 14px 28px", touchAction: "none" }}>
        {view === "teams" ? (
          <>
            {(hEntry || aEntry) && (
              <>
                <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Sweepstake Stats</div>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "0 12px", marginBottom: 18 }}>
                  <StatRow
                    label="Status"
                    hVal={hEntry ? <StatusPill won={hEntry.won} eliminated={hEntry.eliminated} small /> : "—"}
                    aVal={aEntry ? <StatusPill won={aEntry.won} eliminated={aEntry.eliminated} small /> : "—"}
                  />
                  <StatRow
                    label="Stage"
                    hVal={hEntry ? (hEntry.stage ? (STAGE_LABEL[hEntry.stage] || hEntry.stage.replace(/_/g, " ")) : "Groups") : "—"}
                    aVal={aEntry ? (aEntry.stage ? (STAGE_LABEL[aEntry.stage] || aEntry.stage.replace(/_/g, " ")) : "Groups") : "—"}
                  />
                  <StatRow
                    label="Total Pts"
                    hVal={hEntry ? `${hEntry.pts > 0 ? "+" : ""}${hEntry.pts}` : "—"}
                    aVal={aEntry ? `${aEntry.pts > 0 ? "+" : ""}${aEntry.pts}` : "—"}
                    hColor={hEntry ? (hEntry.pts < 0 ? C.red : C.text) : C.muted}
                    aColor={aEntry ? (aEntry.pts < 0 ? C.red : C.text) : C.muted}
                  />
                  <StatRow
                    label="Record"
                    hVal={hEntry ? `${hEntry.w}W ${hEntry.d}D ${hEntry.l}L` : "—"}
                    aVal={aEntry ? `${aEntry.w}W ${aEntry.d}D ${aEntry.l}L` : "—"}
                  />
                </div>
              </>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              {h && onTeamClick && (
                <button onClick={() => onTeamClick(h)} style={navBtnStyle}>
                  <Flag code={h} size={14} />
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.homeTeam?.name || h}</span>
                  <span style={{ fontSize: 14, lineHeight: 1, flexShrink: 0 }}>›</span>
                </button>
              )}
              {a && onTeamClick && (
                <button onClick={() => onTeamClick(a)} style={navBtnStyle}>
                  <Flag code={a} size={14} />
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.awayTeam?.name || a}</span>
                  <span style={{ fontSize: 14, lineHeight: 1, flexShrink: 0 }}>›</span>
                </button>
              )}
            </div>
          </>
        ) : view === "players" ? (
          <>
            {(hPlayer || aPlayer) ? (
              <>
                <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Sweepstake Stats</div>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "0 12px", marginBottom: 18 }}>
                  <StatRow
                    label="Status"
                    hVal={hPlayer ? <StatusPill won={hWon} eliminated={!hStillIn && !hWon ? true : null} small /> : "—"}
                    aVal={aPlayer ? <StatusPill won={aWon} eliminated={!aStillIn && !aWon ? true : null} small /> : "—"}
                  />
                  <StatRow
                    label="Stage"
                    hVal={hBestStage ? (STAGE_LABEL[hBestStage] || "Groups") : (hPlayer ? "Groups" : "—")}
                    aVal={aBestStage ? (STAGE_LABEL[aBestStage] || "Groups") : (aPlayer ? "Groups" : "—")}
                  />
                  <StatRow
                    label="Total Pts"
                    hVal={hPlayer ? `${hPlayer.total > 0 ? "+" : ""}${hPlayer.total}` : "—"}
                    aVal={aPlayer ? `${aPlayer.total > 0 ? "+" : ""}${aPlayer.total}` : "—"}
                    hColor={hPlayer ? (hPlayer.total < 0 ? C.red : C.text) : C.muted}
                    aColor={aPlayer ? (aPlayer.total < 0 ? C.red : C.text) : C.muted}
                  />
                  <StatRow
                    label="Teams Alive"
                    hVal={hPlayer ? `${(hPlayer.teams || []).filter(t => !t.eliminated).length} / ${(hPlayer.codes || []).length}` : "—"}
                    aVal={aPlayer ? `${(aPlayer.teams || []).filter(t => !t.eliminated).length} / ${(aPlayer.codes || []).length}` : "—"}
                  />
                </div>
                {hOwner === aOwner && (
                  <div style={{ fontSize: 11, color: C.muted, textAlign: "center", marginBottom: 14 }}>Both teams owned by the same player</div>
                )}
              </>
            ) : (
              <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>No sweepstake owners for this match</div>
            )}
          </>
        ) : (
          <>
            {(hFamilyData || aFamilyData) ? (
              <>
                <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Family Stats</div>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "0 12px", marginBottom: 18 }}>
                  <StatRow
                    label="Status"
                    hVal={hFamilyDef ? <StatusPill won={hFamilyWon} eliminated={!hFamilyStillIn && !hFamilyWon} small /> : "—"}
                    aVal={aFamilyDef ? <StatusPill won={aFamilyWon} eliminated={!aFamilyStillIn && !aFamilyWon} small /> : "—"}
                  />
                  <StatRow
                    label="Stage"
                    hVal={hFamilyDef ? (hFamilyBestStage ? (STAGE_LABEL[hFamilyBestStage] || "Groups") : "Groups") : "—"}
                    aVal={aFamilyDef ? (aFamilyBestStage ? (STAGE_LABEL[aFamilyBestStage] || "Groups") : "Groups") : "—"}
                  />
                  <StatRow
                    label="Avg Pts"
                    hVal={hFamilyData ? `+${hFamilyData.avg}` : "—"}
                    aVal={aFamilyData ? `+${aFamilyData.avg}` : "—"}
                    hColor={hFamilyData ? C.accent : C.muted}
                    aColor={aFamilyData ? C.accent : C.muted}
                  />
                  <StatRow
                    label="Total Pts"
                    hVal={hFamilyData ? hFamilyData.total : "—"}
                    aVal={aFamilyData ? aFamilyData.total : "—"}
                  />
                  <StatRow
                    label="Teams Alive"
                    hVal={hFamilyDef ? `${hFamilyAlive} / ${hFamilyTeams.length}` : "—"}
                    aVal={aFamilyDef ? `${aFamilyAlive} / ${aFamilyTeams.length}` : "—"}
                  />
                  {hFamilyDef?.name === aFamilyDef?.name && hFamilyDef && (
                    <div style={{ fontSize: 11, color: C.muted, textAlign: "center", padding: "10px 0" }}>Both players are in the same family</div>
                  )}
                </div>
              </>
            ) : (
              <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>No family data for this match</div>
            )}
          </>
        )}
      </div>
    </>
  );
}

        <div style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, color: C.muted, padding: "0 6px" }}>vs</div>

}

function HomeMatchRow({ m, ranked, pts, onTeamClick, onMatchClick, isLast, banners = false }) {

  const aOwner = ownerOf(a, ranked);
  const hs = m.score?.fullTime?.home ?? 0;
  const as_ = m.score?.fullTime?.away ?? 0;
  const banner = banners ? resultBanner(m) : null;
  const rowClickable = !!onMatchClick;
  return (
    <div
      className={rowClickable ? "player-card" : undefined}
      onClick={rowClickable ? () => onMatchClick(m.id) : undefined}
      style={{ padding: "10px 14px", borderBottom: isLast ? "none" : `1px solid ${C.border}`, boxShadow: banner ? `inset 3px 0 0 ${C.gold}` : "none", cursor: rowClickable ? "pointer" : "default" }}>
      {banners ? (
        <div style={{ display: "flex", alignItems: "center", marginBottom: 7 }}>
          <span style={{ fontSize: 9, color: live ? C.red : C.dim, fontWeight: 700, letterSpacing: "0.08em", flex: 1, textTransform: "uppercase", animation: live ? "pulse-red 1.5s infinite" : "none" }}>{live ? "⚡ LIVE" : (m.stage || "").replace(/_/g, " ")}</span>

              <span style={{ fontSize: 12, lineHeight: 1 }}>{banner.icon}</span>
              <span style={{ fontSize: 9, fontWeight: 900, color: C.gold, letterSpacing: "0.06em" }}>{banner.label}</span>

        <div style={{ marginBottom: 6 }}>
          <span style={{ fontSize: 9, color: C.dim, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase" }}>{(m.stage || "").replace(/_/g, " ")}</span>
        </div>
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <div
          className={!rowClickable && onTeamClick && h ? "player-card" : undefined}
          onClick={!rowClickable && onTeamClick && h ? () => onTeamClick(h) : undefined}
          style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, cursor: !rowClickable && onTeamClick && h ? "pointer" : "default", minWidth: 0 }}>
          <Flag code={h} size={20} />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{hOwner || m.homeTeam?.name || "TBD"}</div>
            {hOwner && <div style={{ fontSize: 10, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.homeTeam?.name}{POT[h] ? <span style={{ fontSize: 9 }}> (P{POT[h]})</span> : ""}</div>}

          </div>
        </div>
        <div style={{ textAlign: "center", flexShrink: 0, minWidth: 44 }}>

            ? <>
                <span style={{ fontSize: 15, fontWeight: 800, color: live ? C.red : C.text, letterSpacing: 1 }}>{hs}–{as_}</span>
                {fin && m.score?.penalties?.home != null && (
                  <div style={{ fontSize: 9, color: C.muted, marginTop: 1 }}>pens {m.score.penalties.home}–{m.score.penalties.away}</div>

              </>
            : <div>
                <div style={{ fontSize: 11, color: C.muted, fontWeight: 700 }}>vs</div>
                <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{fmt(m.utcDate)}</div>

        </div>
        <div
          className={!rowClickable && onTeamClick && a ? "player-card" : undefined}
          onClick={!rowClickable && onTeamClick && a ? () => onTeamClick(a) : undefined}
          style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end", cursor: !rowClickable && onTeamClick && a ? "pointer" : "default", minWidth: 0 }}>
          <div style={{ textAlign: "right", minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{aOwner || m.awayTeam?.name || "TBD"}</div>
            {aOwner && <div style={{ fontSize: 10, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.awayTeam?.name}{POT[a] ? <span style={{ fontSize: 9 }}> (P{POT[a]})</span> : ""}</div>}
            {pts?.away > 0 && <div style={{ fontSize: 10, fontWeight: 800, color: C.accent, marginTop: 1 }}>+{pts.away}pts</div>}
          </div>
          <Flag code={a} size={20} />
        </div>
      </div>

function FamilyCardContent({ bodyRef, familyName, ranked, groupKey, matches = [], matchPtsById = {}, onPlayerClick, onMatchClick, onClose }) {
  const families = GROUPS[groupKey]?.families;
  const family = families?.find(f => f.name === familyName);
  if (!family) return null;
  const rankColors = ["#84cc16","#94a3b8","#b45309"];
  const playerMap = Object.fromEntries(ranked.map((p, i) => [p.name, { ...p, overallRank: i + 1 }]));
  const memberData = family.members
    .map(name => ({ name, p: playerMap[name] }))
    .sort((a, b) => (b.p?.total ?? 0) - (a.p?.total ?? 0));
  const total = memberData.reduce((s, m) => s + (m.p?.total ?? 0), 0);
  const avg = Math.round(total / memberData.length);
  const hists = memberData.map(m => m.p?.hist).filter(Boolean);
  const len = hists.length ? Math.max(...hists.map(h => h.length)) : 0;
  const combinedHist = len ? Array.from({ length: len }, (_, i) => hists.reduce((s, h) => s + (h[i] ?? h[h.length - 1] ?? 0), 0)) : [0];
  const allFamilyRows = families.map(f => {
    const tots = f.members.map(n => playerMap[n]?.total ?? 0);
    return { name: f.name, avg: Math.round(tots.reduce((s, v) => s + v, 0) / f.members.length) };
  }).sort((a, b) => b.avg - a.avg);
  const familyRank = allFamilyRows.findIndex(f => f.name === familyName) + 1;
  const allMemberTeams = memberData.flatMap(({ p }) => p?.teams || []);
  const familyWon = allMemberTeams.some(t => t.won);
  const familyStillIn = allMemberTeams.some(t => !t.eliminated);
  return (<>
    <div className="sheet-handle"><span></span></div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
      <div>
        <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>{familyName}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
          <span style={{ fontSize: 11, color: C.muted }}>Rank {familyRank} · {avg} avg pts · {memberData.length} members</span>
          {allMemberTeams.length > 0 && <StatusPill won={familyWon} eliminated={!familyStillIn && !familyWon} small />}
        </div>
      </div>
      <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
    </div>
    <div ref={bodyRef} style={{ flex: 1, overflowY: "auto", padding: "16px 14px 28px" }}>
      <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
        <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, padding: "12px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 24, fontWeight: 900, color: C.accent, lineHeight: 1 }}>{avg}</div>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 4 }}>Avg pts</div>
        </div>
        <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, padding: "12px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 24, fontWeight: 900, color: C.text, lineHeight: 1 }}>{total}</div>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 4 }}>Total pts</div>
        </div>
      </div>
      <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Points over time</div>
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, padding: "12px 8px", marginBottom: 18, display: "flex", justifyContent: "center" }}>
        <Sparkline data={combinedHist} width={300} height={72} color={C.accent} />
      </div>
      <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Members</div>
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: s.card.borderRadius, overflow: "hidden", marginBottom: 18 }}>
        {memberData.map(({ name, p }, j) => (
          <div key={name}
            className={onPlayerClick ? "player-card" : undefined}
            onClick={onPlayerClick ? () => onPlayerClick(name) : undefined}
            style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderBottom: j < memberData.length - 1 ? `1px solid ${C.border}` : "none", cursor: onPlayerClick ? "pointer" : "default" }}>
            <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, minWidth: 14, textAlign: "right" }}>{p?.overallRank ?? "—"}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 3 }}>{name}</div>
              {p?.grimReaper
                ? <div style={{ fontSize: 10, color: C.dangerText, opacity: 0.8 }}>💀 Grim Reaper</div>
                : p && <FlagRow teams={p.teams} baseHeight={14} />}
            </div>
            <div style={{ fontSize: 14, fontWeight: 800, color: C.text, flexShrink: 0 }}>
              {p?.total ?? 0}<span style={{ fontSize: 9, color: C.muted, marginLeft: 2 }}>pts</span>
            </div>
            {onPlayerClick && <span aria-hidden="true" style={{ color: C.muted, fontSize: 18, lineHeight: 1, flexShrink: 0 }}>›</span>}
          </div>
        ))}
      </div>
      {(() => {
        const familyCodes = allMemberTeams.map(t => t.code);
        const upcomingFamilyMatches = matches
          .filter(m => {
            const h = m.homeTeam?.tla?.toUpperCase();
            const a = m.awayTeam?.tla?.toUpperCase();
            return (familyCodes.includes(h) || familyCodes.includes(a)) && !isSettled(m.status);
          })
          .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
        if (upcomingFamilyMatches.length === 0) return null;
        return (<>
          <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Upcoming</div>
          {upcomingFamilyMatches.map((m, i) => (
            <UpcomingMatchRow key={m.id} m={m} onMatchClick={onMatchClick} isLast={i === upcomingFamilyMatches.length - 1} />
          ))}
          <div style={{ marginBottom: 18 }} />
        </>);
      })()}
      {(() => {
        const seen = new Set();
        const events = [];
        allMemberTeams.forEach(t => {
          const code = t.code;
          matches
            .filter(m => {
              const h = m.homeTeam?.tla?.toUpperCase();
              const a = m.awayTeam?.tla?.toUpperCase();
              return (h === code || a === code) && isSettled(m.status);
            })
            .forEach(m => {
              const key = `${code}-${m.id}`;
              if (seen.has(key)) return;
              seen.add(key);
              const h = m.homeTeam?.tla?.toUpperCase();
              const isHome = h === code;
              const isLive = m.status === "IN_PLAY" || m.status === "PAUSED";
              const hs = m.score?.fullTime?.home ?? 0;
              const as_ = m.score?.fullTime?.away ?? 0;
              const myGoals = isHome ? hs : as_;
              const oppGoals = isHome ? as_ : hs;
              const pen = m.score?.penalties;
              let result = "D";
              if (myGoals > oppGoals) result = "W";
              else if (myGoals < oppGoals) result = "L";
              else if (pen) {
                const myPen = isHome ? pen.home : pen.away;
                const oppPen = isHome ? pen.away : pen.home;
                result = myPen > oppPen ? "W" : "L";
              }
              const mPts = matchPtsById[m.id];
              const earnedPts = mPts ? (isHome ? mPts.home : mPts.away) : null;
              const oppName = isHome ? (m.awayTeam?.name || "TBD") : (m.homeTeam?.name || "TBD");
              const resultColor = isLive ? "#f97316" : result === "W" ? C.accent : result === "L" ? C.red : C.muted;
              const badgeBg = isLive ? "rgba(249,115,22,0.15)" : result === "W" ? C.posBg : result === "L" ? C.negBg : "rgba(148,163,184,0.12)";
              events.push({ key, t, m, isLive, myGoals, oppGoals, result, earnedPts, oppName, resultColor, badgeBg });
            });
        });
        events.sort((a, b) => new Date(b.m.utcDate) - new Date(a.m.utcDate));
        if (events.length === 0) return null;
        return (<>
          <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Results</div>
          {events.map(({ key, t, m, isLive, myGoals, oppGoals, result, earnedPts, oppName, resultColor, badgeBg }, i) => (
            <div key={key} className={onMatchClick ? "player-card" : undefined} onClick={onMatchClick ? () => onMatchClick(m.id) : undefined}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: i < events.length - 1 ? `1px solid ${C.border}` : "none", cursor: onMatchClick ? "pointer" : "default" }}>
              <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: badgeBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: resultColor }}>{result}</div>
              <Flag code={t.code} size={18} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}{t.pot ? <span style={{ fontSize: 9, color: C.muted, fontWeight: 400 }}> (P{t.pot})</span> : ""}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{isLive && <span style={{ color: "#f97316", fontWeight: 700 }}>LIVE · </span>}vs {oppName} · {fmt(m.utcDate)}</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                {earnedPts != null && <div style={{ fontSize: 12, fontWeight: 800, color: isLive ? "#f97316" : C.text }}>{earnedPts > 0 ? `+${earnedPts}` : earnedPts} pts</div>}
                <div style={{ fontSize: 11, color: resultColor }}>{myGoals}–{oppGoals}</div>
              </div>
            </div>
          ))}
        </>);
      })()}
    </div>
  </>);
}

function FamilyLeagueTab({ ranked, groupKey, onPlayerClick, onFamilyClick }) {
  const families = GROUPS[groupKey]?.families;
  if (!families) return null;
  const rankColors = ["#84cc16","#94a3b8","#b45309"];
  const playerMap = Object.fromEntries(ranked.map((p, i) => [p.name, { ...p, overallRank: i + 1 }]));
  const familyRows = families.map(f => {
    const memberData = f.members
      .map(name => ({ name, p: playerMap[name] }))
      .sort((a, b) => (b.p?.total ?? 0) - (a.p?.total ?? 0));
    const total = memberData.reduce((s, m) => s + (m.p?.total ?? 0), 0);
    const avg = Math.round(total / memberData.length);
    const hists = memberData.map(m => m.p?.hist).filter(Boolean);
    const len = hists.length ? Math.max(...hists.map(h => h.length)) : 0;

function MatchFocusCard({ matches, ranked, matchPtsById = {}, onMatchClick }) {
  const [countdown, setCountdown] = React.useState("");
  const [idx, setIdx] = useState(0);
  const trackRef = React.useRef(null);
  const drag = React.useRef({ startX: 0, dx: 0, active: false, w: 0 });
  const ANIM = "transform 0.28s cubic-bezier(0.4,0,0.2,1)";

  const liveMatches = matches.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED")
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
  const isLive = liveMatches.length > 0;

  // For upcoming: show all matches sharing the same earliest kickoff minute.
  const upcomingSorted = matches.filter(m => m.status === "SCHEDULED" || m.status === "TIMED")
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
  const nextTime = upcomingSorted.length > 0 ? new Date(upcomingSorted[0].utcDate).getTime() : null;
  const nextBatch = nextTime
    ? upcomingSorted.filter(m => Math.abs(new Date(m.utcDate).getTime() - nextTime) < 60000)
    : [];

  const games = isLive ? liveMatches : nextBatch;
  const count = games.length;
  const multi = count > 1;
  const safeIdx = Math.max(0, Math.min(idx, count - 1));

  useEffect(() => {
    const t = trackRef.current; if (!t) return;
    t.style.transition = ANIM;
    t.style.transform = `translateX(${-safeIdx * 100}%)`;
  }, [safeIdx, count]);
  useEffect(() => { if (idx > count - 1) setIdx(Math.max(0, count - 1)); }, [count]);

  const settle = useCallback((i) => {
    const t = trackRef.current;
    const clamped = Math.max(0, Math.min(count - 1, i));
    if (t) { t.style.transition = ANIM; t.style.transform = `translateX(${-clamped * 100}%)`; }
    setIdx(clamped);
  }, [count]);

  const onDown = (e) => {
    const d = drag.current;
    d.active = true; d.startX = e.clientX; d.dx = 0; d.w = e.currentTarget.clientWidth;
    if (multi && trackRef.current) trackRef.current.style.transition = "none";
    e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onMove = (e) => {
    const d = drag.current; if (!d.active || !multi) return;
    d.dx = e.clientX - d.startX;
    const edge = (safeIdx === 0 && d.dx > 0) || (safeIdx === count - 1 && d.dx < 0);
    const eff = edge ? d.dx * 0.35 : d.dx;
    if (trackRef.current) trackRef.current.style.transform = `translateX(calc(${-safeIdx * 100}% + ${eff}px))`;
  };
  const onUp = () => {
    const d = drag.current; if (!d.active) return;
    d.active = false;
    const thresh = Math.max(40, d.w * 0.15);
    if (d.dx <= -thresh) settle(safeIdx + 1);
    else if (d.dx >= thresh) settle(safeIdx - 1);
    else settle(safeIdx);
  };
  // Use onClick (not onPointerUp) to open the H2H modal — click fires on the
  // card element before React re-renders, so the backdrop doesn't exist yet
  // and can't intercept the event. onPointerUp triggers a re-render first,
  // then the browser fires a synthetic click directly onto the fresh backdrop.
  const onTap = () => {
    const d = drag.current;
    if (Math.abs(d.dx) < 8 && onMatchClick && games[safeIdx]) onMatchClick(games[safeIdx].id);
  };

  useEffect(() => {
    if (isLive || !nextBatch[0]) { setCountdown(""); return; }
    const tick = () => {
      const diff = new Date(nextBatch[0].utcDate) - new Date();
      if (diff <= 0) { setCountdown(""); return; }
      const hh = Math.floor(diff / 3600000);
      const mm = Math.floor((diff % 3600000) / 60000);
      const ss = Math.floor((diff % 60000) / 1000);
      setCountdown(hh > 0
        ? `${hh}h ${String(mm).padStart(2,"0")}m ${String(ss).padStart(2,"0")}s`
        : `${mm}m ${String(ss).padStart(2,"0")}s`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [isLive, nextBatch[0]?.id]);

  if (games.length === 0) return null;

  const renderGame = (m) => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hOwner = ownerOf(h, ranked);
    const aOwner = ownerOf(a, ranked);
    const broadcast = typeof getBroadcast === "function" ? getBroadcast(h, a) : { b: "", url: "" };
    const livePts = matchPtsById[m.id];
    return (
      <div key={m.id} style={{ flex:"0 0 100%", display:"flex", alignItems:"center" }}>
        <div style={{ flex:1, display:"flex", alignItems:"center", gap:6 }}>
          <Flag code={h} size={18} />
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{hOwner || m.homeTeam?.name}</div>
            <div style={{ fontSize:10, color:C.muted }}>{m.homeTeam?.name}{POT[h] ? <span style={{ fontSize:9 }}> (P{potOf(h)})</span> : ""}</div>
            {livePts && livePts.home > 0 && <div style={{ fontSize:10, fontWeight:800, color:C.accent, marginTop:2 }}>+{livePts.home} pts</div>}
          </div>
        </div>
        <div style={{ textAlign:"center", padding:"0 8px", flexShrink:0 }}>
          {isLive
            ? <div style={{ fontSize:16, fontWeight:800, color:C.red, letterSpacing:2 }}>{m.score?.fullTime?.home??0}–{m.score?.fullTime?.away??0}</div>
            : <div style={{ fontSize:13, color:C.muted, marginBottom:4 }}>vs</div>
          }
          {broadcast.b && <span style={{ background:broadcast.b==="ITV"?"#003087":"#FF6B35", color:"white", fontSize:9, fontWeight:800, padding:"2px 5px", borderRadius:3, whiteSpace:"nowrap", display:"inline-block" }}>▶ {broadcast.b}</span>}
        </div>
        <div style={{ flex:1, display:"flex", alignItems:"center", gap:6, justifyContent:"flex-end" }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{aOwner || m.awayTeam?.name}</div>
            <div style={{ fontSize:10, color:C.muted }}>{m.awayTeam?.name}{POT[a] ? <span style={{ fontSize:9 }}> (P{potOf(a)})</span> : ""}</div>
            {livePts && livePts.away > 0 && <div style={{ fontSize:10, fontWeight:800, color:C.accent, marginTop:2 }}>+{livePts.away} pts</div>}
          </div>
          <Flag code={a} size={18} />
        </div>
      </div>
    );
  };

  return (
    <div style={{ ...s.card, marginBottom:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 14px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {isLive && <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:C.red, animation:"pulse-red 1.5s infinite" }} />}
          <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.1em", color: isLive ? C.red : C.muted }}>
            {isLive ? "LIVE NOW" : "NEXT MATCH"}
          </span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {!isLive && countdown && <span style={{ fontSize:11, fontFamily:"monospace", color:C.accent }}>{countdown}</span>}
          {multi && <span style={{ fontSize:10, fontWeight:700, color:C.muted, fontVariantNumeric:"tabular-nums" }}>{safeIdx+1}/{count}</span>}
        </div>
      </div>
      <div onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        onClick={onTap}
        style={{ padding:"8px 14px 12px", overflow:"hidden", touchAction: multi ? "pan-y" : "auto", cursor: onMatchClick ? "pointer" : "default" }}>
        <div ref={trackRef} style={{ display:"flex" }}>
          {games.map(renderGame)}
        </div>
      </div>
      {multi && (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:7, paddingBottom:10, height:16 }}>
          {games.map((m, i) => (
            <button key={m.id} onClick={() => settle(i)} aria-label={`Match ${i+1}`}
              style={{ width:i===safeIdx?8:6, height:i===safeIdx?8:6, padding:0, border:"none", cursor:"pointer", borderRadius:"50%", background:i===safeIdx?(isLive?C.red:C.accent):C.border, transition:"all 0.2s" }}/>
          ))}
        </div>
      )}
    </div>
  );
}

// BBC/email-digest-style homepage — a snapshot of yesterday, now, and what's
// next, mirroring the daily email's sections so the two feel like the same
// product. Pure read-only summary view; "Open the full table" hands off to
// the League tab for anything that needs deeper interaction.
function HomeTab({ matches, ranked, badges, rank24hChange, rank24hPtsChange, matchPtsById, upcoming, setTab, setLeagueView, openPlayerModal, openTeamModal, openMatchModal, openFamilyModal, groupKey }) {
  const openPlayer = (name, scrollToBottom = false) => openPlayerModal(name, scrollToBottom);
  // Badges assigned in the last 24h (not "since you last looked" — same
  // rolling window as everything else on this tab). Single-holder badges
  // (Top Dog, Firepower, etc.) naturally surface for whoever holds them
  // *now* if the holder changed within the window — see comment in
  // computeNewBadges24h in scoring.js for why no extra logic is needed.
  const newAccolades = typeof computeNewBadges24h === "function" ? computeNewBadges24h(badges, matches) : [];

  // "Last 24 hours" everywhere on this tab, not calendar "yesterday" — same
  // rolling window rank24hChange/rank24hPtsChange already use, so every
  // section on the page is answering the same question consistently.
  const cutoffMs = Date.now() - 24 * 60 * 60 * 1000;
  const recentResults = matches
    .filter(m => m.status === "FINISHED" && new Date(m.utcDate).getTime() >= cutoffMs)
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

  const real = ranked.filter(p => !p.grimReaper);
  const topThree = real.slice(0, 3);

  const upNext = [...upcoming]
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
    .slice(0, 6);

  // Same flat section-per-card layout as the email digest (label above a
  // card), not grouped into per-app-area cards — but each section that maps
  // onto a real tab still gets a footer link straight into it.
  const Section = ({ icon, title, onOpen, linkLabel, empty, children }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>{icon}</span>{title}</div>
      <div style={s.card}>
        {empty
          ? <div style={{ padding: "14px", fontSize: 12, color: C.muted }}>{empty}</div>
          : children}
        {onOpen && (
          <button onClick={onOpen} style={{
            width: "100%", padding: "10px 14px", background: "transparent", border: "none",
            borderTop: `1px solid ${C.border}`, color: C.accent, fontSize: 12, fontWeight: 700,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
          }}>
            {linkLabel} <span style={{ fontSize: 14, lineHeight: 1 }}>›</span>
          </button>
        )}
      </div>
    </div>
  );

  const rankColors = ["#84cc16","#94a3b8","#b45309"];

  const families = GROUPS[groupKey]?.families;
  const familyRows = families ? (() => {
    const playerMap = Object.fromEntries(ranked.map((p, i) => [p.name, { ...p, overallRank: i + 1 }]));
    return families.map(f => {
      const memberData = f.members.map(name => ({ name, p: playerMap[name] })).sort((a, b) => (b.p?.total ?? 0) - (a.p?.total ?? 0));
      const total = memberData.reduce((s, m) => s + (m.p?.total ?? 0), 0);
      const avg = Math.round(total / memberData.length);
      const hists = memberData.map(m => m.p?.hist).filter(Boolean);
      const len = hists.length ? Math.max(...hists.map(h => h.length)) : 0;
      const combinedHist = len ? Array.from({ length: len }, (_, i) => hists.reduce((s, h) => s + (h[i] ?? h[h.length - 1] ?? 0), 0)) : [0];
      return { name: f.name, memberData, total, avg, combinedHist };
    }).sort((a, b) => b.avg - a.avg);
  })() : null;
  const topFamily = familyRows?.[0] || null;
  const topFamilyThree = familyRows?.slice(0, 3) || [];

  return (
    <div>
      <MatchFocusCard matches={matches} ranked={ranked} matchPtsById={matchPtsById} onMatchClick={openMatchModal} />

          </div>
          <div style={{ fontSize: 30, fontWeight: 900, color: C.accent, lineHeight: 1 }}>
            {topThree[0].total}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
          </div>
        </div>
      )}

      <Section icon="🏆" title="Top Players" onOpen={() => { window.history.pushState({ appTab: "table", appModal: null }, ""); window.scrollTo(0, 0); setTab("table"); setLeagueView("league"); }} linkLabel="View player league"
        empty={topThree.length === 0 ? "No standings yet" : null}>

          return (

              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 12, fontWeight: 800, color: "#080c18",
              }}>{i + 1}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
              </div>
              <Sparkline data={p.hist} width={64} height={28} color={p.total < 0 ? C.red : p.total === 0 ? C.neutral : C.accent} />
              <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.text, lineHeight: 1 }}>{p.total}</div>
                <div style={{
                  display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, marginTop: 3,
                  background: delta === 0 ? "rgba(148,163,184,0.12)" : delta > 0 ? C.posBg : C.negBg,

      {topFamily && (

          <div style={{ marginBottom: 6 }}>
            <span style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{topFamily.name}</span>
          </div>
          <div style={{ fontSize: 30, fontWeight: 900, color: C.accent, lineHeight: 1 }}>
            {topFamily.avg}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> avg pts</span>
          </div>
        </div>
      )}
      {topFamilyThree.length > 0 && (
        <Section icon="👨‍👩‍👧‍👦" title="Top Families" onOpen={() => { window.history.pushState({ appTab: "table", appModal: null }, ""); window.scrollTo(0, 0); setTab("table"); setLeagueView("families"); }} linkLabel="View family league"
          empty={null}>
          {topFamilyThree.map((family, i) => (
            <div key={family.name}

              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,

                fontSize: 12, fontWeight: 800, color: "#080c18",

              <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: C.text }}>{family.name}</div>
              <Sparkline data={family.combinedHist} width={64} height={28} color={C.accent} />
              <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.text, lineHeight: 1 }}>{family.avg}</div>
                <div style={{ fontSize: 9, color: C.muted, marginTop: 2 }}>avg pts</div>

            </div>
          ))}
        </Section>
      )}

      <Section icon="🏅" title="New Accolades" onOpen={() => { window.history.pushState({ appTab: "table", appModal: null }, ""); window.scrollTo(0, 0); setTab("table"); }} linkLabel="View league"
        empty={newAccolades.length === 0 ? "No new accolades in the last 24h" : null}>
        {newAccolades.map((b, i) => (
          <div key={i} className="player-card" onClick={() => openPlayer(b.name)} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < newAccolades.length - 1 ? `1px solid ${C.border}` : "none" }}>

      <Section icon="🗓️" title="Knockout Bracket" onOpen={() => { window.history.pushState({ appTab: "table", appModal: null }, ""); window.scrollTo(0, 0); setTab("table"); setLeagueView("knockout"); }} linkLabel="View full bracket">

  );
