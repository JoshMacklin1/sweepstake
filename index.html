// POINTS MATRIX  — INCREMENTAL points earned at each stage [Pot1, Pot2, Pot3, Pot4]
// A team earns ALL stages they reach cumulatively
// e.g. a Pot4 team reaching the SF earns: 0(group) + 50(L32) + 150(L16) + 300(QF) + 500(SF) = 1000
// ─────────────────────────────────────────────────────────────────────────────
const PTS_INC = {
  LAST_32:       [0,   15,  25,   50],
  LAST_16:       [5,   25,  50,   150],
  QUARTER_FINALS:[15,  50,  100,  300],

};

// Group stage win/draw points by pot [P1, P2, P3, P4]
const GROUP_WIN_PTS  = [2,  4,  8,  12];
const GROUP_DRAW_PTS = [1,  2,  3,   5];

function groupGamePts(code, result) {
  const pot = (POT[code] || 4) - 1;
  if (result === "W") return GROUP_WIN_PTS[pot];
  if (result === "D") return GROUP_DRAW_PTS[pot];
  return 0;
}

// Compute group stage W/D/L points for all teams from finished group matches
function deriveGroupPts(matches) {
  const groupPts = {};
  matches.filter(m => (m.status === "FINISHED" || m.status === "IN_PLAY" || m.status === "PAUSED") && (m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    if (!h || !a) return;
    let hResult, aResult;
    if (hs > as_)       { hResult = "W"; aResult = "L"; }
    else if (as_ > hs)  { hResult = "L"; aResult = "W"; }
    else                 { hResult = "D"; aResult = "D"; }
    groupPts[h] = (groupPts[h] || 0) + groupGamePts(h, hResult);
    groupPts[a] = (groupPts[a] || 0) + groupGamePts(a, aResult);
  });
  return groupPts;
}
const STAGE_ORDER = ["GROUP_ELIM","LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINALIST","WINNER"];

// Total points for a team at a given stage (sum of all incremental stages reached)
const ptsTotal = (code, stageKey) => {
  if (stageKey === "GROUP_ELIM") return (PTS_INC.GROUP_ELIM || [0,0,0,0])[(POT[code]||4)-1];
  const pot = (POT[code]||4) - 1;
  const idx = STAGE_ORDER.indexOf(stageKey);
  if (idx < 0) return 0;
  let total = 0;
  STAGE_ORDER.slice(1, idx + 1).forEach(s => { total += (PTS_INC[s]||[0,0,0,0])[pot]; });
  return total;
};

function goalDroughtPts(m) {
  const hs = m.score?.fullTime?.home ?? 0;

// ─────────────────────────────────────────────────────────────────────────────
function deriveStages(matches) {
  const eliminated = {};
  const winners    = {};
  const stageReached = {}; // code → highest stage key reached

  const done = matches.filter(m => m.status === "FINISHED");

  const markStage = (code, stageKey) => {
    if (!code) return;
    const cur = stageReached[code];
    if (!cur || STAGE_ORDER.indexOf(stageKey) > STAGE_ORDER.indexOf(cur)) {
      stageReached[code] = stageKey;
    }
  };

  done.forEach(m => {
    const stage = (m.stage || "").toUpperCase();
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const pen = m.score?.penalties;

    let loser = null, winner = null;
    if (hs > as_)      { loser = a; winner = h; }
    else if (as_ > hs) { loser = h; winner = a; }
    else if (pen) {
      if (pen.home > pen.away) { loser = a; winner = h; }
      else { loser = h; winner = a; }
    }

    if (stage === "FINAL") {
      if (winner) { winners[winner] = true; markStage(winner, "WINNER"); }
      if (loser)  { eliminated[loser] = "FINALIST"; markStage(loser, "FINALIST"); }
    } else if (stage.includes("SEMI")) {
      markStage(winner, "SEMI_FINALS"); markStage(loser, "SEMI_FINALS");
      if (loser) eliminated[loser] = "SEMI_FINALS";
    } else if (stage.includes("QUARTER")) {
      markStage(winner, "QUARTER_FINALS"); markStage(loser, "QUARTER_FINALS");
      if (loser) eliminated[loser] = "QUARTER_FINALS";
    } else if (stage.includes("LAST_16") || stage.includes("16")) {
      markStage(winner, "LAST_16"); markStage(loser, "LAST_16");
      if (loser) eliminated[loser] = "LAST_16";
    } else if (stage.includes("LAST_32") || stage.includes("32")) {
      markStage(winner, "LAST_32"); markStage(loser, "LAST_32");
      if (loser) eliminated[loser] = "LAST_32";
    }
  });

  // Group stage eliminations
  const knockoutTeams = new Set(Object.keys(stageReached));
  const groupGames = {};
  done.filter(m => (m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    if (h) groupGames[h] = (groupGames[h]||0) + 1;
    if (a) groupGames[a] = (groupGames[a]||0) + 1;
  });
  Object.entries(groupGames).forEach(([code, n]) => {
    if (n >= 3 && !knockoutTeams.has(code) && !eliminated[code]) {
      eliminated[code] = "GROUP_ELIM";
      stageReached[code] = "GROUP_ELIM";
    }
  });

  return { eliminated, winners, stageReached };
}

// ─────────────────────────────────────────────────────────────────────────────
// W/D/L TALLY  — count match results for every team across all finished games
// ─────────────────────────────────────────────────────────────────────────────
function deriveWDL(matches) {
  const record = {}; // code → { w, d, l }
  const ensure = c => { if (c && !record[c]) record[c] = { w:0, d:0, l:0 }; };

  matches.filter(m => m.status === "FINISHED").forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    ensure(h); ensure(a);
    if (!h || !a) return;
    if (hs > as_)      { record[h].w++; record[a].l++; }
    else if (as_ > hs) { record[a].w++; record[h].l++; }
    else               { record[h].d++; record[a].d++; }
  });
  return record;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORE PLAYERS
// ─────────────────────────────────────────────────────────────────────────────
function scorePlayers(matches) {
  const { eliminated, winners, stageReached } = deriveStages(matches);
  const wdlByTeam = deriveWDL(matches);
  const history = deriveSparklineHistory(matches);
  const grpPts = deriveGroupPts(matches);

  return PLAYERS.map(p => {
    let total = 0;
    let w = 0, d = 0, l = 0;
    let teams = [];

    if (p.grimReaper) {
      Object.entries(eliminated).forEach(([code, stage]) => {
        if (stage === "GROUP_ELIM") total += reaperBountyForCode(code);
      });
      // Goal drought curse
      matches.filter(m => m.status === "FINISHED" && (m.stage||"").toUpperCase().includes("GROUP"))
        .forEach(m => { total += goalDroughtPts(m); });
    } else {
      teams = p.codes.map((code, i) => {
        const stage = stageReached[code] || null;
        const p_pts = stage ? pts(code, stage) : 0;
        const gp = grpPts[code] || 0;
        total += p_pts + gp;
        const teamRecord = wdlByTeam[code] || { w:0, d:0, l:0 };
        w += teamRecord.w; d += teamRecord.d; l += teamRecord.l;
        return { name: p.teams[i], code, pot: POT[code]||4, stage, pts: p_pts + gp,
                 w: teamRecord.w, d: teamRecord.d, l: teamRecord.l,
                 eliminated: !!eliminated[code], won: !!winners[code],
                 lateB: !!(p.lateB?.[i]) };
      });
    }

    const hist = history[p.name] || [0];
    const lastVal = hist[hist.length - 1];
    // Calculate points earned in last game involving this player's teams
    const playerCodes = p.grimReaper ? null : p.codes;
    const lastGamePts = (() => {
      if (p.grimReaper) {
        // Reaper: points from most recent finished match (drought + any elimination that match triggered)
        const sorted = [...matches].filter(m => m.status === "FINISHED")
          .sort((a,b) => new Date(b.utcDate) - new Date(a.utcDate));
        const last = sorted[0];
        if (!last) return 0;
        let reaperPts = goalDroughtPts(last);
        // Check if any team was eliminated as a result of this match
        const h = last.homeTeam?.tla?.toUpperCase();
        const a = last.awayTeam?.tla?.toUpperCase();
        [h, a].forEach(code => {
          if (!code) return;
          const gamesPlayed = matches.filter(m => m.status === "FINISHED" &&
            (m.homeTeam?.tla?.toUpperCase() === code || m.awayTeam?.tla?.toUpperCase() === code)).length;
          // Was this their 3rd group game? Check if they got eliminated
          if (gamesPlayed === 3) {
            const { eliminated: elim } = deriveStages(matches);
            if (elim[code] === "GROUP_ELIM") {
              reaperPts += reaperBountyForCode(code);
            }
          }
        });
        return reaperPts;
      }
      // Find last finished match involving any of this player's teams
      const last = [...matches].filter(m => m.status === "FINISHED" && playerCodes.some(c =>
        m.homeTeam?.tla?.toUpperCase() === c || m.awayTeam?.tla?.toUpperCase() === c
      )).sort((a,b) => new Date(b.utcDate) - new Date(a.utcDate))[0];
      if (!last) return 0;
      const h = last.homeTeam?.tla?.toUpperCase();
      const a = last.awayTeam?.tla?.toUpperCase();
      const hs = last.score?.fullTime?.home ?? 0;
      const as_ = last.score?.fullTime?.away ?? 0;
      const hRes = hs > as_ ? "W" : hs < as_ ? "L" : "D";
      const aRes = hs > as_ ? "L" : hs < as_ ? "W" : "D";
      let pts = 0;
      playerCodes.forEach(c => {
        if (c === h) pts += groupGamePts(c, hRes);
        if (c === a) pts += groupGamePts(c, aRes);
      });
      return pts;
    })();
    const prevVal = lastVal - lastGamePts;
    const lastChange = lastGamePts;
    const pctChange = prevVal !== 0 ? ((lastChange / Math.abs(prevVal)) * 100) : null;
    const tiebreak = w * 3 + d - l;
    return { ...p, total, teams, w, d, l, tiebreak, hist, lastChange, pctChange,
             ...(p.grimReaper ? { _eliminated: eliminated, _matches: matches } : {}) };
  }).sort((a, b) => b.total - a.total || (a.grimReaper ? 1 : 0) - (b.grimReaper ? 1 : 0) || b.tiebreak - a.tiebreak);
}

// ─────────────────────────────────────────────────────────────────────────────
// MONTE CARLO WIN PROBABILITY SIMULATION
// ─────────────────────────────────────────────────────────────────────────────
function simulateWinProbability(ranked, matches, N = 5000) {
  const { eliminated, winners, stageReached } = deriveStages(matches);

  // Teams still alive in knockouts (not eliminated, not group stage)
  const knockoutStages = ["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINALIST","WINNER"];
  const aliveInKnockouts = Object.entries(stageReached)
    .filter(([code, stage]) => knockoutStages.includes(stage) && !eliminated[code])
    .map(([code]) => code);

  // Teams qualified but haven't played a knockout game yet
  const groupWinners = Object.values(PLAYERS)
    .filter(p => !p.grimReaper)
    .flatMap(p => p.codes)
    .filter(code => !eliminated[code] && !stageReached[code]);

  const alive = [...new Set([...aliveInKnockouts, ...groupWinners])];

  // Pot-based win probability weights for knockout matchups
  const potWeight = (code) => {
    const pot = POT[code] || 4;
    return [4, 3, 2, 1][pot - 1]; // Pot1 strongest
  };

  // Current base points per player
  const basePoints = {};
  ranked.forEach(p => { basePoints[p.name] = p.total; });

  // Grim reaper current total
  const reaperBase = ranked.find(p => p.grimReaper)?.total || 0;

  // Player code lookup
  const codeToPlayer = {};
  ranked.filter(p => !p.grimReaper).forEach(p => {
    p.codes.forEach(code => { codeToPlayer[code] = p.name; });
  });

  const wins = {};
  ranked.forEach(p => { wins[p.name] = 0; });

  const remainingStages = ["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINALIST","WINNER"];
  // Work out current highest stage reached by any alive team
  const currentStageIdx = (() => {
    let maxIdx = 0;
    alive.forEach(code => {
      const s = stageReached[code];
      const idx = remainingStages.indexOf(s);
      if (idx > maxIdx) maxIdx = idx;
    });
    return maxIdx;
  })();

  for (let sim = 0; sim < N; sim++) {
    // Clone alive teams for this simulation
    let pool = [...alive];
    const simPts = { ...basePoints };
    let reaperPts = reaperBase;

    // Simulate each remaining knockout stage
    for (let si = currentStageIdx; si < remainingStages.length - 1; si++) {
      const stage = remainingStages[si + 1];
      const nextPool = [];

      // Shuffle pool for random matchups
      const shuffled = [...pool].sort(() => Math.random() - 0.5);

      for (let i = 0; i < shuffled.length - 1; i += 2) {
        const a = shuffled[i];
        const b = shuffled[i + 1];
        if (!b) { nextPool.push(a); continue; }

        // Weight by pot strength
        const wa = potWeight(a);
        const wb = potWeight(b);
        const winner = Math.random() < wa / (wa + wb) ? a : b;
        const loser = winner === a ? b : a;

        nextPool.push(winner);

        // Award points to loser's owner for reaching this stage
        const loserOwner = codeToPlayer[loser];
        if (loserOwner) {
          const newPts = ptsTotal(loser, stage);
          const oldPts = teamPts_sim(loser, stageReached);
          simPts[loserOwner] = (simPts[loserOwner] || 0) + Math.max(0, newPts - oldPts);
        }

        // Award points to winner for reaching next stage too
        const winnerOwner = codeToPlayer[winner];
        if (winnerOwner) {
          const newPts = ptsTotal(winner, stage);
          const oldPts = teamPts_sim(winner, stageReached);
          simPts[winnerOwner] = (simPts[winnerOwner] || 0) + Math.max(0, newPts - oldPts);
        }
      }

      pool = nextPool;
    }

    // Award winner bonus
    if (pool.length > 0) {
      const champion = pool[0];
      const championOwner = codeToPlayer[champion];
      if (championOwner) {
        const newPts = ptsTotal(champion, "WINNER");
        const oldPts = teamPts_sim(champion, stageReached);
        simPts[championOwner] = (simPts[championOwner] || 0) + Math.max(0, newPts - oldPts);
      }
    }

    // Find winner of this simulation
    const scores = Object.entries(simPts).map(([name, pts]) => ({ name, pts }));
    scores.push({ name: "Josh", pts: reaperPts }); // Reaper stays fixed (group stage over)
    scores.sort((a, b) => b.pts - a.pts);
    if (scores[0]) wins[scores[0].name] = (wins[scores[0].name] || 0) + 1;
  }

  // Convert to percentages
  const result = {};
  ranked.forEach(p => {
    result[p.name] = Math.round((wins[p.name] || 0) / N * 100);
  });
  return result;
}

// Helper — get current stage points for a team (already awarded)
function teamPts_sim(code, stageReached) {
  const stage = stageReached[code];
  return stage ? ptsTotal(code, stage) : 0;
}

function computeBadges(ranked, matches) {
  const done = matches.filter(m => m.status === "FINISHED");
  const badges = {};
  ranked.forEach(p => { badges[p.name] = []; });

  // Early Bird — first player to score any pts
  const firstScorer = ranked.filter(p => !p.grimReaper && p.total > 0)
    .sort((a,b) => {
      const aFirst = a.hist.findIndex((v,i) => i > 0 && v > a.hist[i-1]);
      const bFirst = b.hist.findIndex((v,i) => i > 0 && v > b.hist[i-1]);
      return aFirst - bFirst;
    })[0];
  if (firstScorer) badges[firstScorer.name].push({ icon:"🥚", label:"Early Bird", desc:"First to score points" });

  // Giant Killer — owns team that beat a higher-pot team in groups
  done.filter(m => (m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    if (!h || !a) return;
    const hPot = POT[h] || 4;
    const aPot = POT[a] || 4;
    if (hs > as_ && hPot > aPot) {
      const owner = ranked.find(p => p.codes?.includes(h));
      if (owner && !badges[owner.name].find(b => b.icon === "🔪"))
        badges[owner.name].push({ icon:"🔪", label:"Giant Killer", desc:`${h} beat a higher-pot team` });
    }
    if (as_ > hs && aPot > hPot) {
      const owner = ranked.find(p => p.codes?.includes(a));
      if (owner && !badges[owner.name].find(b => b.icon === "🔪"))
        badges[owner.name].push({ icon:"🔪", label:"Giant Killer", desc:`${a} beat a higher-pot team` });
    }
  });

  // On Fire — biggest points gain last round
  const onFire = ranked.filter(p => p.lastChange > 0)
    .sort((a,b) => b.lastChange - a.lastChange)[0];
  if (onFire) badges[onFire.name].push({ icon:"⚡", label:"On Fire", desc:`+${onFire.lastChange}pts last round` });

  // Rough Night — owns most eliminated teams
  const mostElim = ranked.filter(p => !p.grimReaper)
    .sort((a,b) => (b.teams?.filter(t => t.eliminated && !t.won).length||0) - (a.teams?.filter(t => t.eliminated && !t.won).length||0))[0];
  if (mostElim && mostElim.teams?.filter(t => t.eliminated && !t.won).length > 0)
    badges[mostElim.name].push({ icon:"💀", label:"Rough Night", desc:"Most teams eliminated" });

  // Clean Sheet — owns a team that kept a clean sheet in groups
  const cleanSheetOwners = new Set();
  done.filter(m => (m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    if (as_ === 0 && hs > 0) { const owner = ranked.find(p => p.codes?.includes(h)); if (owner) cleanSheetOwners.add(owner.name); }
    if (hs === 0 && as_ > 0) { const owner = ranked.find(p => p.codes?.includes(a)); if (owner) cleanSheetOwners.add(owner.name); }
  });
  cleanSheetOwners.forEach(name => {
    if (badges[name]) badges[name].push({ icon:"🧤", label:"Clean Sheet", desc:"A team kept a clean sheet" });
  });

  return badges;
}

const fmt = (str) => {
  if (!str) return "";
  const d = new Date(str);
  return d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" })
    + " " + d.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
};

const ownerOf = (tla, ranked) => {
  const code = tla?.toUpperCase();
  // Prefer non-lateB player when duplicate codes exist
  const matches = ranked.filter(p => p.codes.includes(code));
  if (!matches.length) return undefined;
  const primary = matches.find(p => {
    const idx = p.codes.indexOf(code);
    return !(PLAYERS.find(pl => pl.name === p.name)?.lateB?.[idx]);
  });
  return (primary || matches[0]).name;
};

// HISTORY — replay matches chronologically, compute per-player cumulative points
// ─────────────────────────────────────────────────────────────────────────────
function deriveHistory(matches) {
  const done = matches
    .filter(m => m.status === "FINISHED")
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const teamPlayer = {}; // code -> array of player names
  PLAYERS.forEach(p => p.codes.forEach((c) => {
    if (!teamPlayer[c]) teamPlayer[c] = [];
    if (!teamPlayer[c].includes(p.name)) teamPlayer[c].push(p.name);
  }));

  const running = {};
  const history = {};
  const teamPts = {};
  PLAYERS.forEach(p => { running[p.name] = 0; history[p.name] = [0]; });

  const eliminated = {}, winners = {}, groupGames = {};
  const knockoutTeams = new Set();
  const bucketLabels = ["Start"];

  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP") && m.status === "FINISHED").forEach(m => {
    if (m.homeTeam?.tla) knockoutTeams.add(m.homeTeam.tla.toUpperCase());
    if (m.awayTeam?.tla) knockoutTeams.add(m.awayTeam.tla.toUpperCase());
  });

  const award = (code, stageKey) => {
    const pls = teamPlayer[code] || [];
    const newPts = ptsTotal(code, stageKey);
    pls.forEach(pl => {
      const key = pl + ":" + code;
      const oldPts = teamPts[key] || 0;
      running[pl] += (newPts - oldPts);
      teamPts[key] = newPts;
    });
  };

  const reaperBounty = (code, stageKey) => {
    if (stageKey !== "GROUP_ELIM") return;
    const bounty = reaperBountyForCode(code);
    if (bounty > 0) running["Josh"] += bounty;
  };

  // Determine matchday bucket for each match
  // Group stage: bucket = "MD1", "MD2", "MD3" based on game number per team
  // Knockout: bucket = stage name
  const getBucket = (m) => {
    const stage = (m.stage || "").toUpperCase();
    if (!stage.includes("GROUP")) return stage;
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hGames = (groupGames[h] || 0) + 1;
    const aGames = (groupGames[a] || 0) + 1;
    return `MD${Math.max(hGames, aGames)}`;
  };

  // Process matches grouped into buckets
  let currentBucket = null;

  done.forEach(m => {
    const stage = (m.stage || "").toUpperCase();
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const pen = m.score?.penalties;

    let loser = null, winner = null;
    if (hs > as_)      { loser = a; winner = h; }
    else if (as_ > hs) { loser = h; winner = a; }
    else if (pen) { if (pen.home > pen.away) { loser = a; winner = h; } else { loser = h; winner = a; } }

    const bucket = getBucket(m);

    // When bucket changes, snapshot current running totals
    if (bucket !== currentBucket && currentBucket !== null) {
      PLAYERS.forEach(p => history[p.name].push(running[p.name]));
      bucketLabels.push(bucket);
    }
    currentBucket = bucket;

    if (stage === "FINAL") {
      if (winner && !winners[winner]) { winners[winner] = true; award(winner, "WINNER"); }
      if (loser && !eliminated[loser]) { eliminated[loser] = "FINALIST"; award(loser, "FINALIST"); }
    } else if (stage.includes("SEMI") && loser && !eliminated[loser]) {
      eliminated[loser] = "SEMI_FINALS"; award(loser, "SEMI_FINALS");
      if (winner) award(winner, "SEMI_FINALS");
    } else if (stage.includes("QUARTER") && loser && !eliminated[loser]) {
      eliminated[loser] = "QUARTER_FINALS"; award(loser, "QUARTER_FINALS");
      if (winner) award(winner, "QUARTER_FINALS");
    } else if ((stage.includes("LAST_16")||stage.includes("16")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_16"; award(loser, "LAST_16");
      if (winner) award(winner, "LAST_16");
    } else if ((stage.includes("LAST_32")||stage.includes("32")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_32"; award(loser, "LAST_32");
      if (winner) award(winner, "LAST_32");
    } else if (stage.includes("GROUP")) {
      let hResult, aResult;
      if (hs > as_)      { hResult = "W"; aResult = "L"; }
      else if (as_ > hs) { hResult = "L"; aResult = "W"; }
      else               { hResult = "D"; aResult = "D"; }

      [[h, hResult], [a, aResult]].forEach(([code, result]) => {
        const pls = teamPlayer[code] || [];
        pls.forEach(pl => {
          if (result !== "L") running[pl] = (running[pl] || 0) + groupGamePts(code, result);
        });
      });

      // Grim Reaper goal drought curse
      const drought = goalDroughtPts(m);
      if (drought > 0) running["Josh"] = (running["Josh"] || 0) + drought;

      [h, a].forEach(code => {
        if (code) groupGames[code] = (groupGames[code]||0) + 1;
        if (code && groupGames[code] >= 3 && !knockoutTeams.has(code) && !eliminated[code]) {
          eliminated[code] = "GROUP_ELIM"; award(code, "GROUP_ELIM"); reaperBounty(code, "GROUP_ELIM");
        }
      });
    }
  });

  // Final snapshot after last bucket
  if (currentBucket !== null) {
    PLAYERS.forEach(p => history[p.name].push(running[p.name]));
    bucketLabels.push(currentBucket);
  }

  return { history, bucketLabels };
}

// Per-match history for sparklines (every scoring event = one point)
function deriveSparklineHistory(matches) {
  const done = matches
    .filter(m => m.status === "FINISHED")
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const teamPlayer = {}; // code -> array of player names
  PLAYERS.forEach(p => p.codes.forEach((c) => {
    if (!teamPlayer[c]) teamPlayer[c] = [];
    if (!teamPlayer[c].includes(p.name)) teamPlayer[c].push(p.name);
  }));

  const running = {};
  const history = {};
  const teamPts = {};
  PLAYERS.forEach(p => { running[p.name] = 0; history[p.name] = [0]; });

  const eliminated = {}, winners = {}, groupGames = {};
  const knockoutTeams = new Set();

  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP") && m.status === "FINISHED").forEach(m => {
    if (m.homeTeam?.tla) knockoutTeams.add(m.homeTeam.tla.toUpperCase());
    if (m.awayTeam?.tla) knockoutTeams.add(m.awayTeam.tla.toUpperCase());
  });

  done.forEach(m => {
    const stage = (m.stage || "").toUpperCase();
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const pen = m.score?.penalties;

    let loser = null, winner = null;
    if (hs > as_)      { loser = a; winner = h; }
    else if (as_ > hs) { loser = h; winner = a; }
    else if (pen) { if (pen.home > pen.away) { loser = a; winner = h; } else { loser = h; winner = a; } }

    let changed = false;
    const award = (code, stageKey) => {
      const pls = teamPlayer[code] || [];
      const newPts = ptsTotal(code, stageKey);
      pls.forEach(pl => {
        const key = pl + ":" + code;
        const oldPts = teamPts[key] || 0;
        running[pl] += (newPts - oldPts);
        teamPts[key] = newPts;
        changed = true;
      });
    };

    if (stage === "FINAL") {
      if (winner && !winners[winner]) { winners[winner] = true; award(winner, "WINNER"); }
      if (loser && !eliminated[loser]) { eliminated[loser] = "FINALIST"; award(loser, "FINALIST"); }
    } else if (stage.includes("SEMI") && loser && !eliminated[loser]) {
      eliminated[loser] = "SEMI_FINALS"; award(loser, "SEMI_FINALS");
      if (winner) award(winner, "SEMI_FINALS");
    } else if (stage.includes("QUARTER") && loser && !eliminated[loser]) {
      eliminated[loser] = "QUARTER_FINALS"; award(loser, "QUARTER_FINALS");
      if (winner) award(winner, "QUARTER_FINALS");
    } else if ((stage.includes("LAST_16")||stage.includes("16")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_16"; award(loser, "LAST_16");
      if (winner) award(winner, "LAST_16");
    } else if ((stage.includes("LAST_32")||stage.includes("32")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_32"; award(loser, "LAST_32");
      if (winner) award(winner, "LAST_32");
    } else if (stage.includes("GROUP")) {
      let hResult, aResult;
      if (hs > as_)      { hResult = "W"; aResult = "L"; }
      else if (as_ > hs) { hResult = "L"; aResult = "W"; }
      else               { hResult = "D"; aResult = "D"; }
      [[h, hResult], [a, aResult]].forEach(([code, result]) => {
        const pls = teamPlayer[code] || [];
        pls.forEach(pl => {
          if (result !== "L") {
            running[pl] = (running[pl] || 0) + groupGamePts(code, result);
            changed = true;
          }
        });
      });
      // Grim Reaper goal drought curse
      const drought = goalDroughtPts(m);
      if (drought > 0) { running["Josh"] = (running["Josh"] || 0) + drought; changed = true; }
      [h, a].forEach(code => {
        if (code) groupGames[code] = (groupGames[code]||0) + 1;
        if (code && groupGames[code] >= 3 && !knockoutTeams.has(code) && !eliminated[code]) {
          eliminated[code] = "GROUP_ELIM"; award(code, "GROUP_ELIM");
          const bounty = reaperBountyForCode(code);
          if (bounty > 0) { running["Josh"] += bounty; changed = true; }
        }
      });
    }

    if (changed) PLAYERS.forEach(p => history[p.name].push(running[p.name]));
  });

  return history;
}

function Sparkline({ data, width = 90, height = 28, color = "#22c55e" }) {
  if (!data || data.length < 2) {
    return (
      <svg width={width} height={height} style={{ display:"block" }}>
        <line x1={0} y1={height*0.6} x2={width} y2={height*0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
      </svg>
    );
  }

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 3;

  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${points[points.length-1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
  const uid = `sp${data.length}x${data[data.length-1]}`;

  return (
    <svg width={width} height={height} style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${uid})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={3.5} fill={color} />
    </svg>
  );
}

function MatchCard({ m, ranked, upcoming = [] }) {
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const fin = m.status === "FINISHED";
  const live = m.status === "IN_PLAY" || m.status === "PAUSED";
  const scheduled = m.status === "SCHEDULED" || m.status === "TIMED";
  const broadcast = getBroadcast(h, a);
  const hOwner = ownerOf(h, ranked);
  const aOwner = ownerOf(a, ranked);

  const hRank = ranked.findIndex(p => p.name === hOwner);
  const aRank = ranked.findIndex(p => p.name === aOwner);

  // Rivalry clash — only flag the FIRST fixture between any two owners
  const firstClashBetween = (ownerA, ownerB) => {
    if (!ownerA || !ownerB || ownerA === ownerB) return null;
    return upcoming.find(fx => {
      const fh = fx.homeTeam?.tla?.toUpperCase();
      const fa = fx.awayTeam?.tla?.toUpperCase();
      const fhOwner = ownerOf(fh, ranked);
      const faOwner = ownerOf(fa, ranked);
      return (fhOwner === ownerA && faOwner === ownerB) || (fhOwner === ownerB && faOwner === ownerA);
    });
  };

  const isFirstClash = scheduled && hOwner && aOwner && hOwner !== aOwner &&
    firstClashBetween(hOwner, aOwner)?.id === m.id;

  const clashLabel = (() => {
    if (!isFirstClash) return null;
    // Title: 1st vs 2nd
    const positions = new Set([hRank, aRank]);
    if (positions.has(0) && positions.has(1)) return { icon:"👑", label:"TITLE SHOWDOWN" };
    // Grudge: a win could cause a leapfrog in the table
    const hPts = ranked[hRank]?.total ?? 0;
    const aPts = ranked[aRank]?.total ?? 0;
    const hMaxGain = GROUP_WIN_PTS[(POT[h]||1)-1];
    const aMaxGain = GROUP_WIN_PTS[(POT[a]||1)-1];
    const hCouldLeap = hRank > aRank && (hPts + hMaxGain) >= aPts;
    const aCouldLeap = aRank > hRank && (aPts + aMaxGain) >= hPts;
    if (hCouldLeap || aCouldLeap) return { icon:"🥊", label:"GRUDGE MATCH" };
    return null;
  })();

  const rivalryBorder = clashLabel?.label === "TITLE SHOWDOWN"
    ? `2px solid ${C.gold}`
    : clashLabel
    ? `2px solid ${C.accent}`
    : `1px solid ${C.border}`;

  const rivalryGlow = clashLabel?.label === "TITLE SHOWDOWN"
    ? "0 0 10px #f59e0b44"
    : clashLabel
    ? "0 0 10px #22c55e33"
    : "none";

  return (
    <div style={{ ...s.card, border: rivalryBorder, boxShadow: rivalryGlow }}>
      <div style={{ padding: "12px 14px" }}>
        {/* Header row: stage left | rivalry centre | date right */}
        <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
          <span style={{ fontSize:10, color: live ? C.red : C.dim, fontWeight:700, letterSpacing:"0.08em", flex:1,
            animation: live ? "pulse-red 1.5s infinite" : "none" }}>
            {live ? "⚡ LIVE" : (m.stage||"").replace(/_/g," ")}
          </span>
          <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"center", flex:1 }}>
            {clashLabel && scheduled && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{clashLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.accent, letterSpacing:"0.08em" }}>{clashLabel.label}</span>
            </>}
          </div>
          <span style={{ fontSize:10, color: C.muted, flex:1, textAlign:"right" }}>{fmt(m.utcDate)}</span>
        </div>
        {/* Teams row */}
        <div style={{ display:"flex", alignItems:"center" }}>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:8 }}>
            <Flag code={h} size={22} />
            <div>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(h, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.homeTeam?.name || "TBD"}{POT[h] ? <span style={{ color:C.muted, fontSize:9 }}> (P{POT[h]})</span> : ""}</div>
            </div>
          </div>
          <div style={{ minWidth:64, textAlign:"center" }}>
            {fin || live
              ? <span style={{ fontSize:18, fontWeight:800, letterSpacing:2 }}>
                  {m.score?.fullTime?.home ?? 0}–{m.score?.fullTime?.away ?? 0}
                </span>
              : <div>
                  <div style={{ fontSize:12, color: C.muted, marginBottom:5 }}>vs</div>
                  <span style={{
                    fontSize:9, fontWeight:800, color:"white",
                    background: broadcast.b === "ITV" ? "#003087" : "#FF6B35",
                    padding:"2px 6px", borderRadius:3,
                  }}>{broadcast.b}</span>
                </div>
            }
          </div>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:8, justifyContent:"flex-end" }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(a, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.awayTeam?.name || "TBD"}{POT[a] ? <span style={{ color:C.muted, fontSize:9 }}> (P{POT[a]})</span> : ""}</div>
            </div>
            <Flag code={a} size={22} />
          </div>
        </div>
      </div>
    </div>
  );
}

                        : <div style={{ fontSize:11, color:"#f87171", opacity:0.35 }}>none yet</div>
                      }
                    </div>

                );

              {(() => {

                const droughtGames = groupMatches.filter(m => goalDroughtPts(m) > 0);
                const droughtTotal = droughtGames.reduce((sum, m) => sum + goalDroughtPts(m), 0);

                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0" }}>

                      <div style={{ fontSize:12, color: droughtTotal > 0 ? C.text : "#f87171", opacity: droughtTotal > 0 ? 1 : 0.5 }}>Goal drought curse</div>
                      <div style={{ fontSize:10, color:"#f87171", opacity:0.6 }}>3pts (0-0)</div>

                    <div style={{ textAlign:"right" }}>
                      {droughtTotal > 0

                        : <div style={{ fontSize:11, color:"#f87171", opacity:0.35 }}>none yet</div>
                      }
                    </div>
                  </div>
                );
              })()}
            </>
          ) : (
            player.teams.map(t => (
              <div key={t.code} style={{
                display:"flex", alignItems:"center", padding:"7px 0",
                borderBottom:`1px solid ${C.border}`,
                opacity: t.stage === "GROUP_ELIM" || (t.eliminated && !t.won) ? 0.45 : 1,
              }}>
                <div style={{ position:"relative", marginRight:10 }}>
                  <Flag code={t.code} size={18} />
                  {(t.eliminated && !t.won) && null}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>
                    {t.name}
                    {(t.w + t.d + t.l) > 0 && (
                      <span style={{ fontSize:10, color:C.muted, fontWeight:400, marginLeft:5 }}>
                        ({t.w}W {t.d}D {t.l}L)

        </div>

    </div>
  );
}

const PLAYER_NAME_ORDER = ["Alex","Ben","Charlotte","Craig","Ahmet","Dharma","Gary","Henry","Katrina","Luke","Marco","Michelle","Natalie","Nick","Ollie","Paul","Peter","Ramon","Sam","Stephen","Stuart","Wes","Will A","Will B","Pete","Alex L","Josh"];

const playerColor = (name) => {
  const idx = PLAYER_NAME_ORDER.indexOf(name);
  return idx >= 0 ? PLAYER_COLORS[idx] : PLAYER_COLORS[PLAYER_NAME_ORDER.length % PLAYER_COLORS.length];
};

const formatBucket = (b) => {
  if (!b) return "";
  if (b === "Start") return "Start";
  if (b.startsWith("MD")) return `MD ${b.slice(2)}`;
  if (b.includes("LAST_32")) return "Last 32";
  if (b.includes("LAST_16") || b.includes("16")) return "Last 16";
  if (b.includes("QUARTER")) return "QF";
  if (b.includes("SEMI")) return "SF";
  if (b === "FINAL") return "Final";
  return b;
};

function BumpChart({ history, allRanked, bucketLabels = [], raceHistory }) {
  const [selected, setSelected] = React.useState(null);
  const [showRace, setShowRace] = React.useState(false);
  const maxLen = Math.max(...history.map(p => p.hist.length));

  if (maxLen < 2) {
    return (
      <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13 }}>
        Not enough scoring events yet to show rankings over time.
      </div>
    );
  }

  const n = history.length;
  const padL = 16, padR = 72, padT = 16, padB = 24;
  const sidebarW = window.innerWidth >= 768 ? 260 : 0;
  const screenW = window.innerWidth - sidebarW;
  const availW = screenW - padL - padR - 56;
  const COL_W = maxLen <= 2 ? availW : Math.max(40, Math.floor(availW / (maxLen - 1)));
  const rowH = 34;
  const chartW = (maxLen - 1) * COL_W;
  const chartH = (n - 1) * rowH;
  const W = padL + chartW + padR;
  const H = padT + chartH + padB;

  const xScale = t => padL + t * COL_W;
  const yScale = r => padT + (r - 1) * rowH;

  const colorOf = name => playerColor(name);

  const timePoints = Array.from({length: maxLen}, (_, t) => {
    const scores = history.map(p => ({
      name: p.name,
      pts: p.hist[Math.min(t, p.hist.length - 1)],
    })).sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
    const ranks = {};
    scores.forEach((s, i) => { ranks[s.name] = i + 1; });
    return ranks;
  });

  const buildPath = name => {
    const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i-1][0] + pts[i][0]) / 2;
      d += ` C ${cpx},${pts[i-1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
    }
    return d;
  };

  const startRanks = timePoints[0];
  const endRanks = timePoints[maxLen - 1];

  const xLabels = Array.from({length: maxLen}, (_, t) => ({
    t,
    label: bucketLabels[t] ? formatBucket(bucketLabels[t]) : (t === 0 ? "Start" : t === maxLen-1 ? "Now" : "")
  })).filter(x => x.label);

  return (
    <div style={{ padding:"8px 0 0" }}>
      <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>
        Rankings Over Time
      </div>
      <div style={{ position:"relative" }}>
        <div style={{ overflowX:"scroll", overflowY:"hidden", WebkitOverflowScrolling:"touch", direction:"rtl" }}>
          <div style={{ direction:"ltr", display:"inline-block" }}>
        <svg width={W} height={H} style={{ display:"block" }}>
          {/* Horizontal grid lines */}
          {Array.from({length: n}, (_, i) => (
            <line key={i} x1={padL} y1={yScale(i+1)} x2={padL+chartW} y2={yScale(i+1)} stroke="#1e3d28" strokeWidth={1} />
          ))}
          {/* Lines */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <path key={p.name} d={buildPath(p.name)} fill="none"
              stroke={dim ? "#1e3d28" : colorOf(p.name)}
              strokeWidth={selected === p.name ? 3.5 : 2.5}
              strokeLinecap="round" strokeLinejoin="round"
              opacity={dim ? 0.3 : 0.9} />
            );
          })}
          {/* Dots */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return timePoints.map((tp, t) => (
              <circle key={`${p.name}-${t}`}
                cx={xScale(t)} cy={yScale(tp[p.name])}
                r={t === maxLen-1 ? 5 : 3}
                fill={dim ? "#1e3d28" : colorOf(p.name)}
                stroke="#080c18" strokeWidth={1.5}
                opacity={dim ? 0.3 : 1} />
            ));
          })}
          {/* Rank numbers on left */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`s-${p.name}`} x={padL-5} y={yScale(startRanks[p.name])+4}
              textAnchor="end" fontSize={10} fontWeight={700}
              fill={dim ? "#1e3d28" : colorOf(p.name)}
              opacity={dim ? 0.3 : 1}>
              {startRanks[p.name]}
            </text>
            );
          })}
          {/* Name labels on right — tappable */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`e-${p.name}`} x={padL+chartW+8} y={yScale(endRanks[p.name])+4}
              textAnchor="start" fontSize={11} fontWeight={700}
              fill={dim ? "#334155" : colorOf(p.name)}
              opacity={dim ? 0.4 : 1}
              style={{ cursor:"pointer" }}
              onClick={() => setSelected(selected === p.name ? null : p.name)}>
              {p.name}
            </text>
            );
          })}
          {/* X labels */}
          {xLabels.map(({t, label}) => (
            <text key={`xl-${t}`} x={xScale(t)} y={H-4}
              textAnchor="middle" fontSize={9} fill={C.muted}>{label}</text>
          ))}
        </svg>
          </div>
        </div>
        {/* Left fade — hints at history off to the left when scrolled right */}
        <div style={{
          position:"absolute", top:0, left:0, bottom:0, width:48,
          background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)`,
          pointerEvents:"none",
        }}/>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16, padding:"0 4px" }}>
        {allRanked.map((p, i) => {
          const dim = selected && selected !== p.name;
          return (
          <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
            style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", opacity: dim ? 0.35 : 1 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:playerColor(p.name), flexShrink:0 }}/>
            <span style={{ fontSize:11, color:C.muted }}>{p.name} <span style={{ color:C.text, fontWeight:700 }}>{p.total}pts</span></span>
          </div>
          );
        })}
      </div>

      {/* Race button */}
      <button onClick={() => setShowRace(true)} style={{
        marginTop:20, width:"100%", padding:"14px",
        background:"linear-gradient(135deg, #1d4ed8, #3b82f6)",
        color:"white", border:"none", borderRadius:10,
        fontSize:14, fontWeight:700, cursor:"pointer",
        letterSpacing:"0.03em",
      }}>
        🏁 Watch the Race
      </button>

      {showRace && <BarRaceModal history={raceHistory || history} allRanked={allRanked} bucketLabels={bucketLabels} onClose={() => setShowRace(false)} />}
    </div>
  );
}

function BarRaceModal({ history, allRanked, bucketLabels = [], onClose }) {
  const maxLen = Math.max(...history.map(p => p.hist.length));
  const [frame, setFrame] = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const intervalRef = React.useRef(null);
  const TICK = 800;
  const n = history.length;

  const colorOf = name => playerColor(name);

  const prevRanks = React.useRef({});

  // Compute standings at this frame — each entry gets a rank (0 = top)
  const standings = React.useMemo(() => {
    const sorted = history.map(p => ({
      name: p.name,
      value: p.hist[Math.min(frame, p.hist.length - 1)],
      color: colorOf(p.name),
    })).sort((a, b) => b.value - a.value || a.name.localeCompare(b.name));
    return sorted.map((s, i) => {
      const prev = prevRanks.current[s.name] ?? i;
      const movingUp = i < prev; // lower index = higher rank = moving up
      return { ...s, rank: i, movingUp };
    });
  }, [frame]);

  // After each render, update prevRanks
  React.useEffect(() => {
    standings.forEach(s => { prevRanks.current[s.name] = s.rank; });
  }, [standings]);

  const maxValue = Math.max(...standings.map(s => s.value), 1);

  // Work out tournament stage label for current frame
  const frameLabel = frame === 0 ? "Start" : `Game ${frame} of ${maxLen - 1}`;

  React.useEffect(() => {
    if (playing && frame < maxLen - 1) {
      intervalRef.current = setTimeout(() => setFrame(f => f + 1), TICK);
    } else if (frame >= maxLen - 1) {
      setPlaying(false);
    }
    return () => clearTimeout(intervalRef.current);
  }, [playing, frame]);

  const wasPlayingRef = React.useRef(false);

  const onScrubStart = () => { wasPlayingRef.current = playing; setPlaying(false); };
  const onScrubEnd = () => { if (wasPlayingRef.current && frame < maxLen - 1) setPlaying(true); };

  const toggle = () => {
    if (frame >= maxLen - 1) { setFrame(0); setPlaying(true); }
    else setPlaying(p => !p);
  };
  const restart = () => { setFrame(0); setPlaying(true); };
  const progress = (frame / Math.max(maxLen - 1, 1)) * 100;

  // Fixed row height for animation
  const ROW_H = `${100 / n}%`;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:60, background:"#0d1f12", display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text }}>🏁 The Race</div>
        <button onClick={onClose} style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
      </div>

      {/* Chart */}
      <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0 }}>
          {/* Render in STABLE order (by name) so DOM nodes never remount */}
          {[...history].sort((a,b) => a.name.localeCompare(b.name)).map(p => {
            const s = standings.find(x => x.name === p.name);
            if (!s) return null;
            const topPct = (s.rank / n) * 100;
            const barW = maxValue > 0 ? (s.value / maxValue) * 100 : 0;
            return (
              <div key={s.name} style={{
                position:"absolute",
                left:0, right:0,
                height:ROW_H,
                top:`${topPct}%`,
                transition:`top ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                display:"flex", alignItems:"center",
                padding:"0 16px",
                gap:8,
                zIndex: s.movingUp ? n + 1 : 1,
              }}>
                <div style={{ width:18, textAlign:"right", fontSize:11, color:C.muted, flexShrink:0, fontWeight:700 }}>
                  {s.rank + 1}
                </div>
                <div style={{ width:66, textAlign:"right", fontSize:12, fontWeight:700, color:C.text, flexShrink:0, overflow:"hidden", whiteSpace:"nowrap" }}>
                  {s.name}
                </div>
                <div style={{ flex:1, position:"relative", height:"55%", minHeight:18 }}>
                  <div style={{ position:"absolute", inset:0, background:"#1e3d28", borderRadius:"0 3px 3px 0" }}/>
                  <div style={{
                    position:"absolute", left:0, top:0, bottom:0,
                    width:`${barW}%`,
                    background:s.color,
                    borderRadius:"0 3px 3px 0",
                    transition:`width ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                  }}/>
                  {s.value > 0 && (
                    <div style={{
                      position:"absolute", left:0, top:0, bottom:0, right:0,
                      display:"flex", alignItems:"center",
                      justifyContent: barW > 70 ? "flex-end" : "flex-start",
                      paddingLeft: barW > 70 ? 0 : `calc(${barW}% + 6px)`,
                      paddingRight: barW > 70 ? 8 : 0,
                      pointerEvents:"none",
                    }}>
                      <span style={{ fontSize:11, fontWeight:700, color:C.text, whiteSpace:"nowrap" }}>
                        {s.value}pts
                      </span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Stage watermark — background only, no event counter here */}
        <div style={{ position:"absolute", bottom:8, right:16, textAlign:"right", pointerEvents:"none" }}>
          <div style={{ fontSize:28, fontWeight:800, color:"rgba(255,255,255,0.06)", lineHeight:1 }}>{frameLabel}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ padding:"10px 16px 20px", flexShrink:0 }}>
        {/* Scrubber */}
        <input
          type="range" min={0} max={maxLen - 1} value={frame}
          onMouseDown={onScrubStart} onTouchStart={onScrubStart}
          onMouseUp={onScrubEnd} onTouchEnd={onScrubEnd}
          onChange={e => setFrame(Number(e.target.value))}
          style={{ width:"100%", marginBottom:10, accentColor:C.accent, cursor:"pointer" }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontSize:11, color:C.muted, fontWeight:600 }}>{frameLabel}</span>
          <span style={{ fontSize:11, color:C.muted }}>Event {frame + 1} of {maxLen}</span>
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:8 }}>
          <button onClick={restart} style={{ background:"#1e3d28", border:"none", color:C.text, padding:"8px 16px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>Restart</button>
          <button onClick={toggle} style={{ background:C.accent, border:"none", color:"white", padding:"8px 24px", borderRadius:6, cursor:"pointer", fontSize:14, fontWeight:700 }}>
            {playing ? "⏸" : frame >= maxLen - 1 ? "↺" : "▶"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [matches,     setMatches]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [tab,         setTab]         = useState("table");
  const [showPayment, setShowPayment] = useState(false);
  const [countdown, setCountdown] = useState("");
  const matchesRef = React.useRef(matches);
  React.useEffect(() => { matchesRef.current = matches; }, [matches]);
  React.useEffect(() => {
    const tick = () => {
      const next = matchesRef.current.filter(m => m.status === "SCHEDULED" || m.status === "TIMED").sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate))[0];
      if (!next) { setCountdown(""); return; }
      const diff = new Date(next.utcDate) - new Date();
      if (diff <= 0) { setCountdown("Starting now!"); return; }
      const h = Math.floor(diff / 3600000);
      const mn = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      setCountdown(`${h}h ${String(mn).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  const paymentShownRef = React.useRef(false);
  const triggerPayment = React.useCallback(() => {
    if (!paymentShownRef.current && localStorage.getItem("sw_paid") !== "yes") {
      paymentShownRef.current = true;
      setShowPayment(true);
    }
  }, []);

  const [expanded,    setExpanded]    = useState(null);
  const [refreshing,  setRefreshing]  = useState(false);
  const [devMode,     setDevMode]     = useState(DEV_MODE_DEFAULT);
  const devModeRef = React.useRef(DEV_MODE_DEFAULT);
  const [showInfo,    setShowInfo]    = useState(false);
  const [copied,      setCopied]      = useState(false);
  const [goalFlash,   setGoalFlash]   = useState(false);
  const prevScoresRef = React.useRef({});
  const [barsVisible, setBarsVisible] = useState(true);
  const lastScrollY = React.useRef(0);

  const fetchMatches = useCallback(async (isManual = false, forceDev = null) => {
    if (isManual) setRefreshing(true);
    const useDev = forceDev !== null ? forceDev : devMode;
    if (useDev) {
      setMatches(MOCK_MATCHES);
      setLastUpdated(new Date());
      setLoading(false);
      setRefreshing(false);
      return;
    }
    try {
      const res  = await fetch(`${WORKER_URL}/competitions/${WC_CODE}/matches?season=${SEASON}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      setMatches(data.matches || []);
      setLastUpdated(new Date());
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => {
    fetchMatches();
    const id = setInterval(() => { if (!devModeRef.current) fetchMatches(); }, 60_000);
    return () => clearInterval(id);
  }, [fetchMatches]);

  useEffect(() => {
    const handleScroll = () => {
      const y = window.scrollY;
      const diff = y - lastScrollY.current;
      if (diff > 4) setBarsVisible(false);       // scrolling down
      else if (diff < -4) setBarsVisible(true);  // scrolling up
      lastScrollY.current = y;
    };
    window.addEventListener("scroll", handleScroll, { passive: true });
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  const ranked   = scorePlayers(matches);
  const prevRankedRef = React.useRef({});
  const cardRefsMap = React.useRef({});
  const pendingAnimRef = React.useRef({}); // { playerName: deltaY }

  React.useEffect(() => {
    // Store pending animations — don't play yet
    ranked.forEach((p, newIdx) => {
      const prevIdx = prevRankedRef.current[p.name];
      if (prevIdx !== undefined && prevIdx !== newIdx) {
        const el = cardRefsMap.current[p.name];
        if (el) {
          const rowH = el.offsetHeight + 10;
          const delta = (prevIdx - newIdx) * rowH;
          pendingAnimRef.current[p.name] = delta;
          // Pre-position the card at its old visual spot
          el.style.transition = "none";
          el.style.transform = `translateY(${delta}px)`;
        }
      }
    });
    const newMap = {};
    ranked.forEach((p, i) => { newMap[p.name] = i; });
    prevRankedRef.current = newMap;

    // Set up IntersectionObserver to play animation when card scrolls into view
    const observers = [];
    Object.entries(pendingAnimRef.current).forEach(([name, delta]) => {
      const el = cardRefsMap.current[name];
      if (!el || delta === 0) return;
      const obs = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) {
          requestAnimationFrame(() => {
            el.style.transition = "transform 0.6s cubic-bezier(0.34,1.2,0.64,1)";
            el.style.transform = "translateY(0)";
          });
          delete pendingAnimRef.current[name];
          obs.disconnect();
        }
      }, { threshold: 0.1 });
      obs.observe(el);
      observers.push(obs);
    });
    return () => observers.forEach(o => o.disconnect());
  }, [ranked]);
  const { history: bumpHistoryMap, bucketLabels } = deriveHistory(matches);
  const badges = React.useMemo(() => computeBadges(ranked, matches), [matches]);
  const live     = matches.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED" ||
    ((m.status === "SCHEDULED" || m.status === "TIMED") && new Date() > new Date(m.utcDate)));
  const upcoming = matches.filter(m => m.status === "SCHEDULED" || m.status === "TIMED");
  const recent   = matches.filter(m => m.status === "FINISHED").reverse();

  // Detect goals — compare current scores to previous refresh
  React.useEffect(() => {
    let scored = false;
    live.forEach(m => {
      const key = m.id;
      const total = (m.score?.fullTime?.home ?? 0) + (m.score?.fullTime?.away ?? 0);
      const prev = prevScoresRef.current[key];
      if (prev !== undefined && total > prev) scored = true;
      prevScoresRef.current[key] = total;
    });
    if (scored) {
      setGoalFlash(true);
      setTimeout(() => setGoalFlash(false), 2500);
    }
  }, [matches]);

  const winPct = React.useMemo(() => {
    if (matches.length === 0) return {};
    return simulateWinProbability(ranked, matches, 5000);
  }, [matches]);

  const groupByDay = (ms) => {
    const groups = {};
    ms.forEach(m => {
      const d = new Date(m.utcDate);
      const key = d.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long" });
      if (!groups[key]) groups[key] = [];
      groups[key].push(m);
    });
    return Object.entries(groups);
  };

  return (
    <div style={{ minHeight:"100vh", paddingBottom:106, animation: goalFlash ? "goalFlash 2.5s ease" : "none" }}>

      {goalFlash && (
        <div style={{
          position:"fixed", inset:0, zIndex:50, pointerEvents:"none",
          display:"flex", alignItems:"center", justifyContent:"center",
          animation:"goalFlash 2.5s ease",
        }}>
          <div style={{
            fontSize:48, fontWeight:900, color:"white",
            textShadow:"0 0 30px #22c55e, 0 0 60px #22c55e",
            animation:"goalFlash 2.5s ease",
            letterSpacing:"-0.02em",
          }}>⚽ GOAL!</div>
        </div>
      )}

      {/* ── Sticky header + live banner ── */}
      <div style={{
        position:"sticky", top:0, zIndex:10,
        background:"#0d1f12",
        borderBottom:`1px solid ${C.border}`,
        transform: barsVisible ? "translateY(0)" : "translateY(-100%)",
        transition: "transform 0.25s ease",
      }}>
        {/* Title row */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px 12px" }}>

            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke={active ? "white" : C.muted} strokeWidth="2" fill="none"/>
              <path d="M12 8v1M12 11v5" stroke={active ? "white" : C.muted} strokeWidth="2" strokeLinecap="round"/>
            </svg>
          )],

        ].map(([id, label, renderIcon]) => {
          const active = tab === id;
          return (
            <button key={id} onClick={() => { if (id === "info") { setShowInfo(true); } else { setTab(id); } }} style={{ flex:1, padding:"14px 4px 12px", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:5, WebkitTapHighlightColor:"transparent" }}>
              <div style={{
                padding:"8px 20px", borderRadius:20,
                background: active ? C.accent : "transparent",
                transition:"background 0.2s ease",
              }}>
                {renderIcon(active)}
              </div>
              <span style={{ fontSize:11, fontWeight: active ? 700 : 400, color: active ? C.text : C.muted }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* ── Body ── */}
      <div style={{ padding:"14px 14px 0" }}>

        {loading && (
          <div style={{ textAlign:"center", padding:48, color: C.muted }}>
            <div className="spinning" style={{ fontSize:24, marginBottom:12 }}>↻</div>
            <div style={{ fontSize:13 }}>Loading live data…</div>
          </div>
        )}

        {error && (
          <div style={{
            background:"#1a0a0a", border:`1px solid #7f1d1d`,
            borderRadius:8, padding:"12px 14px", color:"#fca5a5",
            fontSize:13, marginBottom:12,
          }}>
            ⚠️ {error}
            <div style={{ fontSize:11, color: C.muted, marginTop:4 }}>
              Check your Cloudflare Worker URL is set in WORKER_URL and the Worker is deployed.
            </div>
          </div>
        )}

        {/* ── LEAGUE TABLE ── */}
        {tab === "table" && !loading && (
          <>
            <div style={{ fontSize:11, color:C.text, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", padding:"4px 2px 10px" }}>League Table</div>
            {ranked.map((player, i) => {
              const prev = ranked[i - 1];
              const displayRank = i === 0 ? 1
                : (player.total === prev.total && player.tiebreak === prev.tiebreak)
                  ? ranked[i-1]._displayRank
                  : i + 1;
              player._displayRank = displayRank;
              return (
                <PlayerRow
                  key={player.name}
                  player={player}
                  rank={i}
                  displayRank={displayRank}
                  expanded={expanded === player.name}
                  onToggle={() => setExpanded(expanded === player.name ? null : player.name)}
                  
                />
              );
            })}
            <div style={{ marginTop:8 }}>
              <BumpChart history={ranked.map(p => ({ name: p.name, hist: bumpHistoryMap[p.name] || [0], total: p.total }))} allRanked={ranked} bucketLabels={bucketLabels} raceHistory={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} />
            </div>
          </>
        )}
        {/* ── FIXTURES ── */}
        {tab === "fixtures" && !loading && (
          upcoming.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No upcoming fixtures</div>
            : groupByDay(upcoming).map(([day, ms]) => (
              <div key={day}>
                <div style={{ fontSize:11, color:C.text, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", padding:"12px 2px 6px" }}>{day}</div>
                <div className="league-grid fixture-grid">{ms.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} />)}</div>
              </div>
            ))
        )}

        {/* ── RESULTS ── */}
        {tab === "results" && !loading && (
          recent.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No results yet</div>
            : groupByDay(recent).map(([day, ms]) => (
              <div key={day}>
                <div style={{ fontSize:11, color:C.text, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", padding:"12px 2px 6px" }}>{day}</div>
                <div className="league-grid fixture-grid">{ms.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} />)}</div>
              </div>
            ))
        )}

        {/* ── PAYMENT PROMPT ── */}
        {showPayment && (
          <div style={{ position:"fixed", inset:0, zIndex:50, display:"flex", alignItems:"flex-end", justifyContent:"center",
            background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)" }}
            onClick={() => { localStorage.setItem("sw_paid","remind"); setShowPayment(false); }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"#122018", border:`1px solid ${C.border}`, borderRadius:"20px 20px 0 0",
              padding:"28px 20px 36px", width:"100%", maxWidth:480,
            }}>
              <div style={{ fontSize:24, marginBottom:12, textAlign:"center" }}>💳</div>
              <div style={{ fontSize:18, fontWeight:900, color:C.text, marginBottom:8, textAlign:"center" }}>
                Have you paid your £5?
              </div>
              <div style={{ fontSize:13, color:C.muted, marginBottom:20, textAlign:"center", lineHeight:1.6 }}>
                All money goes to charity — the winner picks which one!
              </div>
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"14px 16px", marginBottom:20 }}>
                <div style={{ fontSize:11, color:C.muted, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>Payment details</div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:13, color:C.dim }}>Name</span>
                  <span style={{ fontSize:13, color:C.text, fontWeight:700 }}>Ben Hutton-Penman</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:13, color:C.dim }}>Sort code</span>
                  <span style={{ fontSize:13, color:C.text, fontWeight:700 }}>60-20-56</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:13, color:C.dim }}>Account</span>
                  <span style={{ fontSize:13, color:C.text, fontWeight:700 }}>46167749</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:13, color:C.dim }}>Amount</span>
                  <span style={{ fontSize:13, color:C.accent, fontWeight:800 }}>£5</span>
                </div>
              </div>
              <button onClick={() => { localStorage.setItem("sw_paid","yes"); setShowPayment(false); }} style={{
                width:"100%", padding:"14px", borderRadius:12, border:"none", cursor:"pointer",
                background:C.accent, color:"white", fontSize:15, fontWeight:800, marginBottom:10,
              }}>
                ✓ I've paid
              </button>
              <button onClick={() => { localStorage.setItem("sw_paid","remind"); setShowPayment(false); }} style={{
                width:"100%", padding:"12px", borderRadius:12, border:`1px solid ${C.border}`,
                background:"transparent", color:C.muted, fontSize:14, fontWeight:600, cursor:"pointer",
              }}>
                Remind me next time
              </button>
            </div>
          </div>
        )}

        {/* ── INFO MODAL ── */}}
        {showInfo && (
          <div onClick={() => setShowInfo(false)} style={{
            position:"fixed", inset:0, zIndex:50,
            background:"rgba(0,0,0,0.7)",
            display:"flex", alignItems:"flex-end",
            padding:"0",
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"#162a1c",
              borderRadius:"16px 16px 0 0",
              width:"100%", maxWidth:620, margin:"0 auto",
              padding:"20px 16px 36px",
              maxHeight:"85vh", overflowY:"auto",
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div style={{ fontSize:15, fontWeight:800, color:C.text }}>How Points Work</div>
                <button onClick={() => setShowInfo(false)} style={{ background:"transparent", border:"none", color:C.muted, fontSize:20, cursor:"pointer", lineHeight:1 }}>✕</button>
              </div>

              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Points by Stage & Pot</div>
              <div style={{ ...s.card, overflowX:"auto", marginBottom:20 }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <th style={{ padding:"10px 12px", textAlign:"left", color:C.dim, fontWeight:700 }}>Stage</th>
                      {["Pot 1","Pot 2","Pot 3","Pot 4"].map((p,i) => (
                        <th key={p} style={{ padding:"10px 8px", textAlign:"center", fontWeight:700, color:["#f59e0b","#a78bfa","#60a5fa","#34d399"][i] }}>{p}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"9px 12px", color:"#22c55e", fontWeight:600, fontSize:11 }}>Group Win</td>
                      {[2,4,8,12].map((v,i) => <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color:C.text }}>+{v}</td>)}
                    </tr>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"9px 12px", color:"#86efac", fontWeight:600, fontSize:11 }}>Group Draw</td>
                      {[1,2,3,5].map((v,i) => <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color:C.text }}>+{v}</td>)}
                    </tr>
                    {Object.entries(PTS).map(([key, vals]) => (
                      <tr key={key} style={{ borderBottom:`1px solid ${C.border}` }}>
                        <td style={{ padding:"9px 12px", color: STAGE_COLOR[key]||C.dim, fontWeight:600, fontSize:11 }}>{STAGE_LABEL[key]}</td>
                        {vals.map((v,i) => (
                          <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color: v < 0 ? C.red : v === 0 ? C.muted : C.text }}>
                            {v > 0 ? `+${v}` : v}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8, marginTop:20 }}>💀 Grim Reaper (Josh)</div>
              <div style={{ ...s.card, padding:"10px 12px", marginBottom:6 }}>
                <div style={{ fontSize:12, color:C.muted, marginBottom:10, lineHeight:1.5 }}>
                  Josh feasts on misfortune. He earns bounties when Pot 1 & 2 teams go out in the group stage, and profits from boring football — 3pts for every 0-0 in the group stage.
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <th style={{ padding:"6px 8px", textAlign:"left", color:C.dim, fontWeight:700 }}>Upset</th>
                      <th style={{ padding:"6px 8px", textAlign:"center", color:C.dim, fontWeight:700 }}>Owner loses</th>
                      <th style={{ padding:"6px 8px", textAlign:"center", color:C.dim, fontWeight:700 }}>Josh gains</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["Pot 1 out in groups", -50, 50],
                      ["Pot 2 out in groups", -15, 15],
                      ["Pot 3/4 out in groups", 0, 0],
                    ].map(([label, owner, josh]) => (
                      <tr key={label} style={{ borderBottom:`1px solid ${C.border}` }}>
                        <td style={{ padding:"7px 8px", color: josh > 0 ? C.text : C.muted }}>{label}</td>
                        <td style={{ padding:"7px 8px", textAlign:"center", color: owner < 0 ? C.red : C.muted, fontWeight:700 }}>{owner < 0 ? owner : "—"}</td>
                        <td style={{ padding:"7px 8px", textAlign:"center", color: josh > 0 ? "#22c55e" : C.muted, fontWeight:700 }}>{josh > 0 ? `+${josh}` : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {PLAYERS.map(p => (
                <div key={p.name} style={{ ...s.card, padding:"10px 12px", marginBottom:6 }}>
                  <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>{p.name}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {p.codes.map((code, i) => (
                      <div key={code} style={{ display:"flex", alignItems:"center", gap:5, background:"#0d1a11", borderRadius:4, padding:"3px 7px" }}>
                        <Flag code={code} size={14} />
                        <span style={{ fontSize:11, color:"#94a3b8" }}>{p.teams[i]}</span>
                        <span style={{ fontSize:9, color:C.muted }}>P{POT[code]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  const sw = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response(''))));
  `;
  const blob = new Blob([sw], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>
</body>
</html>
