<!-- scoring.js defines PLAYERS, POT, PTS_INC, scorePlayers, deriveStages, etc.
     as classic-script globals (see scoring.js header comment for why it's a
     classic script and not type="module"). The Babel script below depends on
     all of these names being defined before it runs — that's guaranteed here
     since classic <script src="..."> tags execute synchronously, in document
     order, exactly like an inline script would. -->

<script type="text/babel">
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({ data, width = 90, height = 28, color = "#22c55e" }) {
  if (!data || data.length < 2) {
    return (
      <svg width={width} height={height} style={{ display:"block" }}>
        <line x1={0} y1={height*0.6} x2={width} y2={height*0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
      </svg>
    );
  }

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 3;

  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${points[points.length-1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
  const uid = `sp${data.length}x${data[data.length-1]}`;

  return (
    <svg width={width} height={height} style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${uid})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={3.5} fill={color} />
    </svg>
  );
}

function Flag({ code, size = 18, snail = false }) {
  const url = flag(code);
  if (!url) return null;
  // onError fallback: if the flagcdn image fails to load for any reason
  // (network blip, CDN issue, etc.), swap to a small text badge showing the
  // code instead of silently rendering nothing — added after an unconfirmed
  // report of DR Congo's flag occasionally not appearing; root cause wasn't
  // conclusively isolated (the flagcdn URL itself was verified correct), so
  // this is a defensive safety net rather than a fix for a confirmed root
  // cause. If this badge ever shows up in practice, that's a strong signal
  // the image genuinely failed to load — worth re-investigating with that
  // confirmation in hand, rather than the inconclusive evidence available now.
  const fallback = (e) => {
    const span = document.createElement("span");
    span.textContent = code;
    span.style.cssText = `display:inline-block;font-size:${size*0.5}px;font-weight:700;color:${C.muted};background:${C.border};border-radius:2px;padding:1px 3px;line-height:${size}px;`;
    e.target.replaceWith(span);
  };
  if (!snail) return <img src={url} alt={code} onError={fallback} style={{ height:size, width:"auto", borderRadius:2, display:"block", flexShrink:0 }} />;
  return (
    <div style={{ position:"relative", display:"inline-flex", flexShrink:0 }}>
      <img src={url} alt={code} onError={fallback} style={{ height:size, width:"auto", borderRadius:2, display:"block", opacity:0.75 }} />
      <span style={{ position:"absolute", bottom:-3, right:-4, fontSize:size*0.55, lineHeight:1 }}>🐌</span>
    </div>
  );
}

function MatchCard({ m, ranked, upcoming = [] }) {
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const fin = m.status === "FINISHED";
  const live = m.status === "IN_PLAY" || m.status === "PAUSED";
  const scheduled = m.status === "SCHEDULED" || m.status === "TIMED";
  const broadcast = getBroadcast(h, a);
  const hOwner = ownerOf(h, ranked);
  const aOwner = ownerOf(a, ranked);

  const hRank = ranked.findIndex(p => p.name === hOwner);
  const aRank = ranked.findIndex(p => p.name === aOwner);

  // Rivalry clash — only flag the FIRST fixture between any two owners
  const firstClashBetween = (ownerA, ownerB) => {
    if (!ownerA || !ownerB || ownerA === ownerB) return null;
    return upcoming.find(fx => {
      const fh = fx.homeTeam?.tla?.toUpperCase();
      const fa = fx.awayTeam?.tla?.toUpperCase();
      const fhOwner = ownerOf(fh, ranked);
      const faOwner = ownerOf(fa, ranked);
      return (fhOwner === ownerA && faOwner === ownerB) || (fhOwner === ownerB && faOwner === ownerA);
    });
  };

  const isFirstClash = scheduled && hOwner && aOwner && hOwner !== aOwner &&
    firstClashBetween(hOwner, aOwner)?.id === m.id;

  const clashLabel = (() => {
    if (!isFirstClash) return null;
    // Title: 1st vs 2nd
    const positions = new Set([hRank, aRank]);
    if (positions.has(0) && positions.has(1)) return { icon:"👑", label:"TITLE SHOWDOWN" };
    // Grudge: a win could cause a leapfrog in the table
    const hPts = ranked[hRank]?.total ?? 0;
    const aPts = ranked[aRank]?.total ?? 0;
    const hMaxGain = GROUP_WIN_PTS[(POT[h]||1)-1];
    const aMaxGain = GROUP_WIN_PTS[(POT[a]||1)-1];
    const hCouldLeap = hRank > aRank && (hPts + hMaxGain) >= aPts;
    const aCouldLeap = aRank > hRank && (aPts + aMaxGain) >= hPts;
    if (hCouldLeap || aCouldLeap) return { icon:"🥊", label:"GRUDGE MATCH" };
    return null;
  })();

  const rivalryBorder = clashLabel?.label === "TITLE SHOWDOWN"
    ? `2px solid ${C.gold}`
    : clashLabel
    ? `2px solid ${C.accent}`
    : `1px solid ${C.border}`;

  const rivalryGlow = clashLabel?.label === "TITLE SHOWDOWN"
    ? "0 0 10px #f59e0b44"
    : clashLabel
    ? "0 0 10px #22c55e33"
    : "none";

  return (
    <div style={{ ...s.card, border: rivalryBorder, boxShadow: rivalryGlow }}>
      <div style={{ padding: "12px 14px" }}>
        {/* Header row: stage left | rivalry centre | date right */}
        <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
          <span style={{ fontSize:10, color: live ? C.red : C.dim, fontWeight:700, letterSpacing:"0.08em", flex:1,
            animation: live ? "pulse-red 1.5s infinite" : "none" }}>
            {live ? "⚡ LIVE" : (m.stage||"").replace(/_/g," ")}
          </span>
          <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"center", flex:1 }}>
            {clashLabel && scheduled && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{clashLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.accent, letterSpacing:"0.08em" }}>{clashLabel.label}</span>
            </>}
          </div>
          <span style={{ fontSize:10, color: C.muted, flex:1, textAlign:"right" }}>{fmt(m.utcDate)}</span>
        </div>
        {/* Teams row */}
        <div style={{ display:"flex", alignItems:"center" }}>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:8 }}>
            <Flag code={h} size={22} />
            <div>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(h, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.homeTeam?.name || "TBD"}{POT[h] ? <span style={{ color:C.muted, fontSize:9 }}> (P{POT[h]})</span> : ""}</div>
            </div>
          </div>
          <div style={{ minWidth:64, textAlign:"center" }}>
            {fin || live
              ? <span style={{ fontSize:18, fontWeight:800, letterSpacing:2 }}>
                  {m.score?.fullTime?.home ?? 0}–{m.score?.fullTime?.away ?? 0}
                </span>
              : <div>
                  <div style={{ fontSize:12, color: C.muted, marginBottom:5 }}>vs</div>
                  <span style={{
                    fontSize:9, fontWeight:800, color:"white",
                    background: broadcast.b === "ITV" ? "#003087" : "#FF6B35",
                    padding:"2px 6px", borderRadius:3,
                  }}>{broadcast.b}</span>
                </div>
            }

}

const formatBucket = (b) => {
  if (!b) return "";
  if (b === "Start") return "Start";

function BumpChart({ history, allRanked, bucketLabels = [], raceHistory }) {
  const [selected, setSelected] = React.useState(null);
  const [showRace, setShowRace] = React.useState(false);
  const maxLen = Math.max(...history.map(p => p.hist.length));

  if (maxLen < 2) {
    return (
      <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13 }}>
        Not enough scoring events yet to show rankings over time.
      </div>
    );
  }

  const n = history.length;
  const padL = 16, padR = 72, padT = 16, padB = 24;
  const sidebarW = window.innerWidth >= 768 ? 260 : 0;
  const screenW = window.innerWidth - sidebarW;
  const availW = screenW - padL - padR - 56;
  const COL_W = maxLen <= 2 ? availW : Math.max(40, Math.floor(availW / (maxLen - 1)));
  const rowH = 34;
  const chartW = (maxLen - 1) * COL_W;
  const chartH = (n - 1) * rowH;
  const W = padL + chartW + padR;
  const H = padT + chartH + padB;

  const xScale = t => padL + t * COL_W;
  const yScale = r => padT + (r - 1) * rowH;

  const colorOf = name => playerColor(name);

  const timePoints = Array.from({length: maxLen}, (_, t) => {
    const scores = history.map(p => ({
      name: p.name,
      pts: p.hist[Math.min(t, p.hist.length - 1)],
    })).sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
    const ranks = {};
    scores.forEach((s, i) => { ranks[s.name] = i + 1; });
    return ranks;
  });

  const buildPath = name => {
    const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i-1][0] + pts[i][0]) / 2;
      d += ` C ${cpx},${pts[i-1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
    }
    return d;
  };

  const startRanks = timePoints[0];
  const endRanks = timePoints[maxLen - 1];

  const xLabels = Array.from({length: maxLen}, (_, t) => ({
    t,
    label: bucketLabels[t] ? formatBucket(bucketLabels[t]) : (t === 0 ? "Start" : t === maxLen-1 ? "Now" : "")
  })).filter(x => x.label);

  return (
    <div style={{ padding:"8px 0 0" }}>
      <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>
        Rankings Over Time
      </div>
      <div style={{ position:"relative" }}>
        <div style={{ overflowX:"scroll", overflowY:"hidden", WebkitOverflowScrolling:"touch", direction:"rtl" }}>
          <div style={{ direction:"ltr", display:"inline-block" }}>
        <svg width={W} height={H} style={{ display:"block" }}>
          {/* Horizontal grid lines */}
          {Array.from({length: n}, (_, i) => (
            <line key={i} x1={padL} y1={yScale(i+1)} x2={padL+chartW} y2={yScale(i+1)} stroke="#1e3d28" strokeWidth={1} />
          ))}
          {/* Lines */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <path key={p.name} d={buildPath(p.name)} fill="none"
              stroke={dim ? "#1e3d28" : colorOf(p.name)}
              strokeWidth={selected === p.name ? 3.5 : 2.5}
              strokeLinecap="round" strokeLinejoin="round"
              opacity={dim ? 0.3 : 0.9} />
            );
          })}
          {/* Dots */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return timePoints.map((tp, t) => (
              <circle key={`${p.name}-${t}`}
                cx={xScale(t)} cy={yScale(tp[p.name])}
                r={t === maxLen-1 ? 5 : 3}
                fill={dim ? "#1e3d28" : colorOf(p.name)}
                stroke="#080c18" strokeWidth={1.5}
                opacity={dim ? 0.3 : 1} />
            ));
          })}
          {/* Rank numbers on left */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`s-${p.name}`} x={padL-5} y={yScale(startRanks[p.name])+4}
              textAnchor="end" fontSize={10} fontWeight={700}
              fill={dim ? "#1e3d28" : colorOf(p.name)}
              opacity={dim ? 0.3 : 1}>
              {startRanks[p.name]}
            </text>
            );
          })}
          {/* Name labels on right — tappable */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`e-${p.name}`} x={padL+chartW+8} y={yScale(endRanks[p.name])+4}
              textAnchor="start" fontSize={11} fontWeight={700}
              fill={dim ? "#334155" : colorOf(p.name)}
              opacity={dim ? 0.4 : 1}
              style={{ cursor:"pointer" }}
              onClick={() => setSelected(selected === p.name ? null : p.name)}>
              {p.name}
            </text>
            );
          })}
          {/* X labels */}
          {xLabels.map(({t, label}) => (
            <text key={`xl-${t}`} x={xScale(t)} y={H-4}
              textAnchor="middle" fontSize={9} fill={C.muted}>{label}</text>
          ))}
        </svg>
          </div>
        </div>
        {/* Left fade — hints at history off to the left when scrolled right */}
        <div style={{
          position:"absolute", top:0, left:0, bottom:0, width:48,
          background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)`,
          pointerEvents:"none",
        }}/>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16, padding:"0 4px" }}>
        {allRanked.map((p, i) => {
          const dim = selected && selected !== p.name;
          return (
          <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
            style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", opacity: dim ? 0.35 : 1 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:playerColor(p.name), flexShrink:0 }}/>
            <span style={{ fontSize:11, color:C.muted }}>{p.name} <span style={{ color:C.text, fontWeight:700 }}>{p.total}pts</span></span>
          </div>
          );
        })}
      </div>

      {/* Race button */}
      <button onClick={() => setShowRace(true)} style={{
        marginTop:20, width:"100%", padding:"14px",
        background:"linear-gradient(135deg, #1d4ed8, #3b82f6)",
        color:"white", border:"none", borderRadius:10,
        fontSize:14, fontWeight:700, cursor:"pointer",
        letterSpacing:"0.03em",
      }}>
        🏁 Watch the Race
      </button>

      {showRace && <BarRaceModal history={raceHistory || history} allRanked={allRanked} bucketLabels={bucketLabels} onClose={() => setShowRace(false)} />}
    </div>
  );
}

function BarRaceModal({ history, allRanked, bucketLabels = [], onClose }) {
  const maxLen = Math.max(...history.map(p => p.hist.length));
  const [frame, setFrame] = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const intervalRef = React.useRef(null);
  const TICK = 800;
  const n = history.length;

  const colorOf = name => playerColor(name);

  const prevRanks = React.useRef({});

  // Compute standings at this frame — each entry gets a rank (0 = top)
  const standings = React.useMemo(() => {
    const sorted = history.map(p => ({
      name: p.name,
      value: p.hist[Math.min(frame, p.hist.length - 1)],
      color: colorOf(p.name),
    })).sort((a, b) => b.value - a.value || a.name.localeCompare(b.name));
    return sorted.map((s, i) => {
      const prev = prevRanks.current[s.name] ?? i;
      const movingUp = i < prev; // lower index = higher rank = moving up
      return { ...s, rank: i, movingUp };
    });
  }, [frame]);

  // After each render, update prevRanks
  React.useEffect(() => {
    standings.forEach(s => { prevRanks.current[s.name] = s.rank; });
  }, [standings]);

  const maxValue = Math.max(...standings.map(s => s.value), 1);

  // Work out tournament stage label for current frame
  const frameLabel = frame === 0 ? "Start" : `Game ${frame} of ${maxLen - 1}`;

  React.useEffect(() => {
    if (playing && frame < maxLen - 1) {
      intervalRef.current = setTimeout(() => setFrame(f => f + 1), TICK);
    } else if (frame >= maxLen - 1) {
      setPlaying(false);
    }
    return () => clearTimeout(intervalRef.current);
  }, [playing, frame]);

  const wasPlayingRef = React.useRef(false);

  const onScrubStart = () => { wasPlayingRef.current = playing; setPlaying(false); };
  const onScrubEnd = () => { if (wasPlayingRef.current && frame < maxLen - 1) setPlaying(true); };

  const toggle = () => {
    if (frame >= maxLen - 1) { setFrame(0); setPlaying(true); }
    else setPlaying(p => !p);
  };
  const restart = () => { setFrame(0); setPlaying(true); };
  const progress = (frame / Math.max(maxLen - 1, 1)) * 100;

  // Fixed row height for animation
  const ROW_H = `${100 / n}%`;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:60, background:"#0d1f12", display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text }}>🏁 The Race</div>
        <button onClick={onClose} style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
      </div>

      {/* Chart */}
      <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0 }}>
          {/* Render in STABLE order (by name) so DOM nodes never remount */}
          {[...history].sort((a,b) => a.name.localeCompare(b.name)).map(p => {
            const s = standings.find(x => x.name === p.name);
            if (!s) return null;
            const topPct = (s.rank / n) * 100;
            const barW = maxValue > 0 ? (s.value / maxValue) * 100 : 0;
            return (
              <div key={s.name} style={{
                position:"absolute",
                left:0, right:0,
                height:ROW_H,
                top:`${topPct}%`,
                transition:`top ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                display:"flex", alignItems:"center",
                padding:"0 16px",
                gap:8,
                zIndex: s.movingUp ? n + 1 : 1,
              }}>
                <div style={{ width:18, textAlign:"right", fontSize:11, color:C.muted, flexShrink:0, fontWeight:700 }}>
                  {s.rank + 1}
                </div>
                <div style={{ width:66, textAlign:"right", fontSize:12, fontWeight:700, color:C.text, flexShrink:0, overflow:"hidden", whiteSpace:"nowrap" }}>
                  {s.name}
                </div>
                <div style={{ flex:1, position:"relative", height:"55%", minHeight:18 }}>
                  <div style={{ position:"absolute", inset:0, background:"#1e3d28", borderRadius:"0 3px 3px 0" }}/>
                  <div style={{
                    position:"absolute", left:0, top:0, bottom:0,
                    width:`${barW}%`,
                    background:s.color,
                    borderRadius:"0 3px 3px 0",
                    transition:`width ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                  }}/>
                  {s.value > 0 && (
                    <div style={{
                      position:"absolute", left:0, top:0, bottom:0, right:0,
                      display:"flex", alignItems:"center",
                      justifyContent: barW > 70 ? "flex-end" : "flex-start",
                      paddingLeft: barW > 70 ? 0 : `calc(${barW}% + 6px)`,
                      paddingRight: barW > 70 ? 8 : 0,
                      pointerEvents:"none",
                    }}>
                      <span style={{ fontSize:11, fontWeight:700, color:C.text, whiteSpace:"nowrap" }}>
                        {s.value}pts
                      </span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Stage watermark — background only, no event counter here */}
        <div style={{ position:"absolute", bottom:8, right:16, textAlign:"right", pointerEvents:"none" }}>
          <div style={{ fontSize:28, fontWeight:800, color:"rgba(255,255,255,0.06)", lineHeight:1 }}>{frameLabel}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ padding:"10px 16px 20px", flexShrink:0 }}>
        {/* Scrubber */}
        <input
          type="range" min={0} max={maxLen - 1} value={frame}
          onMouseDown={onScrubStart} onTouchStart={onScrubStart}
          onMouseUp={onScrubEnd} onTouchEnd={onScrubEnd}
          onChange={e => setFrame(Number(e.target.value))}
          style={{ width:"100%", marginBottom:10, accentColor:C.accent, cursor:"pointer" }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontSize:11, color:C.muted, fontWeight:600 }}>{frameLabel}</span>
          <span style={{ fontSize:11, color:C.muted }}>Event {frame + 1} of {maxLen}</span>
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:8 }}>
          <button onClick={restart} style={{ background:"#1e3d28", border:"none", color:C.text, padding:"8px 16px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>Restart</button>
          <button onClick={toggle} style={{ background:C.accent, border:"none", color:"white", padding:"8px 24px", borderRadius:6, cursor:"pointer", fontSize:14, fontWeight:700 }}>
            {playing ? "⏸" : frame >= maxLen - 1 ? "↺" : "▶"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TEAMS TAB — Groups + Bracket
// ─────────────────────────────────────────────────────────────────────────────
function TeamsTab({ matches }) {
  // ── Hardcoded group assignments (A-L, 4 teams each) ─────────────────
  const GROUP_ASSIGNMENTS = {
    A: ["ARG","AUT","ALG","JOR"],
    B: ["USA","TUR","AUS","PAR"],
    C: ["BEL","IRN","EGY","NZL"],
    D: ["CAN","SUI","QAT","BIH"],
    E: ["BRA","MAR","HAI","SCO"],
    F: ["GER","ECU","CIV","CUW"],
    G: ["POR","COL","UZB","DRC"],
    H: ["ESP","URU","KSA","CPV"],
    I: ["ENG","CRO","GHA","PAN"],
    J: ["MEX","KOR","CZE","RSA"],
    K: ["FRA","SEN","NOR","IRQ"],
    L: ["NED","JPN","SWE","TUN"],
  };

  const groupMap = {};
  const groupTeams = {};
  Object.entries(GROUP_ASSIGNMENTS).forEach(([letter, teams]) => {
    groupTeams[letter] = new Set(teams);
    teams.forEach(t => { groupMap[t] = letter; });
  });

  const groups = Object.keys(GROUP_ASSIGNMENTS);

  // ── Owner lookup ──────────────────────────────────────────────────────
  const ownerOf = {};
  PLAYERS.forEach(p => {
    if (p.grimReaper) return;
    p.codes.forEach(c => { ownerOf[c] = p.name; });
  });

  // ── WDL + GD + Pts per team for group standings ───────────────────────
  const groupStats = {}; // tla → { w, d, l, gf, ga }
  matches.filter(m =>
    (m.stage||"").toUpperCase().includes("GROUP") &&
    (m.status === "FINISHED" || m.status === "IN_PLAY" || m.status === "PAUSED") &&
    m.score?.fullTime?.home != null
  ).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score.fullTime.home;
    const as_ = m.score.fullTime.away;
    if (!h || !a) return;
    if (!groupStats[h]) groupStats[h] = { w:0, d:0, l:0, gf:0, ga:0 };
    if (!groupStats[a]) groupStats[a] = { w:0, d:0, l:0, gf:0, ga:0 };
    groupStats[h].gf += hs; groupStats[h].ga += as_;
    groupStats[a].gf += as_; groupStats[a].ga += hs;
    if (hs > as_)      { groupStats[h].w++; groupStats[a].l++; }
    else if (as_ > hs) { groupStats[a].w++; groupStats[h].l++; }
    else               { groupStats[h].d++; groupStats[a].d++; }
  });

  const teamPts = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w * 3 + s.d;
  };
  const teamGD = (tla) => {
    const s = groupStats[tla] || { gf:0, ga:0 };
    return s.gf - s.ga;
  };
  const teamPlayed = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w + s.d + s.l;
  };

  // ── Sweepstake scoring data ──────────────────────────────────────────
  const grpPts = deriveGroupPts(matches);

  // ── Knockout bracket data ─────────────────────────────────────────────
  // Build map: team tla → highest stage reached
  const { stageReached, eliminated, winners } = deriveStages(matches);

  // Build map: knockout match id → { home, away, homeScore, awayScore, status, winner }
  const koMatches = {};
  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home;
    const as_ = m.score?.fullTime?.away;
    const pen = m.score?.penalties;
    let winner = null;
    if (hs != null && as_ != null) {
      if (hs > as_) winner = h;
      else if (as_ > hs) winner = a;
      else if (pen) winner = pen.home > pen.away ? h : a;
    }
    koMatches[m.id] = { id: m.id, home: h, away: a, homeScore: hs, awayScore: as_, status: m.status, winner, stage: (m.stage||"").toUpperCase(), date: m.utcDate };
  });

  // Sort knockout matches by date for sequential numbering per round
  const koByStage = {};
  Object.values(koMatches).forEach(m => {
    if (!koByStage[m.stage]) koByStage[m.stage] = [];
    koByStage[m.stage].push(m);
  });
  Object.keys(koByStage).forEach(s => koByStage[s].sort((a,b) => new Date(a.date) - new Date(b.date)));

  // Helper: get team name from tla
  const teamName = (tla) => {
    if (!tla) return null;
    const m = matches.find(m => m.homeTeam?.tla?.toUpperCase() === tla || m.awayTeam?.tla?.toUpperCase() === tla);
    if (!m) return tla;
    if (m.homeTeam?.tla?.toUpperCase() === tla) return m.homeTeam.name;
    return m.awayTeam.name;
  };

  // ── Render helpers ─────────────────────────────────────────────────────
  const TeamRow = ({ tla, rank }) => {
    if (!tla) return null;
    const name = teamName(tla) || tla;
    const owner = ownerOf[tla];
    const pot = POT[tla] ? `P${POT[tla]}` : null;
    const flagUrl = flag(tla);
    const isElim = !!eliminated[tla];
    const s = groupStats[tla] || { w:0, d:0, l:0, gf:0, ga:0 };
    const played = s.w + s.d + s.l;
    const leaguePts = s.w * 3 + s.d;
    // Sweepstake pts: group stage wins + draws scored by this team
    const swPts = (grpPts[tla] || 0) + (stageReached[tla] && stageReached[tla] !== "GROUP_ELIM" ? ptsTotal(tla, stageReached[tla]) : 0) + (eliminated[tla] === "GROUP_ELIM" ? ptsTotal(tla, "GROUP_ELIM") : 0);
    return (
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 12px",
        borderBottom: `1px solid ${C.border}`, opacity: isElim ? 0.45 : 1 }}>
        {rank && <span style={{ fontSize:12, color:C.muted, width:16, textAlign:"right", flexShrink:0 }}>{rank}</span>}
        {flagUrl
          ? <img src={flagUrl} alt={tla} style={{ width:34, height:23, objectFit:"cover", borderRadius:2, flexShrink:0 }} />
          : <span style={{ fontSize:14 }}>{tla}</span>}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, color:C.text, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{owner || "—"}</div>
          <div style={{ fontSize:11, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{name}{pot ? ` (${pot})` : ""}</div>
        </div>
        {played > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:0, flexShrink:0 }}>
            <span style={{ fontSize:11, color:C.muted, width:80, textAlign:"center" }}>{s.w}W {s.d}D {s.l}L</span>
            <span style={{ fontSize:12, fontWeight:600, color:C.text, width:28, textAlign:"center" }}>{leaguePts}</span>
            <span style={{ fontSize:12, fontWeight:700, color:C.accent, width:36, textAlign:"right" }}>+{swPts}</span>
          </div>
        ) : (
          <div style={{ width:144 }} />
        )}
      </div>
    );
  };
  };

  const BracketSlot = ({ tla, matchNum, side, score, isWinner, status }) => {
    const name = tla ? (teamName(tla) || tla) : null;
    const owner = tla ? ownerOf[tla] : null;
    const pot = tla && POT[tla] ? `P${POT[tla]}` : null;
    const flagUrl = tla ? flag(tla) : null;
    const isLive = status === "IN_PLAY" || status === "PAUSED";
    const label = tla ? null : (matchNum ? `W Match ${matchNum}` : "TBD");
    return (
      <div style={{
        display:"flex", alignItems:"center", gap:5,
        padding:"5px 7px", minWidth:0,
        borderBottom: side === "home" ? `1px solid ${C.border}` : "none",
        background: isWinner ? "rgba(34,197,94,0.08)" : "transparent",
      }}>
        {tla && flagUrl
          ? <img src={flagUrl} alt={tla} style={{ width:20, height:13, objectFit:"cover", borderRadius:1, flexShrink:0 }} />
          : <div style={{ width:20, height:13, background:C.border, borderRadius:1, flexShrink:0 }} />}
        {tla ? (
          <div style={{ flex:1, minWidth:0, overflow:"hidden" }}>
            <span style={{ fontSize:12, fontWeight:700, color: isWinner ? C.accent : C.text, whiteSpace:"nowrap" }}>
              {owner || "—"}
            </span>
            {" "}
            <span style={{ fontSize:10, color:C.muted, whiteSpace:"nowrap" }}>
              {name}{pot ? ` (${pot})` : ""}
            </span>
          </div>
        ) : (
          <span style={{ fontSize:11, color:C.muted, flex:1 }}>{label}</span>
        )}
        {score != null && (
          <span style={{ fontSize:12, fontWeight:700, color: isWinner ? C.accent : C.dim, flexShrink:0, marginLeft:2 }}>
            {score}{isLive ? <span style={{color:"#ef4444",fontSize:9}}> ●</span> : ""}
          </span>
        )}
      </div>
    );
  };

  const BracketMatch = ({ match, matchNum }) => {
    if (!match) {
      // Placeholder
      return (
        <div style={{ border:`1px solid ${C.border}`, borderRadius:6, overflow:"hidden", minWidth:150, background:C.card }}>
          <BracketSlot tla={null} matchNum={matchNum} side="home" />
          <BracketSlot tla={null} matchNum={matchNum ? matchNum + 0.1 : null} side="away" />
        </div>
      );
    }
    const { home, away, homeScore, awayScore, status, winner } = match;
    const hasScore = homeScore != null && awayScore != null;
    return (
      <div style={{ border:`1px solid ${winner ? C.accent+"44" : C.border}`, borderRadius:6, overflow:"hidden", minWidth:150, background:C.card }}>
        <BracketSlot tla={home} side="home" score={hasScore ? homeScore : null} isWinner={winner === home} status={status} />
        <BracketSlot tla={away} side="away" score={hasScore ? awayScore : null} isWinner={winner === away} status={status} />
      </div>
    );
  };

  // ── Bracket round renderer ─────────────────────────────────────────────
  const BracketRound = ({ label, matches: rMatches, startNum }) => (
    <div style={{ display:"flex", flexDirection:"column", gap:0, minWidth:165 }}>
      <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>{label}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {rMatches.map((m, i) => (
          <BracketMatch key={i} match={m} matchNum={startNum ? startNum + i : null} />
        ))}
      </div>
    </div>
  );

  // Build bracket rounds — R32 → R16 → QF → SF → F
  const r32 = koByStage["LAST_32"] || [];
  const r16 = koByStage["LAST_16"] || [];
  const qf  = koByStage["QUARTER_FINALS"] || [];
  const sf  = koByStage["SEMI_FINALS"] || [];
  const fin = koByStage["FINAL"] || [];

  // Pad arrays so visual alignment works
  const pad = (arr, len) => { while (arr.length < len) arr.push(null); return arr; };

  const C_local = C; // capture in closure

  const [teamsView, setTeamsView] = React.useState("groups");
  return (
    <div style={{ paddingBottom:20 }}>

      {/* ── TOGGLE ──────────────────────────────────────────────── */}
      <div style={{ display:"flex", gap:0, margin:"14px 12px 14px", background:C.surface, borderRadius:10, padding:3, border:`1px solid ${C.border}` }}>
        {[["groups","Group Stage"],["knockout","Knockout"]].map(([id, label]) => (
          <button key={id} onClick={() => setTeamsView(id)} style={{
            flex:1, padding:"8px 0", border:"none", cursor:"pointer", borderRadius:8,
            background: teamsView === id ? C.accent : "transparent",
            color: teamsView === id ? "#000" : C.muted,
            fontSize:13, fontWeight: teamsView === id ? 700 : 400,
            transition:"all 0.15s ease", WebkitTapHighlightColor:"transparent",
          }}>{label}</button>
        ))}
      </div>

      {/* ── GROUPS ──────────────────────────────────────────────── */}
      {teamsView === "groups" && (

          {groups.map(letter => {
            const teams = [...groupTeams[letter]].sort((a, b) => {
              const pd = teamPts(b) - teamPts(a);
              if (pd !== 0) return pd;
              const gd = teamGD(b) - teamGD(a);
              if (gd !== 0) return gd;
              return (groupStats[b]?.gf||0) - (groupStats[a]?.gf||0);
            });
            return (
              <div key={letter} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"8px 12px", background:C.surface, display:"flex", alignItems:"center", justifyContent:"space-between" }}>

        </div>
      )}

      {/* ── KNOCKOUT ────────────────────────────────────────────── */}
      {teamsView === "knockout" && (
        <>
          {(r32.length === 0 && r16.length === 0 && qf.length === 0 && sf.length === 0 && fin.length === 0) ? (

              <div style={{ display:"flex", gap:16, padding:"0 12px 8px", alignItems:"flex-start", width:"max-content" }}>
                {r32.length > 0 && <BracketRound label="Last 32" matches={pad([...r32], 16)} startNum={1} />}
                {r16.length > 0 && (
                  <div style={{ display:"flex", flexDirection:"column", gap:0, minWidth:165 }}>

                    </div>
                  </div>
                )}
                {sf.length > 0 && (
                  <div style={{ display:"flex", flexDirection:"column", gap:0, minWidth:165 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>Semi Final</div>

                      {pad([...sf], 2).map((m, i) => <BracketMatch key={i} match={m} />)}
                    </div>
                  </div>
                )}
                {fin.length > 0 && (
                  <div style={{ display:"flex", flexDirection:"column", gap:0, minWidth:165 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:C.accent, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>🏆 Final</div>
                    <div style={{ marginTop: sf.length > 0 ? 248 : qf.length > 0 ? 116 : 0 }}>
                      {pad([...fin], 1).map((m, i) => <BracketMatch key={i} match={m} />)}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function App() {
  const [matches,     setMatches]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [tab,         setTab]         = useState("table");
  const [showPayment, setShowPayment] = useState(false);
  const [countdown, setCountdown] = useState("");
  const matchesRef = React.useRef(matches);
  React.useEffect(() => { matchesRef.current = matches; }, [matches]);
  React.useEffect(() => {
    const tick = () => {
      const next = matchesRef.current.filter(m => m.status === "SCHEDULED" || m.status === "TIMED").sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate))[0];
      if (!next) { setCountdown(""); return; }
      const diff = new Date(next.utcDate) - new Date();
      if (diff <= 0) { setCountdown("Starting now!"); return; }
      const h = Math.floor(diff / 3600000);
      const mn = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      setCountdown(`${h}h ${String(mn).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  const triggerPayment = React.useCallback(() => {
    if (localStorage.getItem("sw_paid") !== "yes") {
      setShowPayment(true);
    }
  }, []);

  const [expanded,    setExpanded]    = useState(null);
  const [refreshing,  setRefreshing]  = useState(false);
  const [devMode,     setDevMode]     = useState(DEV_MODE_DEFAULT);
  const devModeRef = React.useRef(DEV_MODE_DEFAULT);
  const [showInfo,    setShowInfo]    = useState(false);
  const [copied,      setCopied]      = useState(false);
  const [goalFlash,   setGoalFlash]   = useState(false);
  const prevScoresRef = React.useRef({});
  const [barsVisible, setBarsVisible] = useState(true);
  const lastScrollY = React.useRef(0);

  const fetchMatches = useCallback(async (isManual = false, forceDev = null) => {
    if (isManual) setRefreshing(true);
    const useDev = forceDev !== null ? forceDev : devMode;
    if (useDev) {
      setMatches(MOCK_MATCHES);
      setLastUpdated(new Date());
      setLoading(false);
      setRefreshing(false);
      return;
    }
    try {
      const res  = await fetch(`${WORKER_URL}/competitions/${WC_CODE}/matches?season=${SEASON}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      // football-data.org's live 2026 World Cup API uses FIFA's official "COD"
      // code for DR Congo (ISO 3166-1 alpha-3, "Congo-Kinshasa"), but every
      // other part of this app — PLAYERS, POT, FLAG_ISO — was built using
      // "DRC". Normalizing COD -> DRC here, at the single point match data
      // enters the app, means every downstream lookup (ownerOf, flag, POT,
      // scoring) keeps working unchanged rather than needing 25+ individual
      // call sites updated. If other real-API-vs-our-data code mismatches
      // turn up later, add them here following the same pattern.
      const normalizeTla = (team) => {
        if (team?.tla?.toUpperCase() === "COD") return { ...team, tla: "DRC" };
        return team;
      };
      const normalizedMatches = (data.matches || []).map(m => ({
        ...m,
        homeTeam: normalizeTla(m.homeTeam),
        awayTeam: normalizeTla(m.awayTeam),
      }));
      setMatches(normalizedMatches);
      setLastUpdated(new Date());
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => {
    fetchMatches();
    const id = setInterval(() => { if (!devModeRef.current) fetchMatches(); }, 60_000);
    return () => clearInterval(id);
  }, [fetchMatches]);

  useEffect(() => {
    const id = setTimeout(() => { triggerPayment(); }, 5000);
    return () => clearTimeout(id);
  }, [triggerPayment]);

  useEffect(() => {
    if (showPayment) {
      const prevOverflow = document.body.style.overflow;
      document.body.style.overflow = "hidden";
      return () => { document.body.style.overflow = prevOverflow; };
    }
  }, [showPayment]);

  useEffect(() => {
    const handleScroll = () => {
      const y = window.scrollY;
      const diff = y - lastScrollY.current;
      if (diff > 4) setBarsVisible(false);       // scrolling down
      else if (diff < -4) setBarsVisible(true);  // scrolling up
      lastScrollY.current = y;
    };
    window.addEventListener("scroll", handleScroll, { passive: true });
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  const ranked   = scorePlayers(matches);
  const rank24hChange = compute24hRankChange(matches, ranked);
  const prevRankedRef = React.useRef({});
  const cardRefsMap = React.useRef({});
  const pendingAnimRef = React.useRef({}); // { playerName: deltaY }

  React.useEffect(() => {
    // Store pending animations — don't play yet
    ranked.forEach((p, newIdx) => {
      const prevIdx = prevRankedRef.current[p.name];
      if (prevIdx !== undefined && prevIdx !== newIdx) {
        const el = cardRefsMap.current[p.name];
        if (el) {
          const rowH = el.offsetHeight + 10;
          const delta = (prevIdx - newIdx) * rowH;
          pendingAnimRef.current[p.name] = delta;
          // Pre-position the card at its old visual spot
          el.style.transition = "none";
          el.style.transform = `translateY(${delta}px)`;
        }
      }
    });
    const newMap = {};
    ranked.forEach((p, i) => { newMap[p.name] = i; });
    prevRankedRef.current = newMap;

    // Set up IntersectionObserver to play animation when card scrolls into view
    const observers = [];
    Object.entries(pendingAnimRef.current).forEach(([name, delta]) => {
      const el = cardRefsMap.current[name];
      if (!el || delta === 0) return;
      const obs = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) {
          requestAnimationFrame(() => {
            el.style.transition = "transform 0.6s cubic-bezier(0.34,1.2,0.64,1)";
            el.style.transform = "translateY(0)";
          });
          delete pendingAnimRef.current[name];
          obs.disconnect();
        }
      }, { threshold: 0.1 });
      obs.observe(el);
      observers.push(obs);
    });
    return () => observers.forEach(o => o.disconnect());
  }, [ranked]);
  const { history: bumpHistoryMap, bucketLabels } = deriveHistory(matches);
  const badges = React.useMemo(() => computeBadges(ranked, matches), [matches]);
  const live     = matches.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED" ||
    ((m.status === "SCHEDULED" || m.status === "TIMED") && new Date() > new Date(m.utcDate)));
  const upcoming = matches.filter(m => m.status === "SCHEDULED" || m.status === "TIMED");
  const recent   = matches.filter(m => m.status === "FINISHED").reverse();

  // Detect goals — compare current scores to previous refresh
  React.useEffect(() => {
    let scored = false;
    live.forEach(m => {
      const key = m.id;

  const winPct = React.useMemo(() => {

                  <tbody>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"9px 12px", color:"#22c55e", fontWeight:600, fontSize:11 }}>Group Win</td>
                      {[2,4,8,12].map((v,i) => <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color:C.text }}>+{v}</td>)}
                    </tr>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"9px 12px", color:"#86efac", fontWeight:600, fontSize:11 }}>Group Draw</td>
                      {[1,2,3,5].map((v,i) => <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color:C.text }}>+{v}</td>)}
                    </tr>
                    {Object.entries(PTS).map(([key, vals]) => (
                      <tr key={key} style={{ borderBottom:`1px solid ${C.border}` }}>
                        <td style={{ padding:"9px 12px", color: STAGE_COLOR[key]||C.dim, fontWeight:600, fontSize:11 }}>{STAGE_LABEL[key]}</td>
                        {vals.map((v,i) => (
                          <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color: v < 0 ? C.red : v === 0 ? C.muted : C.text }}>
                            {v > 0 ? `+${v}` : v}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8, marginTop:20 }}>💀 Grim Reaper (Josh)</div>
              <div style={{ ...s.card, padding:"10px 12px", marginBottom:6 }}>
                <div style={{ fontSize:12, color:C.muted, marginBottom:10, lineHeight:1.5 }}>
                  Josh feasts on misfortune. He earns bounties when Pot 1 & 2 teams go out in the group stage, and profits from boring football — 3pts for every 0-0 in the group stage.
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <th style={{ padding:"6px 8px", textAlign:"left", color:C.dim, fontWeight:700 }}>Upset</th>
                      <th style={{ padding:"6px 8px", textAlign:"center", color:C.dim, fontWeight:700 }}>Owner loses</th>
                      <th style={{ padding:"6px 8px", textAlign:"center", color:C.dim, fontWeight:700 }}>Josh gains</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["Pot 1 out in groups", -50, 50],
                      ["Pot 2 out in groups", -15, 15],
                      ["Pot 3/4 out in groups", 0, 0],
                    ].map(([label, owner, josh]) => (
                      <tr key={label} style={{ borderBottom:`1px solid ${C.border}` }}>
                        <td style={{ padding:"7px 8px", color: josh > 0 ? C.text : C.muted }}>{label}</td>
                        <td style={{ padding:"7px 8px", textAlign:"center", color: owner < 0 ? C.red : C.muted, fontWeight:700 }}>{owner < 0 ? owner : "—"}</td>
                        <td style={{ padding:"7px 8px", textAlign:"center", color: josh > 0 ? "#22c55e" : C.muted, fontWeight:700 }}>{josh > 0 ? `+${josh}` : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {PLAYERS.map(p => (
                <div key={p.name} style={{ ...s.card, padding:"10px 12px", marginBottom:6 }}>
                  <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>{p.name}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {p.codes.map((code, i) => (
                      <div key={code} style={{ display:"flex", alignItems:"center", gap:5, background:"#0d1a11", borderRadius:4, padding:"3px 7px" }}>
                        <Flag code={code} size={14} />
                        <span style={{ fontSize:11, color:"#94a3b8" }}>{p.teams[i]}</span>
                        <span style={{ fontSize:9, color:C.muted }}>P{POT[code]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  const sw = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response(''))));
  `;
  const blob = new Blob([sw], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>
</body>
</html>
