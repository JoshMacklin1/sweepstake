// ═════════════════════════════════════════════════════════════════════════
// PROJECTED ROUND OF 32 BRACKET ("as it stands")
// ═════════════════════════════════════════════════════════════════════════
// Projects what the Last 32 bracket WOULD look like if the group stage ended
// today, using current standings. Mirrors BBC Sport's "As it stands" feature.
//
// Real FIFA rule: top 2 from each of 12 groups (24 teams) + best 8 of the 12
// third-placed teams (ranked by Pts > GD > GF > fair play > FIFA ranking —
// we only have the first three, fair play/ranking not tracked in this app).
//
// The 8 qualifying third-place groups are looked up in FIFA's official
// Annex C scenario table (495 combinations) to find the exact opponent
// assignment for each of the 8 "3rd place" slots in the Last 32 draw.

// Fixed Last 32 structure — always the same regardless of which teams qualify.
// "3RD-N" placeholders are resolved via THIRD_PLACE_SCENARIOS based on which
// 8 groups' third-place teams actually qualify.
var R32_FIXED_MATCHES = [
  { match: 73, home: "RU-A", away: "RU-B" },
  { match: 74, home: "W-E",  away: "3RD-1" }, // 3rd of A/B/C/D/F
  { match: 75, home: "W-F",  away: "RU-C" },
  { match: 76, home: "W-C",  away: "RU-F" },
  { match: 77, home: "W-I",  away: "3RD-2" }, // 3rd of C/D/F/G/H
  { match: 78, home: "RU-E", away: "RU-I" },
  { match: 79, home: "W-A",  away: "3RD-3" }, // 3rd of C/E/F/H/I
  { match: 80, home: "W-L",  away: "3RD-4" }, // 3rd of E/H/I/J/K
  { match: 81, home: "W-D",  away: "3RD-5" }, // 3rd of B/E/F/I/J
  { match: 82, home: "W-G",  away: "3RD-6" }, // 3rd of A/E/H/I/J
  { match: 83, home: "RU-K", away: "RU-L" },
  { match: 84, home: "W-H",  away: "RU-J" },
  { match: 85, home: "W-B",  away: "3RD-7" }, // 3rd of E/F/G/I/J
  { match: 86, home: "W-J",  away: "RU-H" },
  { match: 87, home: "W-K",  away: "3RD-8" }, // 3rd of D/E/I/J/L
  { match: 88, home: "RU-D", away: "RU-G" },
];

// projectR32(groupStandings) — given current standings for all 12 groups,
// returns the projected Last 32 fixture list ("as it stands").
//
// groupStandings: { A: [{tla, pts, gd, gf}, ...4 teams sorted 1st-4th...], B: [...], ... }
function projectR32(groupStandings) {
  const GROUPS = "ABCDEFGHIJKL".split("");

  // Winners and runners-up are simply position 1 and 2 in each group's current table
  const winner = g => groupStandings[g]?.[0] || null;
  const runnerUp = g => groupStandings[g]?.[1] || null;
  const third = g => groupStandings[g]?.[2] || null;

  // Rank all 12 third-place teams: Pts > GD > GF (fair play / FIFA ranking
  // not available in this app's data, so ties beyond this are arbitrary
  // but rare in practice).
  const allThirds = GROUPS
    .map(g => ({ group: g, team: third(g) }))
    .filter(t => t.team); // only groups with enough matches played

  allThirds.sort((a, b) => {
    if (b.team.pts !== a.team.pts) return b.team.pts - a.team.pts;
    if (b.team.gd  !== a.team.gd)  return b.team.gd  - a.team.gd;
    return b.team.gf - a.team.gf;
  });

  const qualifyingThirds = allThirds.slice(0, 8);
  const qualifyingGroups = qualifyingThirds.map(t => t.group).sort();
  const key = qualifyingGroups.join("");

  const scenario = THIRD_PLACE_SCENARIOS[key];
  // If not enough groups have played enough games yet, scenario lookup will
  // fail (key won't have 8 entries) — caller should check for this.
  if (!scenario || qualifyingThirds.length < 8) {
    return { ready: false, fixtures: [] };
  }

  // Map "3RD-N" slot index (1-8) -> which group's 3rd place team fills it
  const thirdByGroup = {};
  qualifyingThirds.forEach(t => { thirdByGroup[t.group] = t.team; });

  const slotTeam = (slotIdx) => {
    const groupLetter = scenario[slotIdx - 1]; // 1-indexed slots
    return thirdByGroup[groupLetter] || null;
  };

  const resolveSlot = (code) => {
    if (code.startsWith("W-")) return winner(code.slice(2));
    if (code.startsWith("RU-")) return runnerUp(code.slice(3));
    if (code.startsWith("3RD-")) return slotTeam(parseInt(code.slice(4), 10));
    return null;
  };

  const fixtures = R32_FIXED_MATCHES.map(m => ({
    match: m.match,
    home: resolveSlot(m.home),
    away: resolveSlot(m.away),
  }));

  return { ready: true, fixtures, qualifyingGroups };
}



// BBC/email-digest-style homepage — a snapshot of yesterday, now, and what's
// next, mirroring the daily email's sections so the two feel like the same
// product. Pure read-only summary view; "Open the full table" hands off to
// the League tab for anything that needs deeper interaction.
function HomeTab({ matches, ranked, badges, rank24hChange, rank24hPtsChange, matchPtsById, upcoming, setTab }) {
  // Badges assigned in the last 24h (not "since you last looked" — same
  // rolling window as everything else on this tab). Single-holder badges
  // (Top Dog, Firepower, etc.) naturally surface for whoever holds them
  // *now* if the holder changed within the window — see comment in
  // computeNewBadges24h in scoring.js for why no extra logic is needed.
  const newAccolades = typeof computeNewBadges24h === "function" ? computeNewBadges24h(badges, matches) : [];

  // "Last 24 hours" everywhere on this tab, not calendar "yesterday" — same
  // rolling window rank24hChange/rank24hPtsChange already use, so every
  // section on the page is answering the same question consistently.
  const cutoffMs = Date.now() - 24 * 60 * 60 * 1000;
  const recentResults = matches
    .filter(m => m.status === "FINISHED" && new Date(m.utcDate).getTime() >= cutoffMs)
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

  const real = ranked.filter(p => !p.grimReaper);
  const risers = real.filter(p => (rank24hChange.get(p.name) || 0) > 0)
    .sort((a, b) => rank24hChange.get(b.name) - rank24hChange.get(a.name)).slice(0, 5);
  const fallers = real.filter(p => (rank24hChange.get(p.name) || 0) < 0)
    .sort((a, b) => rank24hChange.get(a.name) - rank24hChange.get(b.name)).slice(0, 5);

  const topThree = real.slice(0, 3);

  const upNext = [...upcoming]
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
    .slice(0, 6);

  // Same flat section-per-card layout as the email digest (label above a
  // card), not grouped into per-app-area cards — but each section that maps
  // onto a real tab still gets a footer link straight into it.
  const Section = ({ icon, title, onOpen, linkLabel, empty, children }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>{icon}</span>{title}</div>
      <div style={s.card}>
        {empty
          ? <div style={{ padding: "14px", fontSize: 12, color: C.muted }}>{empty}</div>
          : children}
        {onOpen && (
          <button onClick={onOpen} style={{
            width: "100%", padding: "10px 14px", background: "transparent", border: "none",
            borderTop: `1px solid ${C.border}`, color: C.accent, fontSize: 12, fontWeight: 700,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
          }}>
            {linkLabel} <span style={{ fontSize: 14, lineHeight: 1 }}>›</span>
          </button>
        )}
      </div>
    </div>
  );

  const rankColors = ["#84cc16","#94a3b8","#b45309"];

  return (
    <div>
      {/* Headline leader card — the one "hero" element on the page, same
         visual weight as the live-match banner up in the sticky header, so
         Home has an immediate payoff instead of opening on a wall of
         uppercase section labels. */}
      {topThree[0] && (
        <div style={{
          ...s.card, padding: "18px 16px", marginBottom: 16, textAlign: "center",
          background: "linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.02))",
        }}>
          <div style={{ fontSize: 11, color: C.dim, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Currently Leading</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 6 }}>
            <div style={{ display: "flex", gap: 4 }}>{topThree[0].teams.map(t => <Flag key={t.code} code={t.code} size={20} />)}</div>
            <span style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{topThree[0].name}</span>
          </div>
          <div style={{ fontSize: 30, fontWeight: 900, color: C.accent, lineHeight: 1 }}>
            {topThree[0].total}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
          </div>
        </div>
      )}

      {/* Top of the Table reuses PlayerRow's rank-badge-circle + sparkline
         treatment (not the plain text row this used to be) — same data,
         dressed with the same visual language as the League tab so Home
         doesn't look like a stripped-down report next to it. */}
      <Section icon="🏆" title="Top of the Table" onOpen={() => { window.scrollTo(0, 0); setTab("table"); }} linkLabel="View league"
        empty={topThree.length === 0 ? "No standings yet" : null}>
        {topThree.map((p, i) => {
          const delta = rank24hChange.get(p.name) || 0;
          return (
            <div key={p.name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderBottom: i < topThree.length - 1 ? `1px solid ${C.border}` : "none" }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 12, fontWeight: 800, color: "#080c18",
              }}>{i + 1}</div>
              <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>{p.teams.map(t => <Flag key={t.code} code={t.code} size={16} />)}</div>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.text, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
              <Sparkline data={p.hist} width={64} height={28} color={p.total < 0 ? C.red : p.total === 0 ? C.neutral : C.accent} />
              <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.text, lineHeight: 1 }}>{p.total}</div>
                <div style={{
                  display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, marginTop: 3,
                  background: delta === 0 ? "rgba(148,163,184,0.12)" : delta > 0 ? C.posBg : C.negBg,
                  color: delta === 0 ? "#94a3b8" : delta > 0 ? C.accent : C.red,
                }}>{delta === 0 ? "0 pos" : `${delta > 0 ? "▲" : "▼"} ${Math.abs(delta)} pos`}</div>
              </div>
            </div>
          );
        })}
      </Section>

      {/* Recent Results and Up Next (below) deliberately don't use the
         Section card-wrapper pattern the other sections use — the user
         wants these to look exactly like the Scores tab, so they render
         real MatchCards in the same "league-grid fixture-grid" grid, not
         wrapped in an extra outer card (MatchCard already draws its own
         border/background per match; nesting that inside Section's card
         would double up). The condensed DigestMatchRow component these used
         before is gone now that nothing renders it any more. */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>🌐</span>Recent Results</div>
        {recentResults.length === 0
          ? <div style={{ ...s.card, padding: "14px", fontSize: 12, color: C.muted }}>No matches in the last 24h</div>
          : <div className="league-grid fixture-grid">{recentResults.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} pts={matchPtsById[m.id]} />)}</div>}
        <button onClick={() => { window.scrollTo(0, 0); setTab("scores"); }} style={{
          width: "100%", padding: "10px 14px", marginTop: 4, background: "transparent",
          border: `1px solid ${C.border}`, borderRadius: 10, color: C.accent, fontSize: 12, fontWeight: 700,
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
        }}>
          View all scores <span style={{ fontSize: 14, lineHeight: 1 }}>›</span>
        </button>
      </div>

      <Section icon="📊" title="Risers & Fallers" onOpen={() => { window.scrollTo(0, 0); setTab("race"); }} linkLabel="Watch the race"
        empty={risers.length === 0 && fallers.length === 0 ? "No position changes in the last 24h" : null}>
        {risers.length > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: "0.06em", padding: "10px 14px 4px" }}>RISERS</div>}
        {risers.map((p, i) => (
          <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 14px", borderBottom: (i < risers.length - 1 || fallers.length > 0) ? `1px solid ${C.border}` : "none" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{p.name}</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: C.accent }}>
              ▲ {rank24hChange.get(p.name)} place{rank24hChange.get(p.name) === 1 ? "" : "s"}
              {rank24hPtsChange.get(p.name) > 0 ? ` (+${rank24hPtsChange.get(p.name)}pts)` : ""}
            </span>
          </div>
        ))}
        {fallers.length > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: C.red, letterSpacing: "0.06em", padding: "10px 14px 4px" }}>FALLERS</div>}
        {fallers.map((p, i) => (
          <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 14px", borderBottom: i < fallers.length - 1 ? `1px solid ${C.border}` : "none" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{p.name}</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: C.red }}>
              ▼ {Math.abs(rank24hChange.get(p.name))} place{Math.abs(rank24hChange.get(p.name)) === 1 ? "" : "s"}
            </span>
          </div>
        ))}
      </Section>

      <Section icon="🏅" title="New Accolades"
        empty={newAccolades.length === 0 ? "No new accolades in the last 24h" : null}>
        {newAccolades.map((b, i) => (
          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px", borderBottom: i < newAccolades.length - 1 ? `1px solid ${C.border}` : "none" }}>
            <span style={{ fontSize: 18, lineHeight: 1.3 }}>{b.icon}</span>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
                {b.name} — <span style={{ color: b.tone === "bad" ? C.red : C.accent }}>{b.label}</span>
              </div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{b.desc}</div>
            </div>
          </div>
        ))}
      </Section>

      {/* Same Scores-tab MatchCard treatment as Recent Results above — see
         the comment there for why this skips the Section/card wrapper. */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>📅</span>Up Next</div>
        {upNext.length === 0
          ? <div style={{ ...s.card, padding: "14px", fontSize: 12, color: C.muted }}>No upcoming fixtures</div>
          : <div className="league-grid fixture-grid">{upNext.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} />)}</div>}
      </div>
    </div>
  );
}

function TeamsTab({ matches, view, setView }) {
  const bracketRef = React.useRef(null);
  // ── Hardcoded group assignments (A-L, 4 teams each) ─────────────────
  const GROUP_ASSIGNMENTS = {
    A: ["MEX","RSA","KOR","CZE"],
    B: ["CAN","BIH","QAT","SUI"],
    C: ["BRA","MAR","HAI","SCO"],
    D: ["USA","PAR","AUS","TUR"],
    E: ["GER","CUW","CIV","ECU"],
    F: ["NED","JPN","SWE","TUN"],
    G: ["BEL","EGY","IRN","NZL"],
    H: ["ESP","CPV","KSA","URU"],
    I: ["FRA","SEN","IRQ","NOR"],
    J: ["ARG","ALG","AUT","JOR"],
    K: ["POR","DRC","UZB","COL"],
    L: ["ENG","CRO","GHA","PAN"],
  };

  const groupMap = {};
  const groupTeams = {};
  Object.entries(GROUP_ASSIGNMENTS).forEach(([letter, teams]) => {
    groupTeams[letter] = new Set(teams);
    teams.forEach(t => { groupMap[t] = letter; });
  });

  const groups = Object.keys(GROUP_ASSIGNMENTS);

  // ── Owner lookup ──────────────────────────────────────────────────────
  const ownerOf = {};
  PLAYERS.forEach(p => {
    if (p.grimReaper) return;
    p.codes.forEach(c => { ownerOf[c] = p.name; });
  });

  // ── WDL + GD + Pts per team for group standings ───────────────────────
  const groupStats = {}; // tla → { w, d, l, gf, ga }
  matches.filter(m =>
    (m.stage||"").toUpperCase().includes("GROUP") &&
    (m.status === "FINISHED" || m.status === "IN_PLAY" || m.status === "PAUSED") &&
    m.score?.fullTime?.home != null
  ).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score.fullTime.home;
    const as_ = m.score.fullTime.away;
    if (!h || !a) return;
    if (!groupStats[h]) groupStats[h] = { w:0, d:0, l:0, gf:0, ga:0 };
    if (!groupStats[a]) groupStats[a] = { w:0, d:0, l:0, gf:0, ga:0 };
    groupStats[h].gf += hs; groupStats[h].ga += as_;
    groupStats[a].gf += as_; groupStats[a].ga += hs;
    if (hs > as_)      { groupStats[h].w++; groupStats[a].l++; }
    else if (as_ > hs) { groupStats[a].w++; groupStats[h].l++; }
    else               { groupStats[h].d++; groupStats[a].d++; }
  });

  const teamPts = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w * 3 + s.d;
  };
  const teamGD = (tla) => {
    const s = groupStats[tla] || { gf:0, ga:0 };
    return s.gf - s.ga;
  };
  const teamPlayed = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w + s.d + s.l;
  };

  // ── Projected "As it stands" Last 32 (BBC-style projection) ───────────
  // Only meaningful once every group has at least one finished match —
  // otherwise group order is arbitrary and the projection is misleading.
  const groupStandingsForProjection = {};
  groups.forEach(letter => {
    const teams = [...groupTeams[letter]].sort((a, b) => {
      const pd = teamPts(b) - teamPts(a);
      if (pd !== 0) return pd;
      const gd = teamGD(b) - teamGD(a);
      if (gd !== 0) return gd;
      return (groupStats[b]?.gf||0) - (groupStats[a]?.gf||0);
    });
    groupStandingsForProjection[letter] = teams.map(tla => ({
      tla,
      pts: teamPts(tla),
      gd: teamGD(tla),
      gf: groupStats[tla]?.gf || 0,
    }));
  });
  const allGroupsHaveStarted = groups.every(letter =>
    groupStandingsForProjection[letter].some(t => teamPlayed(t.tla) > 0)
  );
  const r32Projection = allGroupsHaveStarted
    ? projectR32(groupStandingsForProjection)
    : { ready: false, fixtures: [] };

  // ── Sweepstake scoring data ──────────────────────────────────────────
  const grpPts = deriveGroupPts(matches);

  // ── Knockout bracket data ─────────────────────────────────────────────
  // Build map: team tla → highest stage reached
  const { stageReached, eliminated, winners } = deriveStages(matches);

  // Build map: knockout match id → { home, away, homeScore, awayScore, status, winner }
  const koMatches = {};
  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home;
    const as_ = m.score?.fullTime?.away;
    const pen = m.score?.penalties;
    let winner = null;
    if (hs != null && as_ != null) {
      if (hs > as_) winner = h;
      else if (as_ > hs) winner = a;
      else if (pen) winner = pen.home > pen.away ? h : a;
    }
    koMatches[m.id] = { id: m.id, home: h, away: a, homeScore: hs, awayScore: as_, status: m.status, winner, stage: (m.stage||"").toUpperCase(), date: m.utcDate };
  });

  // Sort knockout matches by date for sequential numbering per round
  const koByStage = {};
  Object.values(koMatches).forEach(m => {
    if (!koByStage[m.stage]) koByStage[m.stage] = [];
    koByStage[m.stage].push(m);
  });
  Object.keys(koByStage).forEach(s => koByStage[s].sort((a,b) => new Date(a.date) - new Date(b.date)));

  // Helper: get team name from tla
  const teamName = (tla) => {
    if (!tla) return null;
    const m = matches.find(m => m.homeTeam?.tla?.toUpperCase() === tla || m.awayTeam?.tla?.toUpperCase() === tla);
    if (!m) return tla;
    if (m.homeTeam?.tla?.toUpperCase() === tla) return m.homeTeam.name;
    return m.awayTeam.name;
  };

  // ── Render helpers ─────────────────────────────────────────────────────
  const TeamRow = ({ tla, rank }) => {
    if (!tla) return null;
    const name = teamName(tla) || tla;
    const owner = ownerOf[tla];
    const pot = POT[tla] ? `P${POT[tla]}` : null;
    const flagUrl = flag(tla);
    const isElim = !!eliminated[tla];
    const s = groupStats[tla] || { w:0, d:0, l:0, gf:0, ga:0 };
    const played = s.w + s.d + s.l;
    const leaguePts = s.w * 3 + s.d;
    // Sweepstake pts: group stage wins + draws scored by this team
    const swPts = (grpPts[tla] || 0) + (stageReached[tla] && stageReached[tla] !== "GROUP_ELIM" ? ptsTotal(tla, stageReached[tla]) : 0) + (eliminated[tla] === "GROUP_ELIM" ? ptsTotal(tla, "GROUP_ELIM") : 0);
    return (
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 12px",
        borderBottom: `1px solid ${C.border}`, opacity: isElim ? 0.45 : 1 }}>
        {rank && <span style={{ fontSize:12, color:C.muted, width:16, textAlign:"right", flexShrink:0 }}>{rank}</span>}
        {flagUrl
          ? <img src={flagUrl} alt={tla} {...flagHandlers(tla, 23)} style={{ width:34, height:23, objectFit:"cover", borderRadius:2, flexShrink:0 }} />
          : <span style={{ fontSize:14 }}>{tla}</span>}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, color:C.text, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{owner || "—"}</div>
          <div style={{ fontSize:11, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{name}{pot ? ` (${pot})` : ""}</div>
        </div>
        {played > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:0, flexShrink:0 }}>
            <span style={{ fontSize:11, color:C.muted, width:80, textAlign:"center" }}>{s.w}W {s.d}D {s.l}L</span>
            <span style={{ fontSize:12, fontWeight:600, color:C.text, width:28, textAlign:"center" }}>{leaguePts}</span>
            <span style={{ fontSize:12, fontWeight:700, color:C.accent, width:36, textAlign:"right" }}>+{swPts}</span>
          </div>
        ) : (
          <div style={{ width:144 }} />
        )}
      </div>
    );
  };

  const BracketSlot = ({ tla, matchNum, side, score, isWinner, status }) => {
    const name = tla ? (teamName(tla) || tla) : null;
    const owner = tla ? ownerOf[tla] : null;
    const pot = tla && POT[tla] ? `P${POT[tla]}` : null;
    const flagUrl = tla ? flag(tla) : null;
    const isLive = status === "IN_PLAY" || status === "PAUSED";
    const label = tla ? null : (matchNum ? `W Match ${matchNum}` : "TBD");
    // Grey out a team once it's been knocked out of this round (loser of a completed match)
    const isElim = tla && eliminated[tla] && score != null && !isWinner;
    return (
      <div style={{
        display:"flex", alignItems:"center", gap:7,
        padding:"4px 8px", height:38, boxSizing:"border-box", minWidth:0, overflow:"hidden",
        borderBottom: side === "home" ? `1px solid ${C.border}` : "none",
        background: isWinner ? "rgba(34,197,94,0.08)" : "transparent",
        opacity: isElim ? 0.45 : 1,
      }}>
        {tla && flagUrl
          ? <img src={flagUrl} alt={tla} {...flagHandlers(tla, 15)} style={{ width:22, height:15, objectFit:"cover", borderRadius:1, flexShrink:0 }} />
          : <div style={{ width:22, height:15, background:C.border, borderRadius:1, flexShrink:0 }} />}
        {tla ? (
          <div style={{ flex:1, minWidth:0, overflow:"hidden" }}>
            <div style={{ fontSize:12, fontWeight:700, color: isWinner ? C.accent : C.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {owner || "—"}
            </div>
            <div style={{ fontSize:10, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {name}{pot ? ` (${pot})` : ""}
            </div>
          </div>
        ) : (
          <span style={{ fontSize:11, color:C.muted, flex:1 }}>{label}</span>
        )}
        {score != null && (
          <span style={{ fontSize:13, fontWeight:700, color: isWinner ? C.accent : C.dim, flexShrink:0, marginLeft:2 }}>
            {score}{isLive ? <span style={{color:C.red,fontSize:9}}> ●</span> : ""}
          </span>
        )}
      </div>
    );
  };

  const BracketMatch = ({ match, matchNum }) => {
    if (!match) {
      // Placeholder
      return (
        <div style={{ border:`1px solid ${C.border}`, borderRadius:6, overflow:"hidden", minWidth:180, height:76, boxSizing:"border-box", background:C.card }}>
          <BracketSlot tla={null} matchNum={matchNum} side="home" />
          <BracketSlot tla={null} matchNum={matchNum ? matchNum + 0.1 : null} side="away" />
        </div>
      );
    }
    const { home, away, homeScore, awayScore, status, winner } = match;
    const hasScore = homeScore != null && awayScore != null;
    const isProjected = status === "PROJECTED";
    return (
      <div style={{
        border: `1px ${isProjected ? "dashed" : "solid"} ${winner ? C.accent+"44" : (isProjected ? C.muted+"66" : C.border)}`,
        borderRadius:6, overflow:"hidden", minWidth:180, height:76, boxSizing:"border-box", background:C.card,
        opacity: isProjected ? 0.85 : 1,
      }}>
        <BracketSlot tla={home} side="home" score={hasScore ? homeScore : null} isWinner={winner === home} status={status} />
        <BracketSlot tla={away} side="away" score={hasScore ? awayScore : null} isWinner={winner === away} status={status} />
      </div>
    );
  };

  // ── Bracket round renderer ─────────────────────────────────────────────
  const BracketRound = ({ label, matches: rMatches, startNum }) => (
    <div style={{ display:"flex", flexDirection:"column", gap:0, minWidth:180 }}>
      <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>{label}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {rMatches.map((m, i) => (
          <BracketMatch key={i} match={m} matchNum={startNum ? startNum + i : null} />
        ))}
      </div>
    </div>
  );

  // Build bracket rounds — R32 → R16 → QF → SF → F
  const r32 = koByStage["LAST_32"] || [];
  // The real API publishes Last 32 fixtures as placeholders (null teams) the
  // moment the schedule skeleton exists — long before the draw is actually
  // known. Only treat R32 as "real" once at least one match has resolved teams.
  const r32HasResolvedTeams = r32.some(m => m.home && m.away);
  const r16 = koByStage["LAST_16"] || [];
  const qf  = koByStage["QUARTER_FINALS"] || [];
  const sf  = koByStage["SEMI_FINALS"] || [];
  const fin = koByStage["FINAL"] || [];

  // Pad arrays so visual alignment works
  const pad = (arr, len) => { while (arr.length < len) arr.push(null); return arr; };

  const C_local = C; // capture in closure

  return (
    <div style={{ paddingBottom:20 }}>
      {/* ── GROUPS ──────────────────────────────────────────────── */}
      {view === "groups" && (
        <div style={{ display:"flex", flexDirection:"column", gap:10, padding:"0 12px 20px" }}>
          {groups.map(letter => {
            const teams = [...groupTeams[letter]].sort((a, b) => {
              const pd = teamPts(b) - teamPts(a);
              if (pd !== 0) return pd;
              const gd = teamGD(b) - teamGD(a);
              if (gd !== 0) return gd;
              return (groupStats[b]?.gf||0) - (groupStats[a]?.gf||0);
            });
            return (
              <div key={letter} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, overflow:"hidden" }}>
                <div style={{ padding:"8px 12px", background:C.surface, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, fontWeight:700, color:C.accent, letterSpacing:1 }}>GROUP {letter}</span>
                  <div style={{ display:"flex", gap:0, flexShrink:0 }}>
                    <span style={{ fontSize:10, color:C.muted, width:80, textAlign:"center" }}>W  D  L</span>
                    <span style={{ fontSize:10, color:C.muted, width:28, textAlign:"center" }}>Pts</span>
                    <span style={{ fontSize:10, color:C.accent, width:36, textAlign:"right" }}>+SW</span>
                  </div>
                </div>
                {teams.map((tla, i) => (
                  <TeamRow key={tla} tla={tla} rank={teamPlayed(tla) > 0 ? i+1 : null} />
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* ── KNOCKOUT ────────────────────────────────────────────── */}
      {view === "knockout" && (
        <>
          {(r32.length === 0 && r16.length === 0 && qf.length === 0 && sf.length === 0 && fin.length === 0) ? (
            <div style={{ textAlign:"center", color:C.muted, fontSize:13, padding:"60px 20px" }}>Knockout stage hasn't started yet</div>
          ) : (() => {
            // ── Absolute-positioned bracket so each round's match sits at the
            // vertical midpoint of its two feeder matches (real bracket look) ──
            const MATCH_H = 76;   // height of a single match card (two-line owner+team layout)
            const R32_GAP = 12;   // gap between consecutive R32 matches
            const SLOT = MATCH_H + R32_GAP; // vertical slot per R32 match

            const allRounds = [
              { key: "r32", label: r32HasResolvedTeams ? "Last 32" : "Last 32 (Projected)",
                data: r32HasResolvedTeams
                  ? pad([...r32], 16)
                  : (r32Projection.ready
                      ? pad(r32Projection.fixtures.map(f => ({
                          home: f.home?.tla || null,
                          away: f.away?.tla || null,
                          homeScore: null, awayScore: null, status: "PROJECTED", winner: null,
                        })), 16)
                      : pad([], 16)) },
              { key: "r16", label: "Last 16",       data: pad([...r16], 8)  },
              { key: "qf",  label: "Quarter Final", data: pad([...qf], 4)   },
              { key: "sf",  label: "Semi Final",    data: pad([...sf], 2)   },
              { key: "fin", label: "🏆 Final",       data: pad([...fin], 1)  },
            ];

            // Always show all 5 rounds — even before any fixtures exist for a round,
            // so the full bracket shape (with TBD placeholders) is always visible.
            const activeRounds = allRounds;

            // Total height based on R32 slot count (16 matches)
            const totalHeight = 16 * SLOT - R32_GAP;

            // Compute top offset for match i in a round, given round index (0=R32, 1=R16, ...)
            const slotsPerMatch = (roundIdx) => Math.pow(2, roundIdx) * SLOT;
            const topFor = (roundIdx, matchIdx) => {
              const s = slotsPerMatch(roundIdx);
              return s * matchIdx + (s - MATCH_H) / 2;
            };

            return (
              <>
              <HScrollButtons targetRef={bracketRef} step={196} />
              <div ref={bracketRef} style={{ overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:8 }}>
                <div style={{ display:"flex", gap:16, padding:"0 12px 8px", alignItems:"flex-start", width:"max-content" }}>
                  {activeRounds.map((round, idx) => (
                    <div key={round.key} style={{ display:"flex", flexDirection:"column", minWidth:180 }}>
                      <div style={{ fontSize:10, fontWeight:700, color: round.key === "fin" ? C.accent : C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>
                        {round.label}
                      </div>
                      <div style={{ position:"relative", height: totalHeight, width:180 }}>
                        {round.data.map((m, i) => (
                          <div key={i} style={{ position:"absolute", top: topFor(idx, i), left:0, right:0, height:MATCH_H }}>
                            <BracketMatch match={m} matchNum={round.key === "r32" ? i+1 : null} />
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              </>
            );
          })()}
        </>
      )}
    </div>
  );
}

function App() {
  const [matches,     setMatches]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [tab,         setTab]         = useState("home");
  const [leagueView,  setLeagueView]  = useState("league"); // "league" | "groups" | "knockout"
  const [showRace,    setShowRace]    = useState(false);
  const [showInfo,    setShowInfo]    = useState(false); // Rules & Info dialog (over current tab)
  const [countdown, setCountdown] = useState("");
  const [selectedDay, setSelectedDay] = useState(null); // null = default to "today", clamped to the tournament's match range
  const matchesRef = React.useRef(matches);
  React.useEffect(() => { matchesRef.current = matches; }, [matches]);
  React.useEffect(() => {
    const tick = () => {
      const next = matchesRef.current.filter(m => m.status === "SCHEDULED" || m.status === "TIMED").sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate))[0];
      if (!next) { setCountdown(""); return; }
      const diff = new Date(next.utcDate) - new Date();
      if (diff <= 0) { setCountdown("Starting now!"); return; }
      const h = Math.floor(diff / 3600000);
      const mn = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      setCountdown(`${h}h ${String(mn).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [refreshing,  setRefreshing]  = useState(false);
  const [devMode,     setDevMode]     = useState(DEV_MODE_DEFAULT);
  const devModeRef = React.useRef(DEV_MODE_DEFAULT);
  const [copied,      setCopied]      = useState(false);
  const [goalFlash,   setGoalFlash]   = useState(false);
  const [goalInfo,    setGoalInfo]    = useState(null);
  const prevScoresRef = React.useRef({});
  const [barsVisible, setBarsVisible] = useState(true);
  const lastScrollY = React.useRef(0);
  const barLockRef = React.useRef(0);

  const fetchMatches = useCallback(async (isManual = false, forceDev = null) => {
    if (isManual) setRefreshing(true);
    const useDev = forceDev !== null ? forceDev : devMode;
    if (useDev) {
      setMatches(MOCK_MATCHES);
      setLastUpdated(new Date());
      setLoading(false);
      setRefreshing(false);
      return;
    }
    try {
      const res  = await fetch(`${WORKER_URL}/competitions/${WC_CODE}/matches?season=${SEASON}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      // football-data.org's live 2026 World Cup API uses FIFA's official "COD"
      // code for DR Congo (ISO 3166-1 alpha-3, "Congo-Kinshasa"), but every
      // other part of this app — PLAYERS, POT, FLAG_ISO — was built using
      // "DRC". Normalizing COD -> DRC here, at the single point match data
      // enters the app, means every downstream lookup (ownerOf, flag, POT,
      // scoring) keeps working unchanged rather than needing 25+ individual
      // call sites updated. If other real-API-vs-our-data code mismatches
      // turn up later, add them here following the same pattern.
      const normalizeTla = (team) => {
        if (team?.tla?.toUpperCase() === "COD") return { ...team, tla: "DRC" };
        return team;
      };
      const normalizedMatches = (data.matches || []).map(m => ({
        ...m,
        homeTeam: normalizeTla(m.homeTeam),
        awayTeam: normalizeTla(m.awayTeam),
      }));
      setMatches(normalizedMatches);
      setLastUpdated(new Date());
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => {
    fetchMatches();
    const id = setInterval(() => { if (!devModeRef.current) fetchMatches(); }, 60_000);
    return () => clearInterval(id);
  }, [fetchMatches]);

  useEffect(() => {
    if (showInfo && !isDesktop) {
      const prevOverflow = document.body.style.overflow;
      document.body.style.overflow = "hidden";
      return () => { document.body.style.overflow = prevOverflow; };
    }
  }, [showInfo, isDesktop]);

  // Escape closes whichever modal/pop-over is open — keyboard users
  // otherwise have no way to dismiss them at all.
  useEffect(() => {
    const onKeyDown = (e) => {
      if (e.key !== "Escape") return;
      setSelectedPlayer(null);
      setShowRace(false);
      setShowInfo(false);
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, []);

  useEffect(() => {
    const handleScroll = () => {
      const y = window.scrollY;
      // Near the top: always show the full header.
      if (y < 48) { lastScrollY.current = y; setBarsVisible(true); return; }
      // Cooldown after a toggle. Collapsing the title changes page height, which
      // fires extra scroll events; without this guard they fight the toggle and
      // the bar flickers "between states" on slow scroll.
      if (Date.now() < barLockRef.current) { lastScrollY.current = y; return; }
      const diff = y - lastScrollY.current;
      // Dead zone: ignore small moves and DON'T reset the anchor, so slow scroll
      // accumulates until it clearly passes the threshold instead of toggling
      // on every pixel.
      if (Math.abs(diff) < 12) return;
      lastScrollY.current = y;
      setBarsVisible(prev => {
        const next = diff < 0; // scrolling up => show, down => hide
        if (next !== prev) barLockRef.current = Date.now() + 220;
        return next;
      });
    };
    window.addEventListener("scroll", handleScroll, { passive: true });
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  // Expose the sticky header's height as --hdr-h so the desktop chart/bracket
  // scroll buttons can pin (sticky) just below it instead of scrolling away.
  React.useEffect(() => {
    const el = document.getElementById("appHeader");
    if (!el) return;
    const setH = () => document.documentElement.style.setProperty("--hdr-h", el.offsetHeight + "px");
    setH();
    const ro = new ResizeObserver(setH);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const ranked   = scorePlayers(matches);
  const rank24hChange = compute24hRankChange(matches, ranked);
  const rank24hPtsChange = typeof compute24hPtsChange === "function" ? compute24hPtsChange(matches, ranked) : new Map();
  const prevRankedRef = React.useRef({});
  const cardRefsMap = React.useRef({});
  const pendingAnimRef = React.useRef({}); // { playerName: deltaY }

  React.useEffect(() => {
    // Store pending animations — don't play yet
    ranked.forEach((p, newIdx) => {
      const prevIdx = prevRankedRef.current[p.name];
      if (prevIdx !== undefined && prevIdx !== newIdx) {
        const el = cardRefsMap.current[p.name];
        if (el) {
          const rowH = el.offsetHeight + 10;
          const delta = (prevIdx - newIdx) * rowH;
          pendingAnimRef.current[p.name] = delta;
          // Pre-position the card at its old visual spot
          el.style.transition = "none";
          el.style.transform = `translateY(${delta}px)`;
        }
      }
    });
    const newMap = {};
    ranked.forEach((p, i) => { newMap[p.name] = i; });
    prevRankedRef.current = newMap;

    // Set up IntersectionObserver to play animation when card scrolls into view
    const observers = [];
    Object.entries(pendingAnimRef.current).forEach(([name, delta]) => {
      const el = cardRefsMap.current[name];
      if (!el || delta === 0) return;
      const obs = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) {
          requestAnimationFrame(() => {
            el.style.transition = "transform 0.6s cubic-bezier(0.34,1.2,0.64,1)";
            el.style.transform = "translateY(0)";
          });
          delete pendingAnimRef.current[name];
          obs.disconnect();
        }
      }, { threshold: 0.1 });
      obs.observe(el);
      observers.push(obs);
    });
    return () => observers.forEach(o => o.disconnect());
  }, [ranked]);
  const { history: bumpHistoryMap, bucketLabels } = deriveHistory(matches);
  // Guard against a stale scoring.js (e.g. index.html deployed but scoring.js
  // not re-uploaded) — falling back to [] keeps the app alive (the bar race just
  // won't grey out flags progressively) instead of crashing to a blank screen.
  const raceElim = React.useMemo(
    () => (typeof deriveRaceEliminations === "function" ? deriveRaceEliminations(matches) : []),
    [matches]
  );
  const live     = matches.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED" ||
    ((m.status === "SCHEDULED" || m.status === "TIMED") && new Date() > new Date(m.utcDate)));
  const upcoming = matches.filter(m => m.status === "SCHEDULED" || m.status === "TIMED");
  const matchPtsById = React.useMemo(
    () => (typeof deriveMatchPts === "function" ? deriveMatchPts(matches) : {}),
    [matches]
  );

  // ── Scores day strip ── every calendar day spanned by the tournament's
  // matches, so browsing reveals "no matches" days rather than skipping them.
  const scoreDays = React.useMemo(() => {
    if (matches.length === 0) return [];
    const dates = matches.map(m => new Date(m.utcDate));
    const start = new Date(Math.min(...dates));
    const end = new Date(Math.max(...dates));
    start.setHours(0,0,0,0);
    end.setHours(0,0,0,0);
    const days = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d));
    return days;
  }, [matches]);
  const today = new Date(); today.setHours(0,0,0,0);
  const defaultScoreDay = scoreDays.length === 0 ? today
    : today < scoreDays[0] ? scoreDays[0]
    : today > scoreDays[scoreDays.length - 1] ? scoreDays[scoreDays.length - 1]
    : today;
  const effectiveScoreDay = selectedDay || defaultScoreDay;
  const dayMatches = matches
    .filter(m => sameDay(new Date(m.utcDate), effectiveScoreDay))
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  // Detect goals — compare current scores to previous refresh, and capture
  // WHICH team scored so the GOAL! overlay can show the flag + owner name.
  React.useEffect(() => {
    let info = null;
    live.forEach(m => {
      const key = m.id;
      const h = m.score?.fullTime?.home ?? 0;
      const a = m.score?.fullTime?.away ?? 0;
      const prev = prevScoresRef.current[key];
      if (prev) {
        if (h > prev.h) {
          const code = m.homeTeam?.tla?.toUpperCase();
          info = { code, team: m.homeTeam?.name, owner: ownerOf(code, ranked) };
        } else if (a > prev.a) {
          const code = m.awayTeam?.tla?.toUpperCase();
          info = { code, team: m.awayTeam?.name, owner: ownerOf(code, ranked) };
        }
      }
      prevScoresRef.current[key] = { h, a };
    });
    if (info) {
      setGoalInfo(info);
      setGoalFlash(true);
      setTimeout(() => setGoalFlash(false), 2500);
    }
  }, [matches]);

  const winPct = React.useMemo(() => {
    if (matches.length === 0) return { players:{}, teams:{} };
    return simulateWinProbability(ranked, matches, 5000);
  }, [matches]);
  // Must come AFTER winPct — computeBadges reads winPct.players (The Prophecy badge).
  const badges = React.useMemo(() => computeBadges(ranked, matches, rank24hChange, winPct.players), [matches]);
  const isDesktop = window.innerWidth >= 768;

  // Main-nav icons — defined once here so desktop (flat Sweeps/Groups/
  // Knockouts) and mobile (single League item, nested toggle) can share
  // the ones that appear on both without duplicating the SVG markup.
  const navIconHome = (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active ? "white" : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 11l9-7 9 7" />
      <path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9" />
      <path d="M10 20v-6h4v6" />
    </svg>

        {/* Sweeps/Groups/Knockouts toggle (mobile League tab) — stays a child
           of #appHeader, in normal flow right after the banner, rather than
           a separately-positioned sticky element. A JS-measured separate
           sticky block (tracking the header's height via --hdr-h) was tried
           first so the header's own border could end at the banner instead
           of after this toggle, but that measurement lags a frame or two
           behind the title row's collapse/expand CSS transition, briefly
           exposing a sliver of card content in the gap. Reverted: the border
           now lives on the banner's own div instead (see the live/next-match
           banners above), so this toggle can stay safely inside the single
           rigid sticky header box with zero risk of a seam. */}
        {tab === "table" && !loading && !isDesktop && (
          <div className="sweeps-nav">
            <div className="sweeps-seg">
              {[["league","Sweeps"],["groups","Groups"],["knockout","Knockouts"]].map(([id, label]) => (
                <button key={id} onClick={() => setLeagueView(id)} style={{
                  background: leagueView === id ? C.accent : "transparent",
                  color: leagueView === id ? "#000" : C.muted,
                  fontSize:13, fontWeight: leagueView === id ? 700 : 400,
                }}>{label}</button>
              ))}
            </div>
          </div>
        )}
        {tab === "scores" && !loading && scoreDays.length > 0 && (
          <div className="sweeps-nav">
            <DayPicker days={scoreDays} selected={effectiveScoreDay} onSelect={setSelectedDay} />
          </div>
        )}
        {tab === "race" && !loading && (
          <div className="sweeps-nav">
            <button onClick={() => setShowRace(true)} style={{
              width:"100%", padding:"12px", borderRadius:10, border:"none", cursor:"pointer",
              background:"linear-gradient(135deg, #15803d, #22c55e)",
              color:"#fff", fontSize:13, fontWeight:800, letterSpacing:"0.03em",
              boxShadow:"0 2px 12px rgba(34,197,94,0.30)",
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            }}>
              🏁 Watch the Race
            </button>
          </div>
        )}
      </div>

      {/* Duplicate "fake sticky" live strips removed — the live banner now stays
         pinned inside the sticky header itself (only the title row collapses on
         scroll-down), so no separate fixed-position copies are needed. */}

      {/* ── Bottom nav ── */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0,
        background:C.bg, borderTop:`1px solid ${C.border}`,
        display:"flex", zIndex:30,
        paddingBottom:"env(safe-area-inset-bottom)",
        maxWidth:620, margin:"0 auto",
        transform: barsVisible ? "translateY(0)" : "translateY(100%)",
        transition: "transform 0.25s ease",
      }}>
        {(isDesktop ? [
          ["home", "Home", navIconHome],
          // Desktop has room to flatten League's Sweeps/Groups/Knockouts
          // into three direct destinations instead of a tab + inline toggle.
          ["table-sweeps",   "Sweeps",    navIconTable],
          ["table-groups",   "Groups",    navIconGroups],
          ["table-knockout", "Knockouts", navIconKnockout],
          ["scores", "Scores", navIconScores],
          ["race", "The Race", navIconRace],
          ["info", "Rules & Info", navIconInfo],
        ] : [
          ["home", "Home", navIconHome],
          ["table", "League", navIconTable],
          ["scores", "Scores", navIconScores],
          ["race", "The Race", navIconRace],
          ["info", "Rules & Info", navIconInfo],
        ]).map(([id, label, renderIcon]) => {
          // Rules & Info: a real tab on DESKTOP (sidebar nav, no pop-over);
          // a pop-over dialog on MOBILE (highlighted while open).
          // table-sweeps/groups/knockout (desktop only) need both tab AND
          // leagueView to match, since they all share tab === "table".
          // Other items just switch tab and dismiss any open mobile dialog.
          let active, onNav;
          if (id === "info") {
            active = isDesktop ? tab === "info" : showInfo;
            onNav = isDesktop ? () => { setShowInfo(false); setTab("info"); } : () => setShowInfo(true);
          } else if (id === "table-sweeps" || id === "table-groups" || id === "table-knockout") {
            const view = id === "table-sweeps" ? "league" : id === "table-groups" ? "groups" : "knockout";
            active = tab === "table" && leagueView === view;
            onNav = () => { setShowInfo(false); setSelectedPlayer(null); setTab("table"); setLeagueView(view); };
          } else {
            active = tab === id && !(showInfo && !isDesktop);
            onNav = () => {
              setShowInfo(false);
              setSelectedPlayer(null);
              setTab(id);
              if (id === "table") setLeagueView("league");    // League always opens on Sweeps
              if (id === "scores") setSelectedDay(null);       // Scores always opens on Today
            };
          }
          return (
            <button key={id} data-active={active} onClick={onNav} style={{ flex:1, padding:"14px 4px 12px", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:5, WebkitTapHighlightColor:"transparent" }}>
              <div style={{
                padding:"8px 20px", borderRadius:20,
                background: active ? C.accent : "transparent",
                transition:"background 0.2s ease",
              }}>
                {renderIcon(active)}
              </div>
              <span style={{ fontSize:11, fontWeight: active ? 700 : 400, color: active ? C.text : C.muted }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* ── Desktop-only dev toggle (bottom-left of sidebar) ── */}
      <button className="desktop-dev"
        onClick={() => { const next = !devMode; devModeRef.current = next; setDevMode(next); setLoading(true); setTab("table"); setLeagueView("league"); setShowInfo(false); fetchMatches(false, next); }}
        aria-label="Toggle developer mode"
        style={{ background:"transparent", margin:0, color: devMode ? C.gold : "#2a4a33", border:`1px solid ${devMode ? C.gold : C.border}` }}>
        {devMode ? "DEV" : "···"}
      </button>

      {/* ── Body ── */}
      <div style={{ padding:"14px 14px 0" }}>

        {loading && (
          <div style={{ textAlign:"center", padding:48, color: C.muted }}>
            <div className="spinning" style={{ fontSize:24, marginBottom:12 }}>↻</div>
            <div style={{ fontSize:13 }}>Loading live data…</div>
          </div>
        )}

        {error && (
          <div style={{
            background:"#1a0a0a", border:`1px solid #7f1d1d`,
            borderRadius:8, padding:"12px 14px", color:C.dangerTextBright,
            fontSize:13, marginBottom:12,
          }}>
            ⚠️ {error}
            <div style={{ fontSize:11, color: C.muted, marginTop:4 }}>
              Check your Cloudflare Worker URL is set in WORKER_URL and the Worker is deployed.
            </div>
          </div>
        )}

        {/* ── TODAY (email-digest-style homepage) ── */}
        {tab === "home" && !loading && (
          <HomeTab matches={matches} ranked={ranked} badges={badges} rank24hChange={rank24hChange}
            rank24hPtsChange={rank24hPtsChange} matchPtsById={matchPtsById} upcoming={upcoming} setTab={setTab} />
        )}

        {/* ── LEAGUE TABLE ── */}
        {tab === "table" && !loading && (
          <>
            {leagueView === "league" && (
              <>
                {ranked.map((player, i) => {
                  const prev = ranked[i - 1];
                  const displayRank = i === 0 ? 1
                    : (player.total === prev.total && player.tiebreak === prev.tiebreak)
                      ? ranked[i-1]._displayRank
                      : i + 1;
                  player._displayRank = displayRank;
                  return (
                    <PlayerRow
                      key={player.name}
                      player={player}
                      rank={i}
                      displayRank={displayRank}
                      onOpen={() => setSelectedPlayer(player.name)}
                      badges={badges[player.name] || []}
                      rank24hChange={rank24hChange.get(player.name)}
                    />
                  );
                })}
              </>
            )}

            {(leagueView === "groups" || leagueView === "knockout") && (
              <TeamsTab matches={matches} view={leagueView} setView={setLeagueView} />
            )}
          </>
        )}
        {/* ── SCORES (combined day-by-day schedule + results, BBC-style day strip above) ── */}
        {tab === "scores" && !loading && (
          dayMatches.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No matches on this day</div>
            : <div className="league-grid fixture-grid">{dayMatches.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} pts={matchPtsById[m.id]} />)}</div>
        )}

        {/* ── THE RACE ── */}
        {tab === "race" && !loading && (
          <BumpChart history={ranked.map(p => ({ name: p.name, hist: bumpHistoryMap[p.name] || [0], total: p.total }))} allRanked={ranked} bucketLabels={bucketLabels} raceHistory={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} />
        )}

        {showRace && <BarRaceModal history={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} allRanked={ranked} bucketLabels={bucketLabels} elimByFrame={raceElim} onClose={() => setShowRace(false)} />}

        {/* ── RULES & INFO — desktop tab (sidebar-navigated), mobile pop-over ── */}
        {tab === "info" && isDesktop && !loading && (
          <div style={{ padding:"4px 2px 28px" }}>
            <InfoContent />
          </div>
        )}
        {showInfo && !isDesktop && (
          <div className="info-backdrop" onClick={() => setShowInfo(false)} style={{ position:"fixed", inset:0, zIndex:25, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,0.55)" }}>
          <div className="info-card" onClick={(e) => e.stopPropagation()} style={{ background:C.bg, display:"flex", flexDirection:"column", border:`1px solid ${C.border}`, boxShadow:"0 24px 64px rgba(0,0,0,0.55)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
              <div style={{ fontSize:15, fontWeight:800, color:C.text }}>Rules & Info</div>
              <button onClick={() => setShowInfo(false)} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:"16px 12px 96px" }}>
              <InfoContent />
            </div>
          </div>
          </div>
        )}

        {selectedPlayer && (() => {
          const idx = ranked.findIndex(x => x.name === selectedPlayer);
          const p = ranked[idx];
          if (!p) return null;
          return <PlayerModal player={p} displayRank={p._displayRank || (idx + 1)} winPct={winPct.players ? winPct.players[selectedPlayer] : 0} winTeams={winPct.teams} badges={badges[selectedPlayer] || []} onClose={() => setSelectedPlayer(null)} />;
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  const sw = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response(''))));
  `;
  const blob = new Blob([sw], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>
</body>
</html>
