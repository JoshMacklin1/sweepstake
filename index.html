// ─────────────────────────────────────────────────────────────────────────────
// KNOCKOUT BRACKET — shared by TeamsTab (knockout view) and HomeTab (section).
// Self-contained: derives all bracket data from `matches` + globals.
// ─────────────────────────────────────────────────────────────────────────────
function KnockoutBracket({ matches, onTeamClick, matchPtsById = {}, bracketRef: externalRef, homeMode = false }) {
  const internalRef = React.useRef(null);
  const bracketRef = externalRef || internalRef;

  // Owner lookup
  const ownerOf = {};
  PLAYERS.forEach(p => {
    if (p.grimReaper) return;
    p.codes.forEach(c => { ownerOf[c] = p.name; });
  });

  const teamName = (tla) => {
    if (!tla) return null;
    const m = matches.find(m => m.homeTeam?.tla?.toUpperCase() === tla || m.awayTeam?.tla?.toUpperCase() === tla);
    if (!m) return tla;
    return m.homeTeam?.tla?.toUpperCase() === tla ? m.homeTeam.name : m.awayTeam.name;
  };

  const { eliminated } = deriveStages(matches);

  // Build KO match map
  const koMatches = {};
  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home;
    const as_ = m.score?.fullTime?.away;
    const pen = m.score?.penalties;
    let winner = null;
    if (hs != null && as_ != null) {
      if (hs > as_) winner = h;
      else if (as_ > hs) winner = a;
      else if (pen) winner = pen.home > pen.away ? h : a;
    }
    koMatches[m.id] = { id: m.id, home: h, away: a, homeScore: hs, awayScore: as_, status: m.status, winner, stage: (m.stage||"").toUpperCase(), penHome: pen?.home ?? null, penAway: pen?.away ?? null };
  });

  const koByStage = {};
  Object.values(koMatches).forEach(m => {
    if (!koByStage[m.stage]) koByStage[m.stage] = [];
    koByStage[m.stage].push(m);
  });
  Object.keys(koByStage).forEach(st => koByStage[st].sort((a,b) => a.id - b.id));

  const r32 = koByStage["LAST_32"] || [];
  const r32HasResolvedTeams = r32.some(m => m.home && m.away);
  const r16Raw = koByStage["LAST_16"] || [];
  const qf  = koByStage["QUARTER_FINALS"] || [];
  const sf  = koByStage["SEMI_FINALS"] || [];
  const fin = koByStage["FINAL"] || [];

  const pad = (arr, len) => { while (arr.length < len) arr.push(null); return arr; };

  const r16 = (() => {
    const apiR16WithTeams = r16Raw.filter(m => m.home || m.away);
    if (apiR16WithTeams.length >= 8) return r16Raw;
    // Teams already allocated in real API r16 matches — don't project them into a second slot
    const allocatedInR16 = new Set();
    r16Raw.forEach(m => { if (m.home) allocatedInR16.add(m.home); if (m.away) allocatedInR16.add(m.away); });
    const projected = [];
    for (let i = 0; i < 16; i += 2) {
      const m1 = r32[i] || null;
      const m2 = r32[i + 1] || null;
      const slotIdx = i / 2;
      const apiSlot = r16Raw[slotIdx] || null;
      if (apiSlot && (apiSlot.home || apiSlot.away)) {
        projected.push(apiSlot);
      } else {
        const home = (m1?.winner && !allocatedInR16.has(m1.winner)) ? m1.winner : null;
        const away = (m2?.winner && !allocatedInR16.has(m2.winner)) ? m2.winner : null;
        projected.push((home || away) ? { home, away, homeScore: null, awayScore: null, status: "PROJECTED", winner: null } : null);
      }
    }
    return projected;
  })();

  if (r32.length === 0 && r16Raw.length === 0 && qf.length === 0 && sf.length === 0 && fin.length === 0) {
    return <div style={{ textAlign:"center", color:C.muted, fontSize:13, padding:"40px 20px" }}>Knockout stage hasn't started yet</div>;
  }

  const BracketSlot = ({ tla, matchNum, side, score, isWinner, status, pts }) => {
    const slotH = 38;
    const name = tla ? (teamName(tla) || tla) : null;
    const owner = tla ? ownerOf[tla] : null;
    const pot = tla && POT[tla] ? `P${potOf(tla)}` : null;
    const flagUrl = tla ? flag(tla) : null;
    const isLive = status === "IN_PLAY" || status === "PAUSED";
    const label = tla ? null : (matchNum ? `W Match ${matchNum}` : "TBD");
    const isElim = tla && eliminated[tla] && score != null && !isWinner;
    const clickable = onTeamClick && tla;
    return (
      <div className={clickable ? "player-card" : undefined}
        onClick={clickable ? () => onTeamClick(tla) : undefined}
        style={{
          display:"flex", alignItems:"center", gap:7,
          padding:"4px 8px", height:slotH, boxSizing:"border-box", minWidth:0, overflow:"hidden",
          borderBottom: side === "home" ? `1px solid ${C.border}` : "none",
          background: isWinner ? "rgba(34,197,94,0.08)" : "transparent",
          cursor: clickable ? "pointer" : "default",
        }}>
        {tla && flagUrl
          ? <div style={{ position:"relative", flexShrink:0, lineHeight:0 }}>
              <img src={flagUrl} alt={tla} {...flagHandlers(tla, 15)} style={{ width:22, height:15, objectFit:"cover", borderRadius:1, display:"block", opacity: isElim ? 0.45 : 1 }} />
              {isElim && <span style={{ position:"absolute", top:-2, right:-2, fontSize:9, fontWeight:900, color:C.red, textShadow:"0 0 2px rgba(0,0,0,0.9)", lineHeight:1, zIndex:1, pointerEvents:"none" }}>✕</span>}
            </div>
          : <div style={{ width:22, height:15, background:C.border, borderRadius:1, flexShrink:0 }} />}
        {tla ? (
          <div style={{ flex:1, minWidth:0, overflow:"hidden", opacity: isElim ? 0.45 : 1 }}>
            <div style={{ fontSize:12, fontWeight:700, color: isWinner ? C.accent : C.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{owner || "—"}</div>
            <div style={{ fontSize:10, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{name}{pot ? ` (${pot})` : ""}</div>
          </div>
        ) : (
          <span style={{ fontSize:11, color:C.muted, flex:1 }}>{label}</span>
        )}
        <div style={{ flexShrink:0, marginLeft:2, textAlign:"right" }}>
          {score != null && (
            <div style={{ fontSize:13, fontWeight:700, color: isWinner ? C.accent : C.dim, opacity: isElim ? 0.45 : 1, lineHeight:1 }}>
              {score}{isLive ? <span style={{color:C.red,fontSize:9}}> ●</span> : ""}
            </div>
          )}
          {pts > 0 && <div style={{ fontSize:9, fontWeight:800, color:C.accent, marginTop:1 }}>+{pts}pts</div>}
        </div>
      </div>
    );
  };

  const BracketMatch = ({ match, matchNum, compact }) => {
    const sizeStyle = compact ? {} : { minWidth:180 };
    if (!match) {
      return (
        <div style={{ border:`1px solid ${C.border}`, borderRadius:6, overflow:"hidden", ...sizeStyle, height:76, boxSizing:"border-box", background:C.card }}>
          <BracketSlot tla={null} matchNum={matchNum} side="home" />
          <BracketSlot tla={null} matchNum={matchNum ? matchNum + 0.1 : null} side="away" />
        </div>
      );
    }
    const { id, home, away, homeScore, awayScore, status, winner } = match;
    const hasScore = homeScore != null && awayScore != null;
    const isProjected = status === "PROJECTED";
    const mpts = id ? matchPtsById[id] : null;
    return (
      <div style={{
        border: `1px ${isProjected ? "dashed" : "solid"} ${winner ? C.accent+"44" : (isProjected ? C.muted+"66" : C.border)}`,
        borderRadius:6, overflow:"hidden", ...sizeStyle, height:76, boxSizing:"border-box", background:C.card,
        opacity: isProjected ? 0.85 : 1,
      }}>
        <BracketSlot tla={home} side="home" score={hasScore ? homeScore : null} isWinner={winner === home} status={status} pts={mpts?.home} />
        <BracketSlot tla={away} side="away" score={hasScore ? awayScore : null} isWinner={winner === away} status={status} pts={mpts?.away} />
      </div>
    );
  };

  const MATCH_H = 76;
  const R32_GAP = 12;
  const SLOT = MATCH_H + R32_GAP;
  const totalHeight = 16 * SLOT - R32_GAP;
  const slotsPerMatch = (roundIdx) => Math.pow(2, roundIdx) * SLOT;
  const topFor = (roundIdx, matchIdx) => { const sl = slotsPerMatch(roundIdx); return sl * matchIdx + (sl - MATCH_H) / 2; };

  const allRounds = [
    { key:"r32", label: r32HasResolvedTeams ? "Last 32" : "Last 32 (Projected)", data: pad([...r32], 16) },
    { key:"r16", label:"Last 16",       data: pad([...r16], 8) },
    { key:"qf",  label:"Quarter Final", data: pad([...qf], 4) },
    { key:"sf",  label:"Semi Final",    data: pad([...sf], 2) },
    { key:"fin", label:"🏆 Final",       data: pad([...fin], 1) },
  ];

  if (homeMode) {
    const activeStatuses = new Set(["IN_PLAY", "PAUSED", "SCHEDULED", "TIMED"]);
    let currentIdx = allRounds.findIndex(r => r.data.some(m => m && activeStatuses.has(m.status)));
    if (currentIdx === -1) {
      for (let i = allRounds.length - 1; i >= 0; i--) {
        if (allRounds[i].data.some(m => m && (m.home || m.away))) { currentIdx = i; break; }
      }
    }
    if (currentIdx === -1) currentIdx = 0;
    const nextIdx = Math.min(currentIdx + 1, allRounds.length - 1);
    const displayIndices = currentIdx === nextIdx ? [currentIdx] : [currentIdx, nextIdx];
    return (
      <div style={{ padding:"12px 12px 12px" }}>
        <div style={{ display:"flex", gap:12 }}>
          {displayIndices.map(globalIdx => {
            const round = allRounds[globalIdx];
            return (
              <div key={round.key} style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>
                <div style={{ fontSize:10, fontWeight:700, color: round.key === "fin" ? C.accent : C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>
                  {round.label}
                </div>
                <div style={{ position:"relative", height: totalHeight }}>
                  {round.data.map((m, i) => (
                    <div key={i} style={{ position:"absolute", top: topFor(globalIdx, i), left:0, right:0, height:MATCH_H }}>
                      <BracketMatch match={m} matchNum={round.key === "r32" ? i+1 : null} compact />
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <>
      <HScrollButtons targetRef={bracketRef} step={196} />
      <div ref={bracketRef} style={{ overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:8 }}>
        <div style={{ display:"flex", gap:16, padding:"0 12px 8px", alignItems:"flex-start", width:"max-content" }}>
          {allRounds.map((round, idx) => (
            <div key={round.key} style={{ display:"flex", flexDirection:"column", minWidth:180 }}>
              <div style={{ fontSize:10, fontWeight:700, color: round.key === "fin" ? C.accent : C.muted, textTransform:"uppercase", letterSpacing:1, padding:"0 4px 8px", textAlign:"center" }}>
                {round.label}
              </div>
              <div style={{ position:"relative", height: totalHeight, width:180 }}>
                {round.data.map((m, i) => (
                  <div key={i} style={{ position:"absolute", top: topFor(idx, i), left:0, right:0, height:MATCH_H }}>
                    <BracketMatch match={m} matchNum={round.key === "r32" ? i+1 : null} />
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function TeamsTab({ matches, view, setView, onTeamClick, matchPtsById = {} }) {
  const bracketRef = React.useRef(null);
  // ── Hardcoded group assignments (A-L, 4 teams each) ─────────────────
  const GROUP_ASSIGNMENTS = {
    A: ["MEX","RSA","KOR","CZE"],
    B: ["CAN","BIH","QAT","SUI"],
    C: ["BRA","MAR","HAI","SCO"],
    D: ["USA","PAR","AUS","TUR"],
    E: ["GER","CUW","CIV","ECU"],
    F: ["NED","JPN","SWE","TUN"],
    G: ["BEL","EGY","IRN","NZL"],
    H: ["ESP","CPV","KSA","URU"],
    I: ["FRA","SEN","IRQ","NOR"],
    J: ["ARG","ALG","AUT","JOR"],
    K: ["POR","DRC","UZB","COL"],
    L: ["ENG","CRO","GHA","PAN"],
  };

  const groupMap = {};
  const groupTeams = {};
  Object.entries(GROUP_ASSIGNMENTS).forEach(([letter, teams]) => {
    groupTeams[letter] = new Set(teams);
    teams.forEach(t => { groupMap[t] = letter; });
  });

  const groups = Object.keys(GROUP_ASSIGNMENTS);

  // ── Owner lookup ──────────────────────────────────────────────────────
  const ownerOf = {};
  PLAYERS.forEach(p => {
    if (p.grimReaper) return;
    p.codes.forEach(c => { ownerOf[c] = p.name; });
  });

  // ── WDL + GD + Pts per team for group standings ───────────────────────
  const groupStats = {}; // tla → { w, d, l, gf, ga }
  matches.filter(m =>
    (m.stage||"").toUpperCase().includes("GROUP") &&
    (m.status === "FINISHED" || m.status === "IN_PLAY" || m.status === "PAUSED") &&
    m.score?.fullTime?.home != null
  ).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score.fullTime.home;
    const as_ = m.score.fullTime.away;
    if (!h || !a) return;
    if (!groupStats[h]) groupStats[h] = { w:0, d:0, l:0, gf:0, ga:0 };
    if (!groupStats[a]) groupStats[a] = { w:0, d:0, l:0, gf:0, ga:0 };
    groupStats[h].gf += hs; groupStats[h].ga += as_;
    groupStats[a].gf += as_; groupStats[a].ga += hs;
    if (hs > as_)      { groupStats[h].w++; groupStats[a].l++; }
    else if (as_ > hs) { groupStats[a].w++; groupStats[h].l++; }
    else               { groupStats[h].d++; groupStats[a].d++; }
  });

  const teamPts = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w * 3 + s.d;
  };
  const teamGD = (tla) => {
    const s = groupStats[tla] || { gf:0, ga:0 };
    return s.gf - s.ga;
  };
  const teamPlayed = (tla) => {
    const s = groupStats[tla] || { w:0, d:0, l:0 };
    return s.w + s.d + s.l;
  };

  // ── Projected "As it stands" Last 32 (BBC-style projection) ───────────
  // Only meaningful once every group has at least one finished match —
  // otherwise group order is arbitrary and the projection is misleading.
  const groupStandingsForProjection = {};
  groups.forEach(letter => {
    const teams = [...groupTeams[letter]].sort((a, b) => {
      const pd = teamPts(b) - teamPts(a);
      if (pd !== 0) return pd;
      const gd = teamGD(b) - teamGD(a);
      if (gd !== 0) return gd;
      return (groupStats[b]?.gf||0) - (groupStats[a]?.gf||0);
    });
    groupStandingsForProjection[letter] = teams.map(tla => ({
      tla,
      pts: teamPts(tla),
      gd: teamGD(tla),
      gf: groupStats[tla]?.gf || 0,
    }));
  });
  const allGroupsHaveStarted = groups.every(letter =>
    groupStandingsForProjection[letter].some(t => teamPlayed(t.tla) > 0)
  );
  const r32Projection = allGroupsHaveStarted
    ? projectR32(groupStandingsForProjection)
    : { ready: false, fixtures: [] };

  // ── Sweepstake scoring data ──────────────────────────────────────────
  const grpPts = deriveGroupPts(matches);

  // ── Knockout bracket data (used by TeamRow for swPts) ────────────────
  const { stageReached, eliminated, winners } = deriveStages(matches);

  // Helper: get team name from tla
  const teamName = (tla) => {
    if (!tla) return null;
    const m = matches.find(m => m.homeTeam?.tla?.toUpperCase() === tla || m.awayTeam?.tla?.toUpperCase() === tla);
    if (!m) return tla;
    if (m.homeTeam?.tla?.toUpperCase() === tla) return m.homeTeam.name;
    return m.awayTeam.name;
  };

  // ── Render helpers ─────────────────────────────────────────────────────
  const TeamRow = ({ tla, rank }) => {
    if (!tla) return null;
    const name = teamName(tla) || tla;
    const owner = ownerOf[tla];
    const pot = POT[tla] ? `P${potOf(tla)}` : null;
    const flagUrl = flag(tla);
    const isElim = !!eliminated[tla];
    const s = groupStats[tla] || { w:0, d:0, l:0, gf:0, ga:0 };
    const played = s.w + s.d + s.l;
    const leaguePts = s.w * 3 + s.d;
    // Sweepstake pts: group stage wins + draws scored by this team
    const swPts = (grpPts[tla] || 0) + (stageReached[tla] && stageReached[tla] !== "GROUP_ELIM" ? ptsTotal(tla, stageReached[tla]) : 0) + (eliminated[tla] === "GROUP_ELIM" ? ptsTotal(tla, "GROUP_ELIM") : 0);
    return (
      <div className={onTeamClick ? "player-card" : undefined}
        onClick={onTeamClick ? () => onTeamClick(tla) : undefined}
        style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 12px",
          borderBottom: `1px solid ${C.border}`,
          cursor: onTeamClick ? "pointer" : "default" }}>
        {rank && <span style={{ fontSize:12, color:C.muted, width:16, textAlign:"right", flexShrink:0, opacity: isElim ? 0.45 : 1 }}>{rank}</span>}
        {flagUrl
          ? <div style={{ position:"relative", flexShrink:0, lineHeight:0 }}>
              <img src={flagUrl} alt={tla} {...flagHandlers(tla, 23)} style={{ width:34, height:23, objectFit:"cover", borderRadius:2, display:"block", opacity: isElim ? 0.45 : 1 }} />
              {isElim && <span style={{ position:"absolute", top:-1, right:-1, fontSize:11, fontWeight:900, color:C.red, textShadow:"0 0 2px rgba(0,0,0,0.9)", lineHeight:1, zIndex:1, pointerEvents:"none" }}>✕</span>}
            </div>
          : <span style={{ fontSize:14, opacity: isElim ? 0.45 : 1 }}>{tla}</span>}
        <div style={{ flex:1, minWidth:0, opacity: isElim ? 0.45 : 1 }}>
          <div style={{ fontSize:14, color:C.text, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{owner || "—"}</div>
          <div style={{ fontSize:11, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{name}{pot ? ` (${pot})` : ""}</div>
        </div>
        {played > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:0, flexShrink:0, opacity: isElim ? 0.45 : 1 }}>
            <span style={{ fontSize:11, color:C.muted, width:80, textAlign:"center" }}>{s.w}W {s.d}D {s.l}L</span>
            <span style={{ fontSize:12, fontWeight:600, color:C.text, width:28, textAlign:"center" }}>{leaguePts}</span>
            <span style={{ fontSize:12, fontWeight:700, color:C.accent, width:36, textAlign:"right" }}>+{swPts}</span>
          </div>
        ) : (
          <div style={{ width:144 }} />
        )}
      </div>
    );
  };


  return (
    <div style={{ paddingBottom:20 }}>
      {/* ── GROUPS ──────────────────────────────────────────────── */}
      {view === "groups" && (
        <div style={{ display:"flex", flexDirection:"column", gap:10, padding:"0 12px 20px" }}>
          {groups.map(letter => {
            const teams = [...groupTeams[letter]].sort((a, b) => {
              const pd = teamPts(b) - teamPts(a);
              if (pd !== 0) return pd;
              const gd = teamGD(b) - teamGD(a);
              if (gd !== 0) return gd;
              return (groupStats[b]?.gf||0) - (groupStats[a]?.gf||0);
            });
            return (
              <div key={letter} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, overflow:"hidden" }}>
                <div style={{ padding:"8px 12px", background:C.surface, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, fontWeight:700, color:C.accent, letterSpacing:1 }}>GROUP {letter}</span>
                  <div style={{ display:"flex", gap:0, flexShrink:0 }}>
                    <span style={{ fontSize:10, color:C.muted, width:80, textAlign:"center" }}>W  D  L</span>
                    <span style={{ fontSize:10, color:C.muted, width:28, textAlign:"center" }}>Pts</span>
                    <span style={{ fontSize:10, color:C.accent, width:36, textAlign:"right" }}>+SW</span>
                  </div>
                </div>
                {teams.map((tla, i) => (
                  <TeamRow key={tla} tla={tla} rank={teamPlayed(tla) > 0 ? i+1 : null} />
                ))}
              </div>
            );
          })}

          {/* ── 3rd-place ranking (BBC-style): top 8 of the twelve 3rd-placed
                 teams reach the Last 32. Provisional "as it stands". ── */}
          {allGroupsHaveStarted && (() => {
            const thirds = groups
              .map(letter => {
                const t = groupStandingsForProjection[letter]?.[2];
                return t ? { ...t, group: letter } : null;
              })
              .filter(Boolean)
              .sort((a, b) => (b.pts - a.pts) || (b.gd - a.gd) || (b.gf - a.gf));
            if (thirds.length === 0) return null;
            return (
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, overflow:"hidden", marginTop:4 }}>
                <div style={{ padding:"8px 12px", background:C.surface, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, fontWeight:700, color:C.accent, letterSpacing:1 }}>3RD PLACE RANKING</span>
                  <div style={{ display:"flex", gap:0, flexShrink:0 }}>
                    <span style={{ fontSize:10, color:C.muted, width:80, textAlign:"center" }}>W  D  L</span>
                    <span style={{ fontSize:10, color:C.muted, width:28, textAlign:"center" }}>Pts</span>
                    <span style={{ fontSize:10, color:C.accent, width:36, textAlign:"right" }}>+SW</span>
                  </div>
                </div>
                {thirds.map((t, i) => (
                  <React.Fragment key={t.tla}>
                    <div style={{ borderLeft:`3px solid ${i < 8 ? C.accent : "transparent"}` }}>
                      <TeamRow tla={t.tla} rank={i+1} />
                    </div>
                    {i === 7 && (
                      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px", background:"rgba(34,197,94,0.06)" }}>
                        <div style={{ flex:1, height:1, background:C.accent, opacity:0.4 }} />
                        <span style={{ fontSize:9, fontWeight:700, color:C.accent, letterSpacing:1, textTransform:"uppercase", flexShrink:0 }}>Last 32 cut-off</span>
                        <div style={{ flex:1, height:1, background:C.accent, opacity:0.4 }} />
                      </div>
                    )}
                  </React.Fragment>
                ))}
                <div style={{ padding:"8px 12px", fontSize:10, color:C.muted, lineHeight:1.45 }}>
                  Top 8 of the twelve 3rd-placed teams reach the Last 32 — ranked by Pts, then GD, then goals scored. Provisional &ldquo;as it stands&rdquo;.
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ── KNOCKOUT ────────────────────────────────────────────── */}
      {view === "knockout" && (
        <KnockoutBracket matches={matches} onTeamClick={onTeamClick} matchPtsById={matchPtsById} bracketRef={bracketRef} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// RULES & INFO content — shared by the desktop tab and the mobile pop-over
// ─────────────────────────────────────────────────────────────────────────────
// PUSH NOTIFICATIONS — settings block inside Rules & Info. Feature-detects
// and renders nothing if the browser/OS doesn't support the Push API (e.g.
// Safari on iOS unless installed to the home screen). Subscribe sends the
// device's push subscription + this device's active group + event-type
// prefs to the football-proxy Worker, which stores them in KV and sends a
// Web Push message whenever the cron job detects a kickoff/goal/full-time.
function PushNotificationsSection() {
  const supported = typeof window !== "undefined" && "serviceWorker" in navigator && "PushManager" in window;
  const [subscribed, setSubscribed] = useState(() => localStorage.getItem("sw_push_subscribed") === "yes");
  const [prefs, setPrefs] = useState(() => {
    try {
      return { goals: true, kickoff: true, fulltime: true, ...JSON.parse(localStorage.getItem("sw_notification_prefs")) };
    } catch {
      return { goals: true, kickoff: true, fulltime: true };
    }
  });
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const urlBase64ToUint8Array = (base64) => {
    const padded = base64.replace(/-/g, "+").replace(/_/g, "/").padEnd(base64.length + (4 - base64.length % 4) % 4, "=");
    return Uint8Array.from(atob(padded), c => c.charCodeAt(0));
  };

  const sendSubscription = async (sub, nextPrefs) => {
    const res = await fetch(`${WORKER_URL}/push/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ subscription: sub.toJSON(), prefs: nextPrefs, groupKey: localStorage.getItem(GROUP_STORAGE_KEY) }),
    });
    if (!res.ok) throw new Error("Couldn't reach the notification server.");
  };

  // Re-sync on every mount (App fully remounts after a group switch) so the
  // Worker's stored groupKey can't go stale — switching groups otherwise left
  // an existing subscription pointed at whichever group was active when the
  // device first subscribed, since "already subscribed" skips the normal
  // subscribe flow entirely. Runs unconditionally (before the `supported`
  // early return below) to satisfy the Rules of Hooks.
  useEffect(() => {
    if (!supported || !subscribed) return;
    (async () => {
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (!sub) {
          localStorage.removeItem("sw_push_subscribed");
          setSubscribed(false);
          return;
        }
        await sendSubscription(sub, prefs);
      } catch (e) {}
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  if (!supported) return null;

  const subscribe = async () => {
    setBusy(true); setError("");
    try {
      const permission = await Notification.requestPermission();
      if (permission !== "granted") throw new Error("Notification permission was denied.");
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      await sendSubscription(sub, prefs);
      localStorage.setItem("sw_push_subscribed", "yes");
      localStorage.setItem("sw_notification_prefs", JSON.stringify(prefs));
      setSubscribed(true);
    } catch (e) {
      setError(e.message || "Couldn't enable notifications.");
    } finally {
      setBusy(false);
    }
  };

  const unsubscribe = async () => {
    setBusy(true); setError("");
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await fetch(`${WORKER_URL}/push/unsubscribe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint: sub.endpoint }),
        }).catch(() => {});
        await sub.unsubscribe();
      }
      localStorage.removeItem("sw_push_subscribed");
      setSubscribed(false);
    } catch (e) {
      setError(e.message || "Couldn't disable notifications.");
    } finally {
      setBusy(false);
    }
  };

  const togglePref = async (key) => {
    const next = { ...prefs, [key]: !prefs[key] };
    setPrefs(next);
    localStorage.setItem("sw_notification_prefs", JSON.stringify(next));
    if (!subscribed) return;
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sendSubscription(sub, next);
    } catch (e) {}
  };

  return (
    <>
      <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8, marginTop:20 }}>Push Notifications</div>
      <div style={{ ...s.card, padding:"12px", marginBottom:6 }}>
        <button onClick={subscribed ? unsubscribe : subscribe} disabled={busy} style={{
          width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          padding:"12px", borderRadius:12, border:`1px solid ${subscribed ? C.accent : C.border}`,
          background: subscribed ? C.posBg : "transparent", color:C.text, fontSize:13, fontWeight:700,
          cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, marginBottom: subscribed ? 12 : 0,
        }}>
          {busy ? "Working…" : subscribed ? "🔔 Notifications enabled" : "🔕 Enable push notifications"}
        </button>
        {subscribed && (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {[["goals","⚽ Goals"],["kickoff","🟢 Kickoff"],["fulltime","🏁 Full time"]].map(([key, label]) => (
              <label key={key} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", fontSize:13, color:C.dim, cursor:"pointer" }}>
                {label}
                <input type="checkbox" checked={!!prefs[key]} onChange={() => togglePref(key)} />
              </label>
            ))}
          </div>
        )}
        {error && <div style={{ fontSize:11, color:C.dangerText, marginTop:8 }}>{error}</div>}
        <div style={{ fontSize:11, color:C.muted, marginTop:10, lineHeight:1.5 }}>
          On iPhone, push notifications only work from an installed app — tap Share → Add to Home Screen first, then enable from there.
        </div>
      </div>
    </>
  );
}

        border:`2px solid ${on ? C.accent : "rgba(255,255,255,0.3)"}`,
        position:"relative", cursor: busy ? "default" : "pointer",
        transition:"background 0.18s, border-color 0.18s",
        opacity: busy ? 0.6 : 1,
      }}
    >
      <div style={{
        position:"absolute", top:2, left: on ? 19 : 2,
        width:18, height:18, borderRadius:"50%",
        background:"white", transition:"left 0.18s",
        boxShadow:"0 1px 3px rgba(0,0,0,0.35)",
      }} />
    </div>
  );
}

function MoreMenu({ devMode, onToggleDevMode, onTakeTour, onViewRules, onSwitchGroup, onClose, isAdmin = false }) {
  const supported = typeof window !== "undefined" && "serviceWorker" in navigator && "PushManager" in window;
  const [pushOn,   setPushOn]   = useState(() => localStorage.getItem("sw_push_subscribed") === "yes");
  const [pushBusy, setPushBusy] = useState(false);
  const [pushErr,  setPushErr]  = useState("");
  const [closing,  setClosing]  = React.useState(false);
  const closingRef = React.useRef(false);
  const triggerClose = () => {
    if (closingRef.current) return;
    closingRef.current = true;
    setClosing(true);
    setTimeout(onClose, 250);
  };
  const isMobile = window.innerWidth < 768;

  const urlBase64ToUint8Array = (b64) => {
    const padded = b64.replace(/-/g,"+").replace(/_/g,"/").padEnd(b64.length+(4-b64.length%4)%4,"=");
    return Uint8Array.from(atob(padded), c => c.charCodeAt(0));
  };

  const togglePush = async () => {
    if (pushBusy) return;
    setPushBusy(true); setPushErr("");
    try {
      if (!pushOn) {
        const perm = await Notification.requestPermission();
        if (perm !== "granted") throw new Error("Permission denied.");
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
        const prefs = JSON.parse(localStorage.getItem("sw_notification_prefs") || '{"goals":true,"kickoff":true,"fulltime":true}');
        await fetch(`${WORKER_URL}/push/subscribe`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ subscription:sub.toJSON(), prefs, groupKey:localStorage.getItem(GROUP_STORAGE_KEY) }) });
        localStorage.setItem("sw_push_subscribed","yes");
        setPushOn(true);
      } else {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await fetch(`${WORKER_URL}/push/unsubscribe`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ endpoint:sub.endpoint }) }).catch(()=>{});
          await sub.unsubscribe();
        }
        localStorage.removeItem("sw_push_subscribed");
        setPushOn(false);
      }
    } catch(e) {
      setPushErr(e.message || "Couldn't change notification setting.");
    } finally {
      setPushBusy(false);
    }
  };

  const navItems = [
    { label:"↻ Retake the tour", onClick:() => { onTakeTour(); onClose(); } },
    { label:"❓ Rules & Info",    onClick:() => { onViewRules(); onClose(); } },
    { label:"🔄 Switch group",    onClick:() => { onSwitchGroup(); onClose(); } },
  ];

  const rowBase = { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 12px", borderBottom:`1px solid ${C.border}` };

  return (
    <div className="detail-backdrop" onClick={triggerClose}
      style={{ background: closing ? "rgba(0,0,0,0)" : "rgba(0,0,0,0.55)", transition: "background 0.25s ease" }}>
      <div className="detail-sheet" onClick={(e) => e.stopPropagation()} style={{
        background:C.bg, display:"flex", flexDirection:"column", border:`1px solid ${C.border}`, boxShadow:"0 24px 64px rgba(0,0,0,0.55)",
        transform: closing ? (isMobile ? "translateY(120%)" : "scale(0.96)") : undefined,
        opacity: closing && !isMobile ? 0 : undefined,
        transition: closing ? (isMobile ? "transform 0.25s ease" : "transform 0.18s ease, opacity 0.18s ease") : undefined,
      }}>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <div style={{ fontSize:15, fontWeight:800, color:C.text }}>More</div>
          <button onClick={triggerClose} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"4px 4px 28px" }}>
          {navItems.map(item => (
            <button key={item.label} onClick={item.onClick} style={{ width:"100%", ...rowBase, background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>
              <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{item.label}</span>
              <span style={{ color:C.muted, fontSize:14 }}>›</span>
            </button>
          ))}
          {supported && (
            <div onClick={togglePush} style={{ ...rowBase, cursor: pushBusy ? "default" : "pointer" }}>
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:C.text }}>🔔 Push notifications</div>
                {pushErr && <div style={{ fontSize:11, color:C.red, marginTop:2 }}>{pushErr}</div>}
              </div>
              <Toggle on={pushOn} onChange={togglePush} busy={pushBusy} />
            </div>
          )}
          {isAdmin && (
            <div onClick={onToggleDevMode} style={{ ...rowBase, cursor:"pointer" }}>
              <span style={{ fontSize:14, fontWeight:600, color:C.text }}>🛠️ Developer mode</span>
              <Toggle on={devMode} onChange={onToggleDevMode} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Push-notification settings, opened from the More menu. Reuses the same
// .info-backdrop/.info-card shell as the Rules & Info pop-over — just wraps
// the unmodified PushNotificationsSection (see its own definition above for
// the subscribe/unsubscribe logic) with a header/close button, since it now

function PushSettingsModal({ onClose }) {

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <div style={{ fontSize:15, fontWeight:800, color:C.text }}>Push Notifications</div>

// Notifications drawer (bell icon) — a feed of recent match activity, not a
// literal push-notification history (the browser has no API for that, and
// football-data.org doesn't give per-goal timestamps for a true minute-by-
// minute feed anyway). Reuses the exact same 24h-window + MatchCard
// Slides down from the top. Push-notification-style cards for every settled
// match ever, split into "New" (since last close) and "Earlier" (already seen).
// Last-seen timestamp stored per group in localStorage; updated on close so
// the split reflects what the user hasn't opened the drawer since.
const NOTIF_SEEN_BASE_KEY = "sw_notif_seen";

function NotificationsDrawer({ matches, ranked, matchPtsById, onClose, onSeenUpdate, groupKey }) {
  const seenKey = groupKey ? `${NOTIF_SEEN_BASE_KEY}_${groupKey}` : NOTIF_SEEN_BASE_KEY;
  const lastSeen = parseInt(localStorage.getItem(seenKey) || "0", 10);

  // Match-result items — only FINISHED matches, not live/paused
  const matchItems = matches
    .filter(m => m.status === "FINISHED")
    .map(m => ({ type:"match", date: new Date(m.utcDate).getTime(), m }));

  // Group-qualification and elimination items — one per team, timestamped at
  // their last group match so they interleave chronologically.
  const qualItems = [];
  const elimItems = [];
  const seenCodes = new Set();
  for (const player of ranked) {
    if (player.grimReaper) continue;
    for (const team of (player.teams || [])) {
      if (seenCodes.has(team.code)) continue;
      seenCodes.add(team.code);
      if (!team.stage) continue;

      const groupMatchTs = matches
        .filter(m => {
          const h = m.homeTeam?.tla?.toUpperCase();
          const a = m.awayTeam?.tla?.toUpperCase();
          return (h === team.code || a === team.code)
            && (m.stage || "").toUpperCase().includes("GROUP")
            && m.status === "FINISHED";
        })
        .map(m => new Date(m.utcDate).getTime());
      const lastGroupTs = groupMatchTs.length ? Math.max(...groupMatchTs) : 0;

      if (team.stage === "GROUP_ELIM") {
        if (!lastGroupTs) continue;
        const penalty = typeof ptsTotal === "function" ? ptsTotal(team.code, "GROUP_ELIM") : null;
        elimItems.push({ type:"elim", date: lastGroupTs, team, owner: player.name, stage: "GROUP_ELIM", penalty });
      } else {
        if (lastGroupTs) {
          const bonus = typeof ptsTotal === "function" ? ptsTotal(team.code, "LAST_32") : null;
          qualItems.push({ type:"qualify", date: lastGroupTs, team, owner: player.name, bonus });
        }
        if (team.eliminated === true) {
          const elimMatchTs = matches
            .filter(m => {
              const h = m.homeTeam?.tla?.toUpperCase();
              const a = m.awayTeam?.tla?.toUpperCase();
              return (h === team.code || a === team.code)
                && (m.stage || "").toUpperCase() === team.stage
                && m.status === "FINISHED";
            })
            .map(m => new Date(m.utcDate).getTime());
          const elimTs = elimMatchTs.length ? Math.max(...elimMatchTs) : 0;
          if (elimTs) {
            elimItems.push({ type:"elim", date: elimTs, team, owner: player.name, stage: team.stage, penalty: null });
          }
        }
      }
    }
  }

  // New-leader notifications — simulate running totals to detect each leadership
  // change. Includes match pts (matchPtsById), qual bonuses for teams not yet in
  // knockout draws, and GROUP_ELIM penalties — all batched per timestamp so
  // simultaneous matches don't create spurious intermediate notifications.
  const leaderItems = [];
  {
    const teamToPlayer = {};
    for (const player of ranked) {
      if (player.grimReaper) continue;
      for (const team of (player.teams || [])) teamToPlayer[team.code] = player.name;
    }
    const totals = {};
    for (const player of ranked) {
      if (!player.grimReaper) totals[player.name] = 0;
    }

    // Teams that have appeared in knockout matchPtsById already have their
    // stage bonuses baked in via deriveMatchPts's award() delta — don't add twice.
    const hasKnockoutPts = new Set();
    for (const m of matches) {
      if (m.status !== "FINISHED" || !matchPtsById?.[m.id]) continue;
      if (!(m.stage || "").toUpperCase().includes("GROUP")) {
        const h = m.homeTeam?.tla?.toUpperCase();
        const a = m.awayTeam?.tla?.toUpperCase();
        if (h) hasKnockoutPts.add(h);
        if (a) hasKnockoutPts.add(a);
      }
    }

    // Build a flat event list: match pts + missing bonuses/penalties
    const events = [];
    for (const m of matches) {
      if (m.status !== "FINISHED" || !matchPtsById?.[m.id]) continue;
      const h = m.homeTeam?.tla?.toUpperCase();
      const a = m.awayTeam?.tla?.toUpperCase();
      const pts = matchPtsById[m.id];
      const date = new Date(m.utcDate).getTime();
      if (h && teamToPlayer[h] && pts?.home != null) events.push({ date, player: teamToPlayer[h], delta: pts.home });
      if (a && teamToPlayer[a] && pts?.away != null) events.push({ date, player: teamToPlayer[a], delta: pts.away });
    }
    // Qual bonuses for teams not yet reflected in knockout matchPtsById
    for (const q of qualItems) {
      if (!hasKnockoutPts.has(q.team.code) && q.bonus > 0)
        events.push({ date: q.date, player: q.owner, delta: q.bonus });
    }
    // Group elimination penalties
    for (const e of elimItems) {
      if (e.stage === "GROUP_ELIM" && e.penalty != null && e.penalty < 0)
        events.push({ date: e.date, player: e.owner, delta: e.penalty });
    }

    // Process events grouped by timestamp so we detect leader changes once per
    // batch, not after every individual event within the same moment.
    const byTs = {};
    for (const ev of events) { (byTs[ev.date] = byTs[ev.date] || []).push(ev); }
    let currentLeader = null;
    for (const ts of Object.keys(byTs).map(Number).sort((a, b) => a - b)) {
      for (const ev of byTs[ts]) totals[ev.player] = (totals[ev.player] || 0) + ev.delta;
      const entries = Object.entries(totals).sort((x, y) => y[1] - x[1]);
      const [topName, topPts] = entries[0];
      const secondPts = entries.length > 1 ? entries[1][1] : 0;
      if (topPts > 0 && topPts > secondPts && topName !== currentLeader) {
        leaderItems.push({ type:"leader", date: ts, leader: topName, pts: topPts, ahead: topPts - secondPts });
        currentLeader = topName;
      }
    }
  }

  // Family elimination notifications — fire when every team across all family members is eliminated
  const familyElimItems = [];
  const familyLeaderItems = [];
  const notifFamilies = GROUPS[groupKey]?.families;
  if (notifFamilies) {
    const playerMap = Object.fromEntries(ranked.map(p => [p.name, p]));
    // Family eliminations
    for (const f of notifFamilies) {
      const memberTeams = f.members.flatMap(n => playerMap[n]?.teams || []);
      if (!memberTeams.length) continue;
      const allElim = memberTeams.every(t => t.eliminated);
      const anyWon = memberTeams.some(t => t.won);
      if (!allElim || anyWon) continue;
      const tsCandidates = memberTeams.flatMap(t =>
        matches.filter(m => {
          const h = m.homeTeam?.tla?.toUpperCase();
          const a = m.awayTeam?.tla?.toUpperCase();
          return (h === t.code || a === t.code) && m.status === "FINISHED";
        }).map(m => new Date(m.utcDate).getTime())
      );
      if (!tsCandidates.length) continue;
      familyElimItems.push({ type:"familyElim", date: Math.max(...tsCandidates), familyName: f.name });
    }
    // Family leader notifications — track running avg pts per family
    const teamToFamily = {};
    for (const f of notifFamilies) {
      const mCount = f.members.length;
      for (const n of f.members) {
        const p = playerMap[n];
        if (!p || p.grimReaper) continue;
        for (const t of (p.teams || [])) teamToFamily[t.code] = { name: f.name, mCount };
      }
    }
    const familyTotals = Object.fromEntries(notifFamilies.map(f => [f.name, 0]));
    const familyMCount = Object.fromEntries(notifFamilies.map(f => [f.name, f.members.length]));
    const fEvents = [];
    for (const m of matches) {
      if (m.status !== "FINISHED" || !matchPtsById?.[m.id]) continue;
      const h = m.homeTeam?.tla?.toUpperCase();
      const a = m.awayTeam?.tla?.toUpperCase();
      const pts = matchPtsById[m.id];
      const date = new Date(m.utcDate).getTime();
      if (h && teamToFamily[h] && pts?.home != null) fEvents.push({ date, family: teamToFamily[h].name, delta: pts.home });
      if (a && teamToFamily[a] && pts?.away != null) fEvents.push({ date, family: teamToFamily[a].name, delta: pts.away });
    }
    const fByTs = {};
    for (const ev of fEvents) (fByTs[ev.date] = fByTs[ev.date] || []).push(ev);
    let currentFamilyLeader = null;
    for (const ts of Object.keys(fByTs).map(Number).sort((a, b) => a - b)) {
      for (const ev of fByTs[ts]) familyTotals[ev.family] = (familyTotals[ev.family] || 0) + ev.delta;
      const avgs = Object.entries(familyTotals).map(([name, tot]) => ({ name, avg: tot / familyMCount[name] })).sort((a, b) => b.avg - a.avg);
      const [topFamily, topAvg] = [avgs[0].name, avgs[0].avg];
      const secondAvg = avgs.length > 1 ? avgs[1].avg : 0;
      if (topAvg > 0 && topAvg > secondAvg && topFamily !== currentFamilyLeader) {
        familyLeaderItems.push({ type:"familyLeader", date: ts, leader: topFamily, avg: Math.round(topAvg), ahead: Math.round(topAvg - secondAvg) });
        currentFamilyLeader = topFamily;
      }
    }
  }

  const allItems = [...matchItems, ...qualItems, ...elimItems, ...leaderItems, ...familyElimItems, ...familyLeaderItems].sort((a, b) => b.date - a.date);

  const FILTERS = [
    { key:"all",     label:"All" },
    { key:"match",   label:"Results" },
    { key:"qualify", label:"Qualifications" },
    { key:"elim",    label:"Eliminations" },
    { key:"leader",  label:"Leaders" },
    ...(notifFamilies ? [{ key:"family", label:"Families" }] : []),
  ];
  const [activeFilter, setActiveFilter] = useState("all");
  const visibleItems = activeFilter === "all" ? allItems
    : activeFilter === "elim" ? allItems.filter(item => item.type === "elim" || item.type === "familyElim")
    : activeFilter === "leader" ? allItems.filter(item => item.type === "leader" || item.type === "familyLeader")
    : activeFilter === "family" ? allItems.filter(item => item.type === "familyElim" || item.type === "familyLeader")
    : allItems.filter(item => item.type === activeFilter);

  const unread = visibleItems.filter(item => item.date > lastSeen);
  const read   = visibleItems.filter(item => item.date <= lastSeen);

  const handleClose = () => {
    const ts = Date.now();
    localStorage.setItem(seenKey, String(ts));
    onSeenUpdate?.(ts);
    onClose();
  };

  const relTime = (ts) => {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const d = new Date(ts);
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const date = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
    const time = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    return `${date}, ${time}`;
  };

  const ptsStr = (n) => {
    if (n === null || n === undefined) return null;
    const color = n > 0 ? C.accent : n < 0 ? C.red : C.muted;
    return <span style={{ color, fontWeight:700 }}>{n >= 0 ? "+" : ""}{n} pts</span>;
  };

  const renderMatchCard = (m, dimmed) => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const hOwner = ownerOf(h, ranked);
    const aOwner = ownerOf(a, ranked);
    const homeName = m.homeTeam?.name || h || "TBD";
    const awayName = m.awayTeam?.name || a || "TBD";
    const pts = matchPtsById?.[m.id];
    const hLabel = hOwner ? `${hOwner}'s ${homeName}` : homeName;
    const aLabel = aOwner ? `${aOwner}'s ${awayName}` : awayName;
    let icon, title, p1Label, p1Pts, p2Label, p2Pts;
    if (hs > as_) {
      icon = "🏆"; title = `${hLabel} beat ${aLabel}`;
      p1Label = hOwner || homeName; p1Pts = pts?.home;
      p2Label = aOwner || awayName; p2Pts = pts?.away;
    } else if (as_ > hs) {
      icon = "🏆"; title = `${aLabel} beat ${hLabel}`;
      p1Label = aOwner || awayName; p1Pts = pts?.away;
      p2Label = hOwner || homeName; p2Pts = pts?.home;
    } else {
      icon = "🤝"; title = `${hLabel} and ${aLabel} draw`;
      p1Label = hOwner || homeName; p1Pts = pts?.home;
      p2Label = aOwner || awayName; p2Pts = pts?.away;
    }
    const hasPts = pts && (p1Pts !== undefined || p2Pts !== undefined);
    return (
      <div key={`m-${m.id}`} style={{ padding:"10px 6px", borderBottom:`1px solid ${C.border}`, background: dimmed ? "transparent" : "rgba(34,197,94,0.07)" }}>
        <div style={{ fontSize:10, color:C.muted, marginBottom:3 }}>WC Sweeps · {relTime(new Date(m.utcDate).getTime())}</div>
        <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:2 }}>{icon} {title}</div>
        <div style={{ fontSize:12, color:C.dim }}>{homeName} {hs}–{as_} {awayName}</div>
        {hasPts && (
          <div style={{ fontSize:11, color:C.muted, marginTop:3, display:"flex", gap:10 }}>
            <span>{p1Label} {ptsStr(p1Pts)}</span>
            {p2Pts !== undefined && <span>{p2Label} {ptsStr(p2Pts)}</span>}
          </div>
        )}
      </div>
    );
  };

  const renderQualCard = ({ team, owner, bonus, date }, dimmed) => (
    <div key={`q-${team.code}`} style={{ padding:"10px 6px", borderBottom:`1px solid ${C.border}`, background: dimmed ? "transparent" : "rgba(34,197,94,0.07)" }}>
      <div style={{ fontSize:10, color:C.muted, marginBottom:3 }}>WC Sweeps · {relTime(date)}</div>
      <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:2 }}>⭐ {owner}'s {team.name} (P{potOf(team.code)}) qualify!</div>
      <div style={{ fontSize:12, color:C.dim, display:"flex", alignItems:"center", gap:8 }}>
        <span>Advanced from group stage</span>
        {bonus > 0 && <span style={{ color:C.accent, fontWeight:700 }}>+{bonus} pts</span>}
      </div>
    </div>
  );

  const renderElimCard = ({ team, owner, stage, penalty, date }, dimmed) => {
    const stageLabel = typeof STAGE_LABEL === "object" ? STAGE_LABEL[stage] : stage;
    const subtitle = stage === "GROUP_ELIM"
      ? "Group stage exit"
      : `Knocked out in ${stageLabel || stage}`;
    return (
      <div key={`e-${team.code}`} style={{ padding:"10px 6px", borderBottom:`1px solid ${C.border}`, background: dimmed ? "transparent" : "rgba(34,197,94,0.07)" }}>
        <div style={{ fontSize:10, color:C.muted, marginBottom:3 }}>WC Sweeps · {relTime(date)}</div>
        <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:2 }}>💀 {owner}'s {team.name} (P{potOf(team.code)}) {stage === "GROUP_ELIM" ? "eliminated!" : "knocked out"}</div>
        <div style={{ fontSize:12, color:C.dim, display:"flex", alignItems:"center", gap:8 }}>
          <span>{subtitle}</span>
          {penalty !== null && penalty < 0 && <span style={{ color:C.red, fontWeight:700 }}>{penalty} pts</span>}
        </div>
      </div>
    );
  };

  const renderLeaderCard = ({ leader, pts, ahead, date }, dimmed) => (
    <div key={`l-${date}`} style={{ padding:"10px 6px", borderBottom:`1px solid ${C.border}`, background: dimmed ? "transparent" : "rgba(34,197,94,0.07)" }}>
      <div style={{ fontSize:10, color:C.muted, marginBottom:3 }}>WC Sweeps · {relTime(date)}</div>
      <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:2 }}>👑 New Leader: {leader}</div>
      <div style={{ fontSize:12, color:C.dim }}>{pts} pts · {ahead} pt{ahead !== 1 ? "s" : ""} clear</div>
    </div>
  );

          <div style={{
            width:64, height:64, borderRadius:"50%", flexShrink:0,
            background:C.posBg, border:`1px solid ${C.accent}`,

          }}>{current.icon}</div>
          <div style={{ fontSize:18, fontWeight:800, color:C.text, marginBottom:10 }}>{current.title}</div>
          <div style={{ fontSize:14, color:C.dim, lineHeight:1.6, maxWidth:300 }}>{current.desc}</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, paddingBottom:18, flexShrink:0 }}>
          {TOUR_STEPS.map((_, i) => (
            <div key={i} style={{ width:6, height:6, borderRadius:"50%", background: i === step ? C.accent : C.border }} />

        <div style={{ display:"flex", gap:10, padding:"16px 20px", borderTop:`1px solid ${C.border}`, flexShrink:0 }}>

            <button onClick={() => setStep(s => s - 1)} style={{ flex:1, padding:"12px", borderRadius:12, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:14, fontWeight:600, cursor:"pointer" }}>

            </button>

          {!isLast && step === 0 && (
            <button onClick={onClose} style={{ flex:1, padding:"12px", borderRadius:12, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:14, fontWeight:600, cursor:"pointer" }}>

            {isLast ? "Got it" : "Next"}
          </button>
        </div>
      </div>
    </div>
  );
}

function LiveBanner({ live, ranked, matchPtsById }) {
  // Multiple concurrent live games (common in WC2026's overlapping kickoffs):
  // page through them one-per-swipe instead of stacking. Sorted by kickoff so
  // the paging order is stable across the 60s refreshes.
  const games = [...live].sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
  const count = games.length;
  const multi = count > 1;

  const [index, setIndex] = useState(0);
  const safeIndex = Math.max(0, Math.min(index, count - 1));
  const trackRef = React.useRef(null);
  const drag = React.useRef({ startX: 0, dx: 0, active: false, w: 0 });
  const ANIM = "transform 0.28s cubic-bezier(0.4,0,0.2,1)";

  // Position the track declaratively via effect (not inline transform), so a
  // 60s refresh re-render mid-drag can't clobber the finger-follow: deps are
  // [safeIndex, count], neither of which changes during a drag.
  useEffect(() => {
    const t = trackRef.current; if (!t) return;
    t.style.transition = ANIM;
    t.style.transform = `translateX(${-safeIndex * 100}%)`;
  }, [safeIndex, count]);
  // Clamp the active page if the live set shrinks between refreshes.
  useEffect(() => { if (index > count - 1) setIndex(Math.max(0, count - 1)); }, [count]);

  const settle = useCallback((i) => {
    const t = trackRef.current;
    const clamped = Math.max(0, Math.min(count - 1, i));
    if (t) { t.style.transition = ANIM; t.style.transform = `translateX(${-clamped * 100}%)`; }
    setIndex(clamped);
  }, [count]);

  const onDown = (e) => {
    if (!multi) return;
    const d = drag.current;
    d.active = true; d.startX = e.clientX; d.dx = 0; d.w = e.currentTarget.clientWidth;
    if (trackRef.current) trackRef.current.style.transition = "none";
    e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onMove = (e) => {
    const d = drag.current; if (!d.active) return;
    d.dx = e.clientX - d.startX;
    // Resist dragging past the first/last game.
    const edge = (safeIndex === 0 && d.dx > 0) || (safeIndex === count - 1 && d.dx < 0);
    const eff = edge ? d.dx * 0.35 : d.dx;
    if (trackRef.current) trackRef.current.style.transform = `translateX(calc(${-safeIndex * 100}% + ${eff}px))`;
  };
  const onUp = () => {
    const d = drag.current; if (!d.active) return;
    d.active = false;
    const thresh = Math.max(40, d.w * 0.15);        // commit distance — velocity-independent, so one flick = one step
    if (d.dx <= -thresh) settle(safeIndex + 1);     // swipe left  -> next (max +1)
    else if (d.dx >= thresh) settle(safeIndex - 1); // swipe right -> prev (max -1)
    else settle(safeIndex);                          // not far enough -> snap back
  };

  const renderGame = (m) => {
    const h = m.homeTeam && m.homeTeam.tla ? m.homeTeam.tla.toUpperCase() : undefined;
    const a = m.awayTeam && m.awayTeam.tla ? m.awayTeam.tla.toUpperCase() : undefined;
    const hOwner = ownerOf(h, ranked);
    const aOwner = ownerOf(a, ranked);
    const broadcast = getBroadcast(h, a);
    const livePts = matchPtsById[m.id];
    return (
      <div key={m.id} style={{ flex:"0 0 100%", display:"flex", alignItems:"center" }}>
        <div style={{ flex:1, display:"flex", alignItems:"center", gap:6 }}>
          <Flag code={h} size={18} />
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{hOwner || m.homeTeam?.name}</div>
            <div style={{ fontSize:10, color:C.muted }}>{m.homeTeam?.name}{POT[h] ? <span style={{ color:C.muted, fontSize:9 }}> (P{potOf(h)})</span> : ""}</div>
            {livePts && <div style={{ fontSize:10, fontWeight:800, color: livePts.home > 0 ? C.accent : C.muted, marginTop:2 }}>+{livePts.home} pts</div>}
          </div>
        </div>
        <div style={{ textAlign:"center", padding:"0 8px" }}>
          <div style={{ fontSize:16, fontWeight:800, color:C.red, letterSpacing:2 }}>{m.score?.fullTime?.home??0}–{m.score?.fullTime?.away??0}</div>
          {m.minute && (
            <div style={{ fontSize:10, color:C.red, fontWeight:600, marginBottom:2 }}>
              {m.minute}{m.injuryTime ? `+${m.injuryTime}` : ""}′
            </div>
          )}
          <a href={broadcast.url} target="_blank" rel="noopener noreferrer" style={{ background:broadcast.b==="ITV"?"#003087":"#FF6B35", color:"white", fontSize:9, fontWeight:800, padding:"2px 5px", borderRadius:3, textDecoration:"none", whiteSpace:"nowrap", display:"inline-block" }}>▶ {broadcast.b}</a>
        </div>
        <div style={{ flex:1, display:"flex", alignItems:"center", gap:6, justifyContent:"flex-end" }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{aOwner || m.awayTeam?.name}</div>
            <div style={{ fontSize:10, color:C.muted }}>{m.awayTeam?.name}{POT[a] ? <span style={{ color:C.muted, fontSize:9 }}> (P{potOf(a)})</span> : ""}</div>
            {livePts && <div style={{ fontSize:10, fontWeight:800, color: livePts.away > 0 ? C.accent : C.muted, marginTop:2 }}>+{livePts.away} pts</div>}
          </div>
          <Flag code={a} size={18} />
        </div>
      </div>
    );
  };

  return (
    <div style={{
      padding:"8px 14px 12px",
      overflow:"hidden",
      animation:"expandDown 0.5s cubic-bezier(0.4,0,0.2,1) 1.5s both",
      animationIterationCount: 1,
      borderBottom:`1px solid ${C.border}`,
    }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
        <div style={{ fontSize:10, color:C.red, fontWeight:700, letterSpacing:"0.1em", display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:C.red, animation:"pulse-red 1.5s infinite" }}/>
          LIVE NOW
        </div>
        {multi && (
          <div style={{ fontSize:10, fontWeight:700, color:C.muted, letterSpacing:"0.05em", fontVariantNumeric:"tabular-nums" }}>{safeIndex + 1}/{count}</div>
        )}
      </div>

      <div onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{ overflow:"hidden", touchAction: multi ? "pan-y" : "auto" }}>
        <div ref={trackRef} style={{ display:"flex" }}>
          {games.map(renderGame)}
        </div>
      </div>

      {multi && (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:7, marginTop:10, height:8 }}>
          {games.map((m, i) => (
            <button key={m.id} onClick={() => settle(i)} aria-label={`Go to live game ${i + 1}`}
              style={{
                width: i === safeIndex ? 8 : 6, height: i === safeIndex ? 8 : 6,
                padding:0, border:"none", cursor:"pointer", borderRadius:"50%",
                background: i === safeIndex ? C.red : C.border, transition:"all 0.2s",
              }}/>
          ))}
        </div>
      )}
    </div>
  );
}

function SearchResultRow({ item, ranked, onClick }) {

          {isGrimReaper ? "💀" : item.label[0]}

          <div style={{ fontSize:10, color:C.muted }}>pts</div>
        </div>
      )}

}

function SearchOverlay({ ranked, onClose, onSelectPlayer, onSelectTeam, groupKey }) {
  const recentKey = groupKey ? `${SEARCH_RECENT_BASE_KEY}_${groupKey}` : SEARCH_RECENT_BASE_KEY;
  const [query, setQuery] = React.useState("");
  const inputRef = React.useRef(null);
  const [recent, setRecent] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(recentKey) || "[]"); }
    catch { return []; }
  });

  React.useEffect(() => {
    setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 60);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, []);

  const saveRecent = (item) => {
    const updated = [item, ...recent.filter(r => !(r.type === item.type && r.id === item.id))].slice(0, 10);
    setRecent(updated);
    localStorage.setItem(recentKey, JSON.stringify(updated));
  };

  const handleSelect = (item) => {
    saveRecent(item);
    onClose();
    if (item.type === "player") onSelectPlayer(item.id);
    else onSelectTeam(item.id);
  };

  const clearRecent = () => {
    setRecent([]);
    localStorage.removeItem(recentKey);
  };

  const q = query.trim().toLowerCase();
  const results = React.useMemo(() => {
    if (!q) return [];
    const ord = (n) => { const s=["th","st","nd","rd"],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
    const out = [];
    ranked.forEach((p, i) => {
      if (p.name.toLowerCase().includes(q))
        out.push({ type:"player", id:p.name, label:p.name, sub:`${ord(p._displayRank||i+1)} · ${p.total} pts`, grimReaper:!!p.grimReaper });
    });
    const seen = new Set();
    ranked.forEach(p => {
      (p.teams||[]).forEach(t => {
        if (!seen.has(t.code) && ((t.name||"").toLowerCase().includes(q)||(t.code||"").toLowerCase().includes(q))) {
          seen.add(t.code);
          out.push({ type:"team", id:t.code, label:t.name||t.code, sub:`Team · Pot ${POT[t.code] ? potOf(t.code) : "?"}` });
        }
      });
    });
    return out;
  }, [q, ranked]);

  return (
    <div style={{ position:"fixed", inset:0, zIndex:50, background:C.bg, display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:10, borderBottom:`1px solid ${C.border}` }}>
        <button onClick={onClose} aria-label="Back" style={{ background:"none", border:"none", color:C.text, cursor:"pointer", padding:6, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke={C.text} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        <div style={{ flex:1, position:"relative" }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", pointerEvents:"none" }}>
            <circle cx="11" cy="11" r="8" stroke={C.muted} strokeWidth="2.5"/>
            <path d="M21 21l-4.35-4.35" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round"/>
          </svg>
          <input
            ref={inputRef}
            type="text"
            inputMode="search"
            placeholder="Search players or teams…"
            value={query}
            onChange={e => setQuery(e.target.value)}
            style={{ width:"100%", boxSizing:"border-box", background:C.surface, border:`1px solid ${C.border}`, borderRadius:24, color:C.text, fontSize:15, padding:"7px 36px 7px 34px", outline:"none", WebkitAppearance:"none", caretColor:C.accent }}
          />
          {query && (
            <button onClick={() => setQuery("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.muted, fontSize:14, cursor:"pointer", padding:"2px 4px", lineHeight:1 }}>✕</button>
          )}
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
        {!q ? (
          recent.length > 0 ? (
            <>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px 6px" }}>
                <span style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:"0.1em", textTransform:"uppercase" }}>Recent</span>
                <button onClick={clearRecent} style={{ background:"none", border:"none", color:C.muted, fontSize:12, cursor:"pointer", padding:4 }}>Clear all</button>
              </div>
              {recent.map((item, i) => <SearchResultRow key={i} item={item} ranked={ranked} onClick={() => handleSelect(item)} />)}
            </>
          ) : (

          )
        ) : results.length === 0 ? (
          <div style={{ color:C.muted, textAlign:"center", padding:"52px 24px", fontSize:14 }}>No results for "{query}"</div>

          results.map((item, i) => <SearchResultRow key={i} item={item} ranked={ranked} onClick={() => handleSelect(item)} />)

    </div>
  );
}

      </div>

      {/* ── Body ── */}
      <div style={{ padding:"14px 14px 0" }}>

        {loading && (
          <div style={{ textAlign:"center", padding:48, color: C.muted }}>
            <div className="spinning" style={{ fontSize:24, marginBottom:12 }}>↻</div>
            <div style={{ fontSize:13 }}>Loading live data…</div>
          </div>
        )}

        {error && (
          <div style={{
            background:"#1a0a0a", border:`1px solid #7f1d1d`,
            borderRadius:8, padding:"12px 14px", color:C.dangerTextBright,
            fontSize:13, marginBottom:12,
          }}>
            ⚠️ {error}
            <div style={{ fontSize:11, color: C.muted, marginTop:4 }}>
              Check your Cloudflare Worker URL is set in WORKER_URL and the Worker is deployed.
            </div>
          </div>
        )}

        {/* ── TODAY (email-digest-style homepage) ── */}
        {tab === "home" && !loading && (
          <HomeTab matches={matches} ranked={ranked} badges={badges} rank24hChange={rank24hChange}
            rank24hPtsChange={rank24hPtsChange} matchPtsById={matchPtsById} upcoming={upcoming} setTab={setTab} setLeagueView={setLeagueView} openPlayerModal={openPlayerModal} openTeamModal={openTeamModal} openMatchModal={openMatchModal} openFamilyModal={openFamilyModal} groupKey={groupKey} />
        )}

        {/* ── LEAGUE TABLE ── */}
        {tab === "table" && !loading && (
          <>
            {leagueView === "league" && (
              <>
                {ranked.map((player, i) => {
                  const prev = ranked[i - 1];
                  const displayRank = i === 0 ? 1
                    : (player.total === prev.total && player.tiebreak === prev.tiebreak)
                      ? ranked[i-1]._displayRank
                      : i + 1;
                  player._displayRank = displayRank;
                  return (
                    <PlayerRow
                      key={player.name}
                      player={player}
                      rank={i}
                      displayRank={displayRank}
                      onOpen={() => openPlayerModal(player.name)}
                      badges={badges[player.name] || []}
                      rank24hChange={rank24hChange.get(player.name)}
                    />
                  );
                })}
              </>
            )}

            {(leagueView === "groups" || leagueView === "knockout") && (
              <TeamsTab matches={matches} view={leagueView} setView={setLeagueView} onTeamClick={openTeamModal} matchPtsById={matchPtsById} />
            )}

            {leagueView === "families" && (
              <FamilyLeagueTab ranked={ranked} groupKey={groupKey} onPlayerClick={openPlayerModal} onFamilyClick={openFamilyModal} />
            )}
          </>
        )}
        {/* ── SCORES (combined day-by-day schedule + results, BBC-style day strip above) ── */}
        {tab === "scores" && !loading && (
          dayMatches.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No matches on this day</div>
            : <div className="league-grid fixture-grid">{dayMatches.map(m => <MatchCard key={m.id} m={m} ranked={ranked} upcoming={upcoming} pts={matchPtsById[m.id]} onMatchClick={openMatchModal} onTeamClick={openTeamModal} />)}</div>
        )}

        {/* ── THE RACE ── */}
        {tab === "race" && !loading && (
          raceView === "family" && familyRaceData
            ? <BumpChart history={familyRaceData} allRanked={familyRaceData} bucketLabels={bucketLabels} colorFn={familyColor} />
            : <BumpChart history={ranked.map(p => ({ name: p.name, hist: bumpHistoryMap[p.name] || [0], total: p.total }))} allRanked={ranked} bucketLabels={bucketLabels} raceHistory={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} />
        )}

        {showRace && (
          raceView === "family" && familyRaceData
            ? <BarRaceModal history={familyRaceData} allRanked={familyRaceData} bucketLabels={bucketLabels} colorFn={familyColor} isFamily={true} onClose={() => setShowRace(false)} />
            : <BarRaceModal history={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} allRanked={ranked} bucketLabels={bucketLabels} elimByFrame={raceElim} stageByFrame={raceStages} onClose={() => setShowRace(false)} />
        )}

        {showSearch && (
          <SearchOverlay ranked={ranked} groupKey={groupKey} onClose={() => setShowSearch(false)}
            onSelectPlayer={(name) => { setSnapFull(true); openPlayerModal(name); }}
            onSelectTeam={(tla)  => { setSnapFull(true); openTeamModal(tla); }} />
        )}

        {/* ── RULES & INFO — same pop-over on mobile and desktop now that the
             bottom-nav/sidebar slot is the "More" menu, not a content tab ── */}
        {showInfo && (
          <div className="info-backdrop" onClick={() => setShowInfo(false)} style={{ position:"fixed", inset:0, zIndex:25, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,0.55)" }}>
          <div className="info-card" onClick={(e) => e.stopPropagation()} style={{ background:C.bg, display:"flex", flexDirection:"column", border:`1px solid ${C.border}`, boxShadow:"0 24px 64px rgba(0,0,0,0.55)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
              <div style={{ fontSize:15, fontWeight:800, color:C.text }}>Rules & Info</div>
              <button onClick={() => setShowInfo(false)} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:"16px 12px 96px" }}>
              <InfoContent />
            </div>
          </div>
          </div>
        )}

        {showMore && (
          <MoreMenu
            devMode={devMode}
            onToggleDevMode={() => { const next = !devMode; devModeRef.current = next; setDevMode(next); setLoading(true); setTab("table"); setLeagueView("league"); fetchMatches(false, next); }}
            onTakeTour={handleTakeTour}
            onViewRules={() => setShowInfo(true)}
            onSwitchGroup={onSwitchGroup}
            onClose={() => setShowMore(false)}
            isAdmin={isAdmin}
          />
        )}

        {showPushSettings && <PushSettingsModal onClose={() => setShowPushSettings(false)} />}
        {showNotifications && (
          <NotificationsDrawer matches={matches} ranked={ranked} matchPtsById={matchPtsById} groupKey={groupKey} onClose={() => setShowNotifications(false)} onSeenUpdate={setNotifSeenTs} />
        )}

        {(selectedPlayer || selectedTeam || selectedMatch || selectedFamily) && (
          <SnapSheet onClose={closeCard} scrollBodyToBottom={!selectedTeam && !selectedMatch && !selectedFamily && scrollPlayerToBadges} initialSnap={snapFull ? "full" : "half"}>
            {(bodyRef, handleClose) => {
              if (selectedFamily) {
                return <FamilyCardContent key={selectedFamily} bodyRef={bodyRef} familyName={selectedFamily} ranked={ranked} groupKey={groupKey} matches={matches} matchPtsById={matchPtsById} onPlayerClick={switchToPlayerFromFamily} onMatchClick={switchToMatchFromCard} onClose={handleClose} />;
              }
              // Team takes precedence: switching player -> team sets selectedTeam
              // and clears selectedPlayer, swapping the content of this same sheet
              // (so the height/snap state is preserved across the switch).
              if (selectedTeam) {
                return <TeamCardContent key={selectedTeam} bodyRef={bodyRef} tla={selectedTeam} matches={matches} ranked={ranked} matchPtsById={matchPtsById} onTeamClick={switchToTeam} onOwnerClick={switchToPlayer} onMatchClick={switchToMatchFromCard} onClose={handleClose} />;
              }
              if (selectedMatch) {
                const matchObj = matches.find(m => String(m.id) === String(selectedMatch));
                if (!matchObj) return null;
                return <HeadToHeadCard key={selectedMatch} bodyRef={bodyRef} m={matchObj} ranked={ranked} matchPtsById={matchPtsById} onTeamClick={switchToTeamFromH2H} onPlayerClick={switchToPlayerFromH2H} onFamilyClick={switchToFamilyFromH2H} groupKey={groupKey} onClose={handleClose} />;
              }
              const idx = ranked.findIndex(x => x.name === selectedPlayer);
              const p = ranked[idx];
              if (!p) return null;
              const playerFamily = (() => {
                const fams = GROUPS[groupKey]?.families;
                if (!fams) return null;
                return fams.find(f => f.members.includes(selectedPlayer))?.name || null;
              })();
              return <PlayerCardContent bodyRef={bodyRef} player={p} displayRank={p._displayRank || (idx + 1)} winPct={winPct.players ? winPct.players[selectedPlayer] : 0} winTeams={winPct.teams} badges={badges[selectedPlayer] || []} matches={matches} matchPtsById={matchPtsById} onTeamClick={switchToTeam} onMatchClick={switchToMatchFromCard} onFamilyClick={switchToFamily} playerFamily={playerFamily} onClose={handleClose} />;
            }}
          </SnapSheet>
        )}

        {showTour && <TourOverlay onClose={closeTour} />}
      </div>
    </div>
  );
}

function GroupGate() {
  const [groupKey, setGroupKey] = useState(() => {
    const stored = localStorage.getItem(GROUP_STORAGE_KEY);
    if (stored === "ADMIN") return "ADMIN";
    return stored && GROUPS[stored] ? stored : null;
  });
  const [simGroup, setSimGroup] = useState(() => {
    const stored = localStorage.getItem(ADMIN_SIM_KEY);
    return stored && GROUPS[stored] ? stored : null;
  });
  const [codeInput, setCodeInput] = useState("");
  const [error, setError] = useState("");

  // Admin logged in + group chosen → render App with isAdmin flag
  if (groupKey === "ADMIN" && simGroup) {
    PLAYERS = GROUPS[simGroup].players;
    PLAYER_NAME_ORDER = PLAYERS.map(p => p.name);
    KNOCKOUT_ONLY = !!(GROUPS[simGroup].knockoutOnly);
    POT_OVERRIDES = GROUPS[simGroup].potOverrides || {};
    const onSwitchGroup = () => {
      localStorage.removeItem(ADMIN_SIM_KEY);
      setSimGroup(null);
    };
    return <App onSwitchGroup={onSwitchGroup} groupKey={simGroup} isAdmin={true} />;
  }

  // Admin logged in but no group chosen yet → show group picker
  if (groupKey === "ADMIN") {
    return <AdminGroupSelector
      onSelect={(key) => { localStorage.setItem(ADMIN_SIM_KEY, key); setSimGroup(key); }}
      onSignOut={() => { localStorage.removeItem(GROUP_STORAGE_KEY); localStorage.removeItem(ADMIN_SIM_KEY); setGroupKey(null); setSimGroup(null); }}
    />;
  }

  // Regular group logged in
  if (groupKey) {
    PLAYERS = GROUPS[groupKey].players;
    PLAYER_NAME_ORDER = PLAYERS.map(p => p.name);
    KNOCKOUT_ONLY = !!(GROUPS[groupKey].knockoutOnly);
    POT_OVERRIDES = GROUPS[groupKey].potOverrides || {};
    const onSwitchGroup = () => {
      localStorage.removeItem(GROUP_STORAGE_KEY);
      setGroupKey(null);
    };
    return <App onSwitchGroup={onSwitchGroup} groupKey={groupKey} />;
  }

  const handleSubmit = (e) => {
    e.preventDefault();
    const matchKey = matchGroupCode(codeInput);
    if (!matchKey) {
      setError("Code not recognised — check with whoever shared it with you.");
      return;
    }
    localStorage.setItem(GROUP_STORAGE_KEY, matchKey);
    setGroupKey(matchKey);
  };
