  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1f12;
      color: #f0faf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .league-card {
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Sweeps/Groups/Knockouts toggle — persistent sticky top nav.
       Class-based (not inline) so it doesn't inherit the header's
       desktop [style*="sticky"] rules. z-index sits above the live
       banner so it stays pinned at the very top on scroll. */
    .sweeps-nav {
      padding: 10px 14px 12px;
    }
    .sweeps-seg {
      display: flex;
      border: 1px solid #1e3d28;
      border-radius: 10px;
      overflow: hidden;
    }
    .sweeps-seg button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    /* Horizontal-scroll arrow buttons — desktop/mouse only (hidden on touch) */
    .hscroll-nav { display: none; }
    /* Scores day strip — no visible scrollbar (swipe/drag only on mobile,
       arrow buttons below take over on desktop) */
    .day-strip { scrollbar-width: none; -ms-overflow-style: none; }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-nav-arrow { display: none; align-items: center; justify-content: center; }
    /* Share button removed from the header (it only ever showed on mobile) */
    .share-btn { display: none !important; }
    /* Desktop-only dev toggle, bottom-left of the sidebar */
    .desktop-dev { display: none; }
    /* Rules & Info pop-over — windowed card with space around it (mobile) */
    .info-backdrop { padding: 24px 18px 88px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .info-card { width: 100%; max-width: 460px; max-height: 68vh; border-radius: 16px; overflow: hidden; animation: modalIn 0.18s ease-out; }
    /* Player detail bottom sheet (mobile) — slides up from the bottom edge,
       deliberately covering the bottom nav (higher z-index than it) rather
       than floating above it like the Rules card does. Drag-to-resize/flick
       to dismiss is a deliberate follow-up, not part of this pass — for now
       it opens/closes the same way the old centred modal did (backdrop tap,
       X, Escape), just restyled and repositioned. */
    .detail-backdrop {
      position: fixed; inset: 0; z-index: 35;
      display: flex; align-items: flex-end; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .detail-sheet {
      width: 100%; max-width: 480px; max-height: 75vh;
      border-radius: 20px 20px 0 0; overflow: hidden;
      animation: sheetIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sheet-handle { display: flex; justify-content: center; padding: 8px 0 0; flex-shrink: 0; }
    .sheet-handle span { width: 36px; height: 4px; border-radius: 2px; background: rgba(143,186,154,0.35); }
    /* Player row hover affordance (desktop) */
    .player-card { transition: background 0.15s ease; }
    .player-card:hover { background: rgba(34,197,94,0.06); }
    /* Share/copy button — hidden on mobile, shown on desktop */
    .share-btn { display: none !important; }

    /* ── Desktop ── */
    @media (min-width: 768px) {
      body { background: #000000; }
      .desktop-dev {
        display: block;
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 6;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
        user-select: none;
      }
      .hscroll-nav {
        display: flex;
        position: sticky;
        top: calc(var(--hdr-h, 130px) + 8px);
        z-index: 8;
        pointer-events: none; /* don't block the content/cards underneath */
        background: transparent;
      }
      .hscroll-nav button { pointer-events: auto; } /* but the buttons stay clickable */
      .day-nav-arrow { display: flex; }
      /* Desktop: the Rules & Info dialog goes full-screen (the windowed look was
         only wanted on mobile — it didn't suit desktop) */
      .info-backdrop { padding: 0; }
      .info-card { max-width: none; max-height: none; width: 100%; height: 100%; border-radius: 0; border: none !important; box-shadow: none !important; animation: none; }
      /* Desktop: stay a centred windowed card — a sheet sliding up off a
         huge viewport doesn't read as a native pattern there, unlike mobile. */
      .detail-backdrop { align-items: center; left: 260px !important; right: auto !important; width: min(760px, calc(100vw - 260px)) !important; }
      .detail-sheet { max-width: 520px; max-height: 82vh; border-radius: 16px; animation: modalIn 0.18s ease-out; }
      .sheet-handle { display: none; }
      /* Centre the pop-over over the CONTENT column (right of the 260px sidebar,
         max 760px wide), not the whole viewport, so it aligns with the list behind it */
      .info-backdrop { left: 260px !important; right: auto !important; width: min(760px, calc(100vw - 260px)) !important; }
      .share-btn { display: flex !important; }
      /* Sidebar background strip */
      body::before {
        content: "";
        display: block;
        width: 260px;
        min-height: 100vh;
        background: #0a1a0f;
        border-right: 1px solid #1e3d28;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 1;
      }

      #root {
        max-width: 760px;
        margin: 0 0 0 260px;
        min-height: 100vh;
        background: #0d1f12;
        box-shadow: 4px 0 40px rgba(0,0,0,0.3);
      }
      /* Single column on desktop for all cards */
      .league-grid {
        display: block;
        max-width: 680px;
      }
      /* Bottom nav → sidebar nav */
      div[style*="bottom:0"][style*="fixed"],
      div[style*="bottom: 0"][style*="fixed"] {
        bottom: auto !important;
        top: 120px !important;
        left: 0 !important;
        right: auto !important;
        width: 260px !important;
        max-width: 260px !important;
        flex-direction: column !important;
        align-items: stretch !important;
        border-top: none !important;
        border-right: 1px solid #1e3d28 !important;
        background: transparent !important;
        padding: 8px 12px !important;
        gap: 2px !important;
        transform: translateY(0) !important;
        z-index: 5 !important;
      }
      /* Nav buttons row → column with label */
      div[style*="bottom:0"][style*="fixed"] button,
      div[style*="bottom: 0"][style*="fixed"] button {
        flex: none !important;
        flex-direction: row !important;
        justify-content: flex-start !important;
        align-items: center !important;
        padding: 11px 14px !important;
        border-radius: 10px !important;
        gap: 12px !important;
        width: 100% !important;
      }
      div[style*="bottom:0"][style*="fixed"] button > div,
      div[style*="bottom: 0"][style*="fixed"] button > div {
        padding: 0 !important;
        background: transparent !important;
        border-radius: 0 !important;
      }
      div[style*="bottom:0"][style*="fixed"] button span,
      div[style*="bottom: 0"][style*="fixed"] button span {
        font-size: 14px !important;
        font-weight: 500 !important;
        text-rendering: optimizeLegibility !important;
        -webkit-font-smoothing: antialiased !important;
      }
      /* Active sidebar item (desktop) — green highlight echoing the mobile pill */
      div[style*="bottom:0"][style*="fixed"] button[data-active="true"],
      div[style*="bottom: 0"][style*="fixed"] button[data-active="true"] {
        background: rgba(34,197,94,0.16) !important;
      }
      div[style*="bottom:0"][style*="fixed"] button[data-active="true"] span,
      div[style*="bottom: 0"][style*="fixed"] button[data-active="true"] span {
        color: #f0faf3 !important;
        font-weight: 700 !important;
      }
      /* Sticky header: hide the title row (duplicated by sidebar header),
         keep the live/next-match banner visible, sticky, and aligned with
         the rest of the content column (matching Fixtures/Results cards).
         The show/hide-on-scroll transform is a mobile-only pattern — on
         desktop the banner is always static, never slides away. */
      div[data-title-row] {
        display: none !important;
      }
      div[style*="sticky"] {
        transform: none !important;
      }
      div[style*="sticky"] > div:not([data-title-row]) {
        padding-left: 28px !important;
        padding-right: 28px !important;
      }
      /* Hide the mobile-only "scrolled past sticky header" duplicate —
         on desktop the sticky banner above is always visible, so this
         peek-a-boo duplicate (built for mobile scroll behaviour) is redundant. */
      div[style*="z-index: 11"] {
        display: none !important;
      }
      /* Content padding */
      div[style*="14px 14px 0"] {
        padding: 20px 28px 0 !important;
      }
    }

    @keyframes goalFlash {
      0%   { background-color: #0d1f12; }
      20%  { background-color: #14532d; }
      40%  { background-color: #0d1f12; }
      60%  { background-color: #14532d; }
      80%  { background-color: #0d1f12; }
      100% { background-color: #0d1f12; }
    }
    @keyframes goalPop {
      0%   { transform: scale(0.6); opacity: 0; }
      30%  { transform: scale(1.08); opacity: 1; }
      45%  { transform: scale(0.98); }
      60%  { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes modalIn {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes pulse-red {
      50% { opacity: 0.5; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes bumpScroll {
      0%   { transform: translateX(0); }
      30%  { transform: translateX(-40px); }
      60%  { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }
      from { max-height: 0; opacity: 0; }
      to   { max-height: 120px; opacity: 1; }
    }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
  </style>

<script type="text/babel">

function Sparkline({ data, width = 90, height = 28, color = C.accent }) {
  if (!data || data.length < 2) {
    return (
      <svg width={width} height={height} style={{ display:"block" }}>
        <line x1={0} y1={height*0.6} x2={width} y2={height*0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
      </svg>
    );
  }

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 3;

  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${points[points.length-1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
  const uid = `sp${data.length}x${data[data.length-1]}`;

  return (
    <svg width={width} height={height} style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${uid})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={3.5} fill={color} />
    </svg>
  );
}

const { useState, useEffect, useCallback } = React;

// Self-healing flag <img> handlers — flagcdn.com occasionally serves a 200 OK
// with empty/corrupt image data for one asset (an edge-cache blip), which
// doesn't fire onError and just renders blank. Added after an unconfirmed
// report of DR Congo's flag occasionally not appearing, later also reported
// for Uruguay (Ollie P) on a near-1-minute on/off cadence — root cause never
// conclusively isolated (the flagcdn URL itself checks out, and nothing in
// this app's own code, the code string/lookup table/React keys, is
// non-deterministic), so this is presumed to be CDN-side. Catches the "loads
// but renders blank" case via onLoad's naturalWidth check, not just onError,
// retries once with a cache-busting query string, then falls back to a small
// text badge showing the team code if the retry also fails. Shared by the
// Flag component and PlayerRow's own inline flag <img>s (PlayerRow predates
// Flag and was never migrated onto it).
function flagHandlers(code, size) {
  const onFail = (e) => {
    if (e.target.dataset.retried) {
      const span = document.createElement("span");
      span.textContent = code;
      span.style.cssText = `display:inline-block;font-size:${size*0.5}px;font-weight:700;color:${C.muted};background:${C.border};border-radius:2px;padding:1px 3px;line-height:${size}px;`;
      e.target.replaceWith(span);
      return;
    }
    e.target.dataset.retried = "1";
    const base = e.target.src.split("?")[0];
    e.target.src = `${base}?retry=${Date.now()}`;
  };
  const onLoad = (e) => { if (e.target.naturalWidth === 0) onFail(e); };
  return { onError: onFail, onLoad };
}

function Flag({ code, size = 18, snail = false }) {
  const url = flag(code);
  if (!url) return null;
  const w = Math.round(size * 1.5); // uniform 3:2 flag aspect across the app
  const handlers = flagHandlers(code, size);
  if (!snail) return <img src={url} alt={code} {...handlers} style={{ width:w, height:size, objectFit:"cover", borderRadius:2, display:"block", flexShrink:0 }} />;
  return (
    <div style={{ position:"relative", display:"inline-flex", flexShrink:0 }}>
      <img src={url} alt={code} {...handlers} style={{ width:w, height:size, objectFit:"cover", borderRadius:2, display:"block", opacity:0.75 }} />
      <span style={{ position:"absolute", bottom:-3, right:-4, fontSize:size*0.55, lineHeight:1 }}>🐌</span>
    </div>
  );
}

const dayKey  = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const sameDay = (a, b) => dayKey(a) === dayKey(b);

// BBC-style day strip — swipe/scroll horizontally through every day of the
// tournament (not just days with fixtures, so "no matches" days still show
// an empty state rather than vanishing). On mobile, swipe is the only input —
// edge fades hint there's more to scroll. Desktop has no swipe gesture, so it
// additionally gets small arrow buttons overlaid on the fades (same
// mobile-hidden/desktop-shown convention as the existing HScrollButtons used
// for the bracket and bump chart).
function DayPicker({ days, selected, onSelect }) {
  const scrollRef = React.useRef(null);
  const selectedKey = dayKey(selected);
  const today = new Date();
  const [atStart, setAtStart] = React.useState(true);
  const [atEnd, setAtEnd] = React.useState(true);

  const checkEdges = () => {
    const el = scrollRef.current;
    if (!el) return;
    setAtStart(el.scrollLeft <= 1);
    setAtEnd(el.scrollLeft + el.clientWidth >= el.scrollWidth - 1);
  };

  React.useEffect(() => {
    const el = scrollRef.current?.querySelector(`[data-daykey="${selectedKey}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    // scrollIntoView is a smooth/async scroll — re-check once it's settled
    // so the fades/arrows reflect where the strip actually lands.
    const t = setTimeout(checkEdges, 350);
    return () => clearTimeout(t);
  }, [selectedKey]);

  const scrollBy = (dir) => scrollRef.current?.scrollBy({ left: dir * 160, behavior: "smooth" });

  // display/alignItems/justifyContent deliberately live in the .day-nav-arrow
  // CSS class, not here — an inline style would override the class's
  // mobile-hides-this `display:none`, since inline always beats a stylesheet
  // rule regardless of the desktop media query.
  const arrowStyle = {
    position: "absolute", top: "50%", transform: "translateY(-50%)",
    width: 26, height: 26, borderRadius: "50%", border: `1px solid ${C.border}`,
    background: C.card, color: C.dim, cursor: "pointer",
    fontSize: 15, fontWeight: 700, lineHeight: 1, padding: 0,
  };

  return (
    <div style={{ position: "relative" }}>
      <div ref={scrollRef} onScroll={checkEdges} className="day-strip" style={{
        display: "flex", overflowX: "auto", WebkitOverflowScrolling: "touch",
        scrollSnapType: "x proximity",
      }}>
        {days.map(d => {
          const key = dayKey(d);
          const isSelected = key === selectedKey;
          const isToday = sameDay(d, today);
          return (
            <button key={key} data-daykey={key} onClick={() => onSelect(d)} style={{
              flex: "0 0 auto", minWidth: 56, scrollSnapAlign: "center",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              padding: "6px 4px 8px", border: "none", cursor: "pointer",
              borderRadius: 8,
              background: isToday ? "rgba(34,197,94,0.18)" : "transparent",
              borderBottom: `3px solid ${isSelected ? C.accent : "transparent"}`,
            }}>
              <span style={{ fontSize: 12, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>
                {isToday ? "Today" : d.toLocaleDateString(undefined, { weekday: "short" })}
              </span>
              <span style={{ fontSize: 17, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>
                {d.getDate()}
              </span>
            </button>
          );
        })}
      </div>
      {!atStart && <div style={{ position:"absolute", top:0, left:0, bottom:0, width:36, pointerEvents:"none",
        background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)` }} />}
      {!atEnd && <div style={{ position:"absolute", top:0, right:0, bottom:0, width:36, pointerEvents:"none",
        background:`linear-gradient(to left, ${C.bg} 0%, transparent 100%)` }} />}
      {!atStart && <button className="day-nav-arrow" onClick={() => scrollBy(-1)} aria-label="Earlier days" style={{ ...arrowStyle, left:2 }}>‹</button>}
      {!atEnd && <button className="day-nav-arrow" onClick={() => scrollBy(1)} aria-label="Later days" style={{ ...arrowStyle, right:2 }}>›</button>}
    </div>
  );
}

function MatchCard({ m, ranked, upcoming = [], pts }) {
  const h = m.homeTeam?.tla?.toUpperCase();
  const a = m.awayTeam?.tla?.toUpperCase();
  const fin = m.status === "FINISHED";
  const live = m.status === "IN_PLAY" || m.status === "PAUSED";
  const scheduled = m.status === "SCHEDULED" || m.status === "TIMED";
  const broadcast = getBroadcast(h, a);
  const hOwner = ownerOf(h, ranked);
  const aOwner = ownerOf(a, ranked);

  const hRank = ranked.findIndex(p => p.name === hOwner);
  const aRank = ranked.findIndex(p => p.name === aOwner);

  // Rivalry clash — only flag the FIRST fixture between any two owners
  const firstClashBetween = (ownerA, ownerB) => {
    if (!ownerA || !ownerB || ownerA === ownerB) return null;
    return upcoming.find(fx => {
      const fh = fx.homeTeam?.tla?.toUpperCase();
      const fa = fx.awayTeam?.tla?.toUpperCase();
      const fhOwner = ownerOf(fh, ranked);
      const faOwner = ownerOf(fa, ranked);
      return (fhOwner === ownerA && faOwner === ownerB) || (fhOwner === ownerB && faOwner === ownerA);
    });
  };

  const isFirstClash = scheduled && hOwner && aOwner && hOwner !== aOwner &&
    firstClashBetween(hOwner, aOwner)?.id === m.id;

  const clashLabel = (() => {
    if (!isFirstClash) return null;
    // Title: 1st vs 2nd
    const positions = new Set([hRank, aRank]);
    if (positions.has(0) && positions.has(1)) return { icon:"👑", label:"TITLE SHOWDOWN" };
    return null;
  })();

  // Result-based banners — winner/loser of THIS match, for finished games only.
  const hs = m.score?.fullTime?.home ?? 0;
  const as_ = m.score?.fullTime?.away ?? 0;
  const pen = m.score?.penalties;
  let winnerCode = null, loserCode = null;
  if (hs > as_)      { winnerCode = h; loserCode = a; }
  else if (as_ > hs) { winnerCode = a; loserCode = h; }
  else if (pen)      { winnerCode = pen.home > pen.away ? h : a; loserCode = winnerCode === h ? a : h; }
  const isKnockout = !(m.stage || "").toUpperCase().includes("GROUP");

  // 😱 Shock Exit — a Pot 1/2 favourite is out. Takes priority over the upset
  // ladder below (an elimination is the bigger story than the pot-gap that
  // caused it). Knockout losses only: a single match is an unambiguous
  // elimination there. Group-stage elimination depends on the whole group
  // (mathematically-locked-into-4th timing), which is already handled
  // precisely for player badges in computeBadges — not duplicated here to
  // avoid the two disagreeing.
  const shockExitLabel = fin && isKnockout && loserCode && (POT[loserCode]||4) <= 2
    ? { icon:"😱", label:"SHOCK EXIT" }
    : null;

  // Upset ladder — escalating banners by pot-gap and win/draw, ranked most-
  // to-least amazing: a 3-pot win, a 2-pot win, a 3-pot draw, a 2-pot draw,
  // then a plain 1-pot win. Win always outranks a draw at the same gap (a
  // result you could lose for real beats merely denying a favourite), which
  // is why the order isn't a strict "bigger gap wins" sort.
  const upsetLabel = (() => {
    if (!fin || shockExitLabel) return null;
    if (winnerCode && loserCode) {
      const gap = (POT[winnerCode]||4) - (POT[loserCode]||4); // >0 if the weaker pot won
      if (gap === 3) return { icon:"🦄", label:"FAIRYTALE" };
      if (gap === 2) return { icon:"🔪", label:"GIANT KILLER" };
      if (gap === 1) return { icon:"⚠️", label:"UPSET ALERT" };
      return null;
    }
    // Draws (group stage only — knockouts always resolve via penalties, so
    // winnerCode/loserCode would already be set above).
    if (hs === as_) {
      const gap = Math.abs((POT[h]||4) - (POT[a]||4));
      if (gap === 3) return { icon:"🛡️", label:"HEROIC STAND" };
      if (gap === 2) return { icon:"🤝", label:"PUNCHED ABOVE" };
    }
    return null;
  })();

  const resultLabel = shockExitLabel || upsetLabel;

  const rivalryBorder = (clashLabel || resultLabel)
    ? `2px solid ${C.gold}`
    : `1px solid ${C.border}`;

  const rivalryGlow = (clashLabel || resultLabel)
    ? "0 0 10px #f59e0b44"
    : "none";

  return (
    <div style={{ ...s.card, border: rivalryBorder, boxShadow: rivalryGlow }}>
      <div style={{ padding: "12px 14px" }}>
        {/* Header row: stage left | rivalry centre | date right */}
        <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
          <span style={{ fontSize:10, color: live ? C.red : C.dim, fontWeight:700, letterSpacing:"0.08em", flex:1,
            animation: live ? "pulse-red 1.5s infinite" : "none" }}>
            {live ? "⚡ LIVE" : (m.stage||"").replace(/_/g," ")}
          </span>
          <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"center", flex:1 }}>
            {clashLabel && scheduled && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{clashLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.accent, letterSpacing:"0.08em" }}>{clashLabel.label}</span>
            </>}
            {resultLabel && fin && <>
              <span style={{ fontSize:13, lineHeight:1 }}>{resultLabel.icon}</span>
              <span style={{ fontSize:9, fontWeight:900, color:C.gold, letterSpacing:"0.08em" }}>{resultLabel.label}</span>
            </>}
          </div>
          <span style={{ fontSize:10, color: C.muted, flex:1, textAlign:"right" }}>{fmt(m.utcDate)}</span>
        </div>
        {/* Teams row */}
        <div style={{ display:"flex", alignItems:"center" }}>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:8 }}>
            <Flag code={h} size={22} />
            <div>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(h, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.homeTeam?.name || "TBD"}{POT[h] ? <span style={{ color:C.muted, fontSize:9 }}> (P{POT[h]})</span> : ""}</div>
              {pts && <div style={{ fontSize:10, fontWeight:800, color: pts.home > 0 ? C.accent : C.muted, marginTop:2 }}>+{pts.home} pts</div>}
            </div>
          </div>
          <div style={{ minWidth:64, textAlign:"center" }}>
            {fin || live
              ? <span style={{ fontSize:18, fontWeight:800, letterSpacing:2 }}>
                  {m.score?.fullTime?.home ?? 0}–{m.score?.fullTime?.away ?? 0}
                </span>
              : <div>
                  <div style={{ fontSize:12, color: C.muted, marginBottom:5 }}>vs</div>
                  <span style={{
                    fontSize:9, fontWeight:800, color:"white",
                    background: broadcast.b === "ITV" ? "#003087" : "#FF6B35",
                    padding:"2px 6px", borderRadius:3,
                  }}>{broadcast.b}</span>
                </div>
            }
          </div>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:8, justifyContent:"flex-end" }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:13, fontWeight:700, color: C.text }}>{ownerOf(a, ranked) || ""}</div>
              <div style={{ fontSize:11, color: C.muted }}>{m.awayTeam?.name || "TBD"}{POT[a] ? <span style={{ color:C.muted, fontSize:9 }}> (P{POT[a]})</span> : ""}</div>
              {pts && <div style={{ fontSize:10, fontWeight:800, color: pts.away > 0 ? C.accent : C.muted, marginTop:2 }}>+{pts.away} pts</div>}
            </div>
            <Flag code={a} size={22} />
          </div>
        </div>
      </div>
    </div>
  );
}

function PlayerModal({ player, displayRank, winPct, winTeams, badges = [], onClose }) {
  // Freeze background scroll for as long as the sheet is mounted — it's
  // mounted/unmounted with selectedPlayer, so a plain mount/unmount effect
  // is enough.
  React.useEffect(() => {
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prevOverflow; };
  }, []);

  // Swipe-to-dismiss (mobile only — desktop's centred card isn't draggable).
  // Covers the WHOLE sheet, including the scrollable body — not just the
  // handle/header — so it's reachable in the natural thumb zone instead of
  // forcing a reach to the top of the card. To not fight with scrolling the
  // team list, a downward drag only starts dismissing once the body is
  // already scrolled to its top; otherwise it scrolls normally.
  // Native (non-passive) listeners, not React's onTouch* props — React
  // attaches touch listeners as passive by default, which would silently
  // no-op our preventDefault() and let the body rubber-band under the drag.
  const sheetRef = React.useRef(null);
  const bodyRef = React.useRef(null);
  const dragInfo = React.useRef({ startY: 0, startTime: 0, active: false, dragY: 0 });
  const [dragY, setDragY] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);

  React.useEffect(() => {
    const el = sheetRef.current;
    if (!el) return;
    const onStart = (e) => {
      dragInfo.current = { startY: e.touches[0].clientY, startTime: Date.now(), active: true, dragY: 0 };
    };
    const onMove = (e) => {
      if (!dragInfo.current.active) return;
      const delta = e.touches[0].clientY - dragInfo.current.startY;
      const atTop = !bodyRef.current || bodyRef.current.scrollTop <= 0;
      if (delta > 0 && atTop) {
        e.preventDefault(); // we're taking over the gesture — stop the body bouncing under it
        dragInfo.current.dragY = delta;
        setDragging(true);
        setDragY(delta);
      } else if (dragInfo.current.dragY > 0) {
        // finger moved back above the start point mid-drag — clamp rather than go negative
        dragInfo.current.dragY = 0;
        setDragY(0);
      }
    };
    const onEnd = () => {
      if (!dragInfo.current.active) return;
      dragInfo.current.active = false;
      setDragging(false);
      const { dragY: finalDragY, startTime } = dragInfo.current;
      if (finalDragY === 0) return; // never actually became a sheet-drag — was just a scroll
      const elapsed = Date.now() - startTime;
      const velocity = finalDragY / Math.max(elapsed, 1); // px/ms
      const sheetHeight = el.offsetHeight;
      if (finalDragY > sheetHeight * 0.25 || velocity > 0.5) {
        onClose();
      } else {
        setDragY(0); // didn't clear the threshold — spring back open
      }
    };
    el.addEventListener("touchstart", onStart, { passive: true });
    el.addEventListener("touchmove", onMove, { passive: false });
    el.addEventListener("touchend", onEnd, { passive: true });
    return () => {
      el.removeEventListener("touchstart", onStart);
      el.removeEventListener("touchmove", onMove);
      el.removeEventListener("touchend", onEnd);
    };
    // [] deliberately, not [onClose] — App re-renders (poll, countdown tick,
    // etc.) recreate the onClose closure constantly, which would tear down
    // and reattach these native listeners mid-gesture if it were a dep. The
    // captured onClose still does the right thing: this instance only ever
    // closes itself.
  }, []);

  if (!player) return null;
  const isReaper = player.grimReaper;
  return (
    <div className="detail-backdrop" onClick={onClose}>
      <div className="detail-sheet" ref={sheetRef} onClick={(e) => e.stopPropagation()} style={{
        background:C.bg, display:"flex", flexDirection:"column", border:`1px solid ${C.border}`, boxShadow:"0 24px 64px rgba(0,0,0,0.55)",
        transform:`translateY(${dragY}px)`, transition: dragging ? "none" : "transform 0.25s ease",
      }}>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <div>
            <div style={{ fontSize:18, fontWeight:900, color:C.text }}>{player.name}</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{isReaper ? "Grim Reaper" : `Rank ${displayRank} · ${player.total} pts`}</div>
          </div>
          <button onClick={onClose} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        <div ref={bodyRef} style={{ flex:1, overflowY:"auto", padding:"16px 14px 28px" }}>
          <div style={{ display:"flex", gap:10, marginBottom:18 }}>
            <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", textAlign:"center" }}>
              <div style={{ fontSize:24, fontWeight:900, color: player.total < 0 ? C.red : C.text }}>{player.total}</div>
              <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em" }}>Points</div>
            </div>
            <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", textAlign:"center" }}>
              <div style={{ fontSize:24, fontWeight:900, color: isReaper ? C.dangerText : C.accent }}>{isReaper ? "—" : `${winPct ?? 0}%`}</div>
              <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em" }}>Sweeps win chance</div>
            </div>
          </div>

          <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Points over time</div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:s.card.borderRadius, padding:"12px 8px", marginBottom:18, display:"flex", justifyContent:"center" }}>
            <Sparkline data={player.hist} width={300} height={72} color={isReaper ? C.red : player.total < 0 ? C.red : player.total === 0 ? C.neutral : C.accent} />
          </div>

          {isReaper ? (
            <>
              <div style={{ fontSize:11, color:C.dangerText, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8 }}>Bounty Board</div>
              {[["Pot 1 upset", 1, 50], ["Pot 2 upset", 2, 15]].map(([label, pot, bounty]) => {
                const count = Object.entries(player._eliminated || {}).filter(([code, stage]) => stage === "GROUP_ELIM" && (POT[code] || 4) === pot).length;
                return (
                  <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid #3f1212` }}>
                    <div>
                      <div style={{ fontSize:12, color: count > 0 ? C.text : C.dangerText, opacity: count > 0 ? 1 : 0.5 }}>{label}</div>
                      <div style={{ fontSize:10, color:C.dangerText, opacity:0.6 }}>{bounty}pts per team</div>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color: count > 0 ? C.red : C.dangerText }}>{count > 0 ? `+${count * bounty}pts` : "—"}</div>
                  </div>
                );
              })}
              {(() => {
                const groupMatches = (player._matches || []).filter(m => (m.stage||"").toUpperCase().includes("GROUP") && m.status === "FINISHED");
                const droughtGames = groupMatches.filter(m => goalDroughtPts(m) > 0);
                const droughtTotal = droughtGames.reduce((sum, m) => sum + goalDroughtPts(m), 0);
                return (
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0" }}>
                    <div>
                      <div style={{ fontSize:12, color: droughtTotal > 0 ? C.text : C.dangerText, opacity: droughtTotal > 0 ? 1 : 0.5 }}>Goal drought curse</div>
                      <div style={{ fontSize:10, color:C.dangerText, opacity:0.6 }}>3pts per 0-0</div>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color: droughtTotal > 0 ? C.red : C.dangerText }}>{droughtTotal > 0 ? `+${droughtTotal}pts` : "—"}</div>
                  </div>
                );
              })()}
            </>
          ) : (
            <>
              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Teams</div>
              {player.teams.map(t => {
                const out = t.eliminated && !t.won;
                const wc = t.won ? 100 : (winTeams && winTeams[t.code] != null ? winTeams[t.code] : 0);
                return (
                  <div key={t.code} style={{ display:"flex", alignItems:"center", padding:"9px 0", borderBottom:`1px solid ${C.border}`, opacity: out ? 0.5 : 1 }}>
                    <div style={{ marginRight:10, flexShrink:0 }}><Flag code={t.code} size={20} /></div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{t.name} <span style={{ fontSize:10, color:C.muted, fontWeight:400 }}>(P{t.pot})</span></div>
                      <div style={{ fontSize:11, color:C.muted }}>{(t.w + t.d + t.l) > 0 ? `${t.w}W ${t.d}D ${t.l}L` : "0W 0D 0L"} · {t.won ? "Winner 🏆" : t.stage ? STAGE_LABEL[t.stage] : "Group Stage"}</div>
                    </div>
                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      <div style={{ fontSize:13, fontWeight:700, color: t.pts < 0 ? C.red : t.pts > 0 ? C.text : C.muted }}>{t.pts > 0 ? "+" : ""}{t.pts}pts</div>
                      <div style={{ fontSize:10, color: out ? C.muted : C.accent }}>{out ? "out" : `${wc}% to win WC`}</div>
                    </div>
                  </div>
                );
              })}
              <div style={{ fontSize:9, color:C.muted, marginTop:12, lineHeight:1.4 }}>
                Win chances are rough Monte Carlo estimates (pot-weighted) — for fun, not real odds.
              </div>
            </>
          )}
          {badges && badges.length > 0 && (
            <>
              <div style={{ fontSize:11, color:C.text, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", margin:"22px 0 8px" }}>Accolades</div>
              {badges.map((b, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                  <span style={{ fontSize:20, flexShrink:0, width:24, textAlign:"center" }}>{b.icon}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color: b.tone === "bad" ? C.dangerText : C.accent }}>{b.label}</div>
                    <div style={{ fontSize:11, color:C.muted }}>{b.desc}</div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const formatBucket = (b) => {
  if (!b) return "";
  if (b === "Start") return "Start";
  if (b.startsWith("MD")) return `MD ${b.slice(2)}`;
  if (b.includes("LAST_32")) return "Last 32";
  if (b.includes("LAST_16") || b.includes("16")) return "Last 16";
  if (b.includes("QUARTER")) return "QF";
  if (b.includes("SEMI")) return "SF";
  if (b === "FINAL") return "Final";
  return b;
};

function HScrollButtons({ targetRef, step = 200 }) {
  const scroll = (dir) => {
    const el = targetRef.current;
    if (el) el.scrollBy({ left: dir * step, behavior: "smooth" });
  };
  const btn = {
    width:34, height:34, borderRadius:"50%", border:`1px solid ${C.border}`,
    background:C.card, color:C.dim, cursor:"pointer", display:"flex",
    alignItems:"center", justifyContent:"center", fontSize:18, lineHeight:1,
    padding:0, fontWeight:700,
  };
  return (
    <div className="hscroll-nav" style={{ gap:8, justifyContent:"flex-end", marginBottom:10, paddingRight:4 }}>
      <button style={btn} onClick={() => scroll(-1)} aria-label="Scroll left">‹</button>
      <button style={btn} onClick={() => scroll(1)} aria-label="Scroll right">›</button>
    </div>
  );
}

function BumpChart({ history, allRanked, bucketLabels = [], raceHistory }) {
  const [selected, setSelected] = React.useState(null);
  const scrollRef = React.useRef(null);
  const maxLen = Math.max(...history.map(p => p.hist.length));

  // Start scrolled to the right (current standings); buttons/trackpad reveal history.
  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) requestAnimationFrame(() => { el.scrollLeft = el.scrollWidth; });
  }, [maxLen]);

  if (maxLen < 2) {
    return (
      <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13 }}>
        Not enough scoring events yet to show rankings over time.
      </div>
    );
  }

  const n = history.length;
  const padL = 16, padR = 72, padT = 16, padB = 24;
  const isDesktop = window.innerWidth >= 768;
  // Width available for the plotted columns. On desktop base it on the CONTENT
  // column (capped at #root's 760px max, minus 28px padding each side) — NOT the
  // full monitor width, which blows the columns out absurdly wide.
  const contentW = isDesktop ? Math.min(window.innerWidth - 260, 760) - 56 : window.innerWidth;
  // Subtract the body's own side padding (28px mobile = 14×2) so the chart fills
  // the content column; the desktop contentW already nets that off, hence -8.
  const availW = contentW - padL - padR - (isDesktop ? 8 : 28);
  // Fill the available width, but never narrower than MIN_COL — past that point
  // (lots of games) the chart grows beyond the view and scrolls instead.
  const MIN_COL = 80;
  const COL_W = maxLen <= 2 ? availW : Math.max(MIN_COL, Math.floor(availW / (maxLen - 1)));
  // Chart only scrolls (and thus needs the left fade) once it outgrows the view.
  const scrollable = (maxLen - 1) * COL_W > availW + 1;
  const rowH = 34;
  const chartW = (maxLen - 1) * COL_W;
  const chartH = (n - 1) * rowH;
  const W = padL + chartW + padR;
  const H = padT + chartH + padB;

  const xScale = t => padL + t * COL_W;
  const yScale = r => padT + (r - 1) * rowH;

  const colorOf = name => playerColor(name);

  const timePoints = Array.from({length: maxLen}, (_, t) => {
    const scores = history.map(p => ({
      name: p.name,
      pts: p.hist[Math.min(t, p.hist.length - 1)],
    })).sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
    const ranks = {};
    scores.forEach((s, i) => { ranks[s.name] = i + 1; });
    return ranks;
  });

  const buildPath = name => {
    const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i-1][0] + pts[i][0]) / 2;
      d += ` C ${cpx},${pts[i-1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
    }
    return d;
  };

  const startRanks = timePoints[0];
  const endRanks = timePoints[maxLen - 1];

  const xLabels = Array.from({length: maxLen}, (_, t) => ({
    t,
    label: bucketLabels[t] ? formatBucket(bucketLabels[t]) : (t === 0 ? "Start" : t === maxLen-1 ? "Now" : "")
  })).filter(x => x.label);

  return (
    <div style={{ padding:"8px 0 0" }}>
      <HScrollButtons targetRef={scrollRef} step={COL_W * 2} />
      <div style={{ position:"relative" }}>
        <div ref={scrollRef} style={{ overflowX:"scroll", overflowY:"hidden", WebkitOverflowScrolling:"touch" }}>
          <div style={{ display:"inline-block" }}>
        <svg width={W} height={H} style={{ display:"block" }}>
          {/* Horizontal grid lines */}
          {Array.from({length: n}, (_, i) => (
            <line key={i} x1={padL} y1={yScale(i+1)} x2={padL+chartW} y2={yScale(i+1)} stroke={C.border} strokeWidth={1} />
          ))}
          {/* Lines */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <path key={p.name} d={buildPath(p.name)} fill="none"
              stroke={dim ? C.border : colorOf(p.name)}
              strokeWidth={selected === p.name ? 3.5 : 2.5}
              strokeLinecap="round" strokeLinejoin="round"
              opacity={dim ? 0.3 : 0.9} />
            );
          })}
          {/* Dots */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return timePoints.map((tp, t) => (
              <circle key={`${p.name}-${t}`}
                cx={xScale(t)} cy={yScale(tp[p.name])}
                r={t === maxLen-1 ? 5 : 3}
                fill={dim ? C.border : colorOf(p.name)}
                stroke="#080c18" strokeWidth={1.5}
                opacity={dim ? 0.3 : 1} />
            ));
          })}
          {/* Rank numbers on left */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`s-${p.name}`} x={padL-5} y={yScale(startRanks[p.name])+4}
              textAnchor="end" fontSize={10} fontWeight={700}
              fill={dim ? C.border : colorOf(p.name)}
              opacity={dim ? 0.3 : 1}>
              {startRanks[p.name]}
            </text>
            );
          })}
          {/* Name labels on right — tappable */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`e-${p.name}`} x={padL+chartW+8} y={yScale(endRanks[p.name])+4}
              textAnchor="start" fontSize={11} fontWeight={700}
              fill={dim ? C.neutral : colorOf(p.name)}
              opacity={dim ? 0.4 : 1}
              style={{ cursor:"pointer" }}
              onClick={() => setSelected(selected === p.name ? null : p.name)}>
              {p.name}
            </text>
            );
          })}
          {/* X labels */}
          {xLabels.map(({t, label}) => (
            <text key={`xl-${t}`} x={xScale(t)} y={H-4}
              textAnchor="middle" fontSize={9} fill={C.muted}>{label}</text>
          ))}
        </svg>
          </div>
        </div>
        {/* Left fade — only when the chart is wide enough to scroll horizontally */}
        {scrollable && (
        <div style={{
          position:"absolute", top:0, left:0, bottom:0, width:48,
          background:`linear-gradient(to right, ${C.bg} 0%, transparent 100%)`,
          pointerEvents:"none",
        }}/>
        )}
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16, padding:"0 4px" }}>
        {allRanked.map((p, i) => {
          const dim = selected && selected !== p.name;
          return (
          <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
            style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", opacity: dim ? 0.35 : 1 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:playerColor(p.name), flexShrink:0 }}/>
            <span style={{ fontSize:11, color:C.muted }}>{p.name} <span style={{ color:C.text, fontWeight:700 }}>{p.total}pts</span></span>
          </div>
          );
        })}
      </div>
    </div>
  );
}

function BarRaceModal({ history, allRanked, bucketLabels = [], elimByFrame = [], onClose }) {
  const maxLen = Math.max(...history.map(p => p.hist.length));
  const [frame, setFrame] = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const intervalRef = React.useRef(null);
  const TICK = 800;
  const n = history.length;

  // Each player's teams (code + elimination status) for the flags shown by the bar.
  const teamsByName = {};
  allRanked.forEach(p => { teamsByName[p.name] = p.teams || []; });
  // Teams eliminated as of the current frame (progressive through the race).
  const elimNow = React.useMemo(
    () => new Set(elimByFrame[Math.min(frame, Math.max(0, elimByFrame.length - 1))] || []),
    [frame, elimByFrame]
  );

  const colorOf = name => playerColor(name);

  const prevRanks = React.useRef({});

  // Compute standings at this frame — each entry gets a rank (0 = top)
  const standings = React.useMemo(() => {
    const sorted = history.map(p => ({
      name: p.name,
      value: p.hist[Math.min(frame, p.hist.length - 1)],
      color: colorOf(p.name),
    })).sort((a, b) => b.value - a.value || a.name.localeCompare(b.name));
    return sorted.map((s, i) => {
      const prev = prevRanks.current[s.name] ?? i;
      const movingUp = i < prev; // lower index = higher rank = moving up
      return { ...s, rank: i, movingUp };
    });
  }, [frame]);

  // After each render, update prevRanks
  React.useEffect(() => {
    standings.forEach(s => { prevRanks.current[s.name] = s.rank; });
  }, [standings]);

  const maxValue = Math.max(...standings.map(s => s.value), 1);

  // Work out tournament stage label for current frame
  const frameLabel = frame === 0 ? "Start" : `Game ${frame} of ${maxLen - 1}`;

  React.useEffect(() => {
    if (playing && frame < maxLen - 1) {
      intervalRef.current = setTimeout(() => setFrame(f => f + 1), TICK);
    } else if (frame >= maxLen - 1) {
      setPlaying(false);
    }
    return () => clearTimeout(intervalRef.current);
  }, [playing, frame]);

  const wasPlayingRef = React.useRef(false);

  const onScrubStart = () => { wasPlayingRef.current = playing; setPlaying(false); };
  const onScrubEnd = () => { if (wasPlayingRef.current && frame < maxLen - 1) setPlaying(true); };

  const toggle = () => {
    if (frame >= maxLen - 1) { setFrame(0); setPlaying(true); }
    else setPlaying(p => !p);
  };
  const restart = () => { setFrame(0); setPlaying(true); };
  const progress = (frame / Math.max(maxLen - 1, 1)) * 100;

  // Fixed row height for animation
  const ROW_H = `${100 / n}%`;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:60, background:C.bg, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text }}>🏁 The Race</div>
        <button onClick={onClose} aria-label="Close" style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
      </div>

      {/* Chart */}
      <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0 }}>
          {/* Render in STABLE order (by name) so DOM nodes never remount */}
          {[...history].sort((a,b) => a.name.localeCompare(b.name)).map(p => {
            const s = standings.find(x => x.name === p.name);
            if (!s) return null;
            const topPct = (s.rank / n) * 100;
            const barW = maxValue > 0 ? (s.value / maxValue) * 100 : 0;
            return (
              <div key={s.name} style={{
                position:"absolute",
                left:0, right:0,
                height:ROW_H,
                top:`${topPct}%`,
                transition:`top ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                display:"flex", alignItems:"center",
                padding:"0 16px",
                gap:8,
                zIndex: s.movingUp ? n + 1 : 1,
              }}>
                <div style={{ width:18, textAlign:"right", fontSize:11, color:C.muted, flexShrink:0, fontWeight:700 }}>
                  {s.rank + 1}
                </div>
                <div style={{ width:66, textAlign:"right", fontSize:12, fontWeight:700, color:C.text, flexShrink:0, overflow:"hidden", whiteSpace:"nowrap" }}>
                  {s.name}
                </div>
                <div style={{ display:"flex", gap:3, flexShrink:0, width:50, alignItems:"center" }}>
                  {(teamsByName[s.name] || []).length === 0 ? (
                    <span style={{ fontSize:16, lineHeight:1, marginLeft:2 }}>💀</span>
                  ) : (teamsByName[s.name] || []).map(t => {
                    const out = elimNow.has(t.code);
                    const url = flag(t.code);
                    return (
                      <div key={t.code} style={{ position:"relative", width:22, height:15, flexShrink:0 }}>
                        <div style={{
                          position:"absolute", inset:0, borderRadius:2,
                          backgroundImage: url ? `url(${url})` : "none", backgroundColor:C.border,
                          backgroundSize:"cover", backgroundPosition:"center",
                          filter: out ? "grayscale(1)" : "none", opacity: out ? 0.4 : 1,
                        }}/>
                        {out && (
                          <span style={{ position:"absolute", top:-2, right:-1, fontSize:9, fontWeight:900, color:C.red, textShadow:"0 0 2px rgba(0,0,0,0.9)", lineHeight:1, zIndex:1 }}>✕</span>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{ flex:1, position:"relative", height:"55%", minHeight:18 }}>
                  <div style={{ position:"absolute", inset:0, background:C.border, borderRadius:"0 3px 3px 0" }}/>
                  <div style={{
                    position:"absolute", left:0, top:0, bottom:0,
                    width:`${barW}%`,
                    background:s.color,
                    borderRadius:"0 3px 3px 0",
                    transition:`width ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                  }}/>
                  {s.value > 0 && (
                    <div style={{
                      position:"absolute", left:0, top:0, bottom:0, right:0,
                      display:"flex", alignItems:"center",
                      justifyContent: barW > 70 ? "flex-end" : "flex-start",
                      paddingLeft: barW > 70 ? 0 : `calc(${barW}% + 6px)`,
                      paddingRight: barW > 70 ? 8 : 0,
                      pointerEvents:"none",
                    }}>
                      <span style={{ fontSize:11, fontWeight:700, color:C.text, whiteSpace:"nowrap" }}>
                        {s.value}pts
                      </span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Stage watermark — background only, no event counter here */}
        <div style={{ position:"absolute", bottom:8, right:16, textAlign:"right", pointerEvents:"none" }}>
          <div style={{ fontSize:28, fontWeight:800, color:"rgba(255,255,255,0.06)", lineHeight:1 }}>{frameLabel}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ padding:"10px 16px 20px", flexShrink:0 }}>
        {/* Scrubber */}
        <input
          type="range" min={0} max={maxLen - 1} value={frame}
          onMouseDown={onScrubStart} onTouchStart={onScrubStart}
          onMouseUp={onScrubEnd} onTouchEnd={onScrubEnd}
          onChange={e => setFrame(Number(e.target.value))}
          style={{ width:"100%", marginBottom:10, accentColor:C.accent, cursor:"pointer" }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontSize:11, color:C.muted, fontWeight:600 }}>{frameLabel}</span>
          <span style={{ fontSize:11, color:C.muted }}>Event {frame + 1} of {maxLen}</span>
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:8 }}>
          <button onClick={restart} style={{ background:C.border, border:"none", color:C.text, padding:"8px 16px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>Restart</button>
          <button onClick={toggle} style={{ background:C.accent, border:"none", color:"white", padding:"8px 24px", borderRadius:6, cursor:"pointer", fontSize:14, fontWeight:700 }}>
            {playing ? "⏸" : frame >= maxLen - 1 ? "↺" : "▶"}
          </button>
        </div>
      </div>
    </div>
  );
}
