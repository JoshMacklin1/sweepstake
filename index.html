const PTS_INC = {
  LAST_32:       [0,   15,  25,   50],
  LAST_16:       [5,   25,  50,   150],
  QUARTER_FINALS:[15,  50,  100,  300],

  WINNER:        [100, 500, 1000, 2000],
  GROUP_ELIM:    [-50, -15, 0,    0],
};

// Stage order — higher index = further in tournament
const STAGE_ORDER = ["GROUP_ELIM","LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINALIST","WINNER"];

// Total points for a team at a given stage (sum of all incremental stages reached)
const ptsTotal = (code, stageKey) => {
  if (stageKey === "GROUP_ELIM") return (PTS_INC.GROUP_ELIM || [0,0,0,0])[(POT[code]||4)-1];
  const pot = (POT[code]||4) - 1;
  const idx = STAGE_ORDER.indexOf(stageKey);
  if (idx < 0) return 0;
  let total = 0;
  STAGE_ORDER.slice(1, idx + 1).forEach(s => { total += (PTS_INC[s]||[0,0,0,0])[pot]; });
  return total;
};

// ─────────────────────────────────────────────────────────────────────────────
// DERIVE TEAM STAGES FROM MATCH DATA
// ─────────────────────────────────────────────────────────────────────────────
function deriveStages(matches) {
  const eliminated = {};
  const winners    = {};
  const stageReached = {}; // code → highest stage key reached

  const done = matches.filter(m => m.status === "FINISHED");

  const markStage = (code, stageKey) => {
    if (!code) return;
    const cur = stageReached[code];
    if (!cur || STAGE_ORDER.indexOf(stageKey) > STAGE_ORDER.indexOf(cur)) {
      stageReached[code] = stageKey;
    }
  };

  done.forEach(m => {
    const stage = (m.stage || "").toUpperCase();
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const pen = m.score?.penalties;

    let loser = null, winner = null;
    if (hs > as_)      { loser = a; winner = h; }
    else if (as_ > hs) { loser = h; winner = a; }
    else if (pen) {
      if (pen.home > pen.away) { loser = a; winner = h; }
      else { loser = h; winner = a; }
    }

    if (stage === "FINAL") {
      if (winner) { winners[winner] = true; markStage(winner, "WINNER"); }
      if (loser)  { eliminated[loser] = "FINALIST"; markStage(loser, "FINALIST"); }
    } else if (stage.includes("SEMI")) {
      markStage(winner, "SEMI_FINALS"); markStage(loser, "SEMI_FINALS");
      if (loser) eliminated[loser] = "SEMI_FINALS";
    } else if (stage.includes("QUARTER")) {
      markStage(winner, "QUARTER_FINALS"); markStage(loser, "QUARTER_FINALS");
      if (loser) eliminated[loser] = "QUARTER_FINALS";
    } else if (stage.includes("LAST_16") || stage.includes("16")) {
      markStage(winner, "LAST_16"); markStage(loser, "LAST_16");
      if (loser) eliminated[loser] = "LAST_16";
    } else if (stage.includes("LAST_32") || stage.includes("32")) {
      markStage(winner, "LAST_32"); markStage(loser, "LAST_32");
      if (loser) eliminated[loser] = "LAST_32";
    }
  });

  // Group stage eliminations
  const knockoutTeams = new Set(Object.keys(stageReached));
  const groupGames = {};
  done.filter(m => (m.stage||"").toUpperCase().includes("GROUP")).forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    if (h) groupGames[h] = (groupGames[h]||0) + 1;
    if (a) groupGames[a] = (groupGames[a]||0) + 1;
  });
  Object.entries(groupGames).forEach(([code, n]) => {
    if (n >= 3 && !knockoutTeams.has(code) && !eliminated[code]) {
      eliminated[code] = "GROUP_ELIM";
      stageReached[code] = "GROUP_ELIM";
    }
  });

  return { eliminated, winners, stageReached };
}

// ─────────────────────────────────────────────────────────────────────────────
// W/D/L TALLY  — count match results for every team across all finished games
// ─────────────────────────────────────────────────────────────────────────────
function deriveWDL(matches) {
  const record = {}; // code → { w, d, l }
  const ensure = c => { if (c && !record[c]) record[c] = { w:0, d:0, l:0 }; };

  matches.filter(m => m.status === "FINISHED").forEach(m => {
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    ensure(h); ensure(a);
    if (!h || !a) return;
    if (hs > as_)      { record[h].w++; record[a].l++; }
    else if (as_ > hs) { record[a].w++; record[h].l++; }
    else               { record[h].d++; record[a].d++; }
  });
  return record;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORE PLAYERS
// ─────────────────────────────────────────────────────────────────────────────
function scorePlayers(matches) {
  const { eliminated, winners, stageReached } = deriveStages(matches);
  const wdlByTeam = deriveWDL(matches);
  const history = deriveHistory(matches);

  return PLAYERS.map(p => {
    let total = 0;
    let w = 0, d = 0, l = 0;

    const teams = p.codes.map((code, i) => {
      const stage = stageReached[code] || null;
      const p_pts = stage ? pts(code, stage) : 0;
      total += p_pts;

      const teamRecord = wdlByTeam[code] || { w:0, d:0, l:0 };
      w += teamRecord.w;
      d += teamRecord.d;
      l += teamRecord.l;

      return { name: p.teams[i], code, pot: POT[code]||4, stage, pts: p_pts,
               w: teamRecord.w, d: teamRecord.d, l: teamRecord.l,
               eliminated: !!eliminated[code], won: !!winners[code] };
    });

    const hist = history[p.name] || [0];
    const lastVal = hist[hist.length - 1];
    const prevVal = hist.length >= 2 ? hist[hist.length - 2] : 0;
    const lastChange = lastVal - prevVal;
    const pctChange = prevVal !== 0 ? ((lastChange / Math.abs(prevVal)) * 100) : null;

    const tiebreak = w * 3 + d - l;
    return { ...p, total, teams, w, d, l, tiebreak, hist, lastChange, pctChange };
  }).sort((a, b) => b.total - a.total || b.tiebreak - a.tiebreak);
}

// ─────────────────────────────────────────────────────────────────────────────
// HISTORY — replay matches chronologically, compute per-player cumulative points
// ─────────────────────────────────────────────────────────────────────────────
function deriveHistory(matches) {
  const done = matches
    .filter(m => m.status === "FINISHED")
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const teamPlayer = {};
  PLAYERS.forEach(p => p.codes.forEach(c => { teamPlayer[c] = p.name; }));

  const running = {};
  const history = {};
  const teamPts = {}; // track cumulative pts per team to avoid double-counting
  PLAYERS.forEach(p => { running[p.name] = 0; history[p.name] = [0]; });

  const eliminated = {}, winners = {}, groupGames = {};
  const knockoutTeams = new Set();

  // Pre-mark knockout teams
  matches.filter(m => !(m.stage||"").toUpperCase().includes("GROUP") && m.status === "FINISHED").forEach(m => {
    if (m.homeTeam?.tla) knockoutTeams.add(m.homeTeam.tla.toUpperCase());
    if (m.awayTeam?.tla) knockoutTeams.add(m.awayTeam.tla.toUpperCase());
  });

  done.forEach(m => {
    const stage = (m.stage || "").toUpperCase();
    const h = m.homeTeam?.tla?.toUpperCase();
    const a = m.awayTeam?.tla?.toUpperCase();
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const pen = m.score?.penalties;

    let loser = null, winner = null;
    if (hs > as_)      { loser = a; winner = h; }
    else if (as_ > hs) { loser = h; winner = a; }
    else if (pen) { if (pen.home > pen.away) { loser = a; winner = h; } else { loser = h; winner = a; } }

    let changed = false;
    const award = (code, stageKey) => {
      const pl = teamPlayer[code];
      if (pl) {
        // Set running total to cumulative pts at this stage (not incremental)
        const newPts = ptsTotal(code, stageKey);
        const oldPts = teamPts[code] || 0;
        running[pl] += (newPts - oldPts);
        teamPts[code] = newPts;
        changed = true;
      }
    };

    if (stage === "FINAL") {
      if (winner && !winners[winner]) { winners[winner] = true; award(winner, "WINNER"); }
      if (loser && !eliminated[loser]) { eliminated[loser] = "FINALIST"; award(loser, "FINALIST"); }
    } else if (stage.includes("SEMI") && loser && !eliminated[loser])    {
      eliminated[loser] = "SEMI_FINALS"; award(loser, "SEMI_FINALS");
      if (winner) award(winner, "SEMI_FINALS");
    } else if (stage.includes("QUARTER") && loser && !eliminated[loser]) {
      eliminated[loser] = "QUARTER_FINALS"; award(loser, "QUARTER_FINALS");
      if (winner) award(winner, "QUARTER_FINALS");
    } else if ((stage.includes("LAST_16")||stage.includes("16")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_16"; award(loser, "LAST_16");
      if (winner) award(winner, "LAST_16");
    } else if ((stage.includes("LAST_32")||stage.includes("32")) && loser && !eliminated[loser]) {
      eliminated[loser] = "LAST_32"; award(loser, "LAST_32");
      if (winner) award(winner, "LAST_32");
    } else if (stage.includes("GROUP")) {
      [h, a].forEach(code => {
        if (code) groupGames[code] = (groupGames[code]||0) + 1;
        if (code && groupGames[code] >= 3 && !knockoutTeams.has(code) && !eliminated[code]) {
          eliminated[code] = "GROUP_ELIM"; award(code, "GROUP_ELIM");
        }
      });
    }

    if (changed) PLAYERS.forEach(p => history[p.name].push(running[p.name]));
  });

  return history;
}

// SPARKLINE SVG
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({ data, width = 90, height = 28, color = "#22c55e" }) {
  if (!data || data.length < 2) {
    return (
      <svg width={width} height={height} style={{ display:"block" }}>
        <line x1={0} y1={height*0.6} x2={width} y2={height*0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
      </svg>
    );
  }

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 3;

  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${points[points.length-1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
  const uid = `sp${data.length}x${data[data.length-1]}`;

  return (
    <svg width={width} height={height} style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${uid})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={2.5} fill={color} />
    </svg>
  );
}

const PLAYER_COLORS = [
  "#f59e0b","#60a5fa","#34d399","#f87171","#a78bfa","#fb923c","#38bdf8","#4ade80"
];

function BumpChart({ history, allRanked }) {
  const [selected, setSelected] = React.useState(null);
  const [showRace, setShowRace] = React.useState(false);
  const maxLen = Math.max(...history.map(p => p.hist.length));
  if (maxLen < 2) {
    return (
      <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13 }}>
        Not enough scoring events yet to show rankings over time.
      </div>
    );
  }

  const n = history.length;
  const padL = 16, padR = 72, padT = 16, padB = 24;
  const COL_W = 40;
  const rowH = 34;
  const chartW = (maxLen - 1) * COL_W;
  const chartH = (n - 1) * rowH;
  const W = padL + chartW + padR;
  const H = padT + chartH + padB;

  const xScale = t => padL + t * COL_W;
  const yScale = r => padT + (r - 1) * rowH;

  const colorOf = name => {
    const idx = allRanked.findIndex(p => p.name === name);
    return PLAYER_COLORS[idx % PLAYER_COLORS.length];
  };

  const timePoints = Array.from({length: maxLen}, (_, t) => {
    const scores = history.map(p => ({
      name: p.name,
      pts: p.hist[Math.min(t, p.hist.length - 1)],
      finalRank: allRanked.findIndex(r => r.name === p.name),
    })).sort((a, b) => b.pts - a.pts || a.finalRank - b.finalRank);
    const ranks = {};
    scores.forEach((s, i) => { ranks[s.name] = i + 1; });
    return ranks;
  });

  const buildPath = name => {
    const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i-1][0] + pts[i][0]) / 2;
      d += ` C ${cpx},${pts[i-1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
    }
    return d;
  };

  const startRanks = timePoints[0];
  const endRanks = timePoints[maxLen - 1];

  const xLabels = [];
  xLabels.push({t:0, label:"Start"});
  if (maxLen > 3) xLabels.push({t: Math.floor(maxLen/2), label:"Mid"});
  xLabels.push({t: maxLen-1, label:"Now"});

  return (
    <div style={{ padding:"8px 0 0" }}>
      <div style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>
        Rankings Over Time
      </div>
      <div style={{ overflowX:"scroll", overflowY:"hidden", WebkitOverflowScrolling:"touch" }}>
        <svg width={W} height={H} style={{ display:"block" }}>
          {/* Horizontal grid lines */}
          {Array.from({length: n}, (_, i) => (
            <line key={i} x1={padL} y1={yScale(i+1)} x2={padL+chartW} y2={yScale(i+1)} stroke="#1e293b" strokeWidth={1} />
          ))}
          {/* Lines */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <path key={p.name} d={buildPath(p.name)} fill="none"
              stroke={dim ? "#1e293b" : colorOf(p.name)}
              strokeWidth={selected === p.name ? 3.5 : 2.5}
              strokeLinecap="round" strokeLinejoin="round"
              opacity={dim ? 0.3 : 0.9} />
            );
          })}
          {/* Dots */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return timePoints.map((tp, t) => (
              <circle key={`${p.name}-${t}`}
                cx={xScale(t)} cy={yScale(tp[p.name])}
                r={t === maxLen-1 ? 5 : 3}
                fill={dim ? "#1e293b" : colorOf(p.name)}
                stroke="#080c18" strokeWidth={1.5}
                opacity={dim ? 0.3 : 1} />
            ));
          })}
          {/* Start rank numbers */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`s-${p.name}`} x={padL-5} y={yScale(startRanks[p.name])+4}
              textAnchor="end" fontSize={10} fontWeight={700}
              fill={dim ? "#1e293b" : colorOf(p.name)}
              opacity={dim ? 0.3 : 1}>
              {startRanks[p.name]}
            </text>
            );
          })}
          {/* End name labels — tappable */}
          {history.map(p => {
            const dim = selected && selected !== p.name;
            return (
            <text key={`e-${p.name}`} x={padL+chartW+8} y={yScale(endRanks[p.name])+4}
              textAnchor="start" fontSize={11} fontWeight={700}
              fill={dim ? "#334155" : colorOf(p.name)}
              opacity={dim ? 0.4 : 1}
              style={{ cursor:"pointer" }}
              onClick={() => setSelected(selected === p.name ? null : p.name)}>
              {p.name}
            </text>
            );
          })}
          {/* X labels */}
          {xLabels.map(({t, label}) => (
            <text key={`xl-${t}`} x={xScale(t)} y={H-4}
              textAnchor="middle" fontSize={9} fill="#475569">{label}</text>
          ))}
        </svg>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16, padding:"0 4px" }}>
        {allRanked.map((p, i) => {
          const dim = selected && selected !== p.name;
          return (
          <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
            style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", opacity: dim ? 0.35 : 1 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:PLAYER_COLORS[i % PLAYER_COLORS.length], flexShrink:0 }}/>
            <span style={{ fontSize:11, color:C.muted }}>{p.name} <span style={{ color:C.text, fontWeight:700 }}>{p.total}pts</span></span>
          </div>
          );
        })}
      </div>

      {/* Race button */}
      <button onClick={() => setShowRace(true)} style={{
        marginTop:20, width:"100%", padding:"14px",
        background:"linear-gradient(135deg, #1d4ed8, #3b82f6)",
        color:"white", border:"none", borderRadius:10,
        fontSize:14, fontWeight:700, cursor:"pointer",
        letterSpacing:"0.03em",
      }}>
        🏁 Watch the Race
      </button>

      {showRace && <BarRaceModal history={history} allRanked={allRanked} onClose={() => setShowRace(false)} />}
    </div>
  );
}

function BarRaceModal({ history, allRanked, onClose }) {
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const maxLen = Math.max(...history.map(p => p.hist.length));

    // Build {date, name, value} — racing-bars accepts inline arrays directly
    const raceData = [];
    for (let t = 0; t < maxLen; t++) {
      const dateStr = `2026-${String(Math.floor(t / 28) + 6).padStart(2,"0")}-${String((t % 28) + 1).padStart(2,"0")}`;
      history.forEach(p => {
        raceData.push({
          date: dateStr,
          name: p.name,
          value: p.hist[Math.min(t, p.hist.length - 1)],
        });
      });
    }

    const runRace = () => {
      if (!containerRef.current || !window.racingBars) return;
      containerRef.current.innerHTML = '<div id="race-inner" style="width:100%;height:100%"></div>';
      window.racingBars.race(raceData, "#race-inner", {
        title: "Sweepstake Tracker",
        subTitle: "Points over time",
        theme: "dark",
        tickDuration: 500,
        topN: 8,
        loop: false,
        showControls: "all",
        labelsPosition: "outside",
        showIcons: false,
        autorun: true,
      });
    };

    if (window.racingBars) {
      setTimeout(runRace, 50);
    } else {
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/racing-bars/racing-bars.umd.js";
      script.onload = () => setTimeout(runRace, 50);
      script.onerror = () => {
        if (containerRef.current) {
          containerRef.current.innerHTML = '<div style="color:#ef4444;padding:20px">Failed to load racing-bars library. Check your internet connection.</div>';
        }
      };
      document.head.appendChild(script);
    }
  }, []);

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:60,
      background:"#080c18",
      display:"flex", flexDirection:"column",
    }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text }}>🏁 The Race</div>
        <button onClick={onClose} style={{ background:"transparent", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
      </div>
      <div ref={containerRef} style={{ flex:1, position:"relative", minHeight:0 }}>
        <div style={{ color:C.muted, padding:20, fontSize:13 }}>Loading race...</div>
      </div>
    </div>
  );
}

function App() {
  const [matches,     setMatches]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [tab,         setTab]         = useState("table");
  const [expanded,    setExpanded]    = useState(null);
  const [refreshing,  setRefreshing]  = useState(false);
  const [devMode,     setDevMode]     = useState(DEV_MODE_DEFAULT);
  const [showInfo,    setShowInfo]    = useState(false);
  const [barsVisible, setBarsVisible] = useState(true);
  const lastScrollY = React.useRef(0);

  const fetchMatches = useCallback(async (isManual = false, forceDev = null) => {
    if (isManual) setRefreshing(true);
    const useDev = forceDev !== null ? forceDev : devMode;
    if (useDev) {
      setMatches(MOCK_MATCHES);
      setLastUpdated(new Date());
      setLoading(false);
      setRefreshing(false);
      return;
    }
    try {
      const res  = await fetch(`${WORKER_URL}/competitions/${WC_CODE}/matches?season=${SEASON}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      setMatches(data.matches || []);
      setLastUpdated(new Date());
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => {
    fetchMatches();
    const id = setInterval(() => fetchMatches(), 60_000);
    return () => clearInterval(id);
  }, [fetchMatches]);

  useEffect(() => {
    const handleScroll = () => {
      const y = window.scrollY;
      const diff = y - lastScrollY.current;
      if (diff > 4) setBarsVisible(false);       // scrolling down
      else if (diff < -4) setBarsVisible(true);  // scrolling up
      lastScrollY.current = y;
    };
    window.addEventListener("scroll", handleScroll, { passive: true });
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  const ranked   = scorePlayers(matches);
  const live     = matches.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED");
  const upcoming = matches.filter(m => m.status === "SCHEDULED" || m.status === "TIMED");
  const recent   = matches.filter(m => m.status === "FINISHED").reverse();

  const groupByDay = (ms) => {
    const groups = {};
    ms.forEach(m => {
      const d = new Date(m.utcDate);
      const key = d.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long" });
      if (!groups[key]) groups[key] = [];
      groups[key].push(m);
    });
    return Object.entries(groups);
  };

  return (
    <div style={{ minHeight:"100vh", paddingBottom:72 }}>

      {/* ── Sticky header + live banner ── */}
      <div style={{
        position:"sticky", top:0, zIndex:10,
        background:"linear-gradient(180deg, #0d1526 0%, #0a1120 100%)",
        transform: barsVisible ? "translateY(0)" : "translateY(-100%)",
        transition: "transform 0.25s ease",
      }}>
        {/* Title row */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px 10px" }}>
          <div>
            <div style={{ fontSize:9, color:C.accent, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase" }}>FIFA World Cup 2026</div>
            <div style={{ fontSize:17, fontWeight:800, color:C.text }}>Sweepstake Tracker</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <button onClick={() => fetchMatches(true)} disabled={refreshing} style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.dim, fontSize:11, padding:"4px 8px", borderRadius:4, cursor:"pointer", display:"flex", alignItems:"center", gap:3 }}>
              <span className={refreshing ? "spinning" : ""}>↻</span>
              {lastUpdated && <span style={{ fontSize:9, color:"#334155" }}>{lastUpdated.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>}
            </button>
            <span onClick={() => { const next = !devMode; setDevMode(next); setLoading(true); fetchMatches(false, next); }}
              style={{ fontSize:9, color:devMode?"#f59e0b":"#1e293b", cursor:"pointer", userSelect:"none", border:`1px solid ${devMode?"#f59e0b":"#1e293b"}`, borderRadius:3, padding:"1px 4px" }}>
              {devMode ? "DEV" : "···"}
            </span>
            <button onClick={() => setShowInfo(true)} style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.dim, fontSize:13, width:28, height:28, borderRadius:"50%", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>?</button>
          </div>
        </div>
        {/* Live banner — expands into header */}
        {live.length > 0 && (
          <div style={{
            padding:"8px 14px 12px",
            overflow:"hidden",
            animation:"expandDown 0.5s cubic-bezier(0.4,0,0.2,1) 1.5s both",
          }}>
            <div style={{ fontSize:10, color:C.red, fontWeight:700, marginBottom:6, letterSpacing:"0.1em", display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:C.red, animation:"pulse-red 1.5s infinite" }}/>
              LIVE NOW
            </div>
            {live.map(m => {
              const h = m.homeTeam?.tla?.toUpperCase();
              const a = m.awayTeam?.tla?.toUpperCase();
              const hOwner = ownerOf(h, ranked);
              const aOwner = ownerOf(a, ranked);
              const broadcast = getBroadcast(h, a);
              return (
                <div key={m.id} style={{ display:"flex", alignItems:"center" }}>
                  <div style={{ flex:1, display:"flex", alignItems:"center", gap:6 }}>
                    <Flag code={h} size={18} />
                    <div>
                      <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{hOwner || m.homeTeam?.name}</div>
                      <div style={{ fontSize:10, color:C.muted }}>{m.homeTeam?.name}</div>
                    </div>
                  </div>
                  <div style={{ textAlign:"center", padding:"0 8px" }}>
                    <div style={{ fontSize:16, fontWeight:800, color:C.red, letterSpacing:2 }}>{m.score?.fullTime?.home??0}–{m.score?.fullTime?.away??0}</div>
                    {m.minute && (
                      <div style={{ fontSize:10, color:C.red, fontWeight:600, marginBottom:2 }}>
                        {m.minute}{m.injuryTime ? `+${m.injuryTime}` : ""}′
                      </div>
                    )}
                    <a href={broadcast.url} target="_blank" rel="noopener noreferrer" style={{ background:broadcast.b==="ITV"?"#003087":"#FF6B35", color:"white", fontSize:9, fontWeight:800, padding:"2px 5px", borderRadius:3, textDecoration:"none", whiteSpace:"nowrap", display:"inline-block" }}>▶ {broadcast.b}</a>
                  </div>
                  <div style={{ flex:1, display:"flex", alignItems:"center", gap:6, justifyContent:"flex-end" }}>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{aOwner || m.awayTeam?.name}</div>
                      <div style={{ fontSize:10, color:C.muted }}>{m.awayTeam?.name}</div>
                    </div>
                    <Flag code={a} size={18} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{ height:1, background:`linear-gradient(90deg, transparent, ${C.border}, transparent)` }} />
      </div>

      {/* ── Collapsed live strip (shows when scrolled down) ── */}
      {live.length > 0 && !barsVisible && live.map(m => {
        const h = m.homeTeam?.tla?.toUpperCase();
        const a = m.awayTeam?.tla?.toUpperCase();
        const hOwner = ownerOf(h, ranked);
        const aOwner = ownerOf(a, ranked);
        const broadcast = getBroadcast(h, a);
        return (
          <div key={m.id} style={{
            position:"fixed", top:0, left:0, right:0, zIndex:11,
            maxWidth:620, margin:"0 auto",
            background:"#0d1526",
            borderBottom:`1px solid #1e293b`,
            display:"flex", alignItems:"center",
            padding:"10px 14px",
            transition:"all 0.25s ease",
          }}>
            <span style={{ width:7, height:7, borderRadius:"50%", background:"#ef4444", display:"inline-block", flexShrink:0, animation:"pulse-red 1.5s infinite", marginRight:8 }}/>
            <Flag code={h} size={18} />
            <span style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginLeft:5 }}>{hOwner || m.homeTeam?.tla}</span>
            <span style={{ fontSize:16, fontWeight:800, color:"#ef4444", letterSpacing:2, margin:"0 10px" }}>
              {m.score?.fullTime?.home??0}–{m.score?.fullTime?.away??0}
            </span>
            {m.minute && (
              <span style={{ fontSize:10, color:"#ef4444", fontWeight:600, marginRight:6 }}>
                {m.minute}{m.injuryTime ? `+${m.injuryTime}` : ""}′
              </span>
            )}
            <span style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginRight:5 }}>{aOwner || m.awayTeam?.tla}</span>
            <Flag code={a} size={18} />
            <a href={broadcast.url} target="_blank" rel="noopener noreferrer" style={{
              marginLeft:"auto",
              background:broadcast.b==="ITV"?"#003087":"#FF6B35",
              color:"white", fontSize:9, fontWeight:800,
              padding:"2px 6px", borderRadius:3, textDecoration:"none", whiteSpace:"nowrap",
            }}>▶ {broadcast.b}</a>
          </div>
        );
      })}

      {/* ── Bottom nav ── */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0,
        background:"#0d1526", borderTop:`1px solid ${C.border}`,
        display:"flex", zIndex:20,
        paddingBottom:"env(safe-area-inset-bottom)",
        maxWidth:620, margin:"0 auto",
        transform: barsVisible ? "translateY(0)" : "translateY(100%)",
        transition: "transform 0.25s ease",
      }}>
        {[["table","🏆","Table"],["fixtures","📅","Fixtures"],["results","📋","Results"],["bump","📈","Rankings"]].map(([id,icon,label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex:1, padding:"10px 4px 8px", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, borderTop: tab===id ? `2px solid ${C.accent}` : "2px solid transparent" }}>
            <span style={{ fontSize:18, lineHeight:1 }}>{icon}</span>
            <span style={{ fontSize:10, fontWeight:tab===id?700:500, color:tab===id?C.accent:C.muted }}>{label}</span>
          </button>
        ))}
      </div>

      {/* ── Body ── */}
      <div style={{ padding:"12px 12px 0" }}>

        {loading && (
          <div style={{ textAlign:"center", padding:48, color: C.muted }}>
            <div className="spinning" style={{ fontSize:24, marginBottom:12 }}>↻</div>
            <div style={{ fontSize:13 }}>Loading live data…</div>
          </div>
        )}

        {error && (
          <div style={{
            background:"#1a0a0a", border:`1px solid #7f1d1d`,
            borderRadius:8, padding:"12px 14px", color:"#fca5a5",
            fontSize:13, marginBottom:12,
          }}>
            ⚠️ {error}
            <div style={{ fontSize:11, color: C.muted, marginTop:4 }}>
              Check your Cloudflare Worker URL is set in WORKER_URL and the Worker is deployed.
            </div>
          </div>
        )}

        {/* ── LEAGUE TABLE ── */}
        {tab === "table" && !loading && (
          <>
            {ranked.map((player, i) => {
              // Tied rank: same display rank if points AND tiebreak both equal previous player
              const prev = ranked[i - 1];
              const displayRank = i === 0 ? 1
                : (player.total === prev.total && player.tiebreak === prev.tiebreak)
                  ? ranked[i-1]._displayRank
                  : i + 1;
              player._displayRank = displayRank;
              return (
              <PlayerRow
                key={player.name}
                player={player}
                rank={i}
                displayRank={displayRank}
                expanded={expanded === player.name}
                onToggle={() => setExpanded(expanded === player.name ? null : player.name)}
              />
              );
            })}
          </>
        )}

        {/* ── FIXTURES ── */}
        {tab === "fixtures" && !loading && (
          upcoming.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No upcoming fixtures</div>
            : groupByDay(upcoming).map(([day, ms]) => (
              <div key={day}>
                <div style={{ fontSize:11, color:C.dim, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", padding:"12px 2px 6px" }}>{day}</div>
                {ms.map(m => <MatchCard key={m.id} m={m} ranked={ranked} />)}
              </div>
            ))
        )}

        {/* ── RESULTS ── */}
        {tab === "results" && !loading && (
          recent.length === 0
            ? <div style={{ color:C.muted, textAlign:"center", padding:32, fontSize:14 }}>No results yet</div>
            : groupByDay(recent).map(([day, ms]) => (
              <div key={day}>
                <div style={{ fontSize:11, color:C.dim, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", padding:"12px 2px 6px" }}>{day}</div>
                {ms.map(m => <MatchCard key={m.id} m={m} ranked={ranked} />)}
              </div>
            ))
        )}

        {/* ── BUMP CHART ── */}
        {tab === "bump" && !loading && (
          <BumpChart history={ranked.map(p => ({ name: p.name, hist: p.hist, total: p.total }))} allRanked={ranked} />
        )}

        {/* ── INFO MODAL ── */}
        {showInfo && (
          <div onClick={() => setShowInfo(false)} style={{
            position:"fixed", inset:0, zIndex:50,
            background:"rgba(0,0,0,0.7)",
            display:"flex", alignItems:"flex-end",
            padding:"0",
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"#111827",
              borderRadius:"16px 16px 0 0",
              width:"100%", maxWidth:620, margin:"0 auto",
              padding:"20px 16px 36px",
              maxHeight:"85vh", overflowY:"auto",
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div style={{ fontSize:15, fontWeight:800, color:C.text }}>How Points Work</div>
                <button onClick={() => setShowInfo(false)} style={{ background:"transparent", border:"none", color:C.muted, fontSize:20, cursor:"pointer", lineHeight:1 }}>✕</button>
              </div>

              <div style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Points by Stage & Pot</div>
              <div style={{ ...s.card, overflowX:"auto", marginBottom:20 }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                      <th style={{ padding:"10px 12px", textAlign:"left", color:C.dim, fontWeight:700 }}>Stage</th>
                      {["Pot 1","Pot 2","Pot 3","Pot 4"].map((p,i) => (
                        <th key={p} style={{ padding:"10px 8px", textAlign:"center", fontWeight:700, color:["#f59e0b","#a78bfa","#60a5fa","#34d399"][i] }}>{p}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Object.entries(PTS).map(([key, vals]) => (
                      <tr key={key} style={{ borderBottom:`1px solid #0a1020` }}>
                        <td style={{ padding:"9px 12px", color: STAGE_COLOR[key]||C.dim, fontWeight:600, fontSize:11 }}>{STAGE_LABEL[key]}</td>
                        {vals.map((v,i) => (
                          <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontWeight:700, color: v < 0 ? C.red : v === 0 ? C.muted : C.text }}>
                            {v > 0 ? `+${v}` : v}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Team Assignments</div>
              {PLAYERS.map(p => (
                <div key={p.name} style={{ ...s.card, padding:"10px 12px", marginBottom:6 }}>
                  <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>{p.name}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {p.codes.map((code, i) => (
                      <div key={code} style={{ display:"flex", alignItems:"center", gap:5, background:"#0a1020", borderRadius:4, padding:"3px 7px" }}>
                        <Flag code={code} size={12} />
                        <span style={{ fontSize:11, color:"#94a3b8" }}>{p.teams[i]}</span>
                        <span style={{ fontSize:9, color:C.muted }}>P{POT[code]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
