          // app): a FINISHED match we've seen is never silently dropped.
          const merged = {};
          matchesRef.current.forEach(m => { merged[m.id] = m; });
          results.flat().forEach(m => { merged[m.id] = m; });
          matchesRef.current = Object.values(merged);
          setLiveMatches(matchesRef.current);
          setLastUpdated(new Date());
          setError(null);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      }, []);

      useEffect(() => {
        fetchMatches();
        const id = setInterval(() => fetchMatches(), 60_000);
        return () => clearInterval(id);
      }, [fetchMatches]);

      // Replay data loads on demand via <script> injection (works on file://
      // where fetch()ing a local JSON would not).
      const toggleReplay = () => {
        if (replay.on) { setReplay({ on: false, loading: false, date: REPLAY_END }); setLoading(matchesRef.current.length === 0); return; }
        if (typeof LEAGUE_REPLAY_DATA !== "undefined") {
          setReplay({ on: true, loading: false, date: REPLAY_END });
          return;
        }
        setReplay({ on: true, loading: true, date: REPLAY_END });
        const sc = document.createElement("script");
        sc.src = "league-data-2025.js";
        sc.onload = () => setReplay(r => ({ ...r, loading: false }));
        sc.onerror = () => setReplay({ on: false, loading: false, date: REPLAY_END });
        document.body.appendChild(sc);
      };

      const matches = useMemo(() => {
        if (replay.on && !replay.loading && typeof LEAGUE_REPLAY_DATA !== "undefined" && typeof leagueMatchesUpTo === "function") {
          return leagueMatchesUpTo(LEAGUE_REPLAY_DATA.matches, replay.date);
        }
        return liveMatches;
      }, [replay, liveMatches]);

      const anchorIso = replay.on ? replay.date : (lastUpdated ? lastUpdated.toISOString() : new Date().toISOString());

      // ── shared derived data (guarded per the coupling pattern) ──
      const ranked = useMemo(() => (typeof scoreLeaguePlayers === "function" ? scoreLeaguePlayers(matches) : []), [matches]);
      const outcomes = useMemo(() => (typeof deriveSeasonOutcomes === "function" ? deriveSeasonOutcomes(matches) : {}), [matches]);
      const badges = useMemo(() => (typeof computeLeagueBadges === "function" ? computeLeagueBadges(ranked, matches, anchorIso) : {}), [ranked, matches, anchorIso]);
      const hist = useMemo(() => (typeof deriveLeagueHistory === "function" ? deriveLeagueHistory(matches).history : {}), [matches]);
      const weekWindow = useMemo(() => (typeof lgWeekWindow === "function" ? lgWeekWindow(ranked, matches, anchorIso) : {}), [ranked, matches, anchorIso]);
      const matchPtsById = useMemo(() => (typeof deriveLeagueMatchPts === "function" ? deriveLeagueMatchPts(matches) : {}), [matches]);
      const tables = useMemo(() => (typeof deriveLeagueTable === "function"
        ? { PL: deriveLeagueTable(matches, "PL"), ELC: deriveLeagueTable(matches, "ELC") } : {}), [matches]);
      const weekMove = useMemo(() => {
        const out = {};
        Object.keys(weekWindow).forEach(n => { out[n] = weekWindow[n].move; });
        return out;
      }, [weekWindow]);
      const displayRanks = useMemo(() => {
        const out = [];
        ranked.forEach((p, i) => {
          out[i] = (i > 0 && ranked[i - 1].total === p.total && ranked[i - 1].tiebreak === p.tiebreak) ? out[i - 1] : i + 1;
        });
        return out;
      }, [ranked]);

      // ── modal open/close with browser-history integration (device back
      //    button closes the card, same as the WC app) ──
      const openPlayerModal = (name) => {
        window.history.pushState({ lgModal: "player", name }, "");
        setSelectedTeam(null); setSelectedPlayer(name);
      };
      const openTeamModal = (teamId) => {
        window.history.pushState({ lgModal: "team", teamId }, "");
        setSelectedPlayer(null); setSelectedTeam(teamId);
      };
      const switchToTeam = (teamId) => {
        window.history.replaceState({ lgModal: "team", teamId }, "");
        setSelectedPlayer(null); setSelectedTeam(teamId);
      };
      const switchToPlayer = (name) => {
        window.history.replaceState({ lgModal: "player", name }, "");
        setSelectedTeam(null); setSelectedPlayer(name);
      };
      const closeCard = () => {
        const st = window.history.state;
        if (st && st.lgModal) window.history.back();
        else { setSelectedPlayer(null); setSelectedTeam(null); }
      };
      useEffect(() => {
        const onPop = (e) => {
          const st = e.state || {};
          if (st.lgModal === "player") { setSelectedTeam(null); setSelectedPlayer(st.name); }
          else if (st.lgModal === "team") { setSelectedPlayer(null); setSelectedTeam(st.teamId); }
          else { setSelectedPlayer(null); setSelectedTeam(null); setShowMore(false); setShowRules(false); }
        };
        const onKey = (e) => {
          if (e.key !== "Escape") return;
          if (selectedPlayer || selectedTeam) closeCard();
          else if (showRules) setShowRules(false);
          else if (showMore) setShowMore(false);
        };
        window.addEventListener("popstate", onPop);
        window.addEventListener("keydown", onKey);
        return () => { window.removeEventListener("popstate", onPop); window.removeEventListener("keydown", onKey); };
      });

      const navTo = (id) => {
        window.scrollTo(0, 0);
        setShowMore(false); setShowRules(false);
        setSelectedPlayer(null); setSelectedTeam(null);
        if (id === "table") setLeagueView("players"); // League always opens on Players
        setTab(id);
      };

      return (
        <div style={{ paddingBottom: 84 }}>
          <Header group={group} lastUpdated={lastUpdated} refreshing={refreshing}
            onRefresh={() => fetchMatches(true)} replay={replay}
            onReplayDate={(d) => setReplay(r => ({ ...r, date: d }))} />
          {error && !replay.on && (
            <div style={{ margin: "6px 14px 10px", padding: 10, background: "#2a1616", border: "1px solid #5b2121", borderRadius: 10, color: C.dangerTextBright, fontSize: 12 }}>
              Couldn't reach the match feed ({error}) — showing last known data.
            </div>
          )}
          {!loading && tab === "table" && (
            <div style={{ padding: "0 14px 10px" }}>
              <div className="tab-seg">
                {[["players", "Players"], ["teams", "Teams"], ["pl", "Premier League"], ["elc", "Championship"]].map(([id, label]) => (
                  <button key={id} onClick={() => { window.scrollTo(0, 0); setLeagueView(id); }} style={{
                    background: leagueView === id ? C.accent : C.surface,
                    color: leagueView === id ? C.bg : C.dim, fontWeight: 700, fontSize: 11,
                    padding: "11px 1px", whiteSpace: "nowrap", letterSpacing: "-0.02em",
                  }}>{label}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{ height: 8 }} />
          {loading && !replay.on
            ? <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>Loading fixtures…</div>
            : tab === "home" ? <HomeTab matches={matches} ranked={ranked} badges={badges} weekWindow={weekWindow} matchPtsById={matchPtsById} hist={hist} outcomes={outcomes} anchorIso={anchorIso} setTab={navTo} openPlayerModal={openPlayerModal} openTeamModal={openTeamModal} />
            : tab === "table" ? (
                leagueView === "players" ? <SweepsTab ranked={ranked} badges={badges} hist={hist} weekMove={weekMove} outcomes={outcomes} displayRanks={displayRanks} onOpenPlayer={openPlayerModal} />
                : leagueView === "teams" ? <TeamsLeagueTab matches={matches} ranked={ranked} anchorIso={anchorIso} onTeamClick={openTeamModal} />
                : <TablesTab matches={matches} tables={tables} outcomes={outcomes} onTeamClick={openTeamModal} comp={leagueView === "pl" ? "PL" : "ELC"} />
              )
            : tab === "scores" ? <ScoresTab matches={matches} matchPtsById={matchPtsById} anchorIso={anchorIso} onTeamClick={openTeamModal} />
            : tab === "race" ? <RaceTab ranked={ranked} matches={matches} anchorIso={anchorIso} replayOn={replay.on} />
            : null}

          {(selectedPlayer || selectedTeam) && (
            <SnapSheet onClose={closeCard}>
              {(bodyRef) => {
                if (selectedTeam) {
                  return <TeamCardContent key={selectedTeam} bodyRef={bodyRef} teamId={selectedTeam} matches={matches} ranked={ranked} matchPtsById={matchPtsById} outcomes={outcomes} tables={tables} onTeamClick={switchToTeam} onOwnerClick={switchToPlayer} onClose={closeCard} />;
                }
                const idx = ranked.findIndex(x => x.name === selectedPlayer);
                const p = ranked[idx];
                if (!p) return null;
                return <PlayerCardContent key={selectedPlayer} bodyRef={bodyRef} player={p} displayRank={displayRanks[idx]} badges={badges[selectedPlayer] || []} matches={matches} matchPtsById={matchPtsById} hist={hist[selectedPlayer] || []} week={weekWindow[selectedPlayer]} outcomes={outcomes} onTeamClick={switchToTeam} onClose={closeCard} />;
              }}
            </SnapSheet>
          )}

          {showRules && (
            <div className="info-backdrop" onClick={() => setShowRules(false)}>
              <div className="info-card" onClick={(e) => e.stopPropagation()} style={{ background: C.bg, display: "flex", flexDirection: "column", border: `1px solid ${C.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.55)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>Rules &amp; Info</div>
                  <button onClick={() => setShowRules(false)} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
                </div>
                <div style={{ flex: 1, overflowY: "auto", padding: "16px 12px 24px" }}>
                  <RulesContent />
                </div>
              </div>
            </div>
          )}

          {showMore && (
            <MoreMenu replayOn={replay.on} onToggleReplay={toggleReplay}
              onViewRules={() => setShowRules(true)} onSwitchGroup={onSwitchGroup}
              onClose={() => setShowMore(false)} />
          )}

          <BottomNav tab={tab} showMore={showMore} onNav={navTo} onMore={() => setShowMore(true)} />
        </div>
      );
    }

    // ── group gate (same pattern as the WC app: reassign the roster global
    //    BEFORE App's first render, so every scoring call reads it live) ────
    function GroupGate() {
      const [groupKey, setGroupKey] = useState(() => {
        const k = localStorage.getItem(GROUP_STORAGE_KEY);
        return (k && typeof LEAGUE_GROUPS !== "undefined" && LEAGUE_GROUPS[k]) ? k : null;
      });
      const [input, setInput] = useState("");
      const [bad, setBad] = useState(false);

      if (groupKey && typeof LEAGUE_GROUPS !== "undefined" && LEAGUE_GROUPS[groupKey]) {
        LEAGUE_PLAYERS = LEAGUE_GROUPS[groupKey].players;
        return <App group={LEAGUE_GROUPS[groupKey]} onSwitchGroup={() => {
          localStorage.removeItem(GROUP_STORAGE_KEY);
          setGroupKey(null);
        }} />;
      }
      const submit = (e) => {
        e.preventDefault();
        const k = typeof leagueMatchGroupCode === "function" ? leagueMatchGroupCode(input) : null;
        if (k) { localStorage.setItem(GROUP_STORAGE_KEY, k); setGroupKey(k); }
        else setBad(true);
      };
      return (
        <div style={{ padding: "80px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 6 }}>League Sweeps <span style={{ color: C.accent }}>26/27</span></div>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 24 }}>Enter your group code to see your sweepstake.</div>
          <form onSubmit={submit}>
            <input value={input} onChange={e => { setInput(e.target.value); setBad(false); }}
              placeholder="GROUP CODE" autoFocus
              style={{
                width: "100%", maxWidth: 280, padding: "12px 14px", fontSize: 16,
                background: C.surface, color: C.text, border: `1px solid ${bad ? C.red : C.border}`,
                borderRadius: 10, textAlign: "center", textTransform: "uppercase", outline: "none",
              }} />
            <div style={{ marginTop: 12 }}>
              <button type="submit" style={{
                background: C.accent, color: C.bg, fontWeight: 800, fontSize: 14,
                border: "none", borderRadius: 10, padding: "10px 28px", cursor: "pointer",
              }}>Enter</button>
            </div>
            {bad && <div style={{ color: C.dangerTextBright, fontSize: 12, marginTop: 10 }}>Unknown code — check with whoever runs your group.</div>}
          </form>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GroupGate />);
  </script>
</body>
</html>
