  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1f12;
      color: #f0faf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
    input[type="range"] { width: 100%; accent-color: #22c55e; }
    @keyframes barGlow {
      0%, 100% { box-shadow: 0 0 8px 2px var(--glow-color), 0 0 20px 4px var(--glow-color-dim); }
      50%       { box-shadow: 0 0 18px 6px var(--glow-color), 0 0 36px 10px var(--glow-color-dim); }
    }
    @keyframes topSheetIn {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
    /* Notifications drawer — drops from the top, constrained to the app column */
    .notif-panel {
      position: fixed; top: 0; left: 0; right: 0; z-index: 36;
      max-width: 480px; margin: 0 auto;
      max-height: 80vh; border-radius: 0 0 20px 20px; overflow: hidden;
      animation: topSheetIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.65);
    }
    .tab-seg { display: flex; border: 1px solid #1e3d28; border-radius: 10px; overflow: hidden; }
    .tab-seg button {
      flex: 1; padding: 10px 0; border: none; border-radius: 0; cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    /* ── WC-app pop-up card treatment (keep in sync with index.html) ── */
    .detail-backdrop {
      position: fixed; inset: 0; z-index: 35;
      display: flex; align-items: flex-end; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .detail-sheet {
      width: 100%; max-width: 480px; max-height: 92vh;
      border-radius: 20px 20px 0 0; overflow: hidden;
    }
    .sheet-handle { display: flex; justify-content: center; padding: 8px 0 0; flex-shrink: 0; }
    .sheet-handle span { width: 36px; height: 4px; border-radius: 2px; background: rgba(143,186,154,0.35); }
    .info-backdrop {
      position: fixed; inset: 0; z-index: 25;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      padding: 24px 18px 88px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .info-card { width: 100%; max-width: 460px; max-height: 68vh; border-radius: 16px; overflow: hidden; }
    /* Scores day strip — no visible scrollbar (swipe/drag on mobile; arrow
       buttons take over on desktop). */
    .day-strip { scrollbar-width: none; -ms-overflow-style: none; }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-nav-arrow { display: none; align-items: center; justify-content: center; }
    @media (min-width: 768px) {
      .detail-backdrop { align-items: center; }
      .detail-sheet { max-width: 520px; max-height: 80vh; border-radius: 16px; }
      .sheet-handle { display: none; }
      .day-nav-arrow { display: flex; }
    }
  </style>
</head>

    // ── tiny shared bits ────────────────────────────────────────────────────
    // Sparkline — verbatim from the WC app (index.html) so the line/area/dot
    // treatment matches exactly.
    function Sparkline({ data, width = 90, height = 28, color = C.accent }) {
      if (!data || data.length < 2) {
        return (
          <svg width={width} height={height} style={{ display: "block" }}>
            <line x1={0} y1={height * 0.6} x2={width} y2={height * 0.6} stroke={color} strokeWidth={1} strokeOpacity={0.3} />
          </svg>
        );
      }
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      const pad = 3;
      const points = data.map((v, i) => {
        const x = pad + (i / (data.length - 1)) * (width - pad * 2);
        const y = pad + (1 - (v - min) / range) * (height - pad * 2);
        return [x, y];
      });
      const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
      const areaPath = `${linePath} L${points[points.length - 1][0].toFixed(1)},${height} L${points[0][0].toFixed(1)},${height} Z`;
      const uid = `sp${data.length}x${data[data.length - 1]}`;
      return (
        <svg width={width} height={height} style={{ display: "block", overflow: "visible" }}>
          <defs>
            <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.25" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          <path d={areaPath} fill={`url(#${uid})`} />
          <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
          <circle cx={points[points.length - 1][0]} cy={points[points.length - 1][1]} r={3.5} fill={color} />
        </svg>
      );
    }

    const Crest = ({ teamId, size = 20 }) => (
      <img src={typeof leagueCrest === "function" ? leagueCrest(teamId) : ""}
        alt="" width={size} height={size} loading="lazy"
        style={{ objectFit: "contain", verticalAlign: "middle", flexShrink: 0 }}
        onError={e => { e.target.style.visibility = "hidden"; }} />
    );

    // CrestRow — the league's FlagRow. A player can own many teams across the
    // six leagues, so rather than cram or scroll every crest, this shows just
    // the highest-scoring team from each league (best league first) and a "+N"
    // chip for the rest. The full roster lives on the player card. Capped at
    // CREST_MAX crests so it never overruns the row; relegated crests keep
    // their dim + ✕ styling.
    const CREST_MAX = 4;
    function CrestRow({ teams, outcomes, baseHeight = 26 }) {
      if (!teams || teams.length === 0) return null;
      const state = (t) => {
        const o = outcomes[t.teamId] && outcomes[t.teamId].outcome;
        if (o === "WINNER" || o === "PROMOTED") return "won";
        if (o === "RELEGATED") return "dead";
        return "alive";
      };
      // One representative per league — its highest-scoring team — then best
      // league first. Everything not shown (other leagues' reps beyond the cap,
      // plus every non-top team) is rolled into the "+N" count.
      const bestByLeague = {};
      teams.forEach(t => {
        const cur = bestByLeague[t.league];
        if (!cur || (t.total || 0) > (cur.total || 0)) bestByLeague[t.league] = t;
      });
      const reps = Object.values(bestByLeague).sort((a, b) => (b.total || 0) - (a.total || 0));
      const shown = reps.slice(0, CREST_MAX);
      const hidden = teams.length - shown.length;
      const h = baseHeight;
      const gap = 4;
      const scale = h / 26;
      return (
        <div style={{ display: "flex", gap, alignItems: "center", flexWrap: "nowrap", overflow: "hidden" }}>
          {shown.map(t => {
            const st = state(t);
            return (
              <div key={t.teamId} title={`${t.name} (Pot ${t.pot})`} style={{ position: "relative", display: "inline-block", height: h, flexShrink: 0 }}>

                  style={{ objectFit: "contain", display: "block", opacity: st === "dead" ? 0.25 : 1 }}
                  onError={e => { e.target.style.visibility = "hidden"; }} />
                {st === "dead" && (
                  <span style={{ position: "absolute", top: 0, right: 0, fontSize: Math.max(7, Math.round(9 * scale)), fontWeight: 900, color: C.red, textShadow: "0 0 2px rgba(0,0,0,0.9)", lineHeight: 1, pointerEvents: "none" }}>✕</span>
                )}
              </div>
            );
          })}
          {hidden > 0 && (
            <span style={{
              flexShrink: 0, marginLeft: 2, fontSize: Math.max(10, Math.round(12 * scale)), fontWeight: 700,
              color: C.muted, background: "rgba(148,163,184,0.14)", borderRadius: 6,
              padding: "2px 6px", lineHeight: 1, whiteSpace: "nowrap",
            }}>+{hidden}</span>
          )}
        </div>
      );
    }

      const myGoals = isHome ? hs : as_;
      const oppGoals = isHome ? as_ : hs;
      const result = myGoals > oppGoals ? "W" : myGoals < oppGoals ? "L" : "D";
      const mPts = matchPtsById[m.id];
      const earnedPts = mPts ? (isHome ? mPts.home : mPts.away) : null;
      const opp = isHome ? m.awayTeam : m.homeTeam;
      return { isHome, myGoals, oppGoals, result, earnedPts, opp };
    }

    const resultChipStyle = (result) => ({
      width: 22, height: 22, borderRadius: 4, flexShrink: 0,
      background: result === "W" ? C.posBg : result === "L" ? C.negBg : "rgba(148,163,184,0.12)",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 10, fontWeight: 800,
      color: result === "W" ? C.accent : result === "L" ? C.red : C.muted,
    });

    // ── SnapSheet — ported from the WC app: bottom sheet with two snap
    //    points on mobile (50vh ↔ 92vh, flick to expand/dismiss), centred
    //    windowed card on desktop ─────────────────────────────────────────
    function SnapSheet({ onClose, children }) {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => { document.body.style.overflow = prev; };
      }, []);
      const [snapState, setSnapState] = useState("half");
      const snapStateRef = useRef("half");
      useEffect(() => { snapStateRef.current = snapState; }, [snapState]);
      const sheetRef = useRef(null);
      const bodyRef = useRef(null);
      const dragInfo = useRef({ startY: 0, startTime: 0, active: false, dragY: 0 });
      const [dragY, setDragY] = useState(0);
      const [dragging, setDragging] = useState(false);

      useEffect(() => {
        const el = sheetRef.current;
        if (!el) return;
        const onStart = (e) => {
          dragInfo.current = { startY: e.touches[0].clientY, startTime: Date.now(), active: true, dragY: 0 };
        };
        const onMove = (e) => {
          if (!dragInfo.current.active) return;
          const delta = e.touches[0].clientY - dragInfo.current.startY;
          const atTop = !bodyRef.current || bodyRef.current.scrollTop <= 0;
          if (delta > 0 && atTop) {
            e.preventDefault();
            dragInfo.current.dragY = delta;
            setDragging(true);
            setDragY(delta);
          } else if (delta < 0 && atTop && snapStateRef.current === "half") {
            e.preventDefault();
            dragInfo.current.dragY = delta;
            setDragging(true);
            setDragY(delta);
          } else if (dragInfo.current.dragY !== 0 && Math.sign(delta) !== Math.sign(dragInfo.current.dragY)) {
            dragInfo.current.dragY = 0;
            setDragY(0);
          }
        };
        const onEnd = () => {
          if (!dragInfo.current.active) return;
          dragInfo.current.active = false;
          setDragging(false);
          const { dragY: finalDragY, startTime } = dragInfo.current;
          if (finalDragY === 0) return;
          const elapsed = Date.now() - startTime;
          const velocity = finalDragY / Math.max(elapsed, 1);
          const snap = snapStateRef.current;
          if (snap === "half") {
            if (finalDragY < 0) {
              if (finalDragY < -40 || velocity < -0.25) { setSnapState("full"); snapStateRef.current = "full"; }
              setDragY(0);
            } else {
              if (finalDragY > el.offsetHeight * 0.25 || velocity > 0.5) onClose();
              else setDragY(0);
            }
          } else {
            if (finalDragY > 60 || velocity > 0.3) { setSnapState("half"); snapStateRef.current = "half"; }
            setDragY(0);
          }
        };
        el.addEventListener("touchstart", onStart, { passive: true });
        el.addEventListener("touchmove", onMove, { passive: false });
        el.addEventListener("touchend", onEnd, { passive: true });
        return () => {
          el.removeEventListener("touchstart", onStart);
          el.removeEventListener("touchmove", onMove);
          el.removeEventListener("touchend", onEnd);
        };
      }, []);

      const isMobile = window.innerWidth < 768;
      return (
        <div className="detail-backdrop" onClick={onClose}>
          <div className="detail-sheet" ref={sheetRef} onClick={(e) => e.stopPropagation()}
            style={{
              background: C.bg, display: "flex", flexDirection: "column",
              border: `1px solid ${C.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.55)",
              height: isMobile
                ? snapState === "full" ? "92vh"
                  : dragging && dragY < 0 ? `calc(50vh - ${dragY}px)` : "50vh"
                : undefined,
              transform: dragging && dragY < 0 && snapState === "half" ? "none" : `translateY(${dragY}px)`,
              transition: dragging ? "none" : "transform 0.25s ease, height 0.3s cubic-bezier(0.22, 1, 0.36, 1)",
            }}>
            {children(bodyRef)}
          </div>
        </div>
      );
    }

    // ── PLAYER CARD — pop-up card mirroring the WC PlayerCardContent ───────
    function PlayerCardContent({ bodyRef, player, displayRank, badges = [], matches = [], matchPtsById = {}, hist = [], week, outcomes = {}, onTeamClick, onClose }) {
      if (!player) return null;
      const sect = { fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 };
      const statBox = { flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px 8px", textAlign: "center" };
      return (<>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>{player.name}</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{`Rank ${displayRank} · ${player.total} pts`}</div>
          </div>
          <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
        </div>
        <div ref={bodyRef} style={{ flex: 1, overflowY: "auto", padding: "16px 14px 28px" }}>
          <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <div style={statBox}>
              <div style={{ fontSize: 24, fontWeight: 900, color: player.total < 0 ? C.red : C.text }}>{player.total}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>Points</div>
            </div>
            <div style={statBox}>
              <div style={{ fontSize: 24, fontWeight: 900, color: (week && week.pts > 0) ? C.accent : C.muted }}>
                {week ? `${week.pts > 0 ? "+" : ""}${week.pts}` : "—"}
              </div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>Pts this week</div>
            </div>
          </div>

          <div style={sect}>Points over time</div>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px 8px", marginBottom: 18, display: "flex", justifyContent: "center" }}>
            <Sparkline data={hist} width={300} height={72} color={player.total < 0 ? C.red : player.total === 0 ? C.neutral : C.accent} />
          </div>

          <>
              <div style={sect}>Teams</div>
              {player.teams.map(t => {
                const dead = t.outcome === "RELEGATED";
                return (
                  <div key={t.teamId} onClick={onTeamClick ? () => onTeamClick(t.teamId) : undefined}
                    role={onTeamClick ? "button" : undefined} tabIndex={onTeamClick ? 0 : undefined}
                    style={{ display: "flex", alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${C.border}`, opacity: dead ? 0.6 : 1, cursor: onTeamClick ? "pointer" : "default", WebkitTapHighlightColor: "transparent" }}>
                    <div style={{ marginRight: 10, flexShrink: 0 }}><Crest teamId={t.teamId} size={26} /></div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{t.name} <span style={{ fontSize: 10, color: C.muted, fontWeight: 400 }}>(P{t.pot} · {t.league})</span></div>
                      <div style={{ fontSize: 11, color: C.muted }}>{t.w}W {t.d}D {t.l}L{t.outcome ? ` · ${(LEAGUE_OUTCOME_LABEL[t.outcome] || t.outcome)}` : ""}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: t.total < 0 ? C.red : t.total > 0 ? C.text : C.muted }}>{t.total > 0 ? "+" : ""}{t.total}pts</div>
                      {t.bonusPts !== 0 && <div style={{ fontSize: 10, color: t.bonusPts > 0 ? C.gold : C.red }}>{t.bonusPts > 0 ? "+" : ""}{t.bonusPts} bonus</div>}
                      {t.clPts ? <div style={{ fontSize: 10, color: t.clPts > 0 ? C.gold : C.red }}>{t.clPts > 0 ? "+" : ""}{t.clPts} 🏆</div> : null}
                    </div>
                    {onTeamClick && <span aria-hidden="true" style={{ marginLeft: 8, color: C.muted, fontSize: 18, lineHeight: 1, flexShrink: 0 }}>›</span>}
                  </div>
                );
              })}
            </>

          {badges.length > 0 && (
            <>
              <div style={{ ...sect, margin: "22px 0 8px" }}>Accolades</div>
              {badges.map((b, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: 20, flexShrink: 0, width: 24, textAlign: "center" }}>{b.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{b.label}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{b.desc}</div>
                  </div>
                </div>
              ))}
            </>
          )}

          {(() => {
            // Bonus milestones + all results + upcoming across the player's
            // teams, mirroring the WC player card's Results section.
            const settled = [], upcoming = [];
            (player.teams || []).forEach(t => {
              matches.forEach(m => {
                if (m.homeTeam.id !== t.teamId && m.awayTeam.id !== t.teamId) return;
                if (m.stage !== "REGULAR_SEASON") return;
                if (typeof lgIsSettled === "function" && lgIsSettled(m)) settled.push({ m, t });
                else if (m.status === "SCHEDULED" || m.status === "TIMED") upcoming.push({ m, t });
              });
            });
            settled.sort((x, y) => y.m.utcDate.localeCompare(x.m.utcDate));
            upcoming.sort((x, y) => x.m.utcDate.localeCompare(y.m.utcDate));
            const bonusTeams = (player.teams || []).filter(t => t.bonusPts !== 0);
            if (settled.length === 0 && upcoming.length === 0 && bonusTeams.length === 0) return null;
            const rowClick = (teamId) => ({
              onClick: onTeamClick ? () => onTeamClick(teamId) : undefined,
              style: { display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}`, cursor: onTeamClick ? "pointer" : "default" },
            });
            return (
              <>
                {(settled.length > 0 || bonusTeams.length > 0) && <div style={{ ...sect, margin: "22px 0 8px" }}>Results</div>}
                {bonusTeams.map(t => (
                  <div key={"b" + t.teamId} onClick={onTeamClick ? () => onTeamClick(t.teamId) : undefined}
                    style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", marginBottom: 8, borderRadius: 8,
                      border: `1px solid ${t.bonusPts > 0 ? "rgba(34,197,94,0.25)" : "rgba(241,90,90,0.25)"}`,
                      background: t.bonusPts > 0 ? "rgba(34,197,94,0.07)" : "rgba(241,90,90,0.06)",
                      cursor: onTeamClick ? "pointer" : "default",
                    }}>
                    <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: t.bonusPts > 0 ? C.posBg : C.negBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>{t.bonusPts > 0 ? "🏅" : "⚠️"}</div>
                    <Crest teamId={t.teamId} size={18} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}</div>
                      <div style={{ fontSize: 10, color: C.muted }}>{LEAGUE_OUTCOME_LABEL[t.outcome] || t.outcome} · season bonus</div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: t.bonusPts > 0 ? C.accent : C.red, flexShrink: 0 }}>{t.bonusPts > 0 ? "+" : ""}{t.bonusPts} pts</div>
                  </div>
                ))}
                {settled.slice(0, 30).map(({ m, t }) => {
                  const r = matchRowData(m, t.teamId, matchPtsById);
                  return (
                    <div key={"r" + t.teamId + m.id} {...rowClick(t.teamId)}>
                      <div style={resultChipStyle(r.result)}>{r.result}</div>
                      <Crest teamId={t.teamId} size={18} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}</div>
                        <div style={{ fontSize: 10, color: C.muted }}>vs {(typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[r.opp.id]) ? LEAGUE_TEAMS[r.opp.id].name : (r.opp.shortName || "TBD")} · {fmtDay(m.utcDate)}</div>
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>{r.myGoals}–{r.oppGoals}</div>
                        {r.earnedPts != null && r.earnedPts > 0 && (
                          <div style={{ fontSize: 10, fontWeight: 700, color: C.accent }}>+{r.earnedPts} pts</div>
                        )}
                      </div>
                    </div>
                  );
                })}
                {upcoming.length > 0 && <div style={{ ...sect, margin: "22px 0 8px" }}>Upcoming</div>}
                {upcoming.slice(0, 8).map(({ m, t }) => {
                  const opp = m.homeTeam.id === t.teamId ? m.awayTeam : m.homeTeam;
                  return (
                    <div key={"u" + t.teamId + m.id} {...rowClick(t.teamId)}>
                      <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: "rgba(148,163,184,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: C.muted }}>vs</div>
                      <Crest teamId={t.teamId} size={18} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}</div>
                        <div style={{ fontSize: 10, color: C.muted }}>vs {(typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[opp.id]) ? LEAGUE_TEAMS[opp.id].name : (opp.shortName || "TBD")} · {fmtDay(m.utcDate)} {fmtTime(m.utcDate)}</div>
                      </div>
                    </div>
                  );
                })}
              </>
            );
          })()}
        </div>
      </>);
    }

    // ── TEAM CARD — pop-up card mirroring the WC TeamCardContent ───────────
    function TeamCardContent({ bodyRef, teamId, matches, ranked, matchPtsById, outcomes, tables, onTeamClick, onOwnerClick, onClose }) {
      const team = typeof LEAGUE_TEAMS !== "undefined" ? LEAGUE_TEAMS[teamId] : null;
      const owner = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(teamId) : null;
      let teamEntry = null;
      for (const p of ranked) {
        const t = (p.teams || []).find(t => t.teamId === teamId);
        if (t) { teamEntry = t; break; }
      }
      const wdl = teamEntry || (typeof deriveLeagueWDL === "function" ? deriveLeagueWDL(matches, teamId) : { w: 0, d: 0, l: 0 });
      const matchPts = teamEntry ? teamEntry.matchPts : (typeof lgTeamMatchPts === "function" ? lgTeamMatchPts(matches, teamId) : 0);
      const bonusPts = teamEntry ? teamEntry.bonusPts : (typeof leagueBonusPts === "function" ? leagueBonusPts(teamId, outcomes) : 0);
      // Champions League overlay gamble (from the scored entry if owned, else computed).
      const clProg = (!teamEntry && typeof deriveCLProgress === "function") ? deriveCLProgress(matches) : null;
      const clPts = teamEntry ? (teamEntry.clPts || 0) : (clProg && typeof clGamblePts === "function" ? clGamblePts(teamId, clProg) : 0);
      const clOutcome = teamEntry ? (teamEntry.clOutcome || null) : (clProg ? (clProg[teamId] || null) : null);
      const clLabel = (typeof CL_OUTCOME_LABEL !== "undefined" && clOutcome) ? (CL_OUTCOME_LABEL[clOutcome] || clOutcome) : clOutcome;
      const totalPts = matchPts + bonusPts + clPts;
      const outcome = outcomes[teamId] ? outcomes[teamId].outcome : null;
      const table = team ? tables[team.league] || [] : [];
      const posIdx = table.findIndex(r => r.teamId === teamId);
      const sect = { fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 };
      const teamMatches = matches
        .filter(m => (m.homeTeam.id === teamId || m.awayTeam.id === teamId) && typeof lgIsSettled === "function" && lgIsSettled(m))
        .sort((a, b) => b.utcDate.localeCompare(a.utcDate));
      const upcomingMatches = matches
        .filter(m => (m.homeTeam.id === teamId || m.awayTeam.id === teamId) && (m.status === "SCHEDULED" || m.status === "TIMED"))
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
      const name = team ? team.name : "Unknown";
      const ownerRank = owner ? ranked.findIndex(p => p.name === owner.name) + 1 : null;
      return (<>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Crest teamId={teamId} size={38} />
            <div>
              <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>{name}</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                {team ? `Pot ${team.pot} · ${compLabel(team.league)}` : ""}{owner ? "" : " · Unowned"}
              </div>
            </div>
          </div>
          <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
        </div>
        <div ref={bodyRef} style={{ flex: 1, overflowY: "auto", padding: "16px 14px 28px" }}>
          {owner && (
            <div onClick={onOwnerClick ? () => onOwnerClick(owner.name) : undefined}
              role={onOwnerClick ? "button" : undefined} tabIndex={onOwnerClick ? 0 : undefined}
              style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 12px", border: `1px solid ${C.border}`, borderRadius: 14, background: C.card, marginBottom: 16, cursor: onOwnerClick ? "pointer" : "default", WebkitTapHighlightColor: "transparent" }}>
              <span style={{ width: 30, height: 30, borderRadius: "50%", background: playerColor(owner.name), color: "#0d1f12", fontWeight: 900, fontSize: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{owner.name[0]}</span>
              <div style={{ flex: 1, minWidth: 0, lineHeight: 1.25 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{owner.name}</div>
                <div style={{ fontSize: 11, color: C.muted }}>Owner{ownerRank ? ` · ${ord(ownerRank)} in the sweepstake` : ""}</div>
              </div>
              {onOwnerClick && <span aria-hidden="true" style={{ color: C.muted, fontSize: 18, lineHeight: 1, flexShrink: 0 }}>›</span>}
            </div>
          )}
          <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 900, color: totalPts < 0 ? C.red : C.text }}>{totalPts > 0 ? `+${totalPts}` : totalPts}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>Points</div>
            </div>
            <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 14, fontWeight: 900, lineHeight: 1.4, color: outcome === "RELEGATED" ? C.red : outcome ? C.gold : C.accent }}>
                {outcome ? (LEAGUE_OUTCOME_LABEL[outcome] || outcome) : posIdx >= 0 ? ord(posIdx + 1) : "—"}
              </div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>{outcome ? "Season" : "League position"}</div>
            </div>
          </div>

          <div style={sect}>Results</div>
          {bonusPts !== 0 && (
            <div style={{
              display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", marginBottom: 8, borderRadius: 8,
              border: `1px solid ${bonusPts > 0 ? "rgba(34,197,94,0.25)" : "rgba(241,90,90,0.25)"}`,
              background: bonusPts > 0 ? "rgba(34,197,94,0.07)" : "rgba(241,90,90,0.06)",
            }}>
              <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: bonusPts > 0 ? C.posBg : C.negBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>{bonusPts > 0 ? "🏅" : "⚠️"}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{LEAGUE_OUTCOME_LABEL[outcome] || outcome}</div>
                <div style={{ fontSize: 10, color: C.muted }}>Season bonus · not tied to one game</div>
              </div>
              <div style={{ fontSize: 13, fontWeight: 800, color: bonusPts > 0 ? C.accent : C.red, flexShrink: 0 }}>{bonusPts > 0 ? "+" : ""}{bonusPts} pts</div>
            </div>
          )}
          {clOutcome && (
            <div style={{
              display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", marginBottom: 8, borderRadius: 8,
              border: `1px solid ${clPts >= 0 ? "rgba(34,197,94,0.25)" : "rgba(241,90,90,0.25)"}`,
              background: clPts >= 0 ? "rgba(34,197,94,0.07)" : "rgba(241,90,90,0.06)",
            }}>
              <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: clPts >= 0 ? C.posBg : C.negBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>🏆</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{clLabel}</div>
                <div style={{ fontSize: 10, color: C.muted }}>Champions League gamble · by pot</div>
              </div>
              <div style={{ fontSize: 13, fontWeight: 800, color: clPts >= 0 ? C.accent : C.red, flexShrink: 0 }}>{clPts > 0 ? "+" : ""}{clPts} pts</div>
            </div>
          )}
          {teamMatches.length === 0 ? (
            <div style={{ fontSize: 12, color: C.muted, padding: "8px 0" }}>No results yet</div>
          ) : teamMatches.map(m => {
            const r = matchRowData(m, teamId, matchPtsById);
            const oppKnown = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[r.opp.id];
            return (
              <div key={m.id} onClick={onTeamClick && oppKnown ? () => onTeamClick(r.opp.id) : undefined}
                style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}`, cursor: onTeamClick && oppKnown ? "pointer" : "default" }}>
                <div style={resultChipStyle(r.result)}>{r.result}</div>
                <Crest teamId={r.opp.id} size={24} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{oppKnown ? oppKnown.name : (r.opp.shortName || "TBD")}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>{fmtDay(m.utcDate)} · {r.isHome ? "home" : "away"}{m.stage !== "REGULAR_SEASON" ? " · playoffs" : ""}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>{r.myGoals}–{r.oppGoals}</div>
                  {r.earnedPts != null && r.earnedPts > 0 && (
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.accent }}>+{r.earnedPts} pts</div>
                  )}
                </div>
              </div>
            );
          })}
          {upcomingMatches.length > 0 && <div style={{ ...sect, margin: "22px 0 8px" }}>Upcoming</div>}
          {upcomingMatches.slice(0, 6).map(m => {
            const opp = m.homeTeam.id === teamId ? m.awayTeam : m.homeTeam;
            const oppKnown = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[opp.id];
            return (
              <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, background: "rgba(148,163,184,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: C.muted }}>vs</div>
                <Crest teamId={opp.id} size={24} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{oppKnown ? oppKnown.name : (opp.shortName || "TBD")}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>{fmtDay(m.utcDate)} {fmtTime(m.utcDate)} · {m.homeTeam.id === teamId ? "home" : "away"}</div>
                </div>
              </div>
            );
          })}
        </div>
      </>);
    }

    // ── PlayerRow — same anatomy as the WC app's PlayerRow ─────────────────
    function PlayerRow({ p, rank, badges, hist, weekMove, outcomes, onOpen }) {
      const rankColors = ["#84cc16", "#94a3b8", "#b45309"];
      const isTop = rank <= 3;
      return (
        <div style={{
          background: C.card,
          border: `1px solid ${C.border}`,
          borderRadius: 14, marginBottom: 10, overflow: "hidden",
        }}>
          <div onClick={onOpen} style={{ display: "flex", alignItems: "center", padding: "10px 14px", cursor: "pointer", gap: 10 }}>
            <div style={{
              width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
              background: isTop ? rankColors[rank - 1] : C.border,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 800, color: isTop ? "#080c18" : C.dim,
            }}>{rank}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5, minWidth: 0, marginBottom: 5 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: C.text, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {p.name}
                </div>
                <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                  {badges.slice(0, 2).map((b, i) => (
                    <span key={i} title={`${b.label} — ${b.desc}`} style={{ fontSize: 13, lineHeight: 1 }}>{b.icon}</span>
                  ))}
                </div>
              </div>
              <CrestRow teams={p.teams} outcomes={outcomes} />
            </div>
            <div style={{ flexShrink: 0 }}>
              <Sparkline data={hist} width={78} height={56}
                color={p.total < 0 ? C.red : p.total === 0 ? C.neutral : C.accent} />
            </div>
            <div style={{ textAlign: "right", flexShrink: 0, minWidth: 52 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: p.total < 0 ? C.red : C.text, lineHeight: 1 }}>
                {p.total}
              </div>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>pts</div>
              {weekMove !== 0 ? (
                <div style={{
                  display: "inline-block", fontSize: 10, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                  background: weekMove > 0 ? C.posBg : C.negBg,
                  color: weekMove > 0 ? C.accent : C.red,
                }}>
                  {weekMove > 0 ? "▲" : "▼"} {Math.abs(weekMove)} pos
                </div>
              ) : (
                <div style={{
                  display: "inline-block", fontSize: 10, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                  background: "rgba(148,163,184,0.12)", color: "#94a3b8",
                }}>0 pos</div>
              )}
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, transform: "rotate(-90deg)" }}>
              <path d="M6 9l6 6 6-6" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
        </div>
      );
    }

    function SweepsTab({ ranked, badges, hist, weekMove, outcomes, displayRanks, onOpenPlayer }) {
      return (
        <div style={{ padding: "0 14px" }}>
          {ranked.map((p, i) => (
            <PlayerRow key={p.name} p={p} rank={displayRanks[i]} badges={badges[p.name] || []}
              hist={hist[p.name] || []} weekMove={weekMove[p.name] || 0} outcomes={outcomes}
              onOpen={() => onOpenPlayer(p.name)} />
          ))}
        </div>
      );
    }

    // ── Teams view — every owned team ranked by sweepstake points, styled like
    //    the Players table (crest + sparkline + pts + 7-day position pill). The
    //    team name leads; pot + owner sit underneath as context. Tap → team card.
    function TeamLeagueRow({ row, rank, hist, move, onOpen }) {
      const swPts = row.total;
      const lineColor = swPts < 0 ? C.red : swPts === 0 ? C.neutral : C.accent;
      const rankColors = ["#84cc16", "#94a3b8", "#b45309"];
      const isTop = rank <= 3;
      return (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
          <div onClick={onOpen} style={{ display: "flex", alignItems: "center", padding: "10px 14px", cursor: "pointer", gap: 10 }}>
            <div style={{
              width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
              background: isTop ? rankColors[rank - 1] : C.border,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 800, color: isTop ? "#080c18" : C.dim,
            }}>{rank}</div>
            <Crest teamId={row.teamId} size={30} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, minWidth: 0 }}>
                <span style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Pot {row.pot} · {row.owner}</span>
                {row.outcome && outcomeChip(row.outcome)}
              </div>
            </div>
            <div style={{ flexShrink: 0 }}>
              <Sparkline data={hist} width={90} height={48} color={lineColor} />
            </div>
            <div style={{ textAlign: "right", flexShrink: 0, minWidth: 52 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: swPts < 0 ? C.red : C.text, lineHeight: 1 }}>{swPts}</div>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>pts</div>
              {move !== 0 ? (
                <div style={{
                  display: "inline-block", fontSize: 10, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                  background: move > 0 ? C.posBg : C.negBg, color: move > 0 ? C.accent : C.red,
                }}>{move > 0 ? "▲" : "▼"} {Math.abs(move)} pos</div>
              ) : (
                <div style={{
                  display: "inline-block", fontSize: 10, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                  background: "rgba(148,163,184,0.12)", color: "#94a3b8",
                }}>0 pos</div>
              )}
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, transform: "rotate(-90deg)" }}>
              <path d="M6 9l6 6 6-6" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
        </div>
      );
    }

    function TeamsLeagueTab({ matches, ranked, anchorIso, onTeamClick }) {
      // Owned teams (every player's teams) ranked by sweepstake points.
      const rows = React.useMemo(() => {
        const out = [];
        ranked.forEach(p => (p.teams || []).forEach(t => out.push({ ...t, owner: p.name })));
        out.sort((a, b) => (b.total - a.total) || a.name.localeCompare(b.name));
        return out;
      }, [ranked]);
      // Per-team sparkline history — computed lazily (only when this tab mounts).
      const teamHist = React.useMemo(
        () => (typeof deriveLeagueTeamHistory === "function" ? deriveLeagueTeamHistory(matches).history : {}),
        [matches]
      );
      // 7-day position change (league weekly rhythm): rank now vs rank ~7d before anchor.
      const move = React.useMemo(() => {
        const rankNow = {}; rows.forEach((t, i) => { rankNow[t.teamId] = i; });
        const cut = new Date(anchorIso).getTime() - 7 * 864e5;
        const past = matches.filter(m => new Date(m.utcDate).getTime() <= cut);
        const pastRanked = typeof scoreLeaguePlayers === "function" ? scoreLeaguePlayers(past) : [];
        const pastRows = [];
        pastRanked.forEach(p => (p.teams || []).forEach(t => pastRows.push(t)));
        pastRows.sort((a, b) => (b.total - a.total) || a.name.localeCompare(b.name));
        const rankPast = {}; pastRows.forEach((t, i) => { rankPast[t.teamId] = i; });
        const out = {};
        rows.forEach(t => { const n = rankNow[t.teamId], pa = rankPast[t.teamId]; out[t.teamId] = (pa != null && n != null) ? pa - n : 0; });
        return out;
      }, [rows, matches, anchorIso]);
      return (
        <div style={{ padding: "0 14px" }}>
          {rows.map((t, i) => (
            <TeamLeagueRow key={t.teamId} row={t} rank={i + 1} hist={teamHist[t.teamId] || [0]}
              move={move[t.teamId] || 0} onOpen={() => onTeamClick(t.teamId)} />
          ))}
          {rows.length === 0 && <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>No teams yet.</div>}
        </div>
      );
    }

    // ── The Race — ported from the WC app (BumpChart positions-over-time +
    //    an animated BarRaceModal launched by the "Watch the Race" button),
    //    fed by deriveLeagueHistory. No knockouts/eliminations in a league
    //    season, so the stage/elim layers are dropped; frames are calendar
    //    days and team badges come from leagueCrest by teamId. ───────────────
    function lgChunk(items, size) {
      const rows = [];
      for (let i = 0; i < items.length; i += size) rows.push(items.slice(i, i + size));
      return rows;
    }

    function BumpChart({ history, allRanked, bucketLabels = [] }) {
      const [selected, setSelected] = React.useState(null);
      const [atLeft, setAtLeft] = React.useState(false);
      const scrollRef = React.useRef(null);
      const maxLen = Math.max(...history.map(p => p.hist.length));

      React.useEffect(() => {
        const el = scrollRef.current;
        if (el) requestAnimationFrame(() => { el.scrollLeft = el.scrollWidth; });
      }, [maxLen]);

      const handleScroll = React.useCallback(() => {
        const el = scrollRef.current;
        if (el) setAtLeft(el.scrollLeft <= 1);
      }, []);

      if (maxLen < 2) {
        return <div style={{ textAlign: "center", padding: 40, color: C.muted, fontSize: 13 }}>Not enough scoring events yet to show rankings over time.</div>;
      }

      const n = history.length;
      const padL = 16, padR = 72, padT = 16, padB = 24;
      const availW = window.innerWidth - padL - padR - 28;
      const MIN_COL = 26;
      const COL_W = maxLen <= 2 ? availW : Math.max(MIN_COL, Math.floor(availW / (maxLen - 1)));
      const scrollable = (maxLen - 1) * COL_W > availW + 1;
      const rowH = n <= 9 ? Math.max(34, Math.min(72, Math.floor((window.innerHeight * 0.5) / Math.max(n - 1, 1)))) : 34;
      const chartW = (maxLen - 1) * COL_W;
      const chartH = (n - 1) * rowH;
      const W = padL + chartW + padR;
      const H = padT + chartH + padB;
      const xScale = t => padL + t * COL_W;
      const yScale = r => padT + (r - 1) * rowH;
      const colorOf = name => playerColor(name);

      const timePoints = Array.from({ length: maxLen }, (_, t) => {
        const ranks = {};
        if (t === maxLen - 1 && allRanked && allRanked.length > 0) {
          allRanked.forEach((p, i) => { ranks[p.name] = i + 1; });
          history.forEach((p, i) => { if (!(p.name in ranks)) ranks[p.name] = allRanked.length + i + 1; });
        } else {
          history.map(p => ({ name: p.name, pts: p.hist[Math.min(t, p.hist.length - 1)] }))
            .sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name))
            .forEach((s, i) => { ranks[s.name] = i + 1; });
        }
        return ranks;
      });

      const buildPath = name => {
        const pts = timePoints.map((tp, t) => [xScale(t), yScale(tp[name])]);
        let d = `M ${pts[0][0]},${pts[0][1]}`;
        for (let i = 1; i < pts.length; i++) {
          const cpx = (pts[i - 1][0] + pts[i][0]) / 2;
          d += ` C ${cpx},${pts[i - 1][1]} ${cpx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
        }
        return d;
      };

      const startRanks = timePoints[0];
      const endRanks = timePoints[maxLen - 1];

      // Sparse x-labels: a short month name at the first frame of each month
      // (175 daily frames would overlap if every one were labelled).
      const xLabels = [];
      let lastMonth = "";
      bucketLabels.forEach((b, t) => {
        const mo = b ? b.slice(0, 7) : "";
        if (mo && mo !== lastMonth) {
          lastMonth = mo;
          xLabels.push({ t, label: new Date(b).toLocaleDateString("en-GB", { month: "short" }) });
        }
      });

      return (
        <div style={{ padding: "8px 0 0" }}>
          <div style={{ position: "relative" }}>
            <div ref={scrollRef} onScroll={handleScroll} style={{ overflowX: "scroll", overflowY: "hidden", WebkitOverflowScrolling: "touch" }}>
              <div style={{ display: "inline-block" }}>
                <svg width={W} height={H} style={{ display: "block" }}>
                  {Array.from({ length: n }, (_, i) => (
                    <line key={i} x1={padL} y1={yScale(i + 1)} x2={padL + chartW} y2={yScale(i + 1)} stroke={C.border} strokeWidth={1} />
                  ))}
                  {history.map(p => {
                    const dim = selected && selected !== p.name;
                    return (
                      <path key={p.name} d={buildPath(p.name)} fill="none"
                        stroke={dim ? C.border : colorOf(p.name)}
                        strokeWidth={selected === p.name ? 3.5 : 2.5}
                        strokeLinecap="round" strokeLinejoin="round"
                        opacity={dim ? 0.3 : 0.9} />
                    );
                  })}
                  {history.map(p => {
                    const dim = selected && selected !== p.name;
                    return timePoints.map((tp, t) => (
                      <circle key={`${p.name}-${t}`} cx={xScale(t)} cy={yScale(tp[p.name])}
                        r={t === maxLen - 1 ? 5 : 2.5}
                        fill={dim ? C.border : colorOf(p.name)}
                        stroke="#080c18" strokeWidth={1.5} opacity={dim ? 0.3 : 1} />
                    ));
                  })}
                  {history.map(p => {
                    const dim = selected && selected !== p.name;
                    return (
                      <text key={`s-${p.name}`} x={padL - 5} y={yScale(startRanks[p.name]) + 4}
                        textAnchor="end" fontSize={10} fontWeight={700}
                        fill={dim ? C.border : colorOf(p.name)} opacity={dim ? 0.3 : 1}>{startRanks[p.name]}</text>
                    );
                  })}
                  {history.map(p => {
                    const dim = selected && selected !== p.name;
                    return (
                      <text key={`e-${p.name}`} x={padL + chartW + 8} y={yScale(endRanks[p.name]) + 4}
                        textAnchor="start" fontSize={11} fontWeight={700}
                        fill={dim ? C.neutral : colorOf(p.name)} opacity={dim ? 0.4 : 1}
                        style={{ cursor: "pointer" }}
                        onClick={() => setSelected(selected === p.name ? null : p.name)}>{p.name}</text>
                    );
                  })}
                  {xLabels.map(({ t, label }) => (
                    <text key={`xl-${t}`} x={xScale(t)} y={H - 4} textAnchor="middle" fontSize={9} fill={C.muted}>{label}</text>
                  ))}
                </svg>
              </div>
            </div>
            {scrollable && !atLeft && (
              <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: 48, background: `linear-gradient(to right, ${C.bg} 0%, transparent 100%)`, pointerEvents: "none" }} />
            )}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 16, padding: "0 4px" }}>
            {allRanked.map(p => {
              const dim = selected && selected !== p.name;
              return (
                <div key={p.name} onClick={() => setSelected(selected === p.name ? null : p.name)}
                  style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", opacity: dim ? 0.35 : 1 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: colorOf(p.name), flexShrink: 0 }} />
                  <span style={{ fontSize: 11, color: C.muted }}>{p.name} <span style={{ color: C.text, fontWeight: 700 }}>{p.total}pts</span></span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function BarRaceModal({ history, allRanked, bucketLabels = [], onClose }) {
      const maxLen = Math.max(...history.map(p => p.hist.length));
      const [frame, setFrame] = React.useState(0);
      const [playing, setPlaying] = React.useState(true);
      const intervalRef = React.useRef(null);
      const TICK = 700;
      const n = history.length;

      const teamsByName = {};
      allRanked.forEach(p => { teamsByName[p.name] = p.teams || []; });
      const colorOf = name => playerColor(name);
      const prevRanks = React.useRef({});

      const standings = React.useMemo(() => {
        const sorted = history.map(p => ({
          name: p.name,
          value: p.hist[Math.min(frame, p.hist.length - 1)],
          color: colorOf(p.name),
        })).sort((a, b) => b.value - a.value || a.name.localeCompare(b.name));
        return sorted.map((s, i) => {
          const prev = prevRanks.current[s.name] ?? i;
          return { ...s, rank: i, movingUp: i < prev };
        });
      }, [frame]);

      React.useEffect(() => { standings.forEach(s => { prevRanks.current[s.name] = s.rank; }); }, [standings]);

      const minValue = Math.min(...standings.map(s => s.value), 0);
      const maxValue = Math.max(...standings.map(s => s.value), 1);
      const barOffset = minValue < 0 ? -minValue : 0;
      const barRange = maxValue + barOffset || 1;

      const frameLabel = frame === 0 ? "Start" : (bucketLabels[frame] ? fmtDay(bucketLabels[frame]) : `Day ${frame}`);
      const champ = (allRanked && allRanked.length) ? allRanked[0] : null;
      const raceFinished = frame >= maxLen - 1 && maxLen > 1 && champ && champ.total > 0;

      React.useEffect(() => {
        if (playing && frame < maxLen - 1) {
          intervalRef.current = setTimeout(() => setFrame(f => f + 1), TICK);
        } else if (frame >= maxLen - 1) {
          setPlaying(false);
        }
        return () => clearTimeout(intervalRef.current);
      }, [playing, frame]);

      const wasPlayingRef = React.useRef(false);
      const onScrubStart = () => { wasPlayingRef.current = playing; setPlaying(false); };
      const onScrubEnd = () => { if (wasPlayingRef.current && frame < maxLen - 1) setPlaying(true); };
      const toggle = () => { if (frame >= maxLen - 1) { setFrame(0); setPlaying(true); } else setPlaying(p => !p); };
      const restart = () => { setFrame(0); setPlaying(true); };
      const ROW_H = `${100 / n}%`;

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 60, background: C.bg, display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>🏁 The Race</div>
            <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer" }}>✕</button>
          </div>
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", inset: 0 }}>
              {[...history].sort((a, b) => a.name.localeCompare(b.name)).map(p => {
                const s = standings.find(x => x.name === p.name);
                if (!s) return null;
                const topPct = (s.rank / n) * 100;
                const barW = ((s.value + barOffset) / barRange) * 100;
                const teams = teamsByName[s.name] || [];
                return (
                  <div key={s.name} style={{
                    position: "absolute", left: 0, right: 0, height: ROW_H, top: `${topPct}%`,
                    transition: `top ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                    display: "flex", alignItems: "center", padding: "0 12px", gap: 8,
                    zIndex: s.movingUp ? n + 1 : 1,
                  }}>
                    <div style={{ width: 18, textAlign: "right", fontSize: 11, color: C.muted, flexShrink: 0, fontWeight: 700 }}>{s.rank + 1}</div>
                    <div style={{ width: 70, textAlign: "right", fontSize: 12, fontWeight: 700, color: C.text, flexShrink: 0, overflow: "hidden", whiteSpace: "nowrap" }}>{s.name}</div>
                    <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: 2, flexShrink: 0, width: 66 }}>
                      {teams.length === 0
                        ? <span style={{ fontSize: 12, lineHeight: 1, marginLeft: 2, color: C.muted }}>—</span>
                        : lgChunk(teams, 3).map((row, ri) => (
                          <div key={ri} style={{ display: "flex", gap: 3 }}>
                            {row.map(t => <Crest key={t.teamId} teamId={t.teamId} size={18} />)}
                          </div>
                        ))}
                    </div>
                    <div style={{ flex: 1, position: "relative", height: "55%", minHeight: 18 }}>
                      <div style={{ position: "absolute", inset: 0, background: C.border, borderRadius: "0 3px 3px 0" }} />
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0, width: `${barW}%`,
                        background: s.color, borderRadius: "0 3px 3px 0",
                        transition: `width ${TICK * 0.85}ms cubic-bezier(0.4,0,0.2,1)`,
                        ...(raceFinished && s.rank === 0 ? { "--glow-color": s.color, "--glow-color-dim": s.color + "55", animation: "barGlow 1.8s ease-in-out infinite" } : {}),
                      }} />
                      {s.value !== 0 && (
                        <div style={{
                          position: "absolute", left: 0, top: 0, bottom: 0, right: 0, display: "flex", alignItems: "center",
                          justifyContent: barW > 70 ? "flex-end" : "flex-start",
                          paddingLeft: barW > 70 ? 0 : `calc(${Math.max(barW, 0)}% + 6px)`,
                          paddingRight: barW > 70 ? 8 : 0, pointerEvents: "none",
                        }}>
                          <span style={{ fontSize: 11, fontWeight: 700, color: s.value < 0 ? C.red : C.text, whiteSpace: "nowrap" }}>{s.value}pts</span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ padding: "10px 16px 20px", flexShrink: 0 }}>
            <input type="range" min={0} max={maxLen - 1} value={frame}
              onMouseDown={onScrubStart} onTouchStart={onScrubStart} onMouseUp={onScrubEnd} onTouchEnd={onScrubEnd}
              onChange={e => setFrame(Number(e.target.value))}
              style={{ width: "100%", marginBottom: 10, accentColor: C.accent, cursor: "pointer" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, color: C.muted, fontWeight: 600 }}>{frameLabel}</span>
              <span style={{ fontSize: 11, color: C.muted }}>Day {frame + 1} of {maxLen}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}>
              <button onClick={restart} style={{ background: C.border, border: "none", color: C.text, padding: "8px 16px", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Restart</button>
              <button onClick={toggle} style={{ background: C.accent, border: "none", color: "white", padding: "8px 24px", borderRadius: 6, cursor: "pointer", fontSize: 14, fontWeight: 700 }}>
                {playing ? "⏸" : frame >= maxLen - 1 ? "↺" : "▶"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function RaceTab({ ranked, matches, anchorIso, replayOn }) {
      const [showRace, setShowRace] = React.useState(false);
      const { frames, history } = React.useMemo(
        () => (typeof deriveLeagueHistory === "function" ? deriveLeagueHistory(matches) : { frames: [], history: {} }),
        [matches]
      );
      const raceHist = React.useMemo(
        () => ranked.map(p => ({ name: p.name, hist: history[p.name] || [0], total: p.total })),
        [ranked, history]
      );
      return (
        <div style={{ padding: "0 14px" }}>
          <button onClick={() => setShowRace(true)} style={{
            width: "100%", padding: "12px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "linear-gradient(135deg, #15803d, #22c55e)", color: "#fff", fontSize: 13, fontWeight: 800,
            letterSpacing: "0.03em", boxShadow: "0 2px 12px rgba(34,197,94,0.30)", marginBottom: 8,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          }}>🏁 Watch the Race</button>
          <BumpChart history={raceHist} allRanked={ranked} bucketLabels={frames} />
          {showRace && <BarRaceModal history={raceHist} allRanked={ranked} bucketLabels={frames} onClose={() => setShowRace(false)} />}
        </div>
      );
    }

    // Pot tag shown after a club name everywhere it appears, e.g. "Inter (P1)".
    const potTag = (id) => {
      const t = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
      return t ? <span style={{ color: C.muted, fontSize: 9, fontWeight: 600 }}> (P{t.pot})</span> : null;
    };
    const lgPotOf = (id) => { const t = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id]; return t ? t.pot : null; };

    // Significant-result banner (pot-gap upset ladder) — mirrors the WC MatchCard.
    // Domestic games use the "upset" ladder; CL knockout ties use the harsher
    // "shock exit" ladder. Returns { icon, label } or null.
    const lgResultBanner = (m) => {
      if (!(m.status === "FINISHED" || m.status === "AWARDED")) return null;
      const ft = m.score && m.score.fullTime;
      if (!ft) return null;
      const hs = ft.home || 0, as_ = ft.away || 0;
      const isKO = m.competition && m.competition.code === "CL" && m.stage && m.stage !== "LEAGUE_STAGE" && m.stage !== "GROUP_STAGE";
      if (hs !== as_) {
        const W = hs > as_ ? m.homeTeam.id : m.awayTeam.id, L = hs > as_ ? m.awayTeam.id : m.homeTeam.id;
        const pw = lgPotOf(W), pl = lgPotOf(L);
        if (pw == null || pl == null) return null;
        const gap = pw - pl; // > 0 when the weaker pot (higher number) won
        if (isKO) { if (gap >= 3) return { icon: "🌋", label: "SEISMIC SHOCK" }; if (gap === 2) return { icon: "😱", label: "SHOCK EXIT" }; if (gap === 1) return { icon: "⚠️", label: "UPSET ALERT" }; return null; }
        if (gap >= 3) return { icon: "🦄", label: "FAIRYTALE" }; if (gap === 2) return { icon: "🔪", label: "GIANT KILLER" }; if (gap === 1) return { icon: "⚠️", label: "UPSET ALERT" }; return null;
      }
      const pw = lgPotOf(m.homeTeam.id), pl = lgPotOf(m.awayTeam.id);
      if (pw == null || pl == null) return null;
      const gap = Math.abs(pw - pl);
      if (gap >= 3) return { icon: "🛡️", label: "HEROIC STAND" };
      if (gap === 2) return { icon: "🤝", label: "PUNCHED ABOVE" };
      return null;
    };

    // ── LeagueMatchCard — the WC MatchCard, adapted: spaced card, gold border +
    //    glow on a significant result, tap → head-to-head modal ──────────────
    function LeagueMatchCard({ m, matchPtsById, onMatchClick, onTeamClick }) {
      const fin = m.status === "FINISHED" || m.status === "AWARDED";
      const live = m.status === "IN_PLAY" || m.status === "PAUSED";
      const scheduled = m.status === "SCHEDULED" || m.status === "TIMED";
      const kickedOff = scheduled && new Date(m.utcDate).getTime() <= Date.now();
      const ft = m.score && m.score.fullTime;
      const hs = (ft && ft.home) ?? 0, as_ = (ft && ft.away) ?? 0;
      const hasScore = ft && ft.home != null && ft.away != null;
      const pts = matchPtsById ? matchPtsById[m.id] : null;
      const banner = lgResultBanner(m);
      const border = banner ? `2px solid ${C.gold}` : `1px solid ${C.border}`;
      const glow = banner ? "0 0 10px #f59e0b44" : "none";
      const Side = ({ t, right, earned }) => {
        const known = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[t.id];
        const owner = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(t.id) : null;
        const clubName = known ? known.name : (t.shortName || "TBD");
        return (
          <div onClick={onTeamClick && known ? (e) => { e.stopPropagation(); onTeamClick(t.id); } : undefined}
            style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, minWidth: 0, flexDirection: right ? "row-reverse" : "row", cursor: onTeamClick && known ? "pointer" : "default" }}>
            <Crest teamId={t.id} size={26} />
            <div style={{ minWidth: 0, textAlign: right ? "right" : "left" }}>
              {owner
                ? <>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{owner ? owner.name : ""}</div>
                    <div style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{clubName}{potTag(t.id)}</div>
                  </>
                : <div style={{ fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{clubName}{potTag(t.id)}</div>}
              {earned > 0 && <div style={{ fontSize: 10, fontWeight: 800, color: C.accent, marginTop: 2 }}>+{earned} pts</div>}
            </div>
          </div>
        );
      };
      return (
        <div className={onMatchClick ? "player-card" : undefined} onClick={onMatchClick ? () => onMatchClick(m.id) : undefined}
          style={{ ...s.card, border, boxShadow: glow, marginBottom: 10, cursor: onMatchClick ? "pointer" : "default" }}>
          <div style={{ padding: "12px 14px" }}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 10, color: (live || kickedOff) ? C.red : C.dim, fontWeight: 700, letterSpacing: "0.08em", flex: 1, textTransform: "uppercase" }}>
                {(live || kickedOff) ? "⚡ LIVE" : compLabel(m.competition ? m.competition.code : "")}
              </span>
              <div style={{ display: "flex", alignItems: "center", gap: 4, justifyContent: "center", flex: 1 }}>
                {banner && fin && <><span style={{ fontSize: 13, lineHeight: 1 }}>{banner.icon}</span><span style={{ fontSize: 9, fontWeight: 900, color: C.gold, letterSpacing: "0.08em" }}>{banner.label}</span></>}
              </div>
              <span style={{ fontSize: 10, color: C.muted, flex: 1, textAlign: "right" }}>{fmtDay(m.utcDate)}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center" }}>
              <Side t={m.homeTeam} right earned={pts ? pts.home : 0} />
              <div style={{ minWidth: 60, textAlign: "center", flexShrink: 0 }}>
                {fin || live || hasScore
                  ? <><span style={{ fontSize: 18, fontWeight: 800, letterSpacing: 2, color: (live || (hasScore && !fin)) ? C.red : C.text }}>{hs}–{as_}</span>{!fin && <div style={{ fontSize: 9, fontWeight: 800, color: C.red, marginTop: 2 }}>⚡ LIVE</div>}</>
                  : <div><div style={{ fontSize: 12, color: C.muted, marginBottom: 2 }}>vs</div><div style={{ fontSize: 9, color: C.muted }}>{fmtTime(m.utcDate)}</div></div>}
              </div>
              <Side t={m.awayTeam} earned={pts ? pts.away : 0} />
            </div>
          </div>
        </div>
      );
    }

    // ── LeagueHeadToHeadCard — WC-style head-to-head modal opened from any
    //    team-vs-team card. Teams | Players toggle + recent form. ────────────
    function LeagueHeadToHeadCard({ bodyRef, m, ranked, matches, matchPtsById, onTeamClick, onPlayerClick, onClose }) {
      const [view, setView] = useState("teams");
      const fin = m.status === "FINISHED" || m.status === "AWARDED";
      const live = m.status === "IN_PLAY" || m.status === "PAUSED";
      const ft = m.score && m.score.fullTime;
      const hs = ft ? ft.home : null, as_ = ft ? ft.away : null;
      const banner = lgResultBanner(m);
      const known = (id) => typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
      const clubName = (t) => (known(t.id) ? LEAGUE_TEAMS[t.id].name : (t.shortName || "TBD"));
      const ownerObj = (id) => typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(id) : null;
      const hOwner = ownerObj(m.homeTeam.id), aOwner = ownerObj(m.awayTeam.id);
      const rankOf = (name) => { const i = ranked.findIndex(p => p.name === name); return i >= 0 ? i + 1 : null; };
      const totalOf = (name) => { const p = ranked.find(p => p.name === name); return p ? p.total : 0; };
      const form = (id) => matches
        .filter(x => (x.homeTeam.id === id || x.awayTeam.id === id) && x.stage === "REGULAR_SEASON" && typeof lgIsSettled === "function" && lgIsSettled(x))
        .sort((a, b) => b.utcDate.localeCompare(a.utcDate)).slice(0, 5).reverse()
        .map(x => (typeof lgResultFor === "function" ? lgResultFor(x, id) : null)).filter(Boolean);
      const teamHeader = (t, owner) => (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5, textAlign: "center", minWidth: 0 }}>
          <Crest teamId={t.id} size={34} />
          <div style={{ fontSize: 13, fontWeight: 800, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%" }}>{clubName(t)}{potTag(t.id)}</div>
          {owner && <div style={{ fontSize: 11, fontWeight: 600, color: C.accent }}>{owner.name}</div>}
        </div>
      );
      const formPills = (t) => {
        const res = form(t.id);
        if (!res.length) return <div style={{ fontSize: 10, color: C.muted }}>—</div>;
        return (
          <div style={{ display: "flex", gap: 3, justifyContent: "center" }}>
            {res.map((r, i) => (
              <span key={i} style={{ width: 16, height: 16, borderRadius: 3, fontSize: 9, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", color: r === "W" ? C.accent : r === "L" ? C.red : C.muted, background: r === "W" ? C.posBg : r === "L" ? C.negBg : "rgba(148,163,184,0.12)" }}>{r}</span>
            ))}
          </div>
        );
      };
      const navBtn = (id, label) => (
        <button onClick={() => setView(id)} style={{ flex: 1, padding: "9px 8px", background: view === id ? C.accent : C.surface, color: view === id ? C.bg : C.dim, border: "none", borderRadius: 12, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>{label}</button>
      );
      return (<>
        <div className="sheet-handle"><span></span></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px 12px", flexShrink: 0 }}>
          <div style={{ fontSize: 18, fontWeight: 900, color: C.text }}>Head to Head</div>
          <button onClick={onClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
        </div>
        <div ref={bodyRef} style={{ flex: 1, overflowY: "auto", padding: "0 14px 24px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>{navBtn("teams", "Teams")}{navBtn("players", "Players")}</div>
          {view === "teams" ? (
            <div style={{ background: C.card, border: `1px solid ${banner ? C.gold : C.border}`, borderRadius: 14, padding: "16px 12px", boxShadow: banner ? "0 0 10px #f59e0b44" : "none" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {teamHeader(m.homeTeam, hOwner)}
                <div style={{ flexShrink: 0, textAlign: "center", minWidth: 52 }}>
                  {(fin || live) && hs != null && as_ != null
                    ? <div style={{ fontSize: 22, fontWeight: 900, color: C.text, lineHeight: 1 }}>{hs} – {as_}</div>
                    : <div style={{ fontSize: 13, fontWeight: 700, color: C.muted }}>vs</div>}
                  {live && <div style={{ fontSize: 9, fontWeight: 800, color: C.red, marginTop: 3 }}>LIVE</div>}
                  {fin && <div style={{ fontSize: 9, fontWeight: 700, color: C.muted, marginTop: 4, textTransform: "uppercase" }}>{m.status === "AWARDED" ? "AWD" : "FT"}</div>}
                </div>
                {teamHeader(m.awayTeam, aOwner)}
              </div>
              {banner && (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 5, marginTop: 12 }}>
                  <span style={{ fontSize: 14 }}>{banner.icon}</span>
                  <span style={{ fontSize: 10, fontWeight: 900, color: C.gold, letterSpacing: "0.08em" }}>{banner.label}</span>
                </div>
              )}
            </div>
          ) : (
            <div style={{ display: "flex", gap: 10 }}>
              {[{ owner: hOwner }, { owner: aOwner }].map(({ owner }, i) => (
                <button key={i} onClick={owner && onPlayerClick ? () => onPlayerClick(owner.name) : undefined}
                  style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 8px", cursor: owner && onPlayerClick ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                  {owner
                    ? <>
                        <span style={{ width: 36, height: 36, borderRadius: "50%", background: typeof playerColor === "function" ? playerColor(owner.name) : C.border, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 900, color: "#0d1f12" }}>{owner.name[0]}</span>
                        <div style={{ fontSize: 13, fontWeight: 800, color: C.text }}>{owner.name}</div>
                        <div style={{ fontSize: 11, color: C.muted }}>{rankOf(owner.name) ? ord(rankOf(owner.name)) + " · " : ""}{totalOf(owner.name)} pts</div>
                      </>

                </button>
              ))}
            </div>
          )}
          <div style={{ fontSize: 11, color: C.text, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", margin: "20px 0 10px" }}>Recent form</div>
          <div style={{ display: "flex", gap: 10 }}>
            {[m.homeTeam, m.awayTeam].map((t, i) => (
              <div key={i} style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 8px", textAlign: "center" }}>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{clubName(t)}</div>
                {formPills(t)}
              </div>
            ))}
          </div>
        </div>
      </>);
    }

    // ── HomeMatchRow — WC HomeMatchRow, player-first (owner bold, club as
    //    context beneath), crest per side, "+N pts" chips ───────────────────
    function HomeMatchRow({ m, matchPtsById, onTeamClick, onMatchClick, isLast, banners = false }) {

      const live = m.status === "IN_PLAY" || m.status === "PAUSED";

      const teamClick = onMatchClick ? null : onTeamClick;
      const Side = ({ t, right, earned }) => {

          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

                    <div style={{ fontSize: 11, color: C.muted, fontWeight: 700 }}>vs</div>

                  </div>}
            </div>
            <Side t={m.awayTeam} earned={pts ? pts.away : 0} />
