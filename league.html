    //    from Home's New Accolades section (WC parity). ─────────────────────────
    function LeagueAllAccoladesModal({ ranked, badges, onClose, onPlayerClick }) {
      const [closing, setClosing] = React.useState(false);
      const closingRef = React.useRef(false);
      const triggerClose = () => { if (closingRef.current) return; closingRef.current = true; setClosing(true); setTimeout(onClose, 250); };

                        <div style={{ flex: 1, minWidth: 0 }}>

    function HomeTab({ matches, ranked, badges, weekWindow, matchPtsById, hist, outcomes, anchorIso, setTab, openPlayerModal, openTeamModal }) {
      const real = ranked.filter(p => !p.grimReaper);
      const newAccolades = useMemo(
        () => (typeof computeNewLeagueBadges === "function" ? computeNewLeagueBadges(badges, matches, anchorIso) : []),
        [badges, matches, anchorIso]
      );
      const cutoff = new Date(new Date(anchorIso).getTime() - 7 * 24 * 3600 * 1000).toISOString();
      const recentResults = matches
        .filter(m => m.status === "FINISHED" && m.utcDate >= cutoff && m.utcDate <= anchorIso)
        .sort((a, b) => b.utcDate.localeCompare(a.utcDate))
        .slice(0, 8);
      const topThree = real.slice(0, 3);
      const upNext = matches
        .filter(m => (m.status === "SCHEDULED" || m.status === "TIMED") && m.utcDate > anchorIso)
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate)).slice(0, 6);
      const rankColors = ["#84cc16", "#94a3b8", "#b45309"];
      const [showAllAccolades, setShowAllAccolades] = React.useState(false);

      // Teams ranked by sweepstake points (each owned team = one row), same
      // source as the Teams tab — for the Leading Team card + Top Teams section.
      const teamHist = useMemo(
        () => (typeof deriveLeagueTeamHistory === "function" ? deriveLeagueTeamHistory(matches).history : {}),
        [matches]
      );
      const buildTeamRows = (rk) => rk.filter(p => !p.grimReaper)
        .flatMap(p => (p.teams || []).map(t => ({ teamId: t.teamId, name: t.name, pot: t.pot, pts: t.total, owner: p.name })))
        .sort((a, b) => (b.pts - a.pts) || a.name.localeCompare(b.name));
      const teamRows = useMemo(() => buildTeamRows(ranked).map(t => ({ ...t, hist: teamHist[t.teamId] || [0] })), [ranked, teamHist]);
      const topTeam = teamRows[0] || null;
      const topTeamThree = teamRows.slice(0, 3);
      const teamWeekMove = useMemo(() => {
        const rankNow = {}; teamRows.forEach((t, i) => { rankNow[t.teamId] = i; });
        const cut = new Date(anchorIso).getTime() - 7 * 864e5;
        const past = matches.filter(m => new Date(m.utcDate).getTime() <= cut);
        const pastRows = buildTeamRows(typeof scoreLeaguePlayers === "function" ? scoreLeaguePlayers(past) : []);
        const rankPast = {}; pastRows.forEach((t, i) => { rankPast[t.teamId] = i; });
        const out = {};
        teamRows.forEach(t => { const n = rankNow[t.teamId], pa = rankPast[t.teamId]; out[t.teamId] = (pa != null && n != null) ? pa - n : 0; });
        return out;
      }, [teamRows, matches, anchorIso]);
      const posPill = (delta) => (
        <div style={{
          display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, marginTop: 3,
          background: delta === 0 ? "rgba(148,163,184,0.12)" : delta > 0 ? C.posBg : C.negBg,
          color: delta === 0 ? "#94a3b8" : delta > 0 ? C.accent : C.red,
        }}>{delta === 0 ? "0 pos" : `${delta > 0 ? "▲" : "▼"} ${Math.abs(delta)} pos`}</div>
      );

      const Section = ({ icon, title, onOpen, linkLabel, empty, children }) => (
        <div style={{ marginBottom: 16 }}>
          <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>{icon}</span>{title}</div>
          <div style={s.card}>
            {empty ? <div style={{ padding: "14px", fontSize: 12, color: C.muted }}>{empty}</div> : children}
            {onOpen && (
              <button onClick={onOpen} style={{
                width: "100%", padding: "10px 14px", background: "transparent", border: "none",
                borderTop: `1px solid ${C.border}`, color: C.accent, fontSize: 12, fontWeight: 700,
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
              }}>
                {linkLabel} <span style={{ fontSize: 14, lineHeight: 1 }}>›</span>
              </button>
            )}
          </div>
        </div>
      );

      return (
        <div style={{ padding: "0 14px" }}>
          <LeagueMatchFocusCard matches={matches} matchPtsById={matchPtsById} onTeamClick={openTeamModal} />

          {topThree[0] && (
            <div onClick={() => openPlayerModal(topThree[0].name)} style={{
              ...s.card, padding: "18px 16px", marginBottom: 16, textAlign: "center", cursor: "pointer",
              background: "linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.02))",
            }}>
              <div style={{ fontSize: 11, color: C.dim, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Currently Leading</div>
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{topThree[0].name}</span>
              </div>
              <div style={{ fontSize: 30, fontWeight: 900, color: C.accent, lineHeight: 1 }}>
                {topThree[0].total}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
              </div>
            </div>
          )}

          <Section icon="🏆" title="Top Players" onOpen={() => { window.scrollTo(0, 0); setTab("table", "players"); }} linkLabel="View all players"
            empty={topThree.length === 0 ? "No standings yet" : null}>
            {topThree.map((p, i) => {
              const delta = (weekWindow[p.name] || {}).move || 0;
              return (
                <div key={p.name} onClick={() => openPlayerModal(p.name)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < topThree.length - 1 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{
                    width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                    background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 800, color: "#080c18",
                  }}>{i + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.text, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }}>{p.name}</div>
                    <CrestRow teams={p.teams} outcomes={outcomes} baseHeight={22} />
                  </div>
                  <Sparkline data={hist[p.name] || []} width={64} height={28} color={p.total < 0 ? C.red : p.total === 0 ? C.neutral : C.accent} />
                  <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: C.text, lineHeight: 1 }}>{p.total}</div>
                    {posPill(delta)}
                  </div>
                </div>
              );
            })}
          </Section>

          {topTeam && (
            <div onClick={() => openTeamModal(topTeam.teamId)} style={{
              ...s.card, padding: "18px 16px", marginBottom: 16, textAlign: "center", cursor: "pointer",
              background: "linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.02))",
            }}>
              <div style={{ fontSize: 11, color: C.dim, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Leading Team</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 8 }}>
                <Crest teamId={topTeam.teamId} size={34} />
                <span style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{topTeam.name}<span style={{ fontSize: 13, fontWeight: 700, color: C.muted }}> (P{topTeam.pot})</span></span>
              </div>
              <div style={{ fontSize: 30, fontWeight: 900, color: topTeam.pts < 0 ? C.red : C.accent, lineHeight: 1 }}>
                {topTeam.pts}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
              </div>
            </div>
          )}

          <Section icon="⚽" title="Top Teams" onOpen={() => { window.scrollTo(0, 0); setTab("table", "teams"); }} linkLabel="View all teams"
            empty={topTeamThree.length === 0 ? "No standings yet" : null}>
            {topTeamThree.map((t, i) => (
              <div key={t.teamId} onClick={() => openTeamModal(t.teamId)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < topTeamThree.length - 1 ? `1px solid ${C.border}` : "none" }}>
                <div style={{
                  width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                  background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 800, color: "#080c18",
                }}>{i + 1}</div>
                <Crest teamId={t.teamId} size={28} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}<span style={{ fontSize: 11, fontWeight: 600, color: C.muted }}> (P{t.pot})</span></div>
                  <div style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.owner || "—"}</div>
                </div>
                <Sparkline data={t.hist} width={64} height={28} color={t.pts < 0 ? C.red : t.pts === 0 ? C.neutral : C.accent} />
                <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: t.pts < 0 ? C.red : C.text, lineHeight: 1 }}>{t.pts}</div>
                  {posPill(teamWeekMove[t.teamId] || 0)}
                </div>
              </div>
            ))}
          </Section>

          <Section icon="🏅" title="New Accolades" onOpen={() => setShowAllAccolades(true)} linkLabel="View all accolades"
            empty={newAccolades.length === 0 ? "No new accolades in the last 7 days" : null}>
            {newAccolades.map((b, i) => (
              <div key={i} onClick={() => openPlayerModal(b.name)} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < newAccolades.length - 1 ? `1px solid ${C.border}` : "none" }}>
                <span style={{ fontSize: 18, lineHeight: 1.3 }}>{b.icon}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
                    {b.name} — <span style={{ color: C.accent }}>{b.label}</span>
                  </div>
                  <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{b.desc}</div>
                </div>
              </div>
            ))}
          </Section>
          {showAllAccolades && (
            <LeagueAllAccoladesModal ranked={ranked} badges={badges}
              onClose={() => setShowAllAccolades(false)}
              onPlayerClick={(name) => { setShowAllAccolades(false); openPlayerModal(name); }} />
          )}

          <Section icon="🌐" title="Recent Results" onOpen={() => { window.scrollTo(0, 0); setTab("scores"); }} linkLabel="View all scores"
            empty={recentResults.length === 0 ? "No matches in the last 7 days" : null}>
            {recentResults.map((m, i) => (
              <HomeMatchRow key={m.id} m={m} matchPtsById={matchPtsById} onTeamClick={openTeamModal} isLast={i === recentResults.length - 1} banners />
            ))}
          </Section>

          <Section icon="📅" title="Up Next" onOpen={() => { window.scrollTo(0, 0); setTab("scores"); }} linkLabel="View all scores"
            empty={upNext.length === 0 ? "No upcoming fixtures" : null}>
            {upNext.map((m, i) => (
              <HomeMatchRow key={m.id} m={m} matchPtsById={matchPtsById} onTeamClick={openTeamModal} isLast={i === upNext.length - 1} />
            ))}
          </Section>
        </div>
      );
    }

    // ── Leagues view — switch across every competition's conventional table.
    //    The switcher is built from LEAGUE_COMPETITIONS, so adding a league
    //    there adds it here automatically. ────────────────────────────────────
    // ── Champions League bracket — the WC KnockoutBracket layout (columns of
    //    absolute-positioned tie boxes spaced by round so the tree reads without
    //    connector lines), adapted to two-legged aggregate ties + club crests.
    function CLBracket({ matches, onTeamClick }) {
      const bracket = typeof deriveCLBracket === "function" ? deriveCLBracket(matches) : { rounds: [] };
      const stageTies = { LAST_16: [], QUARTER_FINALS: [], SEMI_FINALS: [], FINAL: [] };
      bracket.rounds.forEach(r => { if (stageTies[r.stage]) stageTies[r.stage] = r.ties.slice(); });
      if (!["LAST_16", "QUARTER_FINALS", "SEMI_FINALS", "FINAL"].some(s => stageTies[s].length)) {
        return <div style={{ textAlign: "center", color: C.muted, fontSize: 13, padding: "40px 20px" }}>Knockout stage hasn't started yet</div>;
      }
      // Order each round off the next one's winners (anchored backward from the
      // final) so a tie sits centred between the two that feed it; fall back to
      // natural order for any round whose winners aren't decided yet.
      const feederOf = { FINAL: "SEMI_FINALS", SEMI_FINALS: "QUARTER_FINALS", QUARTER_FINALS: "LAST_16" };
      const orderFeeders = (stage, ties) => {
        const pool = (stageTies[feederOf[stage]] || []).slice();
        if (!pool.length) return [];
        const out = []; let matched = 0;
        ties.forEach(tie => [tie && tie.a, tie && tie.b].forEach(team => {
          const idx = team != null ? pool.findIndex(ft => ft && ft.winner === team) : -1;
          if (idx >= 0) { out.push(pool[idx]); pool[idx] = null; matched++; } else out.push(null);
        }));
        return matched ? out : (stageTies[feederOf[stage]] || []);
      };
      const finalR = stageTies.FINAL.slice(0, 1);
      const sfR = finalR.length ? orderFeeders("FINAL", finalR) : stageTies.SEMI_FINALS;
      const qfR = (sfR && sfR.some(Boolean)) ? orderFeeders("SEMI_FINALS", sfR) : stageTies.QUARTER_FINALS;
      const r16R = (qfR && qfR.some(Boolean)) ? orderFeeders("QUARTER_FINALS", qfR) : stageTies.LAST_16;
      const pad = (arr, n) => { const a = (arr || []).slice(0, n); while (a.length < n) a.push(null); return a; };
      const rounds = [
        { key: "r16", label: "Round of 16", data: pad(r16R, 8) },
        { key: "qf", label: "Quarter-finals", data: pad(qfR, 4) },
        { key: "sf", label: "Semi-finals", data: pad(sfR, 2) },
        { key: "fin", label: "🏆 Final", data: pad(finalR, 1) },
      ];
      const MATCH_H = 76, GAP = 12, SLOT = MATCH_H + GAP, totalHeight = 8 * SLOT - GAP;
      const topFor = (roundIdx, i) => { const sl = Math.pow(2, roundIdx) * SLOT; return sl * i + (sl - MATCH_H) / 2; };
      const teamName = (id) => {
        const t = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
        if (t) return t.name;
        const m = matches.find(m => m.homeTeam.id === id || m.awayTeam.id === id);
        return m ? (m.homeTeam.id === id ? (m.homeTeam.shortName || m.homeTeam.tla) : (m.awayTeam.shortName || m.awayTeam.tla)) : "#" + id;
      };
      const ownerOf = (id) => { const o = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(id) : null; return o ? o.name : null; };
      const Slot = ({ id, score, isWinner, isElim, side }) => {
        const clickable = onTeamClick && id && typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
        const owner = id ? ownerOf(id) : null;
        return (
          <div onClick={clickable ? () => onTeamClick(id) : undefined} style={{
            display: "flex", alignItems: "center", gap: 7, padding: "4px 8px", height: 38, boxSizing: "border-box", minWidth: 0, overflow: "hidden",
            borderBottom: side === "home" ? `1px solid ${C.border}` : "none",
            background: isWinner ? "rgba(34,197,94,0.08)" : "transparent", cursor: clickable ? "pointer" : "default",
          }}>
            {id ? (
              <div style={{ position: "relative", flexShrink: 0, lineHeight: 0 }}>
                <img src={typeof leagueCrest === "function" ? leagueCrest(id) : ""} alt="" width={20} height={20}
                  style={{ objectFit: "contain", display: "block", opacity: isElim ? 0.4 : 1 }} onError={e => { e.target.style.visibility = "hidden"; }} />
                {isElim && <span style={{ position: "absolute", top: -3, right: -3, fontSize: 9, fontWeight: 900, color: C.red, textShadow: "0 0 2px rgba(0,0,0,0.9)", lineHeight: 1 }}>✕</span>}
              </div>
            ) : <div style={{ width: 20, height: 20, background: C.border, borderRadius: 3, flexShrink: 0 }} />}
            {id ? (
              <div style={{ flex: 1, minWidth: 0, opacity: isElim ? 0.5 : 1 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: isWinner ? C.accent : C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{owner || teamName(id)}</div>
                {owner && <div style={{ fontSize: 10, color: C.muted, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{teamName(id)}</div>}
              </div>
            ) : <span style={{ fontSize: 11, color: C.muted, flex: 1 }}>TBD</span>}
            {score != null && <div style={{ flexShrink: 0, fontSize: 13, fontWeight: 700, color: isWinner ? C.accent : C.dim, opacity: isElim ? 0.5 : 1 }}>{score}</div>}
          </div>
        );
      };
      const Tie = ({ tie }) => {
        if (!tie) return (
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 6, overflow: "hidden", height: MATCH_H, boxSizing: "border-box", background: C.card }}>
            <Slot side="home" /><Slot side="away" />
          </div>
        );
        return (
          <div style={{ border: `1px solid ${tie.winner ? C.accent + "44" : C.border}`, borderRadius: 6, overflow: "hidden", height: MATCH_H, boxSizing: "border-box", background: C.card }}>
            <Slot id={tie.a} side="home" score={tie.played ? tie.aggA : null} isWinner={tie.winner === tie.a} isElim={!!tie.winner && tie.winner !== tie.a} />
            <Slot id={tie.b} side="away" score={tie.played ? tie.aggB : null} isWinner={tie.winner === tie.b} isElim={!!tie.winner && tie.winner !== tie.b} />
          </div>
        );
      };
      return (
        <div>
          <div style={{ fontSize: 11, color: C.muted, padding: "0 14px 10px" }}>Two-legged ties show the aggregate score. Tap a club for its card.</div>
          <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch", paddingBottom: 8 }}>
            <div style={{ display: "flex", gap: 16, padding: "0 12px 8px", alignItems: "flex-start", width: "max-content" }}>
              {rounds.map((round, idx) => (
                <div key={round.key} style={{ display: "flex", flexDirection: "column", minWidth: 170 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: round.key === "fin" ? C.accent : C.muted, textTransform: "uppercase", letterSpacing: 1, padding: "0 4px 8px", textAlign: "center" }}>{round.label}</div>
                  <div style={{ position: "relative", height: totalHeight, width: 170 }}>
                    {round.data.map((tie, i) => (
                      <div key={i} style={{ position: "absolute", top: topFor(idx, i), left: 0, right: 0, height: MATCH_H }}><Tie tie={tie} /></div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Scores tab ──────────────────────────────────────────────────────────
    function ScoresTab({ matches, matchPtsById, anchorIso, onTeamClick }) {
      const days = useMemo(() => {
        const byDay = {};
        matches.forEach(m => {
          const day = m.utcDate.slice(0, 10);
          (byDay[day] = byDay[day] || []).push(m);
        });
        const anchor = anchorIso.slice(0, 10);
        return Object.keys(byDay)
          .sort((a, b) => Math.abs(new Date(a) - new Date(anchor)) - Math.abs(new Date(b) - new Date(anchor)))
          .slice(0, 10)
          .sort((a, b) => b.localeCompare(a))
          .map(d => ({ day: d, games: byDay[d].sort((x, y) => x.utcDate.localeCompare(y.utcDate)) }));
      }, [matches, anchorIso]);
      return (
        <div style={{ padding: "0 14px" }}>
          {days.map(({ day, games }) => (
            <div key={day} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.dim, margin: "0 0 6px 2px" }}>{fmtDay(day)}</div>
              <div style={s.card}>
                {games.map((m, i) => (
                  <HomeMatchRow key={m.id} m={m} matchPtsById={matchPtsById} onTeamClick={onTeamClick} isLast={i === games.length - 1} banners />
                ))}
              </div>
            </div>
          ))}
          {days.length === 0 && <div style={{ color: C.muted, fontSize: 13, padding: 20, textAlign: "center" }}>No fixtures loaded yet.</div>}
        </div>
      );
    }

    // ── Search overlay — WC-parity search over league players + teams ────────
    function LeagueSearchOverlay({ ranked, onClose, onSelectPlayer, onSelectTeam }) {
      const [query, setQuery] = React.useState("");
      const inputRef = React.useRef(null);
      const [recent, setRecent] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem(SEARCH_RECENT_KEY) || "[]"); } catch (e) { return []; }
      });
      React.useEffect(() => {
        setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 60);
        const prev = document.body.style.overflow; document.body.style.overflow = "hidden";
        return () => { document.body.style.overflow = prev; };
      }, []);
      const saveRecent = (item) => {
        const updated = [item, ...recent.filter(r => !(r.type === item.type && r.id === item.id))].slice(0, 10);
        setRecent(updated); localStorage.setItem(SEARCH_RECENT_KEY, JSON.stringify(updated));
      };
      const handleSelect = (item) => {
        saveRecent(item); onClose();
        if (item.type === "player") onSelectPlayer(item.id); else onSelectTeam(item.id);
      };
      const clearRecent = () => { setRecent([]); localStorage.removeItem(SEARCH_RECENT_KEY); };
      const q = query.trim().toLowerCase();
      const index = React.useMemo(() => {
        const players = [], teams = [];
        ranked.forEach(p => {
          players.push({ type: "player", id: p.name, label: p.name, sub: p.grimReaper ? "Grim Reaper" : `${p.total} pts`, reaper: !!p.grimReaper });
          (p.teams || []).forEach(t => teams.push({ type: "team", id: t.teamId, label: t.name, sub: `Pot ${t.pot} · ${p.name}` }));
        });
        return { players, teams };
      }, [ranked]);
      const results = React.useMemo(() => {
        if (!q) return [];
        const out = [];
        index.players.forEach(p => { if (p.label.toLowerCase().includes(q)) out.push(p); });
        index.teams.forEach(t => { if (t.label.toLowerCase().includes(q)) out.push(t); });
        return out;
      }, [q, index]);
      const Row = ({ item, onClick }) => (
        <div onClick={onClick} className="player-card" style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", cursor: "pointer", borderBottom: `1px solid ${C.border}` }}>
          {item.type === "team"
            ? <Crest teamId={item.id} size={26} />
            : <div style={{ width: 26, height: 26, borderRadius: "50%", flexShrink: 0, background: item.reaper ? C.reaperAccent : C.border, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: C.text }}>{item.reaper ? "💀" : (item.label[0] || "?")}</div>}
          <div style={{ minWidth: 0, flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.label}</div>
            <div style={{ fontSize: 11, color: C.muted }}>{item.type === "team" ? "Team" : "Player"} · {item.sub}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, transform: "rotate(-90deg)" }}><path d="M6 9l6 6 6-6" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
        </div>
      );
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 50, background: C.bg, display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", padding: "10px 14px", gap: 10, borderBottom: `1px solid ${C.border}` }}>
            <button onClick={onClose} aria-label="Back" style={{ background: "none", border: "none", color: C.text, cursor: "pointer", padding: 6, display: "flex", flexShrink: 0 }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke={C.text} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
            </button>
            <div style={{ flex: 1, position: "relative" }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}>
                <circle cx="11" cy="11" r="8" stroke={C.muted} strokeWidth="2.5" /><path d="M21 21l-4.35-4.35" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" />
              </svg>
              <input ref={inputRef} type="text" inputMode="search" placeholder="Search players or teams…" value={query} onChange={e => setQuery(e.target.value)}
                style={{ width: "100%", boxSizing: "border-box", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 24, color: C.text, fontSize: 15, padding: "7px 36px 7px 34px", outline: "none", WebkitAppearance: "none", caretColor: C.accent }} />
              {query && <button onClick={() => setQuery("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: C.muted, fontSize: 14, cursor: "pointer", padding: "2px 4px", lineHeight: 1 }}>✕</button>}
            </div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            {!q ? (
              recent.length > 0 ? (<>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px 6px" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase" }}>Recent</span>
                  <button onClick={clearRecent} style={{ background: "none", border: "none", color: C.muted, fontSize: 12, cursor: "pointer", padding: 4 }}>Clear all</button>
                </div>
                {recent.map((item, i) => <Row key={i} item={item} onClick={() => handleSelect(item)} />)}
              </>) : (
                <div style={{ color: C.muted, textAlign: "center", padding: "52px 24px", fontSize: 14, lineHeight: 1.6 }}>
                  <div style={{ fontSize: 30, marginBottom: 14 }}>🔍</div>Search for a player or team to open their card
                </div>
              )
            ) : results.length === 0 ? (
              <div style={{ color: C.muted, textAlign: "center", padding: "52px 24px", fontSize: 14 }}>No results for "{query}"</div>
            ) : results.map((item, i) => <Row key={i} item={item} onClick={() => handleSelect(item)} />)}
          </div>
        </div>
      );
    }

    // ── Notifications drawer — recent league events (results / season
    //    milestones / leader changes), drops from the top like the WC app.
    //    All items are client-derived; a per-device "last seen" timestamp
    //    drives the unread badge. ─────────────────────────────────────────────
    function LeagueNotificationsDrawer({ matches, ranked, matchPtsById, onClose, onSeenUpdate }) {
      const lastSeen = parseInt(localStorage.getItem(NOTIF_SEEN_KEY) || "0", 10);
      const { frames, history } = React.useMemo(
        () => (typeof deriveLeagueHistory === "function" ? deriveLeagueHistory(matches) : { frames: [], history: {} }),
        [matches]
      );
      const outcomes = React.useMemo(
        () => (typeof deriveSeasonOutcomes === "function" ? deriveSeasonOutcomes(matches) : {}),
        [matches]
      );

      const matchItems = matches.filter(m => m.status === "FINISHED")
        .map(m => ({ type: "match", date: new Date(m.utcDate).getTime(), m }));

      const milestoneItems = [];
      ranked.forEach(p => {
        if (p.grimReaper) return;
        (p.teams || []).forEach(t => {
          const o = outcomes[t.teamId];
          if (!o) return;
          const ts = matches.filter(m => (m.homeTeam.id === t.teamId || m.awayTeam.id === t.teamId) && m.status === "FINISHED")
            .map(m => new Date(m.utcDate).getTime());
          const date = ts.length ? Math.max(...ts) : 0;
          if (!date) return;
          const bonus = typeof leagueBonusPts === "function" ? leagueBonusPts(t.teamId, outcomes) : null;
          milestoneItems.push({ type: "milestone", date, teamId: t.teamId, name: t.name, owner: p.name, outcome: o.outcome, bonus });
        });
      });

      const leaderItems = [];
      if (frames.length && history) {
        const names = Object.keys(history);
        let currentLeader = null;
        frames.forEach((f, i) => {
          const st = names.map(n => ({ n, v: (history[n] || [])[i] || 0 })).sort((a, b) => b.v - a.v);
          if (st.length && st[0].v > 0 && (st.length < 2 || st[0].v > st[1].v) && st[0].n !== currentLeader) {
            leaderItems.push({ type: "leader", date: new Date(f).getTime(), leader: st[0].n, pts: st[0].v, ahead: st[0].v - (st[1] ? st[1].v : 0) });
            currentLeader = st[0].n;
          }
        });
      }

      const allItems = [...matchItems, ...milestoneItems, ...leaderItems].sort((a, b) => b.date - a.date);
      const FILTERS = [{ key: "all", label: "All" }, { key: "match", label: "Results" }, { key: "milestone", label: "Milestones" }, { key: "leader", label: "Leaders" }];
      const [activeFilter, setActiveFilter] = React.useState("all");
      const visibleItems = activeFilter === "all" ? allItems : allItems.filter(it => it.type === activeFilter);
      const unread = visibleItems.filter(it => it.date > lastSeen);
      const read = visibleItems.filter(it => it.date <= lastSeen);

      const handleClose = () => { const ts = Date.now(); localStorage.setItem(NOTIF_SEEN_KEY, String(ts)); if (onSeenUpdate) onSeenUpdate(ts); onClose(); };
      const relTime = (ts) => {
        const mins = Math.floor((Date.now() - ts) / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins}m ago`;
        return fmtDay(new Date(ts).toISOString()) + ", " + fmtTime(new Date(ts).toISOString());
      };
      const ptsStr = (n) => (n === null || n === undefined) ? null : <span style={{ color: n > 0 ? C.accent : n < 0 ? C.red : C.muted, fontWeight: 700 }}>{n >= 0 ? "+" : ""}{n} pts</span>;
      const brandRow = (ts) => <div style={{ fontSize: 10, color: C.muted, marginBottom: 3 }}>League Sweeps · {relTime(ts)}</div>;
      const cardStyle = (dimmed) => ({ padding: "10px 6px", borderBottom: `1px solid ${C.border}`, background: dimmed ? "transparent" : "rgba(34,197,94,0.07)" });

      const teamName = (id) => (typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id] && LEAGUE_TEAMS[id].name);
      const ownerName = (id) => { const o = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(id) : null; return o ? o.name : null; };

      const renderMatch = (m, dimmed) => {
        const hId = m.homeTeam.id, aId = m.awayTeam.id;
        const hs = (m.score && m.score.fullTime && m.score.fullTime.home) || 0;
        const as_ = (m.score && m.score.fullTime && m.score.fullTime.away) || 0;
        const hN = teamName(hId) || m.homeTeam.shortName || "TBD";
        const aN = teamName(aId) || m.awayTeam.shortName || "TBD";
        const hO = ownerName(hId), aO = ownerName(aId);
        const pts = matchPtsById[m.id];
        const hL = hO ? `${hO}'s ${hN}` : hN, aL = aO ? `${aO}'s ${aN}` : aN;
        let icon, title, l1, p1, l2, p2;
        if (hs > as_) { icon = "🏆"; title = `${hL} beat ${aL}`; l1 = hO || hN; p1 = pts && pts.home; l2 = aO || aN; p2 = pts && pts.away; }
        else if (as_ > hs) { icon = "🏆"; title = `${aL} beat ${hL}`; l1 = aO || aN; p1 = pts && pts.away; l2 = hO || hN; p2 = pts && pts.home; }
        else { icon = "🤝"; title = `${hL} and ${aL} draw`; l1 = hO || hN; p1 = pts && pts.home; l2 = aO || aN; p2 = pts && pts.away; }
        return (
          <div key={`m-${m.id}`} style={cardStyle(dimmed)}>
            {brandRow(new Date(m.utcDate).getTime())}
            <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 2 }}>{icon} {title}</div>
            <div style={{ fontSize: 12, color: C.dim }}>{hN} {hs}–{as_} {aN}</div>
            {pts && (
              <div style={{ fontSize: 11, color: C.muted, marginTop: 3, display: "flex", gap: 10 }}>
                <span>{l1} {ptsStr(p1)}</span><span>{l2} {ptsStr(p2)}</span>
              </div>
            )}
          </div>
        );
      };
      const renderMilestone = (it, dimmed) => (
        <div key={`ms-${it.teamId}`} style={cardStyle(dimmed)}>
          {brandRow(it.date)}
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 2, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            🏅 {it.owner}'s {it.name} {outcomeChip(it.outcome)}
          </div>
          {it.bonus != null && it.bonus !== 0 && <div style={{ fontSize: 12, color: C.dim }}>Season bonus {ptsStr(it.bonus)}</div>}
        </div>
      );
      const renderLeader = (it, dimmed) => (
        <div key={`l-${it.date}`} style={cardStyle(dimmed)}>
          {brandRow(it.date)}
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 2 }}>👑 New Leader: {it.leader}</div>
          <div style={{ fontSize: 12, color: C.dim }}>{it.pts} pts · {it.ahead} pt{it.ahead !== 1 ? "s" : ""} clear</div>
        </div>
      );
      const renderItem = (it, dimmed) => it.type === "milestone" ? renderMilestone(it, dimmed) : it.type === "leader" ? renderLeader(it, dimmed) : renderMatch(it.m, dimmed);

      return (
        <>
          <div onClick={handleClose} style={{ position: "fixed", inset: 0, zIndex: 35, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(3px)", WebkitBackdropFilter: "blur(3px)" }} />
          <div className="notif-panel" style={{ background: C.bg, border: `1px solid ${C.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 16px 12px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>Notifications</div>
                {unread.length > 0 && <span style={{ background: C.accent, color: C.bg, fontSize: 10, fontWeight: 800, borderRadius: 10, padding: "1px 7px", lineHeight: "17px" }}>{unread.length}</span>}
              </div>
              <button onClick={handleClose} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1, padding: "2px 6px" }}>✕</button>
            </div>
            <div style={{ display: "flex", gap: 6, padding: "8px 10px", overflowX: "auto", flexShrink: 0, borderBottom: `1px solid ${C.border}` }}>
              {FILTERS.map(f => (
                <button key={f.key} onClick={() => setActiveFilter(f.key)} style={{
                  flexShrink: 0, padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer",
                  background: activeFilter === f.key ? C.accent : "transparent",
                  color: activeFilter === f.key ? C.bg : C.muted,
                  border: activeFilter === f.key ? `1px solid ${C.accent}` : `1px solid ${C.border}`,
                }}>{f.label}</button>
              ))}
            </div>
            <div style={{ overflowY: "auto", maxHeight: "calc(80vh - 120px)", padding: "0 10px 24px" }}>
              {visibleItems.length === 0
                ? <div style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "24px 0" }}>No notifications yet</div>
                : <>
                  {unread.length > 0 && <><div style={{ ...s.label, padding: "10px 6px 4px" }}>New</div>{unread.map(it => renderItem(it, false))}</>}
                  {read.length > 0 && <><div style={{ ...s.label, padding: "10px 6px 4px" }}>Earlier</div>{read.map(it => renderItem(it, true))}</>}
                </>
              }
            </div>
          </div>
        </>
      );
    }

    // ── header + replay scrubber ────────────────────────────────────────────
    function Header({ group, lastUpdated, refreshing, onRefresh, replay, onReplayDate, onOpenSearch, onOpenNotifications, unreadCount }) {
      const replayPct = replay.on
        ? (new Date(replay.date) - new Date(REPLAY_START)) / (new Date(REPLAY_END) - new Date(REPLAY_START)) * 100
        : 0;
      return (
        <div style={{ padding: "10px 14px 6px" }}>
          {/* Search + notifications row — WC-parity top bar */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <div onClick={onOpenSearch} role="button" style={{
              flex: 1, display: "flex", alignItems: "center", gap: 8,
              background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)",
              borderRadius: 24, padding: "7px 14px 7px 12px", cursor: "pointer",
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
                <circle cx="11" cy="11" r="8" stroke="rgba(255,255,255,0.6)" strokeWidth="2.5" />
                <path d="M21 21l-4.35-4.35" stroke="rgba(255,255,255,0.6)" strokeWidth="2.5" strokeLinecap="round" />
              </svg>
              <span style={{ fontSize: 14, color: "rgba(255,255,255,0.6)" }}>Search players or teams…</span>
            </div>
            <div style={{ position: "relative", flexShrink: 0 }}>
              <button onClick={onOpenNotifications} aria-label="Notifications" style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)", width: 32, height: 32, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M6 10.5a6 6 0 1 1 12 0c0 3.2 1 5.1 1.8 6.1.3.35.05.9-.4.9H4.6c-.45 0-.7-.55-.4-.9.8-1 1.8-2.9 1.8-6.1Z" stroke="rgba(255,255,255,0.75)" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" />
                  <path d="M9.5 19.5a2.5 2.5 0 0 0 5 0" stroke="rgba(255,255,255,0.75)" strokeWidth="1.7" strokeLinecap="round" />
                </svg>
              </button>
              {unreadCount > 0 && (
                <div style={{ position: "absolute", top: -3, right: -3, minWidth: 15, height: 15, borderRadius: 8, background: "#ef4444", color: "white", fontSize: 9, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px", lineHeight: 1, pointerEvents: "none" }}>
                  {unreadCount > 9 ? "9+" : unreadCount}
                </div>
              )}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800 }}>League Sweeps <span style={{ color: C.accent }}>26/27</span></div>
              <div style={{ fontSize: 12, color: C.muted }}>{group.label}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <button onClick={onRefresh} disabled={replay.on} style={{
                background: C.card, color: replay.on ? C.muted : C.text, border: `1px solid ${C.border}`,
                borderRadius: 8, padding: "6px 10px", cursor: replay.on ? "default" : "pointer", fontSize: 12,
              }}>{refreshing ? "…" : "↻ refresh"}</button>
              <div style={{ fontSize: 10, color: C.muted, marginTop: 4 }}>
                {replay.on ? "replay mode" : lastUpdated ? `updated ${fmtTime(lastUpdated.toISOString())}` : ""}
              </div>
            </div>
          </div>
          {replay.on && (
            <div style={{ marginTop: 10, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 10px" }}>
              {replay.loading ? (
                <div style={{ fontSize: 11, color: C.muted }}>Loading replay data…</div>
              ) : (
                <>
                  <input type="range" min={0} max={1000} value={replayPct * 10}
                    onChange={e => {
                      const t = new Date(REPLAY_START).getTime() + (e.target.value / 1000) * (new Date(REPLAY_END) - new Date(REPLAY_START));
                      onReplayDate(new Date(t).toISOString());
                    }} />
                  <div style={{ fontSize: 11, color: C.gold, textAlign: "center" }}>🔁 Replaying 2025-26 · as of {fmtDay(replay.date)}</div>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── app shell ───────────────────────────────────────────────────────────
    function App({ group, onSwitchGroup }) {
      const [tab, setTab] = useState("home");
      // League tab's inline top toggle: players · teams · leagues
      const [leagueView, setLeagueView] = useState("players");
      // Which competition table the "Leagues" view is showing.
      const [leaguesComp, setLeaguesComp] = useState("PL");
      const [liveMatches, setLiveMatches] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [refreshing, setRefreshing] = useState(false);
      const [replay, setReplay] = useState({ on: false, loading: false, date: REPLAY_END });
      const [selectedPlayer, setSelectedPlayer] = useState(null);
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [showMore, setShowMore] = useState(false);
      const [showRules, setShowRules] = useState(false);
      const [showSearch, setShowSearch] = useState(false);
      const [showNotifications, setShowNotifications] = useState(false);
      const [notifSeenTs, setNotifSeenTs] = useState(() => parseInt(localStorage.getItem(NOTIF_SEEN_KEY) || "0", 10));
      const matchesRef = useRef([]);
      const replayRef = useRef(replay);
      replayRef.current = replay;
      const tabRef = useRef(tab);
      tabRef.current = tab;

      const fetchMatches = useCallback(async (isManual) => {
        if (replayRef.current.on) return;
        if (isManual) setRefreshing(true);
        try {
          // One request per competition in LEAGUE_COMPETITIONS (PL, ELC + the
          // four continental leagues). Free tier is 10 req/min; six parallel is
          // fine. A single league failing doesn't blank the others.
          const codes = typeof LEAGUE_COMPETITIONS !== "undefined" ? Object.keys(LEAGUE_COMPETITIONS) : ["PL", "ELC"];
          let failures = 0, lastErr = null;
          const results = await Promise.all(codes.map(async code => {
            try {
              const res = await fetch(`${LEAGUE_WORKER_URL}/competitions/${code}/matches?season=${LEAGUE_SEASON}`);
              if (!res.ok) throw new Error(`API returned ${res.status} for ${code}`);
              return (await res.json()).matches || [];
            } catch (e) { failures++; lastErr = e; return []; }
          }));
          // Surface an error only on a total outage — one league failing must
          // not blank the five that loaded.
          if (failures === codes.length && lastErr) throw lastErr;
          // Merge with existing state (same partial-response guard as the WC
          // app): a FINISHED match we've seen is never silently dropped.
          const merged = {};
          matchesRef.current.forEach(m => { merged[m.id] = m; });
          results.flat().forEach(m => { merged[m.id] = m; });
          matchesRef.current = Object.values(merged);
          setLiveMatches(matchesRef.current);
          setLastUpdated(new Date());
          setError(null);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      }, []);

      useEffect(() => {
        fetchMatches();
        const id = setInterval(() => fetchMatches(), 60_000);
        return () => clearInterval(id);
      }, [fetchMatches]);

      // Replay data loads on demand via <script> injection (works on file://
      // where fetch()ing a local JSON would not).
      const toggleReplay = () => {
        if (replay.on) { setReplay({ on: false, loading: false, date: REPLAY_END }); setLoading(matchesRef.current.length === 0); return; }
        if (typeof LEAGUE_REPLAY_DATA !== "undefined") {
          setReplay({ on: true, loading: false, date: REPLAY_END });
          return;
        }
        setReplay({ on: true, loading: true, date: REPLAY_END });
        const sc = document.createElement("script");
        sc.src = "league-data-2025.js";
        sc.onload = () => setReplay(r => ({ ...r, loading: false }));
        sc.onerror = () => setReplay({ on: false, loading: false, date: REPLAY_END });
        document.body.appendChild(sc);
      };

      const matches = useMemo(() => {
        if (replay.on && !replay.loading && typeof LEAGUE_REPLAY_DATA !== "undefined" && typeof leagueMatchesUpTo === "function") {
          return leagueMatchesUpTo(LEAGUE_REPLAY_DATA.matches, replay.date);
        }
        return liveMatches;
      }, [replay, liveMatches]);

      const anchorIso = replay.on ? replay.date : (lastUpdated ? lastUpdated.toISOString() : new Date().toISOString());

      // ── shared derived data (guarded per the coupling pattern) ──
      const ranked = useMemo(() => (typeof scoreLeaguePlayers === "function" ? scoreLeaguePlayers(matches) : []), [matches]);
      const outcomes = useMemo(() => (typeof deriveSeasonOutcomes === "function" ? deriveSeasonOutcomes(matches) : {}), [matches]);
      const badges = useMemo(() => (typeof computeLeagueBadges === "function" ? computeLeagueBadges(ranked, matches, anchorIso) : {}), [ranked, matches, anchorIso]);
      const hist = useMemo(() => (typeof deriveLeagueHistory === "function" ? deriveLeagueHistory(matches).history : {}), [matches]);
      const weekWindow = useMemo(() => (typeof lgWeekWindow === "function" ? lgWeekWindow(ranked, matches, anchorIso) : {}), [ranked, matches, anchorIso]);
      const matchPtsById = useMemo(() => (typeof deriveLeagueMatchPts === "function" ? deriveLeagueMatchPts(matches) : {}), [matches]);
      const tables = useMemo(() => {
        if (typeof deriveLeagueTable !== "function" || typeof LEAGUE_COMPETITIONS === "undefined") return {};
        const out = {};
        Object.keys(LEAGUE_COMPETITIONS).forEach(code => { out[code] = deriveLeagueTable(matches, code); });
        return out;
      }, [matches]);
      const weekMove = useMemo(() => {
        const out = {};
        Object.keys(weekWindow).forEach(n => { out[n] = weekWindow[n].move; });
        return out;
      }, [weekWindow]);
      const displayRanks = useMemo(() => {
        const out = [];
        ranked.forEach((p, i) => {
          out[i] = (i > 0 && ranked[i - 1].total === p.total && ranked[i - 1].tiebreak === p.tiebreak) ? out[i - 1] : i + 1;
        });
        return out;
      }, [ranked]);

      // ── modal open/close with browser-history integration (device back
      //    button closes the card, same as the WC app) ──
      const openPlayerModal = (name) => {
        window.history.pushState({ lgModal: "player", name }, "");
        setSelectedTeam(null); setSelectedPlayer(name);
      };
      const openTeamModal = (teamId) => {
        window.history.pushState({ lgModal: "team", teamId }, "");
        setSelectedPlayer(null); setSelectedTeam(teamId);
      };
      const switchToTeam = (teamId) => {
        window.history.replaceState({ lgModal: "team", teamId }, "");
        setSelectedPlayer(null); setSelectedTeam(teamId);
      };
      const switchToPlayer = (name) => {
        window.history.replaceState({ lgModal: "player", name }, "");
        setSelectedTeam(null); setSelectedPlayer(name);
      };
      const closeCard = () => {
        const st = window.history.state;
        if (st && st.lgModal) window.history.back();
        else { setSelectedPlayer(null); setSelectedTeam(null); }
      };
      useEffect(() => {
        const onPop = (e) => {
          const st = e.state || {};
          if (st.lgModal === "player") { setSelectedTeam(null); setSelectedPlayer(st.name); }
          else if (st.lgModal === "team") { setSelectedPlayer(null); setSelectedTeam(st.teamId); }
          else { setSelectedPlayer(null); setSelectedTeam(null); setShowMore(false); setShowRules(false); }
        };
        const onKey = (e) => {
          if (e.key !== "Escape") return;
          if (selectedPlayer || selectedTeam) closeCard();
          else if (showRules) setShowRules(false);
          else if (showMore) setShowMore(false);
        };
        window.addEventListener("popstate", onPop);
        window.addEventListener("keydown", onKey);
        return () => { window.removeEventListener("popstate", onPop); window.removeEventListener("keydown", onKey); };
      });

      const navTo = (id, view) => {
        window.scrollTo(0, 0);
        setShowMore(false); setShowRules(false);
        setSelectedPlayer(null); setSelectedTeam(null);
        if (id === "table") setLeagueView(view || "players"); // League opens on Players unless told otherwise
        setTab(id);
      };

      // Unread badge — finished matches newer than the last time the drawer
      // was opened (cheap proxy for the drawer's full unread set).
      const unreadCount = useMemo(
        () => matches.filter(m => m.status === "FINISHED" && new Date(m.utcDate).getTime() > notifSeenTs).length,
        [matches, notifSeenTs]
      );

      return (
        <div style={{ paddingBottom: 84 }}>
          <Header group={group} lastUpdated={lastUpdated} refreshing={refreshing}
            onRefresh={() => fetchMatches(true)} replay={replay}
            onReplayDate={(d) => setReplay(r => ({ ...r, date: d }))}
            onOpenSearch={() => setShowSearch(true)}
            onOpenNotifications={() => setShowNotifications(true)}
            unreadCount={unreadCount} />
          {error && !replay.on && (
            <div style={{ margin: "6px 14px 10px", padding: 10, background: "#2a1616", border: "1px solid #5b2121", borderRadius: 10, color: C.dangerTextBright, fontSize: 12 }}>
              Couldn't reach the match feed ({error}) — showing last known data.
            </div>
          )}
          {!loading && tab === "table" && (
            <div style={{ padding: "0 14px 10px" }}>
              <div className="tab-seg">
                {[["players", "Players"], ["teams", "Teams"], ["leagues", "Leagues"], ["ucl", "UCL"]].map(([id, label]) => (
                  <button key={id} onClick={() => { window.scrollTo(0, 0); setLeagueView(id); }} style={{
                    background: leagueView === id ? C.accent : C.surface,
                    color: leagueView === id ? C.bg : C.dim, fontWeight: 700, fontSize: 12,
                    padding: "11px 2px", whiteSpace: "nowrap",
                  }}>{label}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{ height: 8 }} />
          {loading && !replay.on
            ? <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>Loading fixtures…</div>
            : tab === "home" ? <HomeTab matches={matches} ranked={ranked} badges={badges} weekWindow={weekWindow} matchPtsById={matchPtsById} hist={hist} outcomes={outcomes} anchorIso={anchorIso} setTab={navTo} openPlayerModal={openPlayerModal} openTeamModal={openTeamModal} />
            : tab === "table" ? (
                leagueView === "players" ? <SweepsTab ranked={ranked} badges={badges} hist={hist} weekMove={weekMove} outcomes={outcomes} displayRanks={displayRanks} onOpenPlayer={openPlayerModal} />
                : leagueView === "teams" ? <TeamsLeagueTab matches={matches} ranked={ranked} anchorIso={anchorIso} onTeamClick={openTeamModal} />
                : leagueView === "ucl" ? <ChampionsLeagueTab matches={matches} tables={tables} outcomes={outcomes} onTeamClick={openTeamModal} />
                : <LeaguesTab matches={matches} tables={tables} outcomes={outcomes} onTeamClick={openTeamModal} comp={leaguesComp} setComp={setLeaguesComp} />
              )
            : tab === "scores" ? <ScoresTab matches={matches} matchPtsById={matchPtsById} anchorIso={anchorIso} onTeamClick={openTeamModal} />
            : tab === "race" ? <RaceTab ranked={ranked} matches={matches} anchorIso={anchorIso} replayOn={replay.on} />
            : null}

          {(selectedPlayer || selectedTeam) && (
            <SnapSheet onClose={closeCard}>
              {(bodyRef) => {
                if (selectedTeam) {
                  return <TeamCardContent key={selectedTeam} bodyRef={bodyRef} teamId={selectedTeam} matches={matches} ranked={ranked} matchPtsById={matchPtsById} outcomes={outcomes} tables={tables} onTeamClick={switchToTeam} onOwnerClick={switchToPlayer} onClose={closeCard} />;
                }
                const idx = ranked.findIndex(x => x.name === selectedPlayer);
                const p = ranked[idx];
                if (!p) return null;
                return <PlayerCardContent key={selectedPlayer} bodyRef={bodyRef} player={p} displayRank={displayRanks[idx]} badges={badges[selectedPlayer] || []} matches={matches} matchPtsById={matchPtsById} hist={hist[selectedPlayer] || []} week={weekWindow[selectedPlayer]} outcomes={outcomes} onTeamClick={switchToTeam} onClose={closeCard} />;
              }}
            </SnapSheet>
          )}

          {showRules && (
            <div className="info-backdrop" onClick={() => setShowRules(false)}>
              <div className="info-card" onClick={(e) => e.stopPropagation()} style={{ background: C.bg, display: "flex", flexDirection: "column", border: `1px solid ${C.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.55)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>Rules &amp; Info</div>
                  <button onClick={() => setShowRules(false)} aria-label="Close" style={{ background: "transparent", border: "none", color: C.muted, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
                </div>
                <div style={{ flex: 1, overflowY: "auto", padding: "16px 12px 24px" }}>
                  <RulesContent />
                </div>
              </div>
            </div>
          )}

          {showMore && (
            <MoreMenu replayOn={replay.on} onToggleReplay={toggleReplay}
              onViewRules={() => setShowRules(true)} onSwitchGroup={onSwitchGroup}
              onClose={() => setShowMore(false)} />
          )}

          {showSearch && (
            <LeagueSearchOverlay ranked={ranked}
              onClose={() => setShowSearch(false)}
              onSelectPlayer={openPlayerModal} onSelectTeam={openTeamModal} />
          )}

          {showNotifications && (
            <LeagueNotificationsDrawer matches={matches} ranked={ranked} matchPtsById={matchPtsById}
              onClose={() => setShowNotifications(false)} onSeenUpdate={setNotifSeenTs} />
          )}

          <BottomNav tab={tab} showMore={showMore} onNav={navTo} onMore={() => setShowMore(true)} />
        </div>
      );
    }

    // ── group gate (same pattern as the WC app: reassign the roster global
    //    BEFORE App's first render, so every scoring call reads it live) ────
    const CREATED_LEAGUES_KEY = "lsw_created";
    function loadCreatedLeagues() {
      if (typeof LEAGUE_GROUPS === "undefined") return;
      try {
        const stored = JSON.parse(localStorage.getItem(CREATED_LEAGUES_KEY) || "{}");
        Object.keys(stored).forEach(code => { if (!LEAGUE_GROUPS[code]) LEAGUE_GROUPS[code] = stored[code]; });
      } catch (e) { /* ignore corrupt storage */ }
    }
    function saveCreatedLeague(group) {
      try {
        const stored = JSON.parse(localStorage.getItem(CREATED_LEAGUES_KEY) || "{}");
        stored[group.code] = group;
        localStorage.setItem(CREATED_LEAGUES_KEY, JSON.stringify(stored));
      } catch (e) { /* ignore */ }
    }

    function GroupGate() {
      const [ready] = useState(() => { loadCreatedLeagues(); return true; });
      const [groupKey, setGroupKey] = useState(() => {
        const k = localStorage.getItem(GROUP_STORAGE_KEY);
        return (k && typeof LEAGUE_GROUPS !== "undefined" && LEAGUE_GROUPS[k]) ? k : null;
      });
      const [mode, setMode] = useState("menu"); // menu · join · create
      const [input, setInput] = useState("");
      const [bad, setBad] = useState(false);
      // create form
      const [leagueName, setLeagueName] = useState("");
      const [playersText, setPlayersText] = useState("");
      const [createErr, setCreateErr] = useState("");

      const enter = (key) => {
        if (typeof lgEnsureTeams === "function") lgEnsureTeams(LEAGUE_GROUPS[key]);
        localStorage.setItem(GROUP_STORAGE_KEY, key);
        setGroupKey(key);
      };

      if (groupKey && typeof LEAGUE_GROUPS !== "undefined" && LEAGUE_GROUPS[groupKey]) {
        if (typeof lgEnsureTeams === "function") lgEnsureTeams(LEAGUE_GROUPS[groupKey]);
        LEAGUE_PLAYERS = LEAGUE_GROUPS[groupKey].players;
        return <App group={LEAGUE_GROUPS[groupKey]} onSwitchGroup={() => {
          localStorage.removeItem(GROUP_STORAGE_KEY);
          setGroupKey(null); setMode("menu"); setInput(""); setBad(false);
        }} />;
      }

      const submitJoin = (e) => {
        e.preventDefault();
        const k = typeof leagueMatchGroupCode === "function" ? leagueMatchGroupCode(input) : null;
        if (k) enter(k); else setBad(true);
      };
      const submitCreate = (e) => {
        e.preventDefault();
        const name = leagueName.trim();
        if (!name) { setCreateErr("Give your league a name."); return; }
        const names = playersText.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
        const seen = {}, uniq = [];
        names.forEach(n => { const k = n.toLowerCase(); if (!seen[k]) { seen[k] = 1; uniq.push(n); } });
        if (uniq.length < 2) { setCreateErr("Add at least two players (one per line)."); return; }
        let code = name.toUpperCase().replace(/[^A-Z0-9]+/g, "");
        if (!code) code = "LEAGUE";
        while (LEAGUE_GROUPS[code]) code += Math.floor(Math.random() * 10); // avoid clashing an existing code
        const group = {
          code, label: name,
          players: uniq.map(n => ({ name: n })).concat([{ name: "Grim Reaper", grimReaper: true }]),
        };
        if (typeof lgEnsureTeams === "function") lgEnsureTeams(group);
        LEAGUE_GROUPS[code] = group;
        saveCreatedLeague(group);
        enter(code);
      };

      const shell = (children) => (
        <div style={{ padding: "64px 24px 40px", textAlign: "center", maxWidth: 480, margin: "0 auto" }}>
          <div style={{ fontSize: 26, fontWeight: 800, marginBottom: 4 }}>League Sweeps <span style={{ color: C.accent }}>26/27</span></div>
          {children}
        </div>
      );
      const bigBtn = (label, sub, onClick, primary) => (
        <button onClick={onClick} style={{
          width: "100%", maxWidth: 320, padding: "16px 18px", marginTop: 14, cursor: "pointer",
          background: primary ? C.accent : C.card, color: primary ? C.bg : C.text,
          border: `1px solid ${primary ? C.accent : C.border}`, borderRadius: 14, textAlign: "left",
          display: "flex", flexDirection: "column", gap: 3,
        }}>
          <span style={{ fontSize: 15, fontWeight: 800 }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 500, color: primary ? "rgba(13,31,18,0.75)" : C.muted }}>{sub}</span>
        </button>
      );
      const backLink = (
        <button onClick={() => { setMode("menu"); setBad(false); setCreateErr(""); }}
          style={{ marginTop: 22, background: "none", border: "none", color: C.muted, fontSize: 13, cursor: "pointer" }}>‹ Back</button>
      );

      if (mode === "join") {
        return shell(<>
          <div style={{ color: C.muted, fontSize: 13, margin: "6px 0 22px" }}>Enter the code your league organiser shared.</div>
          <form onSubmit={submitJoin}>
            <input value={input} onChange={e => { setInput(e.target.value); setBad(false); }}
              placeholder="LEAGUE CODE" autoFocus
              style={{ width: "100%", maxWidth: 300, padding: "13px 14px", fontSize: 16, background: C.surface, color: C.text,
                border: `1px solid ${bad ? C.red : C.border}`, borderRadius: 10, textAlign: "center", textTransform: "uppercase", outline: "none" }} />
            <div style={{ marginTop: 12 }}>
              <button type="submit" style={{ background: C.accent, color: C.bg, fontWeight: 800, fontSize: 14, border: "none", borderRadius: 10, padding: "11px 34px", cursor: "pointer" }}>Join</button>
            </div>
            {bad && <div style={{ color: C.dangerTextBright, fontSize: 12, marginTop: 10 }}>Unknown code — check with whoever runs your league.</div>}
          </form>
          {backLink}
        </>);
      }
      if (mode === "create") {
        return shell(<>
          <div style={{ color: C.muted, fontSize: 13, margin: "6px 0 20px" }}>Name your league and add the players — we'll draw everyone a balanced spread of teams.</div>
          <form onSubmit={submitCreate} style={{ textAlign: "left", maxWidth: 320, margin: "0 auto" }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: C.dim, letterSpacing: "0.08em", textTransform: "uppercase" }}>League name</label>
            <input value={leagueName} onChange={e => { setLeagueName(e.target.value); setCreateErr(""); }} placeholder="e.g. The Office League" autoFocus
              style={{ width: "100%", boxSizing: "border-box", padding: "11px 13px", marginTop: 6, marginBottom: 16, fontSize: 15, background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 10, outline: "none" }} />
            <label style={{ fontSize: 11, fontWeight: 700, color: C.dim, letterSpacing: "0.08em", textTransform: "uppercase" }}>Players <span style={{ textTransform: "none", fontWeight: 500, color: C.muted }}>(one per line)</span></label>
            <textarea value={playersText} onChange={e => { setPlayersText(e.target.value); setCreateErr(""); }} placeholder={"Alex\nBen\nCharlie\n…"} rows={6}
              style={{ width: "100%", boxSizing: "border-box", padding: "11px 13px", marginTop: 6, fontSize: 15, background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 10, outline: "none", resize: "vertical", fontFamily: "inherit" }} />
            {createErr && <div style={{ color: C.dangerTextBright, fontSize: 12, marginTop: 8 }}>{createErr}</div>}
            <button type="submit" style={{ width: "100%", marginTop: 16, background: C.accent, color: C.bg, fontWeight: 800, fontSize: 14, border: "none", borderRadius: 10, padding: "12px", cursor: "pointer" }}>Create &amp; draw teams</button>
          </form>
          <div style={{ textAlign: "center" }}>{backLink}</div>
        </>);
      }
      // menu
      return shell(<>
        <div style={{ color: C.muted, fontSize: 13, margin: "6px 0 26px" }}>Premier League &amp; Championship sweepstake.</div>
        {bigBtn("Join a league", "Enter a code you've been given", () => { setMode("join"); }, true)}
        {bigBtn("Create a league", "Start a new one and draw the teams", () => { setMode("create"); }, false)}
      </>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GroupGate />);
  </script>
</body>
</html>
