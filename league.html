    // ── HOME — dashboard mirroring the WC HomeTab section by section, on
    //    the league's 7-day rhythm instead of the WC's rolling 24h ──────────
    // ── MatchFocusCard — WC-parity live/next match card at the top of Home.
    //    Swipeable carousel of the live batch (or the next kickoff batch),
    //    with a countdown when upcoming. No live/upcoming matches → renders
    //    nothing. Team sides tap through to the team card (the league has no
    //    head-to-head match modal). ───────────────────────────────────────────
    function LeagueMatchFocusCard({ matches, matchPtsById = {}, onTeamClick }) {
      const [countdown, setCountdown] = React.useState("");
      const [idx, setIdx] = React.useState(0);
      const trackRef = React.useRef(null);
      const drag = React.useRef({ startX: 0, dx: 0, active: false, w: 0 });
      const ANIM = "transform 0.28s cubic-bezier(0.4,0,0.2,1)";
      const nowMs = Date.now();
      const koPassed = (m) => new Date(m.utcDate).getTime() <= nowMs;
      const isLiveM = (m) => m.status === "IN_PLAY" || m.status === "PAUSED" || ((m.status === "SCHEDULED" || m.status === "TIMED") && koPassed(m));
      const liveMatches = matches.filter(isLiveM).sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
      const isLive = liveMatches.length > 0;
      const upcomingSorted = matches.filter(m => (m.status === "SCHEDULED" || m.status === "TIMED") && !koPassed(m)).sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
      const nextTime = upcomingSorted.length ? new Date(upcomingSorted[0].utcDate).getTime() : null;
      const nextBatch = nextTime ? upcomingSorted.filter(m => Math.abs(new Date(m.utcDate).getTime() - nextTime) < 60000) : [];
      const games = isLive ? liveMatches : nextBatch;
      const count = games.length;
      const multi = count > 1;
      const safeIdx = Math.max(0, Math.min(idx, count - 1));
      React.useEffect(() => { const t = trackRef.current; if (!t) return; t.style.transition = ANIM; t.style.transform = `translateX(${-safeIdx * 100}%)`; }, [safeIdx, count]);
      React.useEffect(() => { if (idx > count - 1) setIdx(Math.max(0, count - 1)); }, [count]);
      const settle = React.useCallback((i) => { const t = trackRef.current; const c = Math.max(0, Math.min(count - 1, i)); if (t) { t.style.transition = ANIM; t.style.transform = `translateX(${-c * 100}%)`; } setIdx(c); }, [count]);
      const onDown = (e) => { const d = drag.current; d.active = true; d.startX = e.clientX; d.dx = 0; d.w = e.currentTarget.clientWidth; if (multi && trackRef.current) trackRef.current.style.transition = "none"; if (e.currentTarget.setPointerCapture) e.currentTarget.setPointerCapture(e.pointerId); };
      const onMove = (e) => { const d = drag.current; if (!d.active || !multi) return; d.dx = e.clientX - d.startX; const edge = (safeIdx === 0 && d.dx > 0) || (safeIdx === count - 1 && d.dx < 0); const eff = edge ? d.dx * 0.35 : d.dx; if (trackRef.current) trackRef.current.style.transform = `translateX(calc(${-safeIdx * 100}% + ${eff}px))`; };
      const onUp = () => { const d = drag.current; if (!d.active) return; d.active = false; const th = Math.max(40, d.w * 0.15); if (d.dx <= -th) settle(safeIdx + 1); else if (d.dx >= th) settle(safeIdx - 1); else settle(safeIdx); };
      React.useEffect(() => {
        if (isLive || !nextBatch[0]) { setCountdown(""); return; }
        const tick = () => {
          const diff = new Date(nextBatch[0].utcDate) - new Date();
          if (diff <= 0) { setCountdown(""); return; }
          const hh = Math.floor(diff / 3600000), mm = Math.floor((diff % 3600000) / 60000), ss = Math.floor((diff % 60000) / 1000);
          setCountdown(hh > 0 ? `${hh}h ${String(mm).padStart(2, "0")}m ${String(ss).padStart(2, "0")}s` : `${mm}m ${String(ss).padStart(2, "0")}s`);
        };
        tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
      }, [isLive, nextBatch[0] && nextBatch[0].id]);
      if (games.length === 0) return null;
      const renderGame = (m) => {
        const hId = m.homeTeam.id, aId = m.awayTeam.id;
        const hT = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[hId];
        const aT = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[aId];
        const hOwner = typeof leagueOwnerOfTeamId === "function" ? (leagueOwnerOfTeamId(hId) || {}).name : null;
        const aOwner = typeof leagueOwnerOfTeamId === "function" ? (leagueOwnerOfTeamId(aId) || {}).name : null;
        const hN = (hT && hT.name) || m.homeTeam.shortName || "TBD";
        const aN = (aT && aT.name) || m.awayTeam.shortName || "TBD";
        const livePts = matchPtsById[m.id];
        const mHasScore = m.score && m.score.fullTime && m.score.fullTime.home != null && m.score.fullTime.away != null;
        const mKicked = (m.status === "SCHEDULED" || m.status === "TIMED") && new Date(m.utcDate).getTime() <= Date.now();
        return (
          <div key={m.id} style={{ flex: "0 0 100%", display: "flex", alignItems: "center" }}>
            <div onClick={onTeamClick && hT ? () => onTeamClick(hId) : undefined} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, cursor: onTeamClick && hT ? "pointer" : "default" }}>
              <Crest teamId={hId} size={24} />
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{hOwner || hN}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{hN}{hT ? ` (P${hT.pot})` : ""}</div>
                {livePts && livePts.home > 0 && <div style={{ fontSize: 10, fontWeight: 800, color: C.accent, marginTop: 2 }}>+{livePts.home} pts</div>}
              </div>
            </div>
            <div style={{ textAlign: "center", padding: "0 8px", flexShrink: 0 }}>
              {mHasScore ? <div style={{ fontSize: 16, fontWeight: 800, color: C.red, letterSpacing: 2 }}>{m.score.fullTime.home}–{m.score.fullTime.away}</div>
                : mKicked ? <div style={{ fontSize: 12, fontWeight: 800, color: C.red, marginBottom: 2, letterSpacing: "0.06em" }}>LIVE</div>
                  : <div style={{ fontSize: 13, color: C.muted, marginBottom: 4 }}>vs</div>}
              {mKicked && !mHasScore && <div style={{ fontSize: 8, color: C.muted, marginTop: 3 }}>awaiting score</div>}
            </div>
            <div onClick={onTeamClick && aT ? () => onTeamClick(aId) : undefined} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end", cursor: onTeamClick && aT ? "pointer" : "default" }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{aOwner || aN}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{aN}{aT ? ` (P${aT.pot})` : ""}</div>
                {livePts && livePts.away > 0 && <div style={{ fontSize: 10, fontWeight: 800, color: C.accent, marginTop: 2 }}>+{livePts.away} pts</div>}
              </div>
              <Crest teamId={aId} size={24} />
            </div>
          </div>
        );
      };
      return (
        <div style={{ ...s.card, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 14px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              {isLive && <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: C.red }} />}
              <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.1em", color: isLive ? C.red : C.muted }}>{isLive ? "LIVE NOW" : "NEXT MATCH"}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {!isLive && countdown && <span style={{ fontSize: 11, fontFamily: "monospace", color: C.accent }}>{countdown}</span>}
              {multi && <span style={{ fontSize: 10, fontWeight: 700, color: C.muted }}>{safeIdx + 1}/{count}</span>}
            </div>
          </div>
          <div onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
            style={{ padding: "8px 14px 12px", overflow: "hidden", touchAction: multi ? "pan-y" : "auto" }}>
            <div ref={trackRef} style={{ display: "flex" }}>{games.map(renderGame)}</div>
          </div>
          {multi && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 7, paddingBottom: 10, height: 16 }}>
              {games.map((m, i) => (<button key={m.id} onClick={() => settle(i)} aria-label={`Match ${i + 1}`} style={{ width: i === safeIdx ? 8 : 6, height: i === safeIdx ? 8 : 6, padding: 0, border: "none", cursor: "pointer", borderRadius: "50%", background: i === safeIdx ? (isLive ? C.red : C.accent) : C.border, transition: "all 0.2s" }} />))}
            </div>
          )}
        </div>
      );
    }

    // ── All Accolades modal — every player's currently-held badges, opened
    //    from Home's New Accolades section (WC parity). ─────────────────────────
    function LeagueAllAccoladesModal({ ranked, badges, onClose, onPlayerClick }) {
      const [closing, setClosing] = React.useState(false);
      const closingRef = React.useRef(false);
      const triggerClose = () => { if (closingRef.current) return; closingRef.current = true; setClosing(true); setTimeout(onClose, 250); };

    }

    function HomeTab({ matches, ranked, badges, weekWindow, matchPtsById, hist, outcomes, anchorIso, setTab, openPlayerModal, openTeamModal, openMatchModal }) {
      const real = ranked;
      const newAccolades = useMemo(
        () => (typeof computeNewLeagueBadges === "function" ? computeNewLeagueBadges(badges, matches, anchorIso) : []),
        [badges, matches, anchorIso]
      );
      const cutoff = new Date(new Date(anchorIso).getTime() - 7 * 24 * 3600 * 1000).toISOString();
      const recentResults = matches
        .filter(m => m.status === "FINISHED" && m.utcDate >= cutoff && m.utcDate <= anchorIso)
        .sort((a, b) => b.utcDate.localeCompare(a.utcDate))
        .slice(0, 8);
      const topThree = real.slice(0, 3);
      const upNext = matches
        .filter(m => (m.status === "SCHEDULED" || m.status === "TIMED") && m.utcDate > anchorIso)
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate)).slice(0, 6);
      const rankColors = ["#84cc16", "#94a3b8", "#b45309"];
      const [showAllAccolades, setShowAllAccolades] = React.useState(false);

      // Teams ranked by sweepstake points (each owned team = one row), same
      // source as the Teams tab — for the Leading Team card + Top Teams section.
      const teamHist = useMemo(
        () => (typeof deriveLeagueTeamHistory === "function" ? deriveLeagueTeamHistory(matches).history : {}),
        [matches]
      );
      const buildTeamRows = (rk) => rk
        .flatMap(p => (p.teams || []).map(t => ({ teamId: t.teamId, name: t.name, pot: t.pot, pts: t.total, owner: p.name })))
        .sort((a, b) => (b.pts - a.pts) || a.name.localeCompare(b.name));
      const teamRows = useMemo(() => buildTeamRows(ranked).map(t => ({ ...t, hist: teamHist[t.teamId] || [0] })), [ranked, teamHist]);
      const topTeam = teamRows[0] || null;
      const topTeamThree = teamRows.slice(0, 3);
      const teamWeekMove = useMemo(() => {
        const rankNow = {}; teamRows.forEach((t, i) => { rankNow[t.teamId] = i; });
        const cut = new Date(anchorIso).getTime() - 7 * 864e5;
        const past = matches.filter(m => new Date(m.utcDate).getTime() <= cut);
        const pastRows = buildTeamRows(typeof scoreLeaguePlayers === "function" ? scoreLeaguePlayers(past) : []);
        const rankPast = {}; pastRows.forEach((t, i) => { rankPast[t.teamId] = i; });
        const out = {};
        teamRows.forEach(t => { const n = rankNow[t.teamId], pa = rankPast[t.teamId]; out[t.teamId] = (pa != null && n != null) ? pa - n : 0; });
        return out;
      }, [teamRows, matches, anchorIso]);
      const posPill = (delta) => (
        <div style={{
          display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, marginTop: 3,
          background: delta === 0 ? "rgba(148,163,184,0.12)" : delta > 0 ? C.posBg : C.negBg,
          color: delta === 0 ? "#94a3b8" : delta > 0 ? C.accent : C.red,
        }}>{delta === 0 ? "0 pos" : `${delta > 0 ? "▲" : "▼"} ${Math.abs(delta)} pos`}</div>
      );

      const Section = ({ icon, title, onOpen, linkLabel, empty, children }) => (
        <div style={{ marginBottom: 16 }}>
          <div style={{ ...s.label, display: "flex", alignItems: "center", gap: 6 }}><span>{icon}</span>{title}</div>
          <div style={s.card}>
            {empty ? <div style={{ padding: "14px", fontSize: 12, color: C.muted }}>{empty}</div> : children}
            {onOpen && (
              <button onClick={onOpen} style={{
                width: "100%", padding: "10px 14px", background: "transparent", border: "none",
                borderTop: `1px solid ${C.border}`, color: C.accent, fontSize: 12, fontWeight: 700,
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
              }}>
                {linkLabel} <span style={{ fontSize: 14, lineHeight: 1 }}>›</span>
              </button>
            )}
          </div>
        </div>
      );

      return (
        <div style={{ padding: "0 14px" }}>
          <LeagueMatchFocusCard matches={matches} matchPtsById={matchPtsById} onTeamClick={openTeamModal} />

          {topThree[0] && (
            <div onClick={() => openPlayerModal(topThree[0].name)} style={{
              ...s.card, padding: "18px 16px", marginBottom: 16, textAlign: "center", cursor: "pointer",
              background: "linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.02))",
            }}>
              <div style={{ fontSize: 11, color: C.dim, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Currently Leading</div>
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{topThree[0].name}</span>
              </div>
              <div style={{ fontSize: 30, fontWeight: 900, color: C.accent, lineHeight: 1 }}>
                {topThree[0].total}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
              </div>
            </div>
          )}

          <Section icon="🏆" title="Top Players" onOpen={() => { window.scrollTo(0, 0); setTab("table", "players"); }} linkLabel="View all players"
            empty={topThree.length === 0 ? "No standings yet" : null}>
            {topThree.map((p, i) => {
              const delta = (weekWindow[p.name] || {}).move || 0;
              return (
                <div key={p.name} onClick={() => openPlayerModal(p.name)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < topThree.length - 1 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{
                    width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                    background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 800, color: "#080c18",
                  }}>{i + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.text, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }}>{p.name}</div>
                    <CrestRow teams={p.teams} outcomes={outcomes} baseHeight={22} />
                  </div>
                  <Sparkline data={hist[p.name] || []} width={64} height={28} color={p.total < 0 ? C.red : p.total === 0 ? C.neutral : C.accent} />
                  <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: C.text, lineHeight: 1 }}>{p.total}</div>
                    {posPill(delta)}
                  </div>
                </div>
              );
            })}
          </Section>

          {topTeam && (
            <div onClick={() => openTeamModal(topTeam.teamId)} style={{
              ...s.card, padding: "18px 16px", marginBottom: 16, textAlign: "center", cursor: "pointer",
              background: "linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.02))",
            }}>
              <div style={{ fontSize: 11, color: C.dim, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Leading Team</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 8 }}>
                <Crest teamId={topTeam.teamId} size={34} />

              <div style={{ fontSize: 30, fontWeight: 900, color: topTeam.pts < 0 ? C.red : C.accent, lineHeight: 1 }}>
                {topTeam.pts}<span style={{ fontSize: 14, fontWeight: 700, color: C.muted }}> pts</span>
              </div>
            </div>
          )}

          <Section icon="⚽" title="Top Teams" onOpen={() => { window.scrollTo(0, 0); setTab("table", "teams"); }} linkLabel="View all teams"
            empty={topTeamThree.length === 0 ? "No standings yet" : null}>
            {topTeamThree.map((t, i) => (
              <div key={t.teamId} onClick={() => openTeamModal(t.teamId)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < topTeamThree.length - 1 ? `1px solid ${C.border}` : "none" }}>
                <div style={{
                  width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                  background: rankColors[i], display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 800, color: "#080c18",
                }}>{i + 1}</div>
                <Crest teamId={t.teamId} size={28} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}<span style={{ fontSize: 11, fontWeight: 600, color: C.muted }}> (P{t.pot})</span></div>
                  <div style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.owner || "—"}</div>
                </div>
                <Sparkline data={t.hist} width={64} height={28} color={t.pts < 0 ? C.red : t.pts === 0 ? C.neutral : C.accent} />
                <div style={{ textAlign: "right", flexShrink: 0, minWidth: 50 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: t.pts < 0 ? C.red : C.text, lineHeight: 1 }}>{t.pts}</div>
                  {posPill(teamWeekMove[t.teamId] || 0)}
                </div>
              </div>
            ))}
          </Section>

          <Section icon="🏅" title="New Accolades" onOpen={() => setShowAllAccolades(true)} linkLabel="View all accolades"
            empty={newAccolades.length === 0 ? "No new accolades in the last 7 days" : null}>
            {newAccolades.map((b, i) => (
              <div key={i} onClick={() => openPlayerModal(b.name)} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px", cursor: "pointer", borderBottom: i < newAccolades.length - 1 ? `1px solid ${C.border}` : "none" }}>
                <span style={{ fontSize: 18, lineHeight: 1.3 }}>{b.icon}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
                    {b.name} — <span style={{ color: C.accent }}>{b.label}</span>
                  </div>
                  <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{b.desc}</div>
                </div>
              </div>
            ))}
          </Section>
          {showAllAccolades && (
            <LeagueAllAccoladesModal ranked={ranked} badges={badges}
              onClose={() => setShowAllAccolades(false)}
              onPlayerClick={(name) => { setShowAllAccolades(false); openPlayerModal(name); }} />
          )}

          <Section icon="🌐" title="Recent Results" onOpen={() => { window.scrollTo(0, 0); setTab("scores"); }} linkLabel="View all scores"
            empty={recentResults.length === 0 ? "No matches in the last 7 days" : null}>
            {recentResults.map((m, i) => (
              <HomeMatchRow key={m.id} m={m} matchPtsById={matchPtsById} onTeamClick={openTeamModal} onMatchClick={openMatchModal} isLast={i === recentResults.length - 1} banners />
            ))}
          </Section>

          <Section icon="📅" title="Up Next" onOpen={() => { window.scrollTo(0, 0); setTab("scores"); }} linkLabel="View all scores"
            empty={upNext.length === 0 ? "No upcoming fixtures" : null}>
            {upNext.map((m, i) => (
              <HomeMatchRow key={m.id} m={m} matchPtsById={matchPtsById} onTeamClick={openTeamModal} onMatchClick={openMatchModal} isLast={i === upNext.length - 1} banners />
            ))}
          </Section>
        </div>
      );
    }

    // ── Leagues view — switch across every competition's conventional table.
    //    The switcher is built from LEAGUE_COMPETITIONS, so adding a league
    //    there adds it here automatically. ────────────────────────────────────
    // A single Champions League tie box (two clubs stacked, aggregate score,
    // winner highlighted / loser dimmed + ✕). Shared by the knockout bracket
    // and the play-off fixtures row under the league table.
    function CLTie({ tie, matches, onTeamClick, height = 76 }) {
      const teamName = (id) => {
        const t = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
        if (t) return t.name;
        const m = matches.find(m => m.homeTeam.id === id || m.awayTeam.id === id);
        return m ? (m.homeTeam.id === id ? (m.homeTeam.shortName || m.homeTeam.tla) : (m.awayTeam.shortName || m.awayTeam.tla)) : "#" + id;
      };
      const ownerOf = (id) => { const o = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(id) : null; return o ? o.name : null; };
      const Slot = ({ id, score, isWinner, isElim, side }) => {
        const clickable = onTeamClick && id && typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
        const owner = id ? ownerOf(id) : null;
        return (
          <div onClick={clickable ? () => onTeamClick(id) : undefined} style={{
            display: "flex", alignItems: "center", gap: 7, padding: "4px 8px", height: 38, boxSizing: "border-box", minWidth: 0, overflow: "hidden",
            borderBottom: side === "home" ? `1px solid ${C.border}` : "none",
            background: isWinner ? "rgba(34,197,94,0.08)" : "transparent", cursor: clickable ? "pointer" : "default",
          }}>
            {id ? (
              <div style={{ position: "relative", flexShrink: 0, lineHeight: 0 }}>
                <img src={typeof leagueCrest === "function" ? leagueCrest(id) : ""} alt="" width={20} height={20}

        <div style={{ border: `1px solid ${C.border}`, borderRadius: 6, overflow: "hidden", height, boxSizing: "border-box", background: C.card }}>

          <Slot id={tie.b} side="away" score={tie.played ? tie.aggB : null} isWinner={tie.winner === tie.b} isElim={!!tie.winner && tie.winner !== tie.b} />

    // Knockout play-off legs as a vertical list of spaced match cards, under

    function CLPlayoffsRow({ matches, matchPtsById, onTeamClick, onMatchClick }) {
      const games = matches

    // ── Champions League knockout bracket — the WC KnockoutBracket layout
    //    (columns of absolute-positioned tie boxes spaced by round so the tree
    //    reads without connector lines). Play-offs live under the league table.
    function CLBracket({ matches, onTeamClick }) {
      const bracket = typeof deriveCLBracket === "function" ? deriveCLBracket(matches) : { rounds: [] };
      const stageTies = { LAST_16: [], QUARTER_FINALS: [], SEMI_FINALS: [], FINAL: [] };
      bracket.rounds.forEach(r => { if (stageTies[r.stage]) stageTies[r.stage] = r.ties.slice(); });
      if (["LAST_16", "QUARTER_FINALS", "SEMI_FINALS", "FINAL"].every(s => !stageTies[s].length)) {
        return <div style={{ textAlign: "center", color: C.muted, fontSize: 13, padding: "40px 20px" }}>Knockout bracket hasn't started yet</div>;
      }
      // Order each round off the next one's winners (anchored backward from the
      // final) so a tie sits centred between the two that feed it; fall back to
      // natural order for any round whose winners aren't decided yet.
      const feederOf = { FINAL: "SEMI_FINALS", SEMI_FINALS: "QUARTER_FINALS", QUARTER_FINALS: "LAST_16" };
      const orderFeeders = (stage, ties) => {
        const pool = (stageTies[feederOf[stage]] || []).slice();
        if (!pool.length) return [];
        const out = []; let matched = 0;
        ties.forEach(tie => [tie && tie.a, tie && tie.b].forEach(team => {
          const idx = team != null ? pool.findIndex(ft => ft && ft.winner === team) : -1;
          if (idx >= 0) { out.push(pool[idx]); pool[idx] = null; matched++; } else out.push(null);
        }));
        return matched ? out : (stageTies[feederOf[stage]] || []);
      };
      const finalR = stageTies.FINAL.slice(0, 1);
      const sfR = finalR.length ? orderFeeders("FINAL", finalR) : stageTies.SEMI_FINALS;
      const qfR = (sfR && sfR.some(Boolean)) ? orderFeeders("SEMI_FINALS", sfR) : stageTies.QUARTER_FINALS;
      const r16R = (qfR && qfR.some(Boolean)) ? orderFeeders("QUARTER_FINALS", qfR) : stageTies.LAST_16;
      const pad = (arr, n) => { const a = (arr || []).slice(0, n); while (a.length < n) a.push(null); return a; };
      const rounds = [
        { key: "r16", label: "Round of 16", data: pad(r16R, 8) },
        { key: "qf", label: "Quarter-finals", data: pad(qfR, 4) },
        { key: "sf", label: "Semi-finals", data: pad(sfR, 2) },
        { key: "fin", label: "🏆 Final", data: pad(finalR, 1) },
      ];
      const MATCH_H = 76, GAP = 12, SLOT = MATCH_H + GAP, totalHeight = 8 * SLOT - GAP;
      const topFor = (roundIdx, i) => { const sl = Math.pow(2, roundIdx) * SLOT; return sl * i + (sl - MATCH_H) / 2; };
      return (
        <div>
          <div style={{ fontSize: 11, color: C.muted, padding: "0 14px 10px" }}>Two-legged ties show the aggregate score. Tap a club for its card.</div>
          <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch", paddingBottom: 8 }}>
            <div style={{ display: "flex", gap: 16, padding: "0 12px 8px", alignItems: "flex-start", width: "max-content" }}>
              {rounds.map((round, idx) => (
                <div key={round.key} style={{ display: "flex", flexDirection: "column", minWidth: 170 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: round.key === "fin" ? C.accent : C.muted, textTransform: "uppercase", letterSpacing: 1, padding: "0 4px 8px", textAlign: "center" }}>{round.label}</div>
                  <div style={{ position: "relative", height: totalHeight, width: 170 }}>
                    {round.data.map((tie, i) => (
                      <div key={i} style={{ position: "absolute", top: topFor(idx, i), left: 0, right: 0, height: MATCH_H }}><CLTie tie={tie} matches={matches} onTeamClick={onTeamClick} /></div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // The Champions League runs League phase → Knockouts (a play-off round then
    // the R16→final bracket). A sub-nav lets you follow those phases in order,

    // ── Tables tab ──────────────────────────────────────────────────────────
    function TablesTab({ matches, tables, outcomes, onTeamClick, comp = "PL", thresholds }) {
      const table = tables[comp] || [];
      // Dotted qualification cut-lines (e.g. the CL table): { after, label, color }.
      const threshAfter = {};
      (thresholds || []).forEach(t => { threshAfter[t.after] = t; });
      const teamName = (id) => {
        const t = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[id];
        if (t) return t.name;
        const m = matches.find(m => m.homeTeam.id === id || m.awayTeam.id === id);
        if (!m) return "#" + id;
        return m.homeTeam.id === id ? (m.homeTeam.shortName || m.homeTeam.tla) : (m.awayTeam.shortName || m.awayTeam.tla);
      };
      const owner = (id) => {
        const o = typeof leagueOwnerOfTeamId === "function" ? leagueOwnerOfTeamId(id) : null;
        return o ? o.name : null;
      };
      const th = { fontSize: 11, color: C.muted, fontWeight: 600, textAlign: "right", padding: "4px 3px" };
      const td = { fontSize: 12, textAlign: "right", padding: "10px 3px", whiteSpace: "nowrap" };
      return (
        <div style={{ padding: "0 10px" }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "8px 7px", overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead><tr>
                <th style={{ ...th, textAlign: "left" }} colSpan={2}>Team</th>
                <th style={th}>P</th><th style={th}>GD</th><th style={th}>Pts</th>
                <th style={th}>W</th><th style={th}>D</th><th style={th}>L</th>
              </tr></thead>
              <tbody>
                {table.map((r, i) => {
                  const o = outcomes[r.teamId];
                  const own = owner(r.teamId);
                  const known = typeof LEAGUE_TEAMS !== "undefined" && LEAGUE_TEAMS[r.teamId];
                  const cut = (i < table.length - 1) ? threshAfter[i + 1] : null;
                  return (
                    <React.Fragment key={r.teamId}>
                    <tr onClick={onTeamClick && known ? () => onTeamClick(r.teamId) : undefined}
                      style={{ borderTop: `1px solid ${C.border}`, cursor: onTeamClick && known ? "pointer" : "default" }}>
                      <td style={{ ...td, textAlign: "left", color: C.muted, width: 20, fontSize: 14 }}>{i + 1}</td>
                      <td style={{ ...td, textAlign: "left" }}>
                        {/* Player-first: the owner IS the row; the club is context */}
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 9 }}>
                          <Crest teamId={r.teamId} size={24} />
                          {own
                            ? <span><span style={{ fontWeight: 700, fontSize: 14 }}>{own}</span> <span style={{ fontSize: 12, color: C.muted }}>{teamName(r.teamId)}{potTag(r.teamId)}</span></span>
                            : <span style={{ fontSize: 13, color: C.muted }}>{teamName(r.teamId)}{potTag(r.teamId)}</span>}
                          {o && o.comp === comp && outcomeChip(o.outcome)}
                        </span>
                      </td>
                      <td style={td}>{r.played}</td>
                      <td style={td}>{r.gd > 0 ? "+" + r.gd : r.gd}</td>
                      <td style={{ ...td, fontWeight: 800 }}>{r.pts}</td>
                      <td style={td}>{r.w}</td><td style={td}>{r.d}</td><td style={td}>{r.l}</td>
                    </tr>
                    {cut && (
                      <tr aria-hidden="true">
                        <td colSpan={8} style={{ padding: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, borderTop: `2px dashed ${cut.color}`, margin: "2px 0", padding: "4px 3px 0" }}>
                            <span style={{ fontSize: 9, fontWeight: 800, color: cut.color, textTransform: "uppercase", letterSpacing: 0.6 }}>{cut.label}</span>
                          </div>
                        </td>
                      </tr>
                    )}
                    </React.Fragment>
                  );
                })}
                {table.length === 0 && <tr><td style={{ ...td, textAlign: "left" }} colSpan={8}>No matches yet.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Scores tab ──────────────────────────────────────────────────────────
    const dayKey = (d) => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

    // ── Scores day strip — the WC app's DayPicker: a horizontally-scrollable
    //    row of date pills (fades + desktop arrows), auto-centring the selected
    //    day, snap, no visible scrollbar.
    function DayPicker({ days, selected, onSelect }) {
      const scrollRef = useRef(null);
      const selectedKey = dayKey(selected);
      const today = new Date();
      const [atStart, setAtStart] = useState(true);
      const [atEnd, setAtEnd] = useState(true);
      const checkEdges = () => {
        const el = scrollRef.current;
        if (!el) return;
        setAtStart(el.scrollLeft <= 1);
        setAtEnd(el.scrollLeft + el.clientWidth >= el.scrollWidth - 1);
      };
      useEffect(() => {
        const el = scrollRef.current && scrollRef.current.querySelector(`[data-daykey="${selectedKey}"]`);
        if (el) el.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        const t = setTimeout(checkEdges, 350);
        return () => clearTimeout(t);
      }, [selectedKey]);
      const scrollBy = (dir) => scrollRef.current && scrollRef.current.scrollBy({ left: dir * 160, behavior: "smooth" });
      const arrowStyle = {
        position: "absolute", top: "50%", transform: "translateY(-50%)",
        width: 26, height: 26, borderRadius: "50%", border: `1px solid ${C.border}`,
        background: C.card, color: C.dim, cursor: "pointer", fontSize: 15, fontWeight: 700, lineHeight: 1, padding: 0,
      };
      return (
        <div style={{ position: "relative" }}>
          <div ref={scrollRef} onScroll={checkEdges} className="day-strip" style={{
            display: "flex", overflowX: "auto", WebkitOverflowScrolling: "touch", scrollSnapType: "x proximity",
          }}>
            {days.map(d => {
              const key = dayKey(d);
              const isSelected = key === selectedKey;
              const isToday = sameDay(d, today);
              return (
                <button key={key} data-daykey={key} onClick={() => onSelect(d)} style={{
                  flex: "0 0 auto", minWidth: 56, scrollSnapAlign: "center",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  padding: "6px 4px 8px", border: "none", cursor: "pointer", borderRadius: 8,
                  background: isToday ? "rgba(34,197,94,0.18)" : "transparent",
                  borderBottom: `3px solid ${isSelected ? C.accent : "transparent"}`,
                }}>
                  <span style={{ fontSize: 12, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>
                    {isToday ? "Today" : d.toLocaleDateString(undefined, { weekday: "short" })}
                  </span>
                  <span style={{ fontSize: 17, fontWeight: isSelected ? 800 : 500, color: isSelected ? C.text : C.muted }}>{d.getDate()}</span>
                </button>
              );
            })}
          </div>
          {!atStart && <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: 36, pointerEvents: "none", background: `linear-gradient(to right, ${C.bg} 0%, transparent 100%)` }} />}
          {!atEnd && <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: 36, pointerEvents: "none", background: `linear-gradient(to left, ${C.bg} 0%, transparent 100%)` }} />}
          {!atStart && <button className="day-nav-arrow" onClick={() => scrollBy(-1)} aria-label="Earlier days" style={{ ...arrowStyle, left: 2 }}>‹</button>}
          {!atEnd && <button className="day-nav-arrow" onClick={() => scrollBy(1)} aria-label="Later days" style={{ ...arrowStyle, right: 2 }}>›</button>}
        </div>
      );
    }

    function ScoresTab({ matches, matchPtsById, anchorIso, onTeamClick, onMatchClick }) {
      const [selectedDay, setSelectedDay] = useState(null);
      // Every calendar day spanned by the loaded matches (so browsing reveals
      // empty days rather than skipping them), mirroring the WC Scores tab.
      const scoreDays = useMemo(() => {
        if (matches.length === 0) return [];
        const dates = matches.map(m => new Date(m.utcDate));
        const start = new Date(Math.min(...dates)); start.setHours(0, 0, 0, 0);
        const end = new Date(Math.max(...dates)); end.setHours(0, 0, 0, 0);
        const days = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d));
        return days;
      }, [matches]);
      if (matches.length === 0) return <div style={{ color: C.muted, fontSize: 13, padding: 20, textAlign: "center" }}>No fixtures loaded yet.</div>;
      const anchor = new Date(anchorIso); anchor.setHours(0, 0, 0, 0);
      const defaultDay = anchor < scoreDays[0] ? scoreDays[0]
        : anchor > scoreDays[scoreDays.length - 1] ? scoreDays[scoreDays.length - 1] : anchor;
      const effectiveDay = selectedDay || defaultDay;
      const dayGames = matches
        .filter(m => sameDay(new Date(m.utcDate), effectiveDay))
        .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
      return (
        <div>
          <div style={{ padding: "0 8px 12px" }}>
            <DayPicker days={scoreDays} selected={effectiveDay} onSelect={setSelectedDay} />
          </div>
          <div style={{ padding: "0 14px" }}>
            {dayGames.length === 0
              ? <div style={{ color: C.muted, fontSize: 13, padding: "28px 0", textAlign: "center" }}>No matches on {fmtDay(effectiveDay.toISOString())}.</div>
              : dayGames.map(m => (
                  <LeagueMatchCard key={m.id} m={m} matchPtsById={matchPtsById} onMatchClick={onMatchClick} onTeamClick={onTeamClick} />
                ))}
          </div>
        </div>
      );
    }

        ? Object.keys(LEAGUE_COMPETITIONS).filter(c => LEAGUE_COMPETITIONS[c].type === "top") : [];

      return (

          {matchPts && refLg && (
            <div style={section}>
              <div style={h}>Match points <span style={{ fontSize: 11, fontWeight: 500, color: C.muted }}>· same in every league</span></div>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr><th style={{ ...th, textAlign: "left" }}></th>{[1, 2, 3, 4].map(p => <th key={p} style={{ ...th, color: POT_COLORS[p] }}>P{p}</th>)}</tr></thead>
                <tbody>
                  {["win", "draw"].map(kind => (
                    <tr key={kind} style={{ borderTop: `1px solid ${C.border}` }}>
